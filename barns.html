<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>إدارة الجمالونات — بيان المزرعة</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Lexend:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
<div class="page-wrap">
  <div id="page-header"></div>
  <div id="content"><div class="text-center py-5"><div class="spinner"></div></div></div>
  <footer class="text-center text-gray mt-5 pt-4 pb-3" style="border-top:1px solid var(--border)">
    © <span id="footer-year"></span> <span id="footer-farm"></span>
  </footer>
</div>
<script src="config.js"></script>
<script src="firebase.js"></script>
<script src="shared.js"></script>
<script>
const BARNS=[{id:'ج١',label:'جمالون ١',stalls:['ج١ع١','ج١ع٢']},{id:'ج٢',label:'جمالون ٢',stalls:['ج٢ع١','ج٢ع٢']},{id:'ج٣',label:'جمالون ٣',stalls:['ج٣ع١','ج٣ع٢']},{id:'ج٤',label:'جمالون ٤',stalls:['ج٤ع١','ج٤ع٢']},{id:'ج٥',label:'جمالون ٥',stalls:['ج٥ع١','ج٥ع٢']}];
const STALL_LABELS={'ج١ع١':'ج١ع١ (عنبر ١)','ج١ع٢':'ج١ع٢ (عنبر ٢)','ج٢ع١':'ج٢ع١','ج٢ع٢':'ج٢ع٢','ج٣ع١':'ج٣ع١','ج٣ع٢':'ج٣ع٢','ج٤ع١':'ج٤ع١','ج٤ع٢':'ج٤ع٢','ج٥ع١':'ج٥ع١','ج٥ع٢':'ج٥ع٢'};
const MAX_STALL=70; const WARN_STALL=50;
let animals=[], selectedBarn=null;

document.addEventListener('DOMContentLoaded', async ()=>{
  if(!requireAuth())return;
  const s=getSettings();
  document.getElementById('footer-year').textContent=ar(new Date().getFullYear());
  document.getElementById('footer-farm').textContent=s.farmName;
  renderNavbar('barns.html');
  animals=await fbGet('animals');
  renderBarnsPage();
});

function renderBarnsPage(){
  const alive=animals.filter(a=>a.status==='alive');
  renderPageHeader('<i class="bi bi-grid-3x3-gap-fill accent-text"></i> إدارة الجمالونات والعنابر',
    `٥ جمالونات • ١٠ عنابر • ${ar(alive.length)} رأس حي`,
    can('animals')?`<button class="action-btn primary" onclick="openTransferModal()"><i class="bi bi-arrow-left-right"></i> نقل حيوانات</button>`:''
  );
  const el=document.getElementById('content');

  const allInStalls=alive.filter(a=>a.barn).length;
  const unassigned=alive.filter(a=>!a.barn).length;

  el.innerHTML=`
  <div class="row g-3 mb-4">
    <div class="col-6 col-md-3"><div class="summary-card"><div class="summary-number accent-text">${ar(5)}</div><small class="text-gray">جمالونات</small></div></div>
    <div class="col-6 col-md-3"><div class="summary-card"><div class="summary-number" style="color:var(--blue)">${ar(10)}</div><small class="text-gray">عنابر</small></div></div>
    <div class="col-6 col-md-3"><div class="summary-card"><div class="summary-number green-text">${ar(allInStalls)}</div><small class="text-gray">رأس في العنابر</small></div></div>
    <div class="col-6 col-md-3"><div class="summary-card"><div class="summary-number" style="color:var(--gray)">${ar(unassigned)}</div><small class="text-gray">غير محدد</small></div></div>
  </div>

  <!-- Interactive Farm Map -->
  <div class="wonder-card mb-4">
    <div class="section-header mb-3"><div class="section-title"><i class="bi bi-map accent-text"></i> خريطة المزرعة التفاعلية</div><small class="text-gray">اضغط على أي جمالون لعرض تفاصيله</small></div>
    <div class="d-flex flex-wrap gap-2 justify-content-center" style="direction:ltr">
      ${BARNS.map(b=>{
        const total=alive.filter(a=>b.stalls.includes(a.barn)).length;
        const barnTotal=total;
        const cap=MAX_STALL*2;const pct=Math.min(100,Math.round(total/cap*100));
        const color=barnTotal>=MAX_STALL?'var(--red)':barnTotal>=WARN_STALL?'var(--orange)':'var(--green)';
        return`<div onclick="showBarnDetail('${b.id}')" style="width:140px;height:140px;border:2px solid ${color}44;border-radius:20px;background:${color}11;cursor:pointer;padding:14px;text-align:center;transition:.3s;display:flex;flex-direction:column;align-items:center;justify-content:center" onmouseover="this.style.borderColor='${color}'" onmouseout="this.style.borderColor='${color}44'">
          <div style="font-size:1.8rem">🏗️</div>
          <div class="fw-bold" style="color:${color};font-size:.9rem">${b.label}</div>
          <div style="font-family:'Lexend';font-size:1.4rem;font-weight:700;color:${color}">${ar(total)}</div>
          <small class="text-gray">رأس (${pct}٪)</small>
          <div class="finance-bar mt-1" style="width:100%;height:5px"><div class="finance-bar-fill" style="width:${pct}%;background:${color}"></div></div>
        </div>`;
      }).join('')}
    </div>
  </div>

  <!-- Stall details table -->
  <div class="wonder-card">
    <div class="section-header mb-3"><div class="section-title"><i class="bi bi-table accent-text"></i> تفصيل العنابر</div><button class="action-btn sm" onclick="exportStallsCSV()"><i class="bi bi-filetype-csv"></i> تصدير</button></div>
    <div class="table-responsive">
      <table class="tbl">
        <thead><tr><th>الجمالون</th><th>العنبر</th><th>إجمالي</th><th>ماعز</th><th>أغنام</th><th>مواليد</th><th>ذكور</th><th>إناث</th><th>نسبة الإشغال</th></tr></thead>
        <tbody>
          ${BARNS.map(b=>b.stalls.map((stall,si)=>{
            const sa=alive.filter(a=>a.barn===stall);
            const pct=Math.min(100,Math.round(sa.length/MAX_STALL*100));
            const c=sa.length>=MAX_STALL?'var(--red)':sa.length>=WARN_STALL?'var(--orange)':'var(--green)';
            return`<tr style="cursor:pointer" onclick="showStallDetail('${stall}')">
              ${si===0?`<td rowspan="2" class="fw-bold accent-text">${b.label}</td>`:''}
              <td class="fw-bold">${stall}</td>
              <td class="fw-bold">${ar(sa.length)}</td>
              <td>${ar(sa.filter(a=>a.species==='goat'&&a.purpose!=='birth').length)}</td>
              <td>${ar(sa.filter(a=>a.species==='sheep'&&a.purpose!=='birth').length)}</td>
              <td>${ar(sa.filter(a=>a.purpose==='birth').length)}</td>
              <td>${ar(sa.filter(a=>a.gender==='male').length)}</td>
              <td>${ar(sa.filter(a=>a.gender==='female').length)}</td>
              <td style="min-width:120px"><div class="d-flex align-items-center gap-2"><div class="finance-bar flex-grow-1" style="height:7px"><div class="finance-bar-fill" style="width:${pct}%;background:${c}"></div></div><small style="color:${c};min-width:35px">${pct}٪</small></div></td>
            </tr>`;
          }).join('')).join('')}
          <tr style="background:rgba(255,255,255,.03)"><td colspan="2" class="fw-bold green-text">غير محدد</td><td class="fw-bold">${ar(unassigned)}</td><td colspan="6"></td></tr>
        </tbody>
      </table>
    </div>
  </div>`;
}

window.showBarnDetail=function(barnId){
  const barn=BARNS.find(b=>b.id===barnId);if(!barn)return;
  const alive=animals.filter(a=>a.status==='alive');
  showModal(`<div class="farm-modal wide" onclick="event.stopPropagation()">
    <h4><i class="bi bi-building accent-text"></i> ${barn.label} — التفاصيل</h4>
    <div class="row g-3">
      ${barn.stalls.map(stall=>{
        const sa=alive.filter(a=>a.barn===stall);
        const breeds=[...new Set(sa.map(a=>a.breed))];
        return`<div class="col-md-6"><div class="wonder-card">
          <div class="fw-bold mb-2">${stall}<span class="type-badge badge-gray ms-2" style="font-size:.7rem">${ar(sa.length)} رأس</span></div>
          ${breeds.map(b=>{const cnt=sa.filter(a=>a.breed===b).length;return`<div class="d-flex justify-content-between py-1" style="border-bottom:1px solid #1e1e1e;font-size:.83rem"><span class="text-gray">${b}</span><span class="fw-bold">${ar(cnt)}</span></div>`;}).join('')}
          ${sa.length===0?'<div class="text-gray text-center py-2" style="font-size:.82rem">فارغ</div>':''}
          <div class="mt-2 d-flex gap-2"><button class="action-btn sm" onclick="closeModal();showStallDetail('${stall}')"><i class="bi bi-list-ul"></i> عرض القائمة</button></div>
        </div></div>`;
      }).join('')}
    </div>
    <div class="d-flex justify-content-end mt-3"><button class="action-btn" onclick="closeModal()">إغلاق</button></div>
  </div>`);
};

window.checkStallCapacity=function(stall,count){
  if(count>=MAX_STALL)return '<div class="type-badge badge-danger" style="font-size:.7rem"><i class="bi bi-exclamation-triangle-fill me-1"></i>ممتلئ ('+ar(count)+'/'+ar(MAX_STALL)+')</div>';
  if(count>=WARN_STALL)return '<div class="type-badge badge-yellow" style="font-size:.7rem"><i class="bi bi-exclamation-circle me-1"></i>شبه ممتلئ — ينصح بالنقل عند '+ar(WARN_STALL)+'</div>';
  return'';
};

window.showStallDetail=function(stall){
  const alive=animals.filter(a=>a.status==='alive'&&a.barn===stall);
  showModal(`<div class="farm-modal wide" onclick="event.stopPropagation()" style="max-height:90vh;overflow-y:auto">
    <h4><i class="bi bi-grid-1x2-fill accent-text"></i> ${stall} — قائمة الحيوانات (${ar(alive.length)})</h4>
    ${alive.length===0?`<div class="empty-state"><i class="bi bi-box"></i><p>العنبر فارغ</p></div>`:`
    <table class="tbl"><thead><tr><th>السلالة</th><th>الجنس</th><th>الغرض</th><th>الترقيم</th></tr></thead>
    <tbody>${alive.map(a=>`<tr><td class="fw-bold">${a.breed}</td><td>${a.gender==='male'?'ذكر':'أنثى'}</td><td><span class="type-badge ${a.purpose==='tasmeen'?'badge-tasmeen':a.purpose==='birth'?'badge-blue':'badge-tarbiya'}" style="font-size:.7rem">${{tarbiya:'تربية',tasmeen:'تسمين',birth:'مواليد'}[a.purpose]||a.purpose}</span></td><td class="text-gray">${a.tag||'—'}</td></tr>`).join('')}</tbody>
    </table>`}
    <div class="d-flex gap-2 justify-content-end mt-3">
      ${can('animals')?`<button class="action-btn primary" onclick="closeModal();openTransferModal('${stall}')"><i class="bi bi-arrow-left-right"></i> نقل</button>`:''}
      <button class="action-btn" onclick="closeModal()">إغلاق</button>
    </div>
  </div>`);
};

window.openTransferModal=function(fromStall=''){
  const allStalls=['','ج١ع١','ج١ع٢','ج٢ع١','ج٢ع٢','ج٣ع١','ج٣ع٢','ج٤ع١','ج٤ع٢','ج٥ع١','ج٥ع٢'];
  const alive=animals.filter(a=>a.status==='alive');

  showModal(`<div class="farm-modal" onclick="event.stopPropagation()" style="max-height:92vh;overflow-y:auto">
    <h4><i class="bi bi-arrow-left-right accent-text"></i> نقل حيوانات</h4>
    <div class="row g-2">
      <div class="col-6">
        <label>من (عنبر المصدر)</label>
        <select class="field" id="tr-from" onchange="updateTransferList()">
          ${allStalls.map(s=>`<option value="${s}" ${fromStall===s?'selected':''}>${s||'— غير محدد —'}</option>`).join('')}
        </select>
      </div>
      <div class="col-6">
        <label>إلى (عنبر الوجهة) *</label>
        <select class="field" id="tr-to">
          ${allStalls.filter(s=>s).map(s=>`<option value="${s}">${s}</option>`).join('')}
        </select>
      </div>
    </div>
    <label>نوع النقل</label>
    <select class="field" id="tr-type" onchange="updateTransferList()">
      <option value="all">نقل الكل</option>
      <option value="species">حسب النوع</option>
      <option value="breed">حسب السلالة</option>
      <option value="select">اختيار يدوي</option>
    </select>
    <div id="tr-options"></div>
    <label>سبب النقل</label>
    <select class="field" id="tr-reason">
      <option>عزل</option><option>فطام</option><option>تسمين</option><option>ولادة</option><option>علاج</option><option>إعادة توزيع</option><option>أخرى</option>
    </select>
    <label>ملاحظات</label><input class="field" id="tr-notes" placeholder="اختياري">
    <div class="d-flex gap-2 justify-content-end mt-3">
      <button class="action-btn" onclick="closeModal()">إلغاء</button>
      <button class="action-btn primary" onclick="submitTransfer()"><i class="bi bi-arrow-left-right"></i> تنفيذ النقل</button>
    </div>
  </div>`);
  updateTransferList();
};

window.updateTransferList=function(){
  const from=document.getElementById('tr-from')?.value||'';
  const type=document.getElementById('tr-type')?.value;
  const alive=animals.filter(a=>a.status==='alive'&&(from===''?!a.barn:a.barn===from));
  const s=getSettings();
  const optEl=document.getElementById('tr-options');if(!optEl)return;

  if(type==='species'){
    optEl.innerHTML=`<label>النوع</label><select class="field" id="tr-val"><option value="goat">ماعز (${ar(alive.filter(a=>a.species==='goat').length)})</option><option value="sheep">أغنام (${ar(alive.filter(a=>a.species==='sheep').length)})</option></select>`;
  } else if(type==='breed'){
    const breeds=[...new Set(alive.map(a=>a.breed))];
    optEl.innerHTML=`<label>السلالة</label><select class="field" id="tr-val">${breeds.map(b=>`<option value="${b}">${b} (${ar(alive.filter(a=>a.breed===b).length)})</option>`).join('')}</select>`;
  } else if(type==='select'){
    optEl.innerHTML=`<label>اختر الحيوانات (${ar(alive.length)} متاح)</label><div style="max-height:200px;overflow-y:auto;border:1px solid #2a2a2a;border-radius:10px;padding:8px">${alive.slice(0,100).map(a=>`<label style="display:flex;align-items:center;gap:8px;padding:4px;cursor:pointer"><input type="checkbox" value="${a._id}" style="accent-color:var(--green)"> <span style="font-size:.83rem">${a.breed} ${a.gender==='male'?'♂':'♀'} ${a.tag?'#'+a.tag:''}</span></label>`).join('')}</div>`;
  } else {
    optEl.innerHTML=`<div class="p-3 text-center text-gray" style="font-size:.85rem">سيتم نقل جميع الحيوانات (${ar(alive.length)} رأس) من العنبر المحدد</div>`;
  }
};

window.submitTransfer=async function(){
  const from=document.getElementById('tr-from').value;
  const to=document.getElementById('tr-to').value;
  const type=document.getElementById('tr-type').value;
  const reason=document.getElementById('tr-reason').value;
  const notes=document.getElementById('tr-notes').value.trim();
  if(!to){toast('يرجى اختيار عنبر الوجهة','error');return;}
  if(from===to){toast('المصدر والوجهة متطابقان','error');return;}

  const alive=animals.filter(a=>a.status==='alive'&&(from===''?!a.barn:a.barn===from));
  let toTransfer=[];

  if(type==='all')toTransfer=alive;
  else if(type==='species'){const val=document.getElementById('tr-val')?.value;toTransfer=alive.filter(a=>a.species===val);}
  else if(type==='breed'){const val=document.getElementById('tr-val')?.value;toTransfer=alive.filter(a=>a.breed===val);}
  else if(type==='select'){const checked=[...document.querySelectorAll('#tr-options input:checked')].map(c=>c.value);toTransfer=alive.filter(a=>checked.includes(a._id));}

  if(!toTransfer.length){toast('لم يتم تحديد حيوانات للنقل','error');return;}
  closeModal();toast(`جاري نقل ${ar(toTransfer.length)} حيوان...`,'info');

  let ok=0;
  for(const a of toTransfer){
    try{await fbPatch('animals',a._id,{barn:to});ok++;}catch(e){console.error(e);}
  }
  if(ok>0){
    await logActivity('edit','animals',`نقل ${ar(ok)} حيوان من ${from||'غير محدد'} إلى ${to} — السبب: ${reason}${notes?' | '+notes:''}`);
    toast(`تم نقل ${ar(ok)} حيوان إلى ${to}`);
    animals=await fbGet('animals');renderBarnsPage();
  }else toast('فشل النقل','error');
};

window.exportStallsCSV=function(){
  const alive=animals.filter(a=>a.status==='alive');
  const rows=[['الجمالون','العنبر','السلالة','الجنس','الغرض','الترقيم'],...alive.filter(a=>a.barn).map(a=>{const barn=BARNS.find(b=>b.stalls.includes(a.barn));return[barn?.label||a.barn,a.barn,a.breed,a.gender==='male'?'ذكر':'أنثى',{tarbiya:'تربية',tasmeen:'تسمين',birth:'مواليد'}[a.purpose]||a.purpose,a.tag||''];})];
  const csv=rows.map(r=>r.map(x=>`"${x}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);a.download=`barns-${todayStr()}.csv`;a.click();
  toast('تم التصدير');
};
</script>
</body>
</html>
