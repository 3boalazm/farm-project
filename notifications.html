<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <!-- Performance hints -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://farm-mz99-default-rtdb.europe-west1.firebasedatabase.app" crossorigin>
  <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
  <link rel="dns-prefetch" href="https://aistudio.googleapis.com">
  <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#f3f4f6" media="(prefers-color-scheme: light)">

<script>(function(){var t=localStorage.getItem('farm_theme');if(t==='light')document.documentElement.classList.add('light-mode');}());</script>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>الإشعارات — بيان المزرعة</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Lexend:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="media/logo-icon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="media/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="media/favicon-16.png">
<link rel="apple-touch-icon" href="media/apple-touch-icon.png">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="page-wrap">
  <div id="page-header"></div>
  <div id="push-permission-bar" style="display:none;background:rgba(255,193,7,.1);border:1px solid rgba(255,193,7,.3);border-radius:12px;padding:12px 18px;margin-bottom:16px">
    <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
      <div><i class="bi bi-bell-slash-fill" style="color:var(--yellow)"></i> <span style="color:var(--yellow);font-weight:600">الإشعارات الفورية غير مفعّلة</span> <small class="text-gray">— فعّلها لتصلك تنبيهات حتى عند إغلاق الصفحة</small></div>
      <button class="action-btn primary" onclick="enablePushNotifs()"><i class="bi bi-bell-fill"></i> تفعيل الإشعارات</button>
    </div>
  </div>
  <div id="content"><div class="text-center py-5"><div class="spinner"></div></div></div>
  <footer class="text-center text-gray mt-5 pt-4 pb-3" style="border-top:1px solid var(--border)">
    © <span id="footer-year"></span> <span id="footer-farm"></span><br>
    <small style="font-size:.72rem;color:var(--text-muted)">إشراف: لواء أحمد رجب نوح &nbsp;|&nbsp; تطوير: جندي مصطفى محمد إبراهيم</small>
  </footer>
</div>
<script src="config.js"></script>
<script src="firebase.js"></script>
<script src="nav.js"></script>
<script src="shared.js"></script>
<script src="offline-sync.js" defer></script>
<script src="pages/datepicker.js" defer></script>
<script src="pages/tour.js" defer></script>
<script src="notifications-service.js"></script>
<script>
'use strict';
let allNotifs=[], nFilter='all';

document.addEventListener('DOMContentLoaded', async ()=>{
  if(!requireAuth())return;
  initFirebase();
  const s=getSettings();
  document.getElementById('footer-year').textContent=ar(new Date().getFullYear());
  document.getElementById('footer-farm').textContent=s.farmName;
  renderNavbar('notifications.html');

  // Check push permission status
  if('Notification' in window && Notification.permission==='default'){
    document.getElementById('push-permission-bar').style.display='block';
  }

  renderPageHeader(
    '<i class="bi bi-bell-fill accent-text"></i> الإشعارات الذكية',
    'تنبيهات تلقائية لكل ما يهم المزرعة',
    '<button class="action-btn primary" onclick="refreshNotifs()"><i class="bi bi-arrow-clockwise"></i> تحديث</button>'+
    '<button class="action-btn" onclick="NS.markAllRead()"><i class="bi bi-check-all"></i> تحديد الكل كمقروء</button>'+
    '<button class="action-btn" onclick="NS.checkAll()"><i class="bi bi-lightning-fill" style="color:var(--yellow)"></i> فحص الآن</button>'
  );

  await loadNotifications();
});

window.enablePushNotifs=async function(){
  const p=await Notification.requestPermission();
  if(p==='granted'){
    document.getElementById('push-permission-bar').style.display='none';
    toast('✅ تم تفعيل الإشعارات الفورية');
    NS.checkAll();
  } else {
    toast('تم رفض الإشعارات — يمكنك تفعيلها من إعدادات المتصفح','error');
  }
};

async function loadNotifications(){
  const el=document.getElementById('content');
  renderLoading(el);
  try{
    // Sprint 9: silent, one-time cleanup of old, already-read notifications
    // before displaying the list. Never touches unread notifications.
    if(window.NS&&NS.expireOld) await NS.expireOld();
    allNotifs=await fbGet('notifications');
    allNotifs.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  }catch(e){toast('خطأ: '+e.message,'error');}
  renderNotifPage();
}

async function refreshNotifs(){
  toast('جاري التحديث...','info');
  await NS.checkAll();
  await loadNotifications();
}

function renderNotifPage(){
  const el=document.getElementById('content');
  const u=getUser();
  const visible=allNotifs.filter(n=>!n.for_role||n.for_role===u?.role||u?.role==='admin');
  const unread=visible.filter(n=>!n.read);
  const filtered=nFilter==='all'?visible:nFilter==='unread'?unread:visible.filter(n=>n.cat===nFilter);
  const cats=[...new Set(visible.map(n=>n.cat))];
  const catCfg={danger:'var(--red)',warning:'var(--orange)',info:'var(--blue)',success:'var(--green)'};

  el.innerHTML=
  // Stats
  '<div class="row g-3 mb-4">'+
    [['إجمالي الإشعارات',ar(visible.length),'var(--orange)','bi-bell-fill'],['غير مقروءة',ar(unread.length),'var(--red)','bi-bell-slash-fill'],
     ['عاجلة',ar(visible.filter(n=>n.type==='danger').length),'var(--red)','bi-exclamation-triangle-fill'],
     ['تنبيهات',ar(visible.filter(n=>n.type==='warning').length),'var(--yellow)','bi-exclamation-circle-fill']]
    .map(s=>'<div class="col-6 col-md-3"><div class="stat-mini"><i class="bi '+s[3]+' d-block mb-1" style="color:'+s[2]+';font-size:1.2rem"></i><div class="num" style="color:'+s[2]+'">'+s[1]+'</div><div class="lbl">'+s[0]+'</div></div></div>').join('')+
  '</div>'+
  // Filters
  '<div class="d-flex gap-2 flex-wrap mb-4">'+
    '<button class="filter-btn'+(nFilter==='all'?' active':'')+'" onclick="nFilter=\'all\';renderNotifPage()">الكل ('+ar(visible.length)+')</button>'+
    '<button class="filter-btn'+(nFilter==='unread'?' active':'')+'" onclick="nFilter=\'unread\';renderNotifPage()">غير مقروءة ('+ar(unread.length)+')</button>'+
    cats.map(c=>'<button class="filter-btn'+(nFilter===c?' active':'')+'" onclick="nFilter=\''+c+'\';renderNotifPage()">'+c+' ('+ar(visible.filter(n=>n.cat===c).length)+')</button>').join('')+
    '<button class="action-btn danger sm" onclick="clearAllNotifs()"><i class="bi bi-trash"></i> مسح الكل</button>'+
  '</div>'+
  // Notif list by category
  (filtered.length===0?'<div class="empty-state"><i class="bi bi-bell-slash"></i><p>لا توجد إشعارات 🎉</p><small class="text-gray">سيظهر هنا تلقائياً أي تنبيه جديد</small></div>':
  cats.filter(c=>nFilter==='all'||nFilter==='unread'||nFilter===c).map(cat=>{
    const catNotifs=filtered.filter(n=>n.cat===cat);
    if(!catNotifs.length)return'';
    return'<div class="mb-4">'+
      '<h6 class="fw-bold mb-3"><i class="bi bi-tag-fill accent-text me-2"></i>'+cat+
        '<span class="type-badge badge-gray ms-2" style="font-size:.68rem">'+ar(catNotifs.length)+'</span></h6>'+
      catNotifs.map(n=>{
        const c=catCfg[n.type]||'var(--gray)';
        return'<div class="notif-item n-'+n.type+'" style="cursor:pointer" onclick="markRead(\''+n._id+'\',\''+( n.href||'#')+'\')">'+
          '<div class="d-flex gap-3 align-items-start">'+
            '<div style="width:38px;height:38px;border-radius:50%;background:'+c+'22;display:flex;align-items:center;justify-content:center;flex-shrink:0">'+
              '<i class="bi '+(n.icon||'bi-bell-fill')+'" style="color:'+c+'"></i>'+
            '</div>'+
            '<div class="flex-grow-1">'+
              '<div class="d-flex justify-content-between align-items-start gap-2">'+
                '<div class="fw-bold" style="font-size:.86rem;color:'+c+'">'+( n.read?'':' 🔵 ')+n.title+'</div>'+
                '<div class="d-flex gap-1 flex-shrink-0">'+
                  (n.href?'<a href="'+n.href+'" class="action-btn sm" onclick="event.stopPropagation()" aria-label="عرض" title="عرض"><i class="bi bi-arrow-left"></i></a>':'')+
                  '<button class="icon-btn del" onclick="event.stopPropagation();deleteNotif(\''+n._id+'\')" aria-label="حذف" title="حذف"><i class="bi bi-trash"></i></button>'+
                '</div>'+
              '</div>'+
              '<div class="text-gray" style="font-size:.8rem;margin-top:2px">'+(n.msg||'—')+'</div>'+
              '<div style="font-size:.7rem;color:var(--text-muted);margin-top:3px"><i class="bi bi-clock me-1"></i>'+(n.created_at?.replace('T',' ').slice(0,16)||n.date||'—')+'</div>'+
            '</div>'+
          '</div>'+
        '</div>';
      }).join('')+
    '</div>';
  }).join(''));
}

window.markRead=async function(id,href){
  // Sprint 9: also stamp read_at, needed for a real (not fabricated)
  // average-response-time statistic in reports. Backward-compatible --
  // older records simply lack this field, correctly excluded from that average.
  try{await fbPatch('notifications',id,{read:true,read_at:new Date().toISOString()});}catch(e){}
  if(href&&href!=='#')location.href=href;
  else{allNotifs=allNotifs.map(n=>n._id===id?{...n,read:true,read_at:new Date().toISOString()}:n);renderNotifPage();}
};
window.deleteNotif=async function(id){
  try{await fbDelete('notifications',id);allNotifs=allNotifs.filter(n=>n._id!==id);renderNotifPage();}
  catch(e){toast('فشل','error');}
};
window.clearAllNotifs=async function(){
  if(!confirm('مسح كل الإشعارات؟'))return;
  try{
    const url=FB_URL+'/notifications.json'+(FB_SECRET?'?auth='+FB_SECRET:'');
    await fetch(url,{method:'DELETE'});
    toast('تم مسح الإشعارات');allNotifs=[];renderNotifPage();
  }catch(e){toast('فشل: '+e.message,'error');}
};
</script>
</body>
</html>
