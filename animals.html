<head>

  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://farm-mz99-default-rtdb.europe-west1.firebasedatabase.app" crossorigin>

<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>إدارة القطيع — بيان المزرعة</title>

<body>
<div class="page-wrap">
  <div id="page-header"></div>
  <div id="animals-kpi-row" class="mb-3"></div>
  <div id="filters-bar" class="wonder-card mb-3"></div>
  <div id="bulk-bar" style="display:none" class="mb-3"></div>
  <div id="content" role="main" aria-label="قائمة القطيع"><div class="text-center py-5"><div class="spinner"></div><div class="text-gray mt-2">جاري التحميل...</div></div></div>
  <div id="animals-insights" class="mb-4"></div>
  <div id="animals-timeline" class="mb-4"></div>
  <footer class="text-center text-gray mt-5 pt-4 pb-3" style="border-top:1px solid var(--border)">

    <small style="font-size:.72rem;color:var(--text-muted)">إشراف: لواء أحمد رجب نوح | تطوير: جندي مصطفى محمد إبراهيم</small>
  </footer>
</div>

<script src="config.js"></script>
<script src="firebase.js"></script>
<script src="nav.js"></script>
<script src="shared.js"></script>
<script src="offline-sync.js" defer></script>
<script src="pages/datepicker.js" defer></script>
<script src="pages/tour.js" defer></script>
<script>
'use strict';
// ── State ────────────────────────────────────────────
var animals=[];
var fSpecies='all', fPurpose='all', fStatus='alive', fSearch='', fBreed='all', fGender='all', fSort='newest';
var _selected=new Set();
var _selectMode=false;

const params=new URLSearchParams(location.search);
if(params.get('species'))fSpecies=params.get('species');
if(params.get('purpose'))fPurpose=params.get('purpose');
if(params.get('status'))fStatus=params.get('status');
if(params.get('breed'))fBreed=params.get('breed');
if(params.get('gender'))fGender=params.get('gender');
if(params.get('search'))fSearch=params.get('search');

// ── Init ─────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async function(){
  if(!requireAuth())return;
  // SECURITY FIX (Phase 6 hardening): nav.js grants this page perm:'animals',
  // but no can('animals') check enforced it -- same bug class already fixed
  // elsewhere. A 'visitor'-role account can currently reach this page's
  // bulk-action/edit/delete surface directly, despite the role model
  // intending animals.html to require the 'animals' permission explicitly.
  if (!can('animals')) {
    document.body.innerHTML='<div class="page-wrap"><div class="empty-state" style="padding-top:100px"><i class="bi bi-shield-x" style="font-size:3rem;display:block;margin-bottom:10px;opacity:.4"></i><p>غير مصرح بالوصول</p><a href="dashboard.html" class="action-btn">الرئيسية</a></div></div>';
    return;
  }
  initFirebase();
  var s=getSettings();
  document.getElementById('footer-year').textContent=ar(new Date().getFullYear());
  document.getElementById('footer-farm').textContent=s.farmName;
  renderNavbar('animals.html');
  addFAB('إضافة حيوان', function(){ openAddAnimal(); });
  renderPageHeaderV2({
    title: '<i class="bi bi-list-ul accent-text"></i> إدارة القطيع',
    breadcrumb: [{label:'الرئيسية', href:'dashboard.html'}, {label:'القطيع'}]
  });

  try{
    animals=await fbGet('animals');
  // Load health records for status calculation
  try { window._healthRecs=await fbGet('health'); } catch(e) { window._healthRecs=[]; }
    animals.sort(function(a,b){return (a.breed||'').localeCompare(b.breed||'');});
  }catch(e){
    document.getElementById('content').innerHTML='<div class="empty-state"><i class="bi bi-wifi-off"></i><p>تعذر الاتصال بقاعدة البيانات</p><small class="text-gray">'+e.message+'</small><br><button class="action-btn primary mt-3" onclick="location.reload()">إعادة المحاولة</button></div>';
    return;
  }
  renderAnimalsKPIs();
  renderFilters();
  renderAnimals();
  renderAnimalsInsights();
});

// ── KPI Summary (Listing Template) — new, was previously missing on this page ──
function renderAnimalsKPIs(){
  var kpiEl=document.getElementById('animals-kpi-row');
  if(!kpiEl)return;
  var alive=animals.filter(function(a){return a.status==='alive';});
  var goats=alive.filter(function(a){return a.species==='goat';}).length;
  var sheep=alive.filter(function(a){return a.species==='sheep';}).length;
  var underTreatment=(window._healthRecs||[]).filter(function(h){return h.status==='active';}).length;
  kpiEl.innerHTML='<div class="row g-3">'+
    '<div class="col-6 col-md-3">'+renderKPICard({ label:'إجمالي القطيع', value: ar(alive.length), status:'normal' })+'</div>'+
    '<div class="col-6 col-md-3">'+renderKPICard({ label:'الماعز', value: ar(goats), status:'normal' })+'</div>'+
    '<div class="col-6 col-md-3">'+renderKPICard({ label:'الأغنام', value: ar(sheep), status:'normal' })+'</div>'+
    '<div class="col-6 col-md-3">'+renderKPICard({ label:'تحت العلاج', value: ar(underTreatment), status: underTreatment>0?'watch':'normal' })+'</div>'+
  '</div>';
}

// ── Render Filters ───────────────────────────────────
function renderFilters(){
  var s=getSettings();
  var fb=document.getElementById('filters-bar');
  if(!fb)return;
  // Breed list from loaded animals
  var breedList=[...new Set(animals.map(function(a){return a.breed;}).filter(Boolean))].sort();

  fb.innerHTML=
    '<div class="row g-2 align-items-end">'+
      '<div class="col-md-2">'+
        '<label class="text-gray" style="font-size:.72rem;font-weight:600">البحث</label>'+
        '<input class="field" placeholder="ترقيم..." id="f-search" value="'+fSearch+'" oninput="fSearch=this.value;renderAnimals()">'+
      '</div>'+
      '<div class="col-md-2">'+
        '<label class="text-gray" style="font-size:.72rem;font-weight:600">النوع</label>'+
        '<select class="field" id="f-sp" onchange="fSpecies=this.value;renderAnimals()">'+
          '<option value="all" '+(fSpecies==='all'?'selected':'')+'>الكل</option>'+
          '<option value="goat" '+(fSpecies==='goat'?'selected':'')+'>ماعز</option>'+
          '<option value="sheep" '+(fSpecies==='sheep'?'selected':'')+'>أغنام</option>'+
        '</select>'+
      '</div>'+
      '<div class="col-md-2">'+
        '<label class="text-gray" style="font-size:.72rem;font-weight:600">السلالة</label>'+
        '<select class="field" id="f-breed" onchange="fBreed=this.value;renderAnimals()">'+
          '<option value="all" '+(fBreed==='all'?'selected':'')+'>الكل</option>'+
          breedList.map(function(b){return'<option value="'+b+'" '+(fBreed===b?'selected':'')+'>'+b+'</option>';}).join('')+
        '</select>'+
      '</div>'+
      '<div class="col-md-1">'+
        '<label class="text-gray" style="font-size:.72rem;font-weight:600">الجنس</label>'+
        '<select class="field" id="f-gen" onchange="fGender=this.value;renderAnimals()">'+
          '<option value="all" '+(fGender==='all'?'selected':'')+'>الكل</option>'+
          '<option value="male" '+(fGender==='male'?'selected':'')+'>ذكر</option>'+
          '<option value="female" '+(fGender==='female'?'selected':'')+'>أنثى</option>'+
        '</select>'+
      '</div>'+
      '<div class="col-md-2">'+
        '<label class="text-gray" style="font-size:.72rem;font-weight:600">الغرض</label>'+
        '<select class="field" id="f-pur" onchange="fPurpose=this.value;renderAnimals()">'+
          '<option value="all" '+(fPurpose==='all'?'selected':'')+'>الكل</option>'+
          '<option value="tarbiya" '+(fPurpose==='tarbiya'?'selected':'')+'>تربية</option>'+
          '<option value="tasmeen" '+(fPurpose==='tasmeen'?'selected':'')+'>تسمين</option>'+
          '<option value="birth" '+(fPurpose==='birth'?'selected':'')+'>مواليد</option>'+
        '</select>'+
      '</div>'+
      '<div class="col-md-1">'+
        '<label class="text-gray" style="font-size:.72rem;font-weight:600">الحالة</label>'+
        '<select class="field" id="f-st" onchange="fStatus=this.value;renderAnimals()">'+
          '<option value="alive" '+(fStatus==='alive'?'selected':'')+'>الأحياء جميعاً</option>'+
          '<option value="healthy" '+(fStatus==='healthy'?'selected':'')+'>سليم فقط</option>'+
          '<option value="under_treatment" '+(fStatus==='under_treatment'?'selected':'')+'>قيد العلاج</option>'+
          '<option value="quarantine" '+(fStatus==='quarantine'?'selected':'')+'>في الحجر</option>'+
          '<option value="sold" '+(fStatus==='sold'?'selected':'')+'>المباع</option>'+
          '<option value="dead" '+(fStatus==='dead'?'selected':'')+'>نافق</option>'+
          '<option value="all" '+(fStatus==='all'?'selected':'')+'>الكل</option>'+
        '</select>'+
      '</div>'+
      '<div class="col-md-2">'+
        '<label class="text-gray" style="font-size:.72rem;font-weight:600">الترتيب</label>'+
        '<select class="field" id="f-sort" onchange="fSort=this.value;renderAnimals()">'+
          '<option value="newest" '+(fSort==='newest'?'selected':'')+'>الأحدث أولاً</option>'+
          '<option value="oldest" '+(fSort==='oldest'?'selected':'')+'>الأقدم أولاً</option>'+
          '<option value="youngest" '+(fSort==='youngest'?'selected':'')+'>الأصغر سناً</option>'+
          '<option value="oldest_age" '+(fSort==='oldest_age'?'selected':'')+'>الأكبر سناً</option>'+
          '<option value="tag_asc" '+(fSort==='tag_asc'?'selected':'')+'>رقم الترقيم ↑</option>'+
          '<option value="tag_desc" '+(fSort==='tag_desc'?'selected':'')+'>رقم الترقيم ↓</option>'+
        '</select>'+
      '</div>'+
      '<div class="col-md-2 d-flex gap-2 flex-wrap">'+
        (can('animals')?
          '<button class="action-btn primary" onclick="openAddAnimal()"><i class="bi bi-plus-lg"></i> إضافة</button>'+
      '<button class="action-btn" onclick="openBatchEntry()" style="background:rgba(33,150,243,.1);border-color:rgba(33,150,243,.35);color:var(--blue)" data-hint="إضافة بالجملة"><i class="bi bi-stack"></i></button>'+'<button class="action-btn" onclick="openUnifiedBirthModal(\'goat\')" style="background:rgba(255,193,7,.1);border-color:rgba(255,193,7,.3);color:var(--yellow)" data-hint="تسجيل مواليد"><i class="bi bi-stars"></i></button>'+'<button class="action-btn danger" onclick="openMarkDeath()" data-hint="تسجيل نفوق"><i class="bi bi-x-octagon"></i></button>':'')+
        (can('admin')?'<button class="action-btn" onclick="openResetModal()" style="background:rgba(156,39,176,.1);border-color:rgba(156,39,176,.3);color:var(--purple)" data-hint="إعادة تعيين"><i class="bi bi-arrow-counterclockwise"></i></button>':'')+
      '</div>'+
    '</div>';
}

// ── Render Animals ───────────────────────────────────
function renderAnimals(){
  var el=document.getElementById('content');
  if(!el)return;

  // Apply filters
  var list=animals.slice();
  if(fStatus!=='all'){
    list = list.filter(function(a) {
      var actualStatus = window._healthRecs ? getAnimalStatus(a, window._healthRecs) : a.status;
      if (fStatus === 'alive') return ['alive','healthy','under_treatment'].includes(a.status) || ['healthy','under_treatment'].includes(actualStatus);
      if (fStatus === 'healthy') return actualStatus === 'healthy' || (a.status === 'alive' && actualStatus !== 'under_treatment');
      if (fStatus === 'under_treatment') return actualStatus === 'under_treatment';
      return a.status === fStatus;
    });
  }
  if(fSpecies!=='all')list=list.filter(function(a){return a.species===fSpecies;});
  if(fBreed!=='all')list=list.filter(function(a){return a.breed===fBreed;});
  if(fGender!=='all')list=list.filter(function(a){return a.gender===fGender;});
  if(fPurpose!=='all'){
    var purArr=fPurpose.split(',');
    list=list.filter(function(a){return purArr.indexOf(a.purpose)>=0;});
  }
  if(fSearch){
    var q=fSearch.toLowerCase();
    list=list.filter(function(a){return (a.tag||'').toLowerCase().indexOf(q)>=0||(a.breed||'').indexOf(q)>=0;});
  }

  // ── Sort ─────────────────────────────────────────
  if(fSort==='newest'){
    list.sort(function(a,b){
      var da=a.created_at||a.imported_at||a.birth_date||'';
      var db=b.created_at||b.imported_at||b.birth_date||'';
      return db.localeCompare(da);
    });
  } else if(fSort==='oldest'){
    list.sort(function(a,b){
      var da=a.created_at||a.imported_at||a.birth_date||'9999';
      var db=b.created_at||b.imported_at||b.birth_date||'9999';
      return da.localeCompare(db);
    });
  } else if(fSort==='youngest'){
    list.sort(function(a,b){
      var da=a.birth_date||'0000';
      var db=b.birth_date||'0000';
      return db.localeCompare(da); // newest birth = youngest
    });
  } else if(fSort==='oldest_age'){
    list.sort(function(a,b){
      var da=a.birth_date||'9999';
      var db=b.birth_date||'9999';
      return da.localeCompare(db); // oldest birth = oldest animal
    });
  } else if(fSort==='tag_asc'){
    list.sort(function(a,b){
      var ta=a.tag||'zzzzz';
      var tb=b.tag||'zzzzz';
      // Natural sort: handle tags like A-001, A-002, B-10 correctly
      return ta.localeCompare(tb,undefined,{numeric:true,sensitivity:'base'});
    });
  } else if(fSort==='tag_desc'){
    list.sort(function(a,b){
      var ta=a.tag||'';
      var tb=b.tag||'';
      return tb.localeCompare(ta,undefined,{numeric:true,sensitivity:'base'});
    });
  }

  // ── Bulk bar ──────────────────────────────────────
  // Update bulk bar
  renderBulkBar();

  // Empty state
  if(!list.length){
    el.innerHTML='<div class="empty-state"><i class="bi bi-search"></i>'+
      '<p>لا توجد حيوانات'+( animals.length===0?' — قاعدة البيانات فارغة':' تطابق هذه الفلاتر')+'</p>'+
      (animals.length===0?'<a href="import.html" class="action-btn primary">استيراد بيانات المزرعة</a>':
        '<button class="action-btn primary" onclick="fSearch=\'\';fSpecies=\'all\';fPurpose=\'all\';fStatus=\'alive\';renderFilters();renderAnimals()">إعادة تعيين الفلاتر</button>')+
    '</div>';
    return;
  }

  // Count bar
  var shown=list.slice(0,150);
  var countHtml='<div class="mb-2 d-flex justify-content-between align-items-center gap-2 flex-wrap">'+
    '<small class="text-gray">يُعرض '+ar(shown.length)+(list.length>shown.length?' من '+ar(list.length):'')+' حيوان (إجمالي: '+ar(animals.filter(function(a){return a.status==='alive';}).length)+')</small>'+
    '<div class="d-flex gap-2">'+
      '<button class="action-btn sm" onclick="toggleSelectMode()" aria-label="تفعيل وضع التحديد المتعدد" style="'+(  _selectMode?'background:rgba(33,150,243,.1);border-color:rgba(33,150,243,.4);color:var(--blue)':'')+'" data-hint="تحديد متعدد للعمليات الجماعية"><i class="bi bi-check2-square"></i> '+(_selectMode?ar(_selected.size)+' محدد':'تحديد')+'</button>'+
      '<div class="position-relative" id="data-menu-wrap"><button class="action-btn sm" onclick="toggleDataMenu()" data-hint="استيراد وتصدير البيانات"><i class="bi bi-database-fill-gear"></i> بيانات <i class="bi bi-chevron-down" style="font-size:.6rem"></i></button><div id="data-menu" style="display:none;position:absolute;left:0;top:110%;background:var(--bg-2);border:1px solid var(--border-2);border-radius:12px;padding:6px;min-width:200px;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,.35)"><button class="action-btn sm" style="width:100%;justify-content:flex-start;margin-bottom:4px" onclick="exportExcel()"><i class="bi bi-file-earmark-excel-fill" style="color:#4caf50"></i> تصدير Excel (.xlsx)</button><button class="action-btn sm" style="width:100%;justify-content:flex-start;margin-bottom:4px" onclick="exportCSV()" aria-label="تصدير CSV"><i class="bi bi-filetype-csv"></i> تصدير CSV</button><hr style="border-color:var(--border-3);margin:4px 0"><button class="action-btn sm" style="width:100%;justify-content:flex-start;margin-bottom:4px" onclick="openImportDialog()"><i class="bi bi-cloud-arrow-up-fill" style="color:var(--blue)"></i> استيراد من Excel</button><a href="import.html" class="action-btn sm" style="width:100%;justify-content:flex-start"><i class="bi bi-database-fill-add" style="color:var(--orange)"></i> محرك البيانات الكامل</a></div></div>'+
    '</div>'+
  '</div>';

  // Rows
  var rows=shown.map(function(a){
    var purposeLabel={tarbiya:'تربية',tasmeen:'تسمين',birth:'مواليد'}[a.purpose]||a.purpose||'—';
    var purposeCls=a.purpose==='tasmeen'?'badge-tasmeen':a.purpose==='birth'?'badge-blue':'badge-tarbiya';
    var statusCls=a.status==='alive'?'badge-tarbiya':'badge-danger';
    var statusLabel=a.status==='alive'?'حي':'نافق';
    var sel=_selected.has(a._id);
    var rowStyle=sel?'border-color:rgba(33,150,243,.5);background:rgba(33,150,243,.05);':'';
    var cb=_selectMode?'<label style="padding-left:4px;cursor:pointer;flex-shrink:0"><input type="checkbox" class="anim-cb" data-id="'+a._id+'" '+(sel?'checked':'')+' style="accent-color:var(--blue);width:17px;height:17px" onchange="toggleOne(\''+a._id+'\',this.checked)"></label>':'';
    var menuBtn=can('admin')?
      '<button class="icon-btn" onclick="event.stopPropagation();openAnimalMenu(\''+a._id+'\',\''+encodeURIComponent(a.breed||'')+'\',\''+encodeURIComponent(a.tag||'')+'\',\''+(a.status||'alive')+'\')"><i class="bi bi-three-dots-vertical"></i></button>':'';
    return '<div class="animal-row" style="'+rowStyle+'" onclick="'+(  _selectMode?'toggleOne(\''+a._id+'\',!_selected.has(\''+a._id+'\'))':'')+'">'+
      cb+
      '<a href="animal-detail.html?id='+a._id+'" style="text-decoration:none;display:flex;align-items:center;gap:12px;flex:1;min-width:0" onclick="if(_selectMode)event.preventDefault()">'+
        '<div class="animal-avatar">'+(a.species==='goat'?'🐐':'🐑')+'</div>'+
        '<div class="flex-grow-1" style="min-width:0">'+
          '<div class="d-flex gap-2 flex-wrap align-items-center">'+
            '<span class="fw-bold">'+(a.breed||'—')+'</span>'+
            (a.tag?'<span class="type-badge badge-gray">#'+a.tag+'</span>':'')+
            '<span class="type-badge '+purposeCls+'">'+purposeLabel+'</span>'+
            '<span class="type-badge '+(a.gender==='male'?'badge-blue':'badge-purple')+'" style="font-size:.68rem">'+(a.gender==='male'?'♂ ذكر':'♀ أنثى')+'</span>'+
            (a.status!=='alive'?'<span class="type-badge '+statusCls+'">'+statusLabel+'</span>':'')+
            (a.barn?'<span class="type-badge badge-gray" style="font-size:.68rem"><i class="bi bi-building me-1"></i>'+a.barn+'</span>':'')+
          '</div>'+
          '<small class="text-gray">'+(a.species==='goat'?'ماعز':'أغنام')+(a.birth_date?' • مواليد: '+a.birth_date:' • غير محدد')+'</small>'+
        '</div>'+
        '<i class="bi bi-chevron-left text-gray"></i>'+
      '</a>'+
      menuBtn+
    '</div>';
  }).join('');

  el.innerHTML=countHtml+rows+
    (list.length>150?'<div class="text-center py-3 text-gray" style="font-size:.82rem"><i class="bi bi-info-circle me-1"></i>يُعرض أول '+ar(150)+' — استخدم الفلاتر لتضييق النتائج</div>':'');
}

// ── Related Insights + Activity Timeline (Listing Template) ──
// New sections, added per the Animals module migration to the
// Dashboard v2 architecture. Deliberately reuse the exact same
// shared functions dashboard.html already established — no new
// component, no new chart type, no new data dependency (built
// entirely from the `animals` array already loaded for this page,
// same as every other section on it).
function renderAnimalsInsights(){
  var elI=document.getElementById('animals-insights');
  var elT=document.getElementById('animals-timeline');
  if(!elI||!elT)return;

  var alive=animals.filter(function(a){return a.status==='alive';});

  // 1. Breed distribution — same renderDonutSVG primitive as dashboard.html's
  //    health-status donut, just fed breed totals instead.
  var byBreed={};
  alive.forEach(function(a){
    var k=(a.breed||'—')+' ('+(a.species==='goat'?'ماعز':'أغنام')+')';
    byBreed[k]=(byBreed[k]||0)+1;
  });
  var dc=['#00e676','#2196f3','#ff6b35','#9c27b0','#ffc107','#f44336','#00bcd4','#8bc34a'];
  var breedSegments=Object.keys(byBreed).map(function(k,i){
    return { label:k, value:byBreed[k], color:dc[i%dc.length] };
  }).sort(function(a,b){return b.value-a.value;}).slice(0,8);

  // 2. Age distribution — reuses renderGroupedBarSVG's single-series capability
  //    (a "grouped" bar with one value per group renders as a plain bar chart).
  var ageBuckets=[
    { label:'< 6 شهور', test:function(m){return m<6;} },
    { label:'6-12 شهر', test:function(m){return m>=6&&m<12;} },
    { label:'1-2 سنة',  test:function(m){return m>=12&&m<24;} },
    { label:'2+ سنة',   test:function(m){return m>=24;} },
  ];
  var ageCounts=ageBuckets.map(function(b){
    var c=alive.filter(function(a){
      if(!a.birth_date)return false;
      var months=Math.floor((new Date()-new Date(a.birth_date))/(30*86400000));
      return b.test(months);
    }).length;
    return { label:b.label, values:[c] };
  });

  var donutSvg=renderDonutSVG(breedSegments,{size:150});
  var barSvg=renderGroupedBarSVG(ageCounts,{colors:['#3b82f6']});

  elI.innerHTML='<h6 class="fw-bold mb-3" style="font-size:var(--text-lg)"><i class="bi bi-graph-up accent-text me-2"></i>رؤى ذات صلة</h6>'+
    '<div class="row g-3">'+
      '<div class="col-md-5">'+renderChartContainer({ title:'توزيع السلالات', subtitle:'الأحياء فقط', chartHtml:donutSvg||'', state: donutSvg?'ready':'empty' })+'</div>'+
      '<div class="col-md-7">'+renderChartContainer({ title:'التوزيع العمري', subtitle:'حسب الفئة', chartHtml:barSvg||'', state: barSvg?'ready':'empty' })+'</div>'+
    '</div>';

  // 3. Activity Timeline — recent additions/births/deaths, reconstructed from
  //    fields already loaded on this page (created_at/imported_at/birth_date/
  //    died_at) — no new Firebase call added, same discipline as dashboard.html's
  //    own "reconstructed where no history collection exists" approach.
  var events=[];
  animals.forEach(function(a){
    var addedDate=a.created_at||a.imported_at;
    if(addedDate) events.push({ date:addedDate, eventType:'إضافة حيوان', entity:(a.breed||'')+' '+(a.gender==='male'?'ذكر':'أنثى')+(a.tag?' #'+a.tag:'') });
    if(a.status==='dead'&&a.died_at) events.push({ date:a.died_at, eventType:'نفوق', entity:(a.breed||'')+(a.tag?' #'+a.tag:'') });
  });
  events.sort(function(x,y){return (y.date||'').localeCompare(x.date||'');});
  var recentEvents=events.slice(0,8);

  elT.innerHTML='<div class="wonder-card">'+
    '<h6 class="fw-bold mb-3" style="font-size:var(--text-lg)"><i class="bi bi-clock-history accent-text me-2"></i>النشاط الأخير</h6>'+
    (recentEvents.length?renderTimeline(recentEvents.map(function(e){
      return renderTimelineItem({ time:e.date, eventType:e.eventType, entity:e.entity });
    })):'<div class="empty-state py-3"><i class="bi bi-clock-history"></i><p>لا يوجد نشاط مسجّل بعد</p></div>')+
  '</div>';
}

// ── Bulk transfer action (Repository 4, Phase 2C) ──────────────
// Extracted verbatim from execBulk()'s 'transfer' branch — same
// field reads, same commitBulkPatch call, same logActivity message,
// same toast. Only ids is now a parameter instead of a closure read;
// ok is returned so execBulk's own toast (unchanged) keeps working.
async function performBulkTransfer(ids,fields){
  var barn=fields?.barn;
  var reason=fields?.reason;
  var ok=await commitBulkPatch(ids,{barn:barn});
  await logActivity('edit','animals','نقل جماعي '+ar(ok)+' حيوان إلى '+barn+' | '+reason);
  toast('تم نقل '+ar(ok)+' حيوان إلى '+barn);
  return ok;
}

// ── Bulk sell action (Repository 4, Phase 2C Iteration 2) ──────
// Extracted verbatim from execBulk()'s 'sell' branch — same field
// reads, same commitBulkPatch call, same conditional finance write,
// same logActivity message, same toast. Only ids is now a parameter;
// ok is returned exactly as the branch's own local `ok` was used.
async function performBulkSell(ids){
  var date=document.getElementById('b-date')?.value||todayStr();
  var price=parseFloat(document.getElementById('b-price')?.value)||0;
  var buyer=document.getElementById('b-buyer')?.value||'—';
  var ok=await commitBulkPatch(ids,{status:'sold',sold_date:date,sold_price:price||null,sold_to:buyer==='—'?null:buyer});
  if(price>0)await fbPost('finance',{date:date,type:'income',category:'بيع حيوانات',amount:price,description:'بيع '+ar(ok)+' حيوان | '+buyer,added_by:getUser()?.name});
  await logActivity('edit','animals','بيع جماعي '+ar(ok)+' | '+buyer+(price>0?' | '+ar(price)+' '+getSettings().currency:''));
  toast('تم بيع '+ar(ok)+' حيوان'+(price>0?' بمبلغ '+ar(price)+' '+getSettings().currency:''));
  return ok;
}

// ── Bulk death action (Repository 4, Phase 2C Iteration 3) ─────
// Extracted verbatim from execBulk()'s 'death' branch. Deliberately
// NOT routed through commitBulkPatch() — its per-iteration dynamic
// animalDeathId (batchDeathId+'-'+(i+1)) is a different shape than
// that helper's single-static-payload contract, exactly as this
// project's own Phase 2B audit already established. The for-loop,
// sequential awaits, and conditional finance write are all preserved
// exactly as they were.
async function performBulkDeath(ids,fields){
  fields=fields||{};
  var date=fields.date||todayStr();
  var time=fields.time||'';
  var reason=fields.reason||'غير معروف';
  var autopsy=fields.autopsy==='yes';
  var totalLoss=parseFloat(fields.loss)||0;
  var batchDeathId=(fields.deathId||'').trim()||genDeathId();
  var notes=(fields.notes||'').trim()||null;
  var perAnimalLoss=totalLoss>0?Math.round((totalLoss/ids.length)*100)/100:null;
  var ok=0;
  for(var i=0;i<ids.length;i++){
    var animalDeathId=batchDeathId+'-'+(i+1);
    try{
      await fbPatch('animals',ids[i],{
        status:'dead',
        died_at:date,
        death_time:time||null,
        death_reason:reason,
        death_autopsy:autopsy,
        death_loss:perAnimalLoss||null,
        death_id:animalDeathId,
        death_notes:notes,
        death_batch_id:batchDeathId
      });
      ok++;
    }catch(e){}
  }
  if(ok>0 && totalLoss>0){
    try{
      await fbPost('finance',{
        date:date,type:'loss',category:'نفوق حيوانات',
        amount:totalLoss,
        description:'نفوق جماعي — '+batchDeathId+(reason?' | '+reason:'')+' ('+ar(ok)+' حيوان)',
        added_by:getUser()?.name
      });
    }catch(e){}
  }
  await logActivity('edit','animals','نفوق جماعي '+ar(ok)+' | '+reason+(autopsy?' | تشريح':'')+' | '+batchDeathId);
  toast('✅ تم تسجيل نفوق '+ar(ok)+' حيوان — '+batchDeathId);
  return ok;
}

  toast('جاري التنفيذ على '+ar(ids.length)+' حيوان...','info');
  var ok=0;
  if(action==='edit'){
    var updates={};
    var gv=function(id){var el=document.getElementById(id);return el?el.value.trim():'';}
    if(gv('be-species'))updates.species=gv('be-species');
    if(gv('be-purpose'))updates.purpose=gv('be-purpose');
    if(gv('be-breed'))updates.breed=gv('be-breed');
    if(gv('be-gender'))updates.gender=gv('be-gender');
    if(gv('be-bdate'))updates.birth_date=gv('be-bdate');
    if(gv('be-barn'))updates.barn=gv('be-barn');
    if(gv('be-mother'))updates.mother_tag=gv('be-mother');
    if(gv('be-father'))updates.father_tag=gv('be-father');
    if(gv('be-status'))updates.status=gv('be-status');
    if(gv('be-notes'))updates.notes=gv('be-notes');
    var reason=gv('be-reason');
    if(!Object.keys(updates).length){toast('لم تختر أي تغيير — اختر حقلاً واحداً على الأقل','error');return;}
    ok=await commitBulkPatch(ids,updates);
    var changed=Object.keys(updates).join(', ');
    await logActivity('edit','animals','تعديل جماعي '+ar(ok)+' حيوان | '+changed+(reason?' | '+reason:''));
    toast('✅ تم تعديل '+ar(ok)+' حيوان ('+changed+')');
  }
  else if(action==='transfer'){
    ok=await performBulkTransfer(ids,extra);
  }
  else if(action==='death'){
    ok=await performBulkDeath(ids,extra);
  }
  else if(action==='sell'){
    ok=await performBulkSell(ids);
  }
  await refreshAnimalsAfterBulk();
};

// ── Bulk delete action (Repository 4, Phase 2D) ─────────────────
// Extracted verbatim from execBulkDo()'s delete loop + its logActivity
// call. The native confirm() dialog (in doBulk('delete')) and the
// start/result toasts + refreshAnimalsAfterBulk() stay exactly where
// they were, in execBulkDo — mirroring the same shape already
// established for performBulkTransfer/Sell/Death in Phase 2C, so
// execBulkDo becomes a thin wrapper the same way execBulk's branches
// did, without redesigning anything new.
async function performBulkDelete(ids){
  var ok=0;
  for(var i=0;i<ids.length;i++){try{await fbDelete('animals',ids[i]);ok++;}catch(e){}}
  await logActivity('delete','animals','حذف جماعي '+ar(ok)+' حيوان');
  return ok;
}

window.execBulkDo=async function(action,ids){
  toast('جاري الحذف...','info');
  var ok=await performBulkDelete(ids);
  toast('تم حذف '+ar(ok)+' حيوان');
  await refreshAnimalsAfterBulk();
};

// ── Death ID generator ───────────────────────────────
function genDeathId(){
  var d=new Date();
  var pad=function(n){return n<10?'0'+n:n;};
  var datePart=d.getFullYear()+''+pad(d.getMonth()+1)+''+pad(d.getDate());
  var rand=Math.random().toString(36).substring(2,6).toUpperCase();
  return'DTH-'+datePart+'-'+rand;
}
function nowTimeStr(){
  var d=new Date();
  var pad=function(n){return n<10?'0'+n:n;};
  return pad(d.getHours())+':'+pad(d.getMinutes());
}

    // fetch() call threw a ReferenceError caught by the empty
    // try{}catch(e){} below — meaning NOTHING was ever actually
    // deleted, while the code still unconditionally reported success.
    // Now reuses fbUrl(), the same authenticated helper every other
    // Firebase call in the app already goes through (no second
    // networking implementation), and tracks real success/failure per
    // table so the message shown actually reflects what happened.
    var failedTables=[];
    for(var t of tables){
      try{
        var r=await fetch(await fbUrl(t),{method:'DELETE'});
        fbCacheInvalidate(t);
        if(!r.ok)failedTables.push(t);
      }catch(e){failedTables.push(t);}
    }
    if(failedTables.length===0){
      toast('تم مسح كل البيانات');
    }else if(failedTables.length<tables.length){
      toast('تم المسح جزئياً — فشل في: '+failedTables.join('، '),'error');
    }else{
      toast('فشل المسح بالكامل — لم يتم حذف أي بيانات','error');
    }
    setTimeout(function(){location.reload();},1500);return;
  }
  // Modal field-read-timing fix (Wave E): these two checkboxes were
  // previously read via document.getElementById AFTER closeModal()
  // already removed them from the DOM, so their .checked state was
  // always undefined/false regardless of what the user selected —
  // same root cause as BL-01/02/03. Captured here, before closeModal,
  // using the exact same read expressions; no logic or order changed.
  var resetDeadChecked=document.getElementById('reset-dead')?.checked;
  var resetBirthsChecked=document.getElementById('reset-births')?.checked;
  closeModal();var done=0;
  if(resetDeadChecked){
    var dead=animals.filter(function(a){return a.status==='dead';});
    for(var a of dead){try{await fbDelete('animals',a._id);done++;}catch(e){}}
  }
  if(resetBirthsChecked){
    var births=animals.filter(function(a){return a.status==='alive'&&a.purpose==='birth';});
    for(var a of births){try{await fbPatch('animals',a._id,{purpose:'tarbiya'});done++;}catch(e){}}
  }
  if(done)toast('تم تنفيذ العملية على '+ar(done)+' سجل');
  animals=await fbGet('animals');renderFilters();renderAnimals();
};

window.suggestTag=function(){
  var breed=document.getElementById('m-breed')?.value||'';
  var gender=document.getElementById('m-gender')?.value||'male';
  var species=document.getElementById('m-species')?.value||'goat';
  if(!breed){toast('اختر السلالة أولاً','error');return;}
  // Build prefix: first 2 chars of breed + gender initial
  var prefix=breed.slice(0,2)+(gender==='male'?'-ذ-':'-إ-');
  // Find max existing tag with this prefix
  var existing=animals.filter(function(a){return a.tag&&a.tag.startsWith(prefix);})
    .map(function(a){return parseInt((a.tag||'').replace(prefix,''))||0;})
    .filter(function(n){return!isNaN(n);});
  var nextNum=(existing.length?Math.max.apply(null,existing):0)+1;
  var suggested=prefix+String(nextNum).padStart(3,'0');
  var inp=document.getElementById('m-tag');
  if(inp){inp.value=suggested;inp.style.borderColor='rgba(0,230,118,.5)';}
  toast('ترقيم مقترح: '+suggested);
};

window._beSubmit=async function(){
  var sp=document.getElementById('be-sp').value;
  var breed=document.getElementById('be-breed').value;
  var gender=document.getElementById('be-gender').value;
  var purpose=document.getElementById('be-purpose').value;
  var barn=document.getElementById('be-barn').value||null;
  var date=document.getElementById('be-date').value||null;
  var weight=parseFloat(document.getElementById('be-weight').value)||null;
  var notes=document.getElementById('be-notes').value.trim()||null;
  var prefix=document.getElementById('be-prefix').value.trim();
  var start=parseInt(document.getElementById('be-start').value)||1;
  var count=parseInt(document.getElementById('be-count').value)||0;
  if(!count||count<1){toast('أدخل عدداً صحيحاً','error');return;}
  if(count>500&&!confirm('إضافة '+ar(count)+' حيوان دفعة واحدة؟ قد يستغرق وقتاً.')){return;}

  var btn=document.getElementById('be-submit-btn');
  if(btn){btn.disabled=true;btn.innerHTML='<div class="spinner" style="width:14px;height:14px;border-width:2px;display:inline-block;margin-left:6px"></div> جاري الحفظ...';}

  var ok=0,failed=0;
  for(var i=0;i<count;i++){
    var tag=prefix?(prefix+String(start+i).padStart(3,'0')):null;
    try{
      await fbPost('animals',{
        species:sp,breed:breed,gender:gender,purpose:purpose,status:'alive',
        tag:tag,barn:barn,birth_date:date,current_weight:weight,notes:notes,
        created_at:todayStr(),batch_entry:true
      });
      ok++;
    }catch(e){failed++;}
  }
  await logActivity('add','animals','إضافة بالجملة: '+ar(ok)+' '+breed+' ('+(gender==='male'?'ذكور':'إناث')+')');
  fbCacheInvalidate('animals');
  closeModal();
  toast('✅ تم إضافة '+ar(ok)+' حيوان'+(failed?' (فشل: '+ar(failed)+')':''));
  setTimeout(function(){location.reload();},1200);
};

window.exportExcel=function(){
  document.getElementById('data-menu').style.display='none';
  if(typeof XLSX==='undefined'){toast('مكتبة Excel غير متاحة','error');return;}
  var list=animals;
  var s=getSettings();
  var wb=XLSX.utils.book_new();

  // Sheet 1: All Animals
  var rows=[
    ['النوع','السلالة','الجنس','الغرض','الحالة','رقم الترقيم','الجمالون/العنبر',
     'تاريخ الميلاد','الوزن (كجم)','ملاحظات','تاريخ الإضافة'],
    ...list.map(function(a){
      return [
        a.species==='goat'?'ماعز':'أغنام',
        a.breed||'',
        a.gender==='male'?'ذكر':'أنثى',
        {tarbiya:'تربية',tasmeen:'تسمين',birth:'مواليد'}[a.purpose]||a.purpose||'',
        a.status==='alive'?'حي':'نافق',
        a.tag||'',
        a.barn||'',
        a.birth_date||'',
        a.current_weight||a.weight||'',
        a.notes||'',
        (a.created_at||a.imported_at||'').slice(0,10),
      ];
    })
  ];
  var ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:8},{wch:12},{wch:8},{wch:10},{wch:8},{wch:12},{wch:10},{wch:14},{wch:10},{wch:20},{wch:14}];
  XLSX.utils.book_append_sheet(wb,ws,'القطيع الكامل');

  // Sheet 2: Alive only breakdown
  var alive=list.filter(function(a){return a.status==='alive';});
  var goats=alive.filter(function(a){return a.species==='goat'&&a.purpose!=='birth';});
  var sheep=alive.filter(function(a){return a.species==='sheep'&&a.purpose!=='birth';});
  var births=alive.filter(function(a){return a.purpose==='birth';});
  var allBreeds=[...s.goatBreeds,...s.sheepBreeds];
  var summary=[
    ['الفئة','الإجمالي','ذكور','إناث'],
    ['ماعز (تربية وتسمين)',goats.length,goats.filter(function(a){return a.gender==='male';}).length,goats.filter(function(a){return a.gender==='female';}).length],
    ['أغنام (تربية وتسمين)',sheep.length,sheep.filter(function(a){return a.gender==='male';}).length,sheep.filter(function(a){return a.gender==='female';}).length],
    ['مواليد',births.length,births.filter(function(a){return a.gender==='male';}).length,births.filter(function(a){return a.gender==='female';}).length],
    ['','','',''],
    ['السلالة','الإجمالي','ذكور','إناث'],
  ];
  allBreeds.forEach(function(b){
    var br=alive.filter(function(a){return a.breed===b;});
    if(br.length)summary.push([b,br.length,br.filter(function(a){return a.gender==='male';}).length,br.filter(function(a){return a.gender==='female';}).length]);
  });
  var ws2=XLSX.utils.aoa_to_sheet(summary);
  ws2['!cols']=[{wch:20},{wch:10},{wch:10},{wch:10}];
  XLSX.utils.book_append_sheet(wb,ws2,'ملخص القطيع');

  // Sheet 3: Barn distribution
  var barnNames=['ج١ع١','ج١ع٢','ج٢ع١','ج٢ع٢','ج٣ع١','ج٣ع٢','ج٤ع١','ج٤ع٢','ج٥ع١','ج٥ع٢'];
  var barnRows=[['الجمالون/العنبر','الإجمالي','ذكور','إناث','تربية','تسمين','مواليد','السلالات']];
  barnNames.forEach(function(barn){
    var ba=alive.filter(function(a){return a.barn===barn;});
    if(ba.length||true)barnRows.push([
      barn,ba.length,
      ba.filter(function(a){return a.gender==='male';}).length,
      ba.filter(function(a){return a.gender==='female';}).length,
      ba.filter(function(a){return a.purpose==='tarbiya';}).length,
      ba.filter(function(a){return a.purpose==='tasmeen';}).length,
      ba.filter(function(a){return a.purpose==='birth';}).length,
      [...new Set(ba.map(function(a){return a.breed;}))].join('، '),
    ]);
  });
  var ws3=XLSX.utils.aoa_to_sheet(barnRows);
  ws3['!cols']=[{wch:12},{wch:8},{wch:8},{wch:8},{wch:8},{wch:8},{wch:8},{wch:25}];
  XLSX.utils.book_append_sheet(wb,ws3,'توزيع الجمالونات');

  XLSX.writeFile(wb,'animals-'+todayStr()+'.xlsx');
  logActivity('export','animals','تصدير Excel القطيع: '+ar(list.length)+' حيوان');
  toast('تم تصدير '+ar(list.length)+' حيوان إلى Excel ✓');
};

};

// ── Import Dialog ─────────────────────────────────────
window.openImportDialog=function(){
  document.getElementById('data-menu').style.display='none';
  if(typeof XLSX==='undefined'){toast('جاري تحميل مكتبة Excel...','info');setTimeout(openImportDialog,1500);return;}
  showModal('<div class="farm-modal" onclick="event.stopPropagation()" style="max-width:500px">'+
    '<h4><i class="bi bi-cloud-arrow-up-fill accent-text"></i> استيراد بيانات القطيع من Excel</h4>'+
    '<div class="mb-3 p-3" style="background:rgba(0,230,118,.06);border:1px solid rgba(0,230,118,.2);border-radius:10px;font-size:.82rem">'+
      '<div class="fw-bold green-text mb-2"><i class="bi bi-info-circle-fill me-1"></i>تعليمات الاستيراد</div>'+
      '<div>أعمدة مدعومة: <strong>النوع، السلالة، الجنس، الغرض، الحالة، رقم الترقيم، الجمالون، تاريخ الميلاد، الوزن، ملاحظات</strong></div>'+
      '<div class="mt-1 text-gray">الأعمدة الإلزامية: النوع (goat/ماعز — sheep/أغنام)، السلالة، الجنس (male/female أو ذكر/أنثى)، الغرض (tarbiya/birth/tasmeen)</div>'+
    '</div>'+
    '<div id="imp-drop" style="border:2px dashed var(--border-2);border-radius:12px;padding:28px;text-align:center;cursor:pointer;transition:.2s" '+
      'onclick="document.getElementById(\'imp-file\').click()" '+
      'ondragover="event.preventDefault();this.style.borderColor=\'var(--orange)\'" '+
      'ondragleave="this.style.borderColor=\'var(--border-2)\'" '+
      'ondrop="event.preventDefault();this.style.borderColor=\'var(--border-2)\';_handleImpDrop(event)">'+
      '<i class="bi bi-file-earmark-excel-fill" style="font-size:2.2rem;color:#4caf50;display:block;margin-bottom:10px"></i>'+
      '<div class="fw-bold">اسحب ملف Excel هنا أو اضغط للاختيار</div>'+
      '<small class="text-gray">.xlsx / .xls فقط</small>'+
    '</div>'+
    '<input type="file" id="imp-file" accept=".xlsx,.xls" style="display:none" onchange="_handleImpFile(this)">'+
    '<div id="imp-preview" class="mt-3"></div>'+
    '<div class="d-flex gap-2 justify-content-end mt-3">'+
      '<button class="action-btn" onclick="closeModal()">إلغاء</button>'+
      '<a href="import.html" class="action-btn"><i class="bi bi-database-fill-gear me-1"></i>محرك البيانات الكامل</a>'+
    '</div>'+
  '</div>');
};

window._handleImpDrop=function(e){var f=e.dataTransfer.files[0];if(f)_parseImpFile(f);};
window._handleImpFile=function(inp){if(inp.files[0])_parseImpFile(inp.files[0]);};

var _NORM={
  species:  {goat:'goat',sheep:'sheep','ماعز':'goat','أغنام':'sheep'},
  gender:   {male:'male',female:'female','ذكر':'male','أنثى':'female'},
  purpose:  {tarbiya:'tarbiya',tasmeen:'tasmeen',birth:'birth','تربية':'tarbiya','تسمين':'tasmeen','مواليد':'birth'},
  status:   {alive:'alive',dead:'dead','حي':'alive','نافق':'dead','':'alive'},
};
var _impRows=[];

window._parseImpFile=function(file){
  var prev=document.getElementById('imp-preview');
  prev.innerHTML='<div class="text-center py-2"><div class="spinner"></div><p class="text-gray mt-1">جاري القراءة...</p></div>';
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var wb=XLSX.read(ev.target.result,{type:'binary',cellDates:true});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      if(!rows||rows.length<2){prev.innerHTML='<div class="red-text">الملف فارغ</div>';return;}
      var headers=rows[0].map(function(h){return String(h||'').trim();});
      // Auto-map
      var ALIASES={
        species:['النوع','species','type'],gender:['الجنس','gender','sex'],
        breed:['السلالة','breed'],purpose:['الغرض','purpose'],
        status:['الحالة','status'],tag:['الترقيم','رقم الترقيم','tag'],
        barn:['الجمالون','العنبر','barn','section'],
        birth_date:['تاريخ الميلاد','birth_date','dob'],
        current_weight:['الوزن','weight','current_weight'],
        notes:['ملاحظات','notes'],
      };
      var colMap={};
      headers.forEach(function(h,i){
        var hn=h.toLowerCase();
        Object.keys(ALIASES).forEach(function(field){
          ALIASES[field].forEach(function(alias){
            if(hn===alias.toLowerCase()&&colMap[field]===undefined)colMap[field]=i;
          });
        });
      });
      // Parse rows
      _impRows=[];
      var errs=0;
      rows.slice(1).forEach(function(row,ri){
        if(!row.some(function(c){return c!=='';}))return;
        var d={};var rowErr=[];
        Object.keys(colMap).forEach(function(field){
          var val=String(row[colMap[field]]||'').trim();
          if(_NORM[field]){var n=_NORM[field][val]||_NORM[field][val.toLowerCase()];if(n!==undefined)val=n;}
          if(field==='birth_date'&&val instanceof Date)val=val.toISOString().slice(0,10);
          if(field==='current_weight'&&val){var w=parseFloat(val);val=(isNaN(w)||w<=0||w>500)?'':w;}
          if(val!==''&&val!==undefined)d[field]=val;
        });
        if(!d.species)rowErr.push('النوع');
        if(!d.breed)rowErr.push('السلالة');
        if(!d.gender)rowErr.push('الجنس');
        if(!d.purpose)rowErr.push('الغرض');
        if(!d.status)d.status='alive';
        _impRows.push({data:d,errors:rowErr,row:ri+2});
        if(rowErr.length)errs++;
      });
      var ok=_impRows.filter(function(r){return!r.errors.length;}).length;
      prev.innerHTML=
        '<div class="d-flex gap-2 mb-2 flex-wrap">'+
          '<span class="type-badge badge-tarbiya"><i class="bi bi-check-circle-fill me-1"></i>صالح: '+ar(ok)+'</span>'+
          (errs?'<span class="type-badge badge-danger"><i class="bi bi-x-circle-fill me-1"></i>أخطاء: '+ar(errs)+'</span>':'')+
          '<span class="type-badge badge-gray">الإجمالي: '+ar(_impRows.length)+'</span>'+
        '</div>'+
        (errs?'<div class="text-gray mb-2" style="font-size:.78rem">الصفوف ذات الأخطاء ستُتجاهل (أعمدة ناقصة: '+['النوع','السلالة','الجنس','الغرض'].join('، ')+')</div>':'')+
        '<div class="table-responsive" style="max-height:160px;overflow-y:auto">'+
          '<table class="tbl" style="font-size:.74rem"><thead><tr>'+
            '<th>صف</th><th>النوع</th><th>السلالة</th><th>الجنس</th><th>الغرض</th><th>الترقيم</th><th>الجمالون</th><th>حالة</th>'+
          '</tr></thead><tbody>'+
          _impRows.slice(0,8).map(function(r){
            return '<tr style="'+(r.errors.length?'background:rgba(244,67,54,.05)':'')+'">'+
              '<td class="text-gray">'+ar(r.row)+'</td>'+
              '<td>'+({goat:'🐐ماعز',sheep:'🐑أغنام'}[r.data.species]||r.data.species||'—')+'</td>'+
              '<td>'+(r.data.breed||'—')+'</td>'+
              '<td>'+({male:'ذكر',female:'أنثى'}[r.data.gender]||r.data.gender||'—')+'</td>'+
              '<td>'+({tarbiya:'تربية',tasmeen:'تسمين',birth:'مواليد'}[r.data.purpose]||r.data.purpose||'—')+'</td>'+
              '<td class="text-gray">'+(r.data.tag||'—')+'</td>'+
              '<td class="text-gray">'+(r.data.barn||'—')+'</td>'+
              '<td>'+(r.errors.length?'<span class="red-text">❌</span>':'<span class="green-text">✅</span>')+'</td>'+
            '</tr>';
          }).join('')+
          (_impRows.length>8?'<tr><td colspan="8" class="text-center text-gray">+ '+ar(_impRows.length-8)+' صف...</td></tr>':'')+
        '</tbody></table></div>'+
        (ok>0?
          '<button class="action-btn primary mt-2" style="width:100%" onclick="_doImport()">'+
            '<i class="bi bi-cloud-arrow-up-fill me-1"></i>رفع '+ar(ok)+' حيوان للنظام'+
          '</button>':'<div class="text-gray text-center mt-2">لا توجد صفوف صالحة للرفع</div>');
    }catch(e){prev.innerHTML='<div class="red-text"><i class="bi bi-exclamation-triangle-fill me-1"></i>خطأ في قراءة الملف: '+e.message+'</div>';}
  };
  reader.readAsBinaryString(file);
};

window._doImport=async function(){
  var valid=_impRows.filter(function(r){return!r.errors.length;});
  if(!valid.length){toast('لا توجد بيانات صالحة','error');return;}
  if(!confirm('رفع '+ar(valid.length)+' حيوان لقاعدة البيانات؟'))return;
  var prev=document.getElementById('imp-preview');
  prev.innerHTML='<div class="text-center py-2"><div class="spinner"></div><p class="text-gray mt-1">جاري الرفع...</p></div>';
  var ok=0,failed=0;
  for(var i=0;i<valid.length;i++){
    try{
      await fbPost('animals',Object.assign({},valid[i].data,{status:valid[i].data.status||'alive',created_at:todayStr(),imported_at:todayStr()}));
      ok++;
    }catch(e){failed++;}
  }
  await logActivity('add','animals','استيراد Excel من صفحة القطيع: '+ar(ok)+' حيوان');
  fbCacheInvalidate('animals');
  prev.innerHTML='<div style="background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.3);border-radius:10px;padding:12px;text-align:center">'+
    '<div class="fw-bold green-text">✅ تم رفع '+ar(ok)+' حيوان بنجاح'+(failed?' (فشل: '+ar(failed)+')':'')+'</div>'+
    '<button class="action-btn primary mt-2" onclick="closeModal();location.reload()"><i class="bi bi-arrow-repeat me-1"></i>تحديث القائمة</button>'+
  '</div>';
};
</script>
</body>
