<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<script>(function(){var t=localStorage.getItem('farm_theme');if(t==='light')document.documentElement.classList.add('light-mode');}());</script>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>إدارة القطيع — بيان المزرعة</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Lexend:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="page-wrap">
  <div id="page-header"></div>
  <div id="filters-bar" class="wonder-card mb-3"></div>
  <div id="bulk-bar" style="display:none" class="mb-3"></div>
  <div id="content"><div class="text-center py-5"><div class="spinner"></div><div class="text-gray mt-2">جاري التحميل...</div></div></div>
  <footer class="text-center text-gray mt-5 pt-4 pb-3" style="border-top:1px solid var(--border)">
    <span id="footer-year"></span> &copy; <span id="footer-farm"></span><br>
    <small style="font-size:.72rem;color:var(--text-muted)">إشراف: لواء أحمد رجب نوح | تطوير: جندي مصطفى محمد إبراهيم</small>
  </footer>
</div>
<script src="config.js"></script>
<script src="firebase.js"></script>
<script src="shared.js"></script>
<script src="notifications-service.js"></script>
<script>
'use strict';
// ── State ────────────────────────────────────────────
var animals=[];
var fSpecies='all', fPurpose='all', fStatus='alive', fSearch='';
var _selected=new Set();
var _selectMode=false;

const params=new URLSearchParams(location.search);
if(params.get('species'))fSpecies=params.get('species');
if(params.get('purpose'))fPurpose=params.get('purpose');
if(params.get('status'))fStatus=params.get('status');
if(params.get('breed'))fSearch=params.get('breed');

// ── Init ─────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async function(){
  if(!requireAuth())return;
  initFirebase();
  var s=getSettings();
  document.getElementById('footer-year').textContent=ar(new Date().getFullYear());
  document.getElementById('footer-farm').textContent=s.farmName;
  renderNavbar('animals.html');
  renderPageHeader('<i class="bi bi-list-ul accent-text"></i> إدارة القطيع','','');

  try{
    animals=await fbGet('animals');
    animals.sort(function(a,b){return (a.breed||'').localeCompare(b.breed||'');});
  }catch(e){
    document.getElementById('content').innerHTML='<div class="empty-state"><i class="bi bi-wifi-off"></i><p>تعذر الاتصال بقاعدة البيانات</p><small class="text-gray">'+e.message+'</small><br><button class="action-btn primary mt-3" onclick="location.reload()">إعادة المحاولة</button></div>';
    return;
  }
  renderFilters();
  renderAnimals();
});

// ── Render Filters ───────────────────────────────────
function renderFilters(){
  var s=getSettings();
  var fb=document.getElementById('filters-bar');
  if(!fb)return;
  var breeds=[...new Set(animals.map(function(a){return a.breed;}))].filter(Boolean).sort();
  fb.innerHTML=
    '<div class="row g-2 align-items-end">'+
      '<div class="col-md-3">'+
        '<label class="text-gray" style="font-size:.72rem;font-weight:600">البحث</label>'+
        '<input class="field" placeholder="ترقيم أو سلالة..." id="f-search" value="'+fSearch+'" oninput="fSearch=this.value;renderAnimals()">'+
      '</div>'+
      '<div class="col-md-2">'+
        '<label class="text-gray" style="font-size:.72rem;font-weight:600">النوع</label>'+
        '<select class="field" id="f-sp" onchange="fSpecies=this.value;renderAnimals()">'+
          '<option value="all" '+(fSpecies==='all'?'selected':'')+'>الكل</option>'+
          '<option value="goat" '+(fSpecies==='goat'?'selected':'')+'>ماعز</option>'+
          '<option value="sheep" '+(fSpecies==='sheep'?'selected':'')+'>أغنام</option>'+
        '</select>'+
      '</div>'+
      '<div class="col-md-2">'+
        '<label class="text-gray" style="font-size:.72rem;font-weight:600">الغرض</label>'+
        '<select class="field" id="f-pur" onchange="fPurpose=this.value;renderAnimals()">'+
          '<option value="all" '+(fPurpose==='all'?'selected':'')+'>الكل</option>'+
          '<option value="tarbiya" '+(fPurpose==='tarbiya'?'selected':'')+'>تربية</option>'+
          '<option value="tasmeen" '+(fPurpose==='tasmeen'?'selected':'')+'>تسمين</option>'+
          '<option value="birth" '+(fPurpose==='birth'?'selected':'')+'>مواليد</option>'+
        '</select>'+
      '</div>'+
      '<div class="col-md-2">'+
        '<label class="text-gray" style="font-size:.72rem;font-weight:600">الحالة</label>'+
        '<select class="field" id="f-st" onchange="fStatus=this.value;renderAnimals()">'+
          '<option value="alive" '+(fStatus==='alive'?'selected':'')+'>حي</option>'+
          '<option value="dead" '+(fStatus==='dead'?'selected':'')+'>نافق</option>'+
          '<option value="all" '+(fStatus==='all'?'selected':'')+'>الكل</option>'+
        '</select>'+
      '</div>'+
      '<div class="col-md-3 d-flex gap-2 flex-wrap">'+
        (can('animals')?
          '<button class="action-btn primary flex-grow-1" onclick="openAddAnimal()"><i class="bi bi-plus-lg"></i> إضافة</button>'+
          '<button class="action-btn" onclick="openUnifiedBirthModal(\'goat\')" style="background:rgba(255,193,7,.1);border-color:rgba(255,193,7,.3);color:var(--yellow)" data-hint="تسجيل مواليد"><i class="bi bi-stars"></i></button>'+
          '<button class="action-btn danger" onclick="openMarkDeath()" data-hint="تسجيل نفوق"><i class="bi bi-x-octagon"></i></button>':'')+
        (can('admin')?'<button class="action-btn" onclick="openResetModal()" style="background:rgba(156,39,176,.1);border-color:rgba(156,39,176,.3);color:var(--purple)" data-hint="إعادة تعيين"><i class="bi bi-arrow-counterclockwise"></i></button>':'')+
      '</div>'+
    '</div>';
}

// ── Render Animals ───────────────────────────────────
function renderAnimals(){
  var el=document.getElementById('content');
  if(!el)return;

  // Apply filters
  var list=animals.slice();
  if(fStatus!=='all')list=list.filter(function(a){return a.status===fStatus;});
  if(fSpecies!=='all')list=list.filter(function(a){return a.species===fSpecies;});
  if(fPurpose!=='all'){
    var purArr=fPurpose.split(',');
    list=list.filter(function(a){return purArr.indexOf(a.purpose)>=0;});
  }
  if(fSearch){
    var q=fSearch.toLowerCase();
    list=list.filter(function(a){return (a.tag||'').toLowerCase().indexOf(q)>=0||(a.breed||'').indexOf(q)>=0;});
  }

  // Update bulk bar
  renderBulkBar();

  // Empty state
  if(!list.length){
    el.innerHTML='<div class="empty-state"><i class="bi bi-search"></i>'+
      '<p>لا توجد حيوانات'+( animals.length===0?' — قاعدة البيانات فارغة':' تطابق هذه الفلاتر')+'</p>'+
      (animals.length===0?'<a href="import.html" class="action-btn primary">استيراد بيانات المزرعة</a>':
        '<button class="action-btn primary" onclick="fSearch=\'\';fSpecies=\'all\';fPurpose=\'all\';fStatus=\'alive\';renderFilters();renderAnimals()">إعادة تعيين الفلاتر</button>')+
    '</div>';
    return;
  }

  // Count bar
  var shown=list.slice(0,150);
  var countHtml='<div class="mb-2 d-flex justify-content-between align-items-center gap-2 flex-wrap">'+
    '<small class="text-gray">يُعرض '+ar(shown.length)+(list.length>shown.length?' من '+ar(list.length):'')+' حيوان (إجمالي: '+ar(animals.filter(function(a){return a.status==='alive';}).length)+')</small>'+
    '<div class="d-flex gap-2">'+
      '<button class="action-btn sm" onclick="toggleSelectMode()" style="'+(  _selectMode?'background:rgba(33,150,243,.1);border-color:rgba(33,150,243,.4);color:var(--blue)':'')+'" data-hint="تحديد متعدد للعمليات الجماعية"><i class="bi bi-check2-square"></i> '+(_selectMode?ar(_selected.size)+' محدد':'تحديد')+'</button>'+
      '<button class="action-btn sm" onclick="exportCSV()" data-hint="تصدير CSV"><i class="bi bi-filetype-csv"></i></button>'+
    '</div>'+
  '</div>';

  // Rows
  var rows=shown.map(function(a){
    var purposeLabel={tarbiya:'تربية',tasmeen:'تسمين',birth:'مواليد'}[a.purpose]||a.purpose||'—';
    var purposeCls=a.purpose==='tasmeen'?'badge-tasmeen':a.purpose==='birth'?'badge-blue':'badge-tarbiya';
    var statusCls=a.status==='alive'?'badge-tarbiya':'badge-danger';
    var statusLabel=a.status==='alive'?'حي':'نافق';
    var sel=_selected.has(a._id);
    var rowStyle=sel?'border-color:rgba(33,150,243,.5);background:rgba(33,150,243,.05);':'';
    var cb=_selectMode?'<label style="padding-left:4px;cursor:pointer;flex-shrink:0"><input type="checkbox" class="anim-cb" data-id="'+a._id+'" '+(sel?'checked':'')+' style="accent-color:var(--blue);width:17px;height:17px" onchange="toggleOne(\''+a._id+'\',this.checked)"></label>':'';
    var menuBtn=can('admin')?
      '<button class="icon-btn" onclick="event.stopPropagation();openAnimalMenu(\''+a._id+'\',\''+encodeURIComponent(a.breed||'')+'\',\''+encodeURIComponent(a.tag||'')+'\',\''+(a.status||'alive')+'\')"><i class="bi bi-three-dots-vertical"></i></button>':'';
    return '<div class="animal-row" style="'+rowStyle+'" onclick="'+(  _selectMode?'toggleOne(\''+a._id+'\',!_selected.has(\''+a._id+'\'))':'')+'">'+
      cb+
      '<a href="animal-detail.html?id='+a._id+'" style="text-decoration:none;display:flex;align-items:center;gap:12px;flex:1;min-width:0" onclick="if(_selectMode)event.preventDefault()">'+
        '<div class="animal-avatar">'+(a.species==='goat'?'🐐':'🐑')+'</div>'+
        '<div class="flex-grow-1" style="min-width:0">'+
          '<div class="d-flex gap-2 flex-wrap align-items-center">'+
            '<span class="fw-bold">'+(a.breed||'—')+'</span>'+
            (a.tag?'<span class="type-badge badge-gray">#'+a.tag+'</span>':'')+
            '<span class="type-badge '+purposeCls+'">'+purposeLabel+'</span>'+
            '<span class="type-badge '+(a.gender==='male'?'badge-blue':'badge-purple')+'" style="font-size:.68rem">'+(a.gender==='male'?'♂ ذكر':'♀ أنثى')+'</span>'+
            (a.status!=='alive'?'<span class="type-badge '+statusCls+'">'+statusLabel+'</span>':'')+
            (a.barn?'<span class="type-badge badge-gray" style="font-size:.68rem"><i class="bi bi-building me-1"></i>'+a.barn+'</span>':'')+
          '</div>'+
          '<small class="text-gray">'+(a.species==='goat'?'ماعز':'أغنام')+(a.birth_date?' • مواليد: '+a.birth_date:' • غير محدد')+'</small>'+
        '</div>'+
        '<i class="bi bi-chevron-left text-gray"></i>'+
      '</a>'+
      menuBtn+
    '</div>';
  }).join('');

  el.innerHTML=countHtml+rows+
    (list.length>150?'<div class="text-center py-3 text-gray" style="font-size:.82rem"><i class="bi bi-info-circle me-1"></i>يُعرض أول '+ar(150)+' — استخدم الفلاتر لتضييق النتائج</div>':'');
}

// ── Bulk Selection ───────────────────────────────────
function renderBulkBar(){
  var bb=document.getElementById('bulk-bar');
  if(!bb)return;
  if(!_selectMode){bb.style.display='none';return;}
  bb.style.display='flex';
  bb.style.cssText='display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:rgba(33,150,243,.08);border:1px solid rgba(33,150,243,.3);border-radius:12px;padding:10px 14px;margin-bottom:10px';
  bb.innerHTML=
    '<label style="display:flex;align-items:center;gap:7px;cursor:pointer;font-weight:700;font-size:.83rem" data-hint="تحديد / إلغاء تحديد الكل">'+
      '<input type="checkbox" id="select-all-cb" style="accent-color:var(--blue);width:16px;height:16px" onchange="selectAll(this.checked)">'+
      '<span style="color:var(--blue)">'+ar(_selected.size)+' محدد</span>'+
    '</label>'+
    '<button class="action-btn primary sm" onclick="doBulk(\'transfer\')" data-hint="نقل للجمالون"><i class="bi bi-arrow-left-right"></i> نقل</button>'+
    '<button class="action-btn sm" style="background:rgba(255,193,7,.1);border-color:rgba(255,193,7,.3);color:var(--yellow)" onclick="doBulk(\'sell\')" data-hint="تسجيل بيع"><i class="bi bi-currency-dollar"></i> بيع</button>'+
    '<button class="action-btn danger sm" onclick="doBulk(\'death\')" data-hint="تسجيل نفوق"><i class="bi bi-x-octagon-fill"></i> نفوق</button>'+
    '<button class="action-btn danger sm" onclick="doBulk(\'delete\')" data-hint="حذف نهائي"><i class="bi bi-trash-fill"></i> حذف</button>'+
    '<button class="action-btn sm" onclick="toggleSelectMode()" style="margin-right:auto"><i class="bi bi-x-lg"></i> إلغاء</button>';
}

window.toggleSelectMode=function(){
  _selectMode=!_selectMode;
  if(!_selectMode)_selected.clear();
  renderAnimals();
};
window.toggleOne=function(id,checked){
  if(checked)_selected.add(id);
  else _selected.delete(id);
  // Update the row visually without re-render
  var cb=document.querySelector('.anim-cb[data-id="'+id+'"]');
  if(cb){
    cb.checked=checked;
    var row=cb.closest('.animal-row');
    if(row){
      row.style.borderColor=checked?'rgba(33,150,243,.5)':'';
      row.style.background=checked?'rgba(33,150,243,.05)':'';
    }
  }
  var span=document.querySelector('#bulk-bar span[style*="blue"]');
  if(span)span.textContent=ar(_selected.size)+' محدد';
};
window.selectAll=function(checked){
  document.querySelectorAll('.anim-cb').forEach(function(cb){
    cb.checked=checked;
    var id=cb.dataset.id;
    if(checked)_selected.add(id);
    else _selected.delete(id);
    var row=cb.closest('.animal-row');
    if(row){row.style.borderColor=checked?'rgba(33,150,243,.5)':'';row.style.background=checked?'rgba(33,150,243,.05)':'';}
  });
  var span=document.querySelector('#bulk-bar span[style*="blue"]');
  if(span)span.textContent=ar(_selected.size)+' محدد';
};

// ── Bulk Actions ─────────────────────────────────────
window.doBulk=function(action){
  var ids=[..._selected];
  if(!ids.length){toast('حدد حيواناً واحداً على الأقل','error');return;}
  var cnt=ar(ids.length);
  var s=getSettings();
  if(action==='transfer'){
    var barns=['ج١ع١','ج١ع٢','ج٢ع١','ج٢ع٢','ج٣ع١','ج٣ع٢','ج٤ع١','ج٤ع٢','ج٥ع١','ج٥ع٢'];
    showModal('<div class="farm-modal narrow" onclick="event.stopPropagation()">'+
      '<h4><i class="bi bi-arrow-left-right accent-text"></i> نقل '+cnt+' حيوان</h4>'+
      '<label>الجمالون الجديد</label>'+
      '<select class="field" id="b-barn">'+barns.map(function(b){return'<option>'+b+'</option>';}).join('')+'</select>'+
      '<label>سبب النقل</label>'+
      '<select class="field" id="b-reason"><option>إعادة توزيع</option><option>عزل</option><option>فطام</option><option>تسمين</option><option>علاج</option><option>أخرى</option></select>'+
      '<div class="d-flex gap-2 justify-content-end mt-3">'+
        '<button class="action-btn" onclick="closeModal()">إلغاء</button>'+
        '<button class="action-btn primary" onclick="execBulk(\'transfer\')">نقل '+cnt+'</button>'+
      '</div></div>');
  }
  else if(action==='death'){
    showModal('<div class="farm-modal narrow" onclick="event.stopPropagation()">'+
      '<h4 style="color:var(--red)"><i class="bi bi-x-octagon-fill"></i> نفوق '+cnt+' حيوان</h4>'+
      '<label>تاريخ النفوق</label><input type="date" class="field" id="b-date" value="'+todayStr()+'">'+
      '<label>السبب</label>'+
      '<select class="field" id="b-reason"><option>مرض</option><option>حادث</option><option>إجهاد حراري</option><option>غير معروف</option></select>'+
      '<div class="d-flex gap-2 justify-content-end mt-3">'+
        '<button class="action-btn" onclick="closeModal()">إلغاء</button>'+
        '<button class="action-btn danger" onclick="execBulk(\'death\')">تأكيد النفوق</button>'+
      '</div></div>');
  }
  else if(action==='sell'){
    showModal('<div class="farm-modal narrow" onclick="event.stopPropagation()">'+
      '<h4 style="color:var(--yellow)"><i class="bi bi-currency-dollar"></i> بيع '+cnt+' حيوان</h4>'+
      '<div class="row g-2">'+
        '<div class="col-6"><label>التاريخ</label><input type="date" class="field" id="b-date" value="'+todayStr()+'"></div>'+
        '<div class="col-6"><label>المبلغ الإجمالي ('+s.currency+')</label><input type="number" class="field" id="b-price" placeholder="0" min="0"></div>'+
      '</div>'+
      '<label>المشتري</label><input class="field" id="b-buyer" placeholder="اسم المشتري — اختياري">'+
      '<div class="d-flex gap-2 justify-content-end mt-3">'+
        '<button class="action-btn" onclick="closeModal()">إلغاء</button>'+
        '<button class="action-btn" style="background:rgba(255,193,7,.1);border-color:rgba(255,193,7,.3);color:var(--yellow)" onclick="execBulk(\'sell\')">تأكيد البيع</button>'+
      '</div></div>');
  }
  else if(action==='delete'){
    if(!confirm('حذف نهائي '+cnt+' حيوان؟\nلا يمكن التراجع!'))return;
    execBulkDo('delete',ids);
  }
};

window.execBulk=async function(action){
  var ids=[..._selected];
  closeModal();
  toast('جاري التنفيذ على '+ar(ids.length)+' حيوان...','info');
  var ok=0;
  if(action==='transfer'){
    var barn=document.getElementById('b-barn')?.value;
    var reason=document.getElementById('b-reason')?.value;
    for(var i=0;i<ids.length;i++){try{await fbPatch('animals',ids[i],{barn:barn});ok++;}catch(e){}}
    await logActivity('edit','animals','نقل جماعي '+ar(ok)+' حيوان إلى '+barn+' | '+reason);
    toast('تم نقل '+ar(ok)+' حيوان إلى '+barn);
  }
  else if(action==='death'){
    var date=document.getElementById('b-date')?.value||todayStr();
    var reason=document.getElementById('b-reason')?.value;
    for(var i=0;i<ids.length;i++){try{await fbPatch('animals',ids[i],{status:'dead',died_at:date,death_reason:reason});ok++;}catch(e){}}
    await logActivity('edit','animals','نفوق جماعي '+ar(ok)+' | '+reason);
    toast('تم تسجيل نفوق '+ar(ok)+' حيوان');
  }
  else if(action==='sell'){
    var date=document.getElementById('b-date')?.value||todayStr();
    var price=parseFloat(document.getElementById('b-price')?.value)||0;
    var buyer=document.getElementById('b-buyer')?.value||'—';
    for(var i=0;i<ids.length;i++){try{await fbPatch('animals',ids[i],{status:'dead',sold_at:date,removal_reason:'sale'});ok++;}catch(e){}}
    if(price>0)await fbPost('finance',{date:date,type:'income',category:'بيع حيوانات',amount:price,description:'بيع '+ar(ok)+' حيوان | '+buyer,added_by:getUser()?.name});
    await logActivity('edit','animals','بيع جماعي '+ar(ok)+' | '+buyer+(price>0?' | '+ar(price)+' '+getSettings().currency:''));
    toast('تم بيع '+ar(ok)+' حيوان'+(price>0?' بمبلغ '+ar(price)+' '+getSettings().currency:''));
  }
  _selected.clear();_selectMode=false;
  animals=await fbGet('animals');
  renderFilters();renderAnimals();
};

window.execBulkDo=async function(action,ids){
  toast('جاري الحذف...','info');var ok=0;
  for(var i=0;i<ids.length;i++){try{await fbDelete('animals',ids[i]);ok++;}catch(e){}}
  await logActivity('delete','animals','حذف جماعي '+ar(ok)+' حيوان');
  toast('تم حذف '+ar(ok)+' حيوان');
  _selected.clear();_selectMode=false;
  animals=await fbGet('animals');
  renderFilters();renderAnimals();
};

// ── Add Animal Modal ─────────────────────────────────
window.openAddAnimal=function(){
  var s=getSettings();
  var barns=['','ج١ع١','ج١ع٢','ج٢ع١','ج٢ع٢','ج٣ع١','ج٣ع٢','ج٤ع١','ج٤ع٢','ج٥ع١','ج٥ع٢'];
  showModal('<div class="farm-modal" onclick="event.stopPropagation()">'+
    '<h4><i class="bi bi-plus-circle accent-text"></i> إضافة حيوان</h4>'+
    '<div class="row g-2">'+
      '<div class="col-6"><label>النوع</label><select class="field" id="m-sp" onchange="updateBreeds()"><option value="goat">ماعز</option><option value="sheep">أغنام</option></select></div>'+
      '<div class="col-6"><label>الغرض</label><select class="field" id="m-pur"><option value="tarbiya">تربية</option><option value="tasmeen">تسمين</option><option value="birth">مواليد</option></select></div>'+
    '</div>'+
    '<label>السلالة</label><select class="field" id="m-breed">'+s.goatBreeds.map(function(b){return'<option>'+b+'</option>';}).join('')+'</select>'+
    '<div class="row g-2">'+
      '<div class="col-6"><label>الجنس</label><select class="field" id="m-gender"><option value="female">أنثى ♀</option><option value="male">ذكر ♂</option></select></div>'+
      '<div class="col-6"><label>رقم الترقيم</label><input class="field" id="m-tag" placeholder="A-001"></div>'+
    '</div>'+
    '<div class="row g-2">'+
      '<div class="col-6"><label>تاريخ الميلاد</label><input type="date" class="field" id="m-bdate" value="'+todayStr()+'"></div>'+
      '<div class="col-6"><label>الجمالون</label><select class="field" id="m-barn">'+barns.map(function(b){return'<option value="'+b+'">'+( b||'— غير محدد —')+'</option>';}).join('')+'</select></div>'+
    '</div>'+
    '<div class="d-flex gap-2 justify-content-end mt-3">'+
      '<button class="action-btn" onclick="closeModal()">إلغاء</button>'+
      '<button class="action-btn primary" onclick="submitAddAnimal()">حفظ</button>'+
    '</div></div>');
};
window.updateBreeds=function(){
  var s=getSettings();var sp=document.getElementById('m-sp')?.value;
  var sel=document.getElementById('m-breed');
  if(sel)sel.innerHTML=(sp==='goat'?s.goatBreeds:s.sheepBreeds).map(function(b){return'<option>'+b+'</option>';}).join('');
};
window.submitAddAnimal=async function(){
  var sp=document.getElementById('m-sp').value;
  var breed=document.getElementById('m-breed').value;
  var gender=document.getElementById('m-gender').value;
  var purpose=document.getElementById('m-pur').value;
  var tag=document.getElementById('m-tag').value.trim();
  var barn=document.getElementById('m-barn').value;
  var bdate=document.getElementById('m-bdate').value;
  closeModal();toast('جاري الحفظ...','info');
  try{
    await fbPost('animals',{species:sp,breed,gender,purpose,status:'alive',tag:tag||null,barn:barn||null,birth_date:bdate||null});
    await logActivity('add','animals','إضافة: '+breed+' '+(gender==='male'?'ذكر':'أنثى'));
    toast('تمت الإضافة');
    animals=await fbGet('animals');renderFilters();renderAnimals();
  }catch(e){toast('فشل: '+e.message,'error');}
};

// ── Mark Death ───────────────────────────────────────
window.openMarkDeath=function(){
  var alive=animals.filter(function(a){return a.status==='alive';});
  showModal('<div class="farm-modal narrow" onclick="event.stopPropagation()">'+
    '<h4 style="color:var(--red)"><i class="bi bi-x-octagon-fill"></i> تسجيل نفوق</h4>'+
    '<label>الحيوان</label>'+
    '<select class="field" id="d-id">'+
      alive.slice(0,300).map(function(a){return'<option value="'+a._id+'">'+(a.breed||'—')+(a.tag?' #'+a.tag:'')+' ('+(a.gender==='male'?'ذكر':'أنثى')+')</option>';}).join('')+
    '</select>'+
    '<label>التاريخ</label><input type="date" class="field" id="d-date" value="'+todayStr()+'">'+
    '<div class="d-flex gap-2 justify-content-end mt-3">'+
      '<button class="action-btn" onclick="closeModal()">إلغاء</button>'+
      '<button class="action-btn danger" onclick="submitDeath()">تسجيل</button>'+
    '</div></div>');
};
window.submitDeath=async function(){
  var id=document.getElementById('d-id').value;
  var date=document.getElementById('d-date').value;
  if(!id){toast('اختر حيواناً','error');return;}
  closeModal();
  try{
    await fbPatch('animals',id,{status:'dead',died_at:date});
    await logActivity('edit','animals','نفوق: '+id);
    toast('تم تسجيل النفوق');
    animals=await fbGet('animals');renderFilters();renderAnimals();
  }catch(e){toast('فشل: '+e.message,'error');}
};

// ── Animal Menu ──────────────────────────────────────
window.openAnimalMenu=function(id,breed,tag,status){
  var breedD=decodeURIComponent(breed);
  var tagD=decodeURIComponent(tag);
  var label=breedD+(tagD?' #'+tagD:'');
  showModal('<div class="farm-modal narrow" onclick="event.stopPropagation()" style="max-width:360px">'+
    '<div class="fw-bold mb-3">'+label+'</div>'+
    '<div class="d-flex flex-column gap-2">'+
      '<a href="animal-detail.html?id='+id+'" class="action-btn" style="justify-content:flex-start;gap:10px"><i class="bi bi-eye-fill green-text"></i> عرض البروفايل الكامل</a>'+
      (status==='alive'?'<button class="action-btn" style="justify-content:flex-start;gap:10px" onclick="closeModal();openMarkDeathSingle(\''+id+'\',\''+encodeURIComponent(label)+'\')"><i class="bi bi-x-octagon-fill accent-text"></i> تسجيل نفوق</button>':'')+
      '<button class="action-btn danger" style="justify-content:flex-start;gap:10px" onclick="closeModal();deleteAnimalFull(\''+id+'\',\''+encodeURIComponent(label)+'\')"><i class="bi bi-trash-fill"></i> حذف نهائي</button>'+
    '</div>'+
    '<div class="d-flex justify-content-end mt-3"><button class="action-btn" onclick="closeModal()">إغلاق</button></div>'+
  '</div>');
};
window.openMarkDeathSingle=function(id,labelEnc){
  var lbl=decodeURIComponent(labelEnc);
  showModal('<div class="farm-modal narrow" onclick="event.stopPropagation()">'+
    '<h4 style="color:var(--red)">تسجيل نفوق: '+lbl+'</h4>'+
    '<label>التاريخ</label><input type="date" class="field" id="ds-date" value="'+todayStr()+'">'+
    '<div class="d-flex gap-2 justify-content-end mt-3">'+
      '<button class="action-btn" onclick="closeModal()">إلغاء</button>'+
      '<button class="action-btn danger" onclick="submitDeathSingle(\''+id+'\')">تأكيد</button>'+
    '</div></div>');
};
window.submitDeathSingle=async function(id){
  var date=document.getElementById('ds-date').value;
  closeModal();
  try{
    await fbPatch('animals',id,{status:'dead',died_at:date});
    await logActivity('edit','animals','نفوق: '+id);
    toast('تم تسجيل النفوق');
    animals=await fbGet('animals');renderFilters();renderAnimals();
  }catch(e){toast('فشل: '+e.message,'error');}
};
window.deleteAnimalFull=async function(id,labelEnc){
  var lbl=decodeURIComponent(labelEnc);
  if(!confirm('حذف نهائي: '+lbl+'؟'))return;
  try{
    await fbDelete('animals',id);
    await logActivity('delete','animals','حذف: '+id);
    toast('تم الحذف');
    animals=animals.filter(function(a){return a._id!==id;});
    renderFilters();renderAnimals();
  }catch(e){toast('فشل: '+e.message,'error');}
};

// ── Reset Modal ──────────────────────────────────────
window.openResetModal=function(){
  showModal('<div class="farm-modal" onclick="event.stopPropagation()">'+
    '<h4 style="color:var(--purple)"><i class="bi bi-arrow-counterclockwise"></i> إعادة تعيين (مدير فقط)</h4>'+
    '<div class="d-flex flex-column gap-2 mb-3">'+
      '<label style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:10px;background:rgba(244,67,54,.06);border-radius:10px;border:1px solid rgba(244,67,54,.2)">'+
        '<input type="checkbox" id="reset-dead" style="accent-color:var(--red)">'+
        '<div><div class="fw-bold">حذف النافق وسجلاتهم</div><small class="text-gray">يشمل سجلاتهم الصحية وسجلات التكاثر</small></div></label>'+
      '<label style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:10px;background:rgba(0,230,118,.06);border-radius:10px;border:1px solid rgba(0,230,118,.2)">'+
        '<input type="checkbox" id="reset-births" style="accent-color:var(--green)">'+
        '<div><div class="fw-bold">تحويل المواليد لتربية</div><small class="text-gray">نقل المواليد الأحياء لقسم التربية</small></div></label>'+
      '<label style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:10px;background:rgba(244,67,54,.1);border-radius:10px;border:2px solid rgba(244,67,54,.4)">'+
        '<input type="checkbox" id="reset-all" style="accent-color:var(--red)">'+
        '<div><div class="fw-bold red-text">⚠️ مسح كل بيانات المزرعة</div><small style="color:var(--red)">حيوانات، صحة، تكاثر، تحصين، مالية، مخزن، أنشطة</small></div></label>'+
    '</div>'+
    '<div class="d-flex gap-2 justify-content-end">'+
      '<button class="action-btn" onclick="closeModal()">إلغاء</button>'+
      '<button class="action-btn" style="background:rgba(156,39,176,.15);border-color:rgba(156,39,176,.4);color:var(--purple)" onclick="submitReset()">تنفيذ</button>'+
    '</div></div>');
};
window.submitReset=async function(){
  if(document.getElementById('reset-all')?.checked){
    if(!confirm('مسح كل بيانات المزرعة نهائياً؟'))return;
    var conf=prompt('اكتب "تأكيد" للمتابعة:');
    if(conf!=='تأكيد'){toast('تم الإلغاء','info');return;}
    closeModal();toast('جاري المسح...','info');
    var tables=['animals','health','breeding','vaccinations','finance','inventory_meds','inventory_feeds','inventory_equipment','activity_log'];
    for(var t of tables){try{await fetch(FB_URL+'/'+t+'.json'+(FB_SECRET?'?auth='+FB_SECRET:''),{method:'DELETE'});}catch(e){}}
    toast('تم مسح كل البيانات');setTimeout(function(){location.reload();},1500);return;
  }
  closeModal();var done=0;
  if(document.getElementById('reset-dead')?.checked){
    var dead=animals.filter(function(a){return a.status==='dead';});
    for(var a of dead){try{await fbDelete('animals',a._id);done++;}catch(e){}}
  }
  if(document.getElementById('reset-births')?.checked){
    var births=animals.filter(function(a){return a.status==='alive'&&a.purpose==='birth';});
    for(var a of births){try{await fbPatch('animals',a._id,{purpose:'tarbiya'});done++;}catch(e){}}
  }
  if(done)toast('تم تنفيذ العملية على '+ar(done)+' سجل');
  animals=await fbGet('animals');renderFilters();renderAnimals();
};

// ── Export CSV ───────────────────────────────────────
window.exportCSV=function(){
  var list=animals;
  var rows=[['الرقم','النوع','السلالة','الجنس','الغرض','الحالة','الترقيم','الجمالون','تاريخ الميلاد']];
  list.forEach(function(a,i){rows.push([ar(i+1),a.species==='goat'?'ماعز':'أغنام',a.breed||'',a.gender==='male'?'ذكر':'أنثى',{tarbiya:'تربية',tasmeen:'تسمين',birth:'مواليد'}[a.purpose]||a.purpose,a.status==='alive'?'حي':'نافق',a.tag||'',a.barn||'',a.birth_date||'']);});
  var csv=rows.map(function(r){return r.map(function(v){return'"'+v+'"';}).join(',');}).join('\n');
  var a=document.createElement('a');a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);a.download='animals-'+todayStr()+'.csv';a.click();
  toast('تم التصدير ('+ar(list.length)+' حيوان)');
};
</script>
