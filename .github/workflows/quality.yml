name: Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install test dependencies
        run: npm install @playwright/test@1.56.0 --no-save

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Syntax check (all JS)
        run: |
          for f in $(find . -name "*.js" -not -path "./node_modules/*" -not -path "./farm-apk/*" -not -path "./tests/*"); do
            node --check "$f" || exit 1
          done

      - name: Static safety scan (permission + SSOT regression detection)
        run: node scripts/safety-scan.js

      - name: Start static server
        run: python3 -m http.server 8080 &
        
      - name: Wait for server
        run: npx wait-on http://localhost:8080 --timeout 10000

      - name: Run regression suite
        run: npx playwright test
        env:
          BASE_URL: http://localhost:8080

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

# Failure conditions (any step failing red-lines the whole gate):
#   - permission regression (safety-scan.js exits 1)
#   - SSOT regression (safety-scan.js exits 1, or a tests/ssot/* spec fails)
#   - syntax errors (node --check)
#   - any regression suite test failure
