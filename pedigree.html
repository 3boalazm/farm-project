<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<script>(function(){var t=localStorage.getItem('farm_theme');if(t==='light')document.documentElement.classList.add('light-mode');}());</script>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>شجرة النسب — بيان المزرعة</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Lexend:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
.ped-search-card{background:var(--bg-2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:20px}
.ped-tree{overflow-x:auto;padding:30px 20px;background:var(--bg-2);border:1px solid var(--border);border-radius:14px;min-height:400px}
.ped-canvas{min-width:900px;position:relative}
.ped-node{display:inline-flex;flex-direction:column;align-items:center;background:var(--bg-3);border:2px solid var(--border-2);border-radius:14px;padding:10px 14px;min-width:140px;max-width:180px;transition:.2s;cursor:pointer;text-decoration:none;color:var(--text);position:relative}
.ped-node:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.25)}
.ped-node.male{border-color:rgba(33,150,243,.5);background:rgba(33,150,243,.05)}
.ped-node.female{border-color:rgba(244,67,54,.4);background:rgba(244,67,54,.04)}
.ped-node.center{border-color:var(--orange);background:rgba(255,107,53,.08);box-shadow:0 0 0 3px rgba(255,107,53,.15)}
.ped-node.empty{opacity:.4;border-style:dashed;cursor:default}
.ped-node.empty:hover{transform:none}
.ped-icon{font-size:1.8rem;margin-bottom:4px}
.ped-name{font-weight:700;font-size:.85rem}
.ped-meta{font-size:.7rem;color:var(--text-muted);margin-top:2px}
.ped-row{display:flex;justify-content:center;gap:24px;flex-wrap:wrap;margin-bottom:24px;position:relative}
.ped-connector{display:flex;justify-content:center;align-items:center;gap:0;height:24px;position:relative;margin:-12px 0}
.ped-line{width:2px;height:24px;background:var(--border-2)}
.ped-label{text-align:center;font-size:.78rem;color:var(--text-muted);font-weight:700;margin-bottom:10px;padding:4px 10px;background:var(--bg-3);border-radius:8px;display:inline-block}
.empty-tree{text-align:center;padding:50px 20px;color:var(--text-muted)}
</style>
</head>
<body>
<div class="page-wrap">
  <div id="page-header"></div>
  <div id="content"><div class="text-center py-5"><div class="spinner"></div></div></div>
  <footer class="text-center text-gray mt-5 pt-4 pb-3" style="border-top:1px solid var(--border)">
    &copy; <span id="footer-year"></span> <span id="footer-farm"></span><br>
    <small style="font-size:.72rem;color:var(--text-muted)">إشراف: لواء أحمد رجب نوح | تطوير: جندي مصطفى محمد إبراهيم</small>
  </footer>
</div>
<script src="config.js"></script>
<script src="firebase.js"></script>
<script src="nav.js"></script>
<script src="shared.js"></script>
<script src="pages/pedigree.js"></script>
</body>
</html>
