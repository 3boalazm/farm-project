<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بيان المزرعة</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Lexend:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Sidebar Overlay -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- Sidebar -->
<aside class="sidebar-menu" id="sidebarMenu">
  <div class="sidebar-header">
    <div>
      <div class="fw-bold" id="sb-farm-name" style="font-size:1.1rem">بيان المزرعة</div>
      <small class="text-gray">القائمة الرئيسية</small>
    </div>
    <button class="sidebar-close" onclick="closeSidebar()"><i class="bi bi-x-lg"></i></button>
  </div>
  <nav class="sidebar-nav" id="sidebar-nav"></nav>
  <div class="sidebar-footer">
    <div class="d-flex align-items-center gap-3">
      <div class="user-avatar" id="sb-avatar">م</div>
      <div>
        <div class="fw-bold" id="sb-owner">مدير المزرعة</div>
        <small class="green-text"><i class="bi bi-circle-fill" style="font-size:8px"></i> متصل الآن</small>
      </div>
    </div>
  </div>
</aside>

<!-- Navbar -->
<nav class="navbar-wonder">
  <div class="container d-flex justify-content-between align-items-center">
    <a href="#" class="navbar-brand" onclick="switchTab('dash');return false;">
      <span style="font-size:1.6rem">🐐</span>
      <span id="nav-farm-name">بيان المزرعة</span>
    </a>
    <div class="d-flex align-items-center gap-2">
      <span class="date-badge"><i class="bi bi-calendar3"></i> <span id="today-display"></span></span>
      <button class="bell-btn" onclick="switchTab('notifications')" id="bell-btn">
        <i class="bi bi-bell-fill"></i>
        <span class="bell-badge" id="bell-badge" style="display:none">0</span>
      </button>
      <button class="menu-btn" onclick="openSidebar()"><i class="bi bi-list"></i></button>
    </div>
  </div>
</nav>

<!-- Main -->
<main class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
    <div>
      <h4 class="fw-bold mb-0" id="page-title-h">النظرة العامة</h4>
      <small class="text-gray" id="page-subtitle"></small>
    </div>
    <ul class="nav nav-pills flex-nowrap overflow-auto" id="tab-pills"></ul>
  </div>
  <div id="page-content"></div>
  <footer class="text-center text-gray mt-5 pt-4 pb-3" style="border-top:1px solid var(--border-color)">
    © <span id="footer-year"></span> <span id="footer-name">بيان المزرعة</span> — جميع الحقوق محفوظة
  </footer>
</main>

<!-- Toast -->
<div id="toast-wrap"></div>
<!-- Modal -->
<div id="modal-root"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="app.js"></script>
</body>
</html>
