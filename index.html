<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بيان المزرعة</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Lexend:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<!-- Login Screen -->
<div id="login-screen" style="display:none"></div>
<!-- Sidebar Overlay -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<!-- Sidebar -->
<aside class="sidebar-menu" id="sidebarMenu">
  <div class="sidebar-header">
    <div class="d-flex align-items-center gap-2">
      <div id="sb-logo" class="farm-logo-sm"></div>
      <div><div class="fw-bold" id="sb-farm-name" style="font-size:1.05rem">بيان المزرعة</div>
      <small class="text-gray" id="sb-role-label">مدير</small></div>
    </div>
    <button class="sidebar-close" onclick="closeSidebar()"><i class="bi bi-x-lg"></i></button>
  </div>
  <nav class="sidebar-nav" id="sidebar-nav"></nav>
  <div class="sidebar-footer">
    <div class="d-flex align-items-center gap-3">
      <div class="user-avatar" id="sb-avatar">م</div>
      <div class="flex-grow-1">
        <div class="fw-bold" id="sb-user-name">المدير</div>
        <small class="green-text"><i class="bi bi-circle-fill" style="font-size:7px"></i> متصل</small>
      </div>
      <button onclick="logout()" style="background:none;border:none;color:#666;cursor:pointer;font-size:1.1rem" title="تسجيل الخروج"><i class="bi bi-box-arrow-left"></i></button>
    </div>
  </div>
</aside>
<!-- Navbar -->
<nav class="navbar-wonder" id="main-navbar">
  <div class="container d-flex justify-content-between align-items-center">
    <div class="d-flex align-items-center gap-2">
      <button onclick="goBack()" id="back-btn" style="display:none;background:none;border:none;color:var(--text-light);font-size:1.1rem;cursor:pointer;padding:4px 8px"><i class="bi bi-arrow-right"></i></button>
      <a href="#" class="navbar-brand" onclick="navigate('dash');return false;">
        <span id="nav-farm-icon">🐐</span> <span id="nav-farm-name">بيان المزرعة</span>
      </a>
    </div>
    <div class="d-flex align-items-center gap-2">
      <span class="date-badge d-none d-sm-flex"><i class="bi bi-calendar3"></i> <span id="today-display"></span></span>
      <button class="bell-btn" onclick="navigate('notifications')" id="bell-btn">
        <i class="bi bi-bell-fill"></i><span class="bell-badge" id="bell-badge" style="display:none">0</span>
      </button>
      <button class="menu-btn" onclick="openSidebar()"><i class="bi bi-list"></i></button>
    </div>
  </div>
</nav>
<!-- Breadcrumb -->
<div class="breadcrumb-bar" id="breadcrumb-bar" style="display:none">
  <div class="container"><span id="breadcrumb-content"></span></div>
</div>
<!-- Main -->
<main class="container py-4" id="main-content">
  <div id="page-header" class="mb-4 d-flex justify-content-between align-items-center flex-wrap gap-3">
    <div><h4 class="fw-bold mb-0" id="page-title-h">النظرة العامة</h4>
    <small class="text-gray" id="page-subtitle"></small></div>
    <ul class="nav nav-pills flex-nowrap overflow-auto" id="tab-pills"></ul>
  </div>
  <div id="page-content"></div>
  <footer class="text-center text-gray mt-5 pt-4 pb-3" style="border-top:1px solid var(--border-color)">
    © <span id="footer-year"></span> <span id="footer-name">بيان المزرعة</span>
  </footer>
</main>
<div id="toast-wrap"></div>
<div id="modal-root"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
