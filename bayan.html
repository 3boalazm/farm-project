<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>بيان القطيع — بيان المزرعة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0a; --card:#161616; --card2:#1d1d1d; --border:#2a2a2a;
    --text:#f3f4f6; --muted:#8a8a8a;
    --green:#639922; --blue:#378add; --orange:#ff6b35; --yellow:#ffc107;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;padding:0}
  .wrap{max-width:1100px;margin:0 auto;padding:24px 16px 60px}
  .head{text-align:center;padding:28px 0 8px}
  .head h1{font-size:1.7rem;font-weight:800;color:var(--green);display:flex;align-items:center;justify-content:center;gap:10px}
  .head p{color:var(--muted);font-size:.95rem;margin-top:6px}
  .datebar{text-align:center;margin:18px 0 26px}
  .datebar span{display:inline-block;background:rgba(99,153,34,.1);border:1px solid rgba(99,153,34,.3);border-radius:12px;padding:9px 22px;font-weight:700;color:var(--green)}
  .row{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:14px}
  .col4{flex:1 1 calc(25% - 14px);min-width:150px}
  .col3{flex:1 1 calc(33.33% - 14px);min-width:240px}
  .col6{flex:1 1 calc(50% - 7px)}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;text-align:center}
  .card .ico{font-size:1.4rem;margin-bottom:4px}
  .card .num{font-size:1.7rem;font-weight:800;line-height:1.2}
  .card .lbl{color:var(--muted);font-size:.85rem;margin-top:2px}
  .card .sub{font-size:.72rem;color:#666;margin-top:3px}
  .divider{display:flex;align-items:center;gap:12px;margin:34px 0 18px;flex-wrap:wrap}
  .divider .line{flex:1;min-width:30px;height:1px;background:var(--border)}
  .divider h2{margin:0;font-weight:800;font-size:1.3rem}
  .pill{display:inline-flex;align-items:center;gap:6px;font-size:.8rem;padding:4px 14px;border-radius:20px;background:rgba(138,138,138,.15);color:var(--muted);border:1px solid rgba(138,138,138,.3)}
  .breed{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px}
  .breed-hd{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .breed-hd .emoji{font-size:1.9rem}
  .breed-hd .name{font-weight:800;font-size:1.05rem}
  .breed-hd .cnt{color:var(--muted);font-size:.82rem}
  .gbox{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center}
  .gbox .gnum{font-size:1.25rem;font-weight:800;display:block}
  .gbox .glbl{color:var(--muted);font-size:.72rem}
  .badges{margin-top:12px;display:flex;flex-wrap:wrap;gap:6px}
  .tag{font-size:.74rem;padding:3px 10px;border-radius:8px;font-weight:600}
  .tag.tarbiya{background:rgba(99,153,34,.15);color:var(--green)}
  .tag.tasmeen{background:rgba(255,107,53,.15);color:var(--orange)}
  .tag.birth{background:rgba(255,193,7,.12);color:var(--yellow)}
  .green{color:var(--green)} .blue{color:var(--blue)} .orange{color:var(--orange)} .yellow{color:var(--yellow)}
  footer{text-align:center;color:var(--muted);font-size:.8rem;margin-top:40px;padding-top:20px;border-top:1px solid var(--border)}
  footer small{font-size:.7rem;color:#555}
  .printbtn{display:block;margin:24px auto 0;background:var(--card2);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:.9rem;padding:9px 22px;border-radius:10px;cursor:pointer}
  .printbtn:hover{border-color:var(--green)}
  @media print{
    body{background:#fff;color:#000}
    .card,.breed,.gbox{border:1px solid #ccc;background:#fff;break-inside:avoid}
    .printbtn{display:none}
    .head h1{color:#000}
  }
  @media(max-width:600px){.col4,.col3{flex:1 1 calc(50% - 7px)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <h1>📋 بيان القطيع</h1>
    <p>بيان الماعز والأغنام عن يوم ٢٠٢٦/٠٦/٠١</p>
  </div>
  <div class="datebar"><span>📅 بيان عن يوم: ٢٠٢٦/٠٦/٠١</span></div>
  <div id="content"></div>
  <button class="printbtn" onclick="window.print()">🖨️ طباعة البيان</button>
  <footer>
    ٢٠٢٦ &copy; بيان المزرعة<br>
    <small>إشراف: لواء أحمد رجب نوح | تطوير: جندي مصطفى محمد إبراهيم</small>
  </footer>
</div>
<script>
// ============================================================
//  بيان ثابت مستقل تماماً — أرقام جدول الإكسيل 2026/06/01
//  لا login، لا اتصال بقاعدة بيانات، لا ملفات خارجية.
//  لتغيير الأرقام عدّل BAYAN_DATA أدناه.
// ============================================================

// purpose: tarbiya = تربية | tasmeen = تجديد قطيع | birth = مواليد
var BAYAN_DATA = {
  goat: {
    label:'الماعز', emoji:'🐐', color:'var(--green)',
    breeds:[
      {name:'بور',  tm:11, tf:15,  sm:4, sf:0,  bm:0,  bf:0},
      {name:'شامي', tm:2,  tf:141, sm:0, sf:0,  bm:0,  bf:0},
      {name:'بلدي', tm:1,  tf:26,  sm:0, sf:0,  bm:0,  bf:0},
      {name:'مواليد',tm:0, tf:0,   sm:0, sf:0,  bm:50, bf:51}
    ]
  },
  sheep: {
    label:'الأغنام', emoji:'🐑', color:'var(--blue)',
    breeds:[
      {name:'برقي',      tm:2, tf:68, sm:0, sf:0,  bm:0,  bf:0},
      {name:'دودبر',     tm:1, tf:1,  sm:0, sf:0,  bm:0,  bf:0},
      {name:'ميت ماستر',tm:1, tf:0,  sm:0, sf:0,  bm:0,  bf:0},
      {name:'مواليد',    tm:0, tf:0,  sm:0, sf:12, bm:19, bf:17}
    ]
  }
};

// تحويل الأرقام للعربية الهندية
function ar(n){
  var d=['٠','١','٢','٣','٤','٥','٦','٧','٨','٩'];
  return String(n).replace(/[0-9]/g,function(x){return d[+x];});
}

function totals(sp){
  var t={tarbiya:0,tasmeen:0,births:0,males:0,females:0,total:0};
  BAYAN_DATA[sp].breeds.forEach(function(b){
    t.tarbiya += b.tm+b.tf;
    t.tasmeen += b.sm+b.sf;
    t.births  += b.bm+b.bf;
    t.males   += b.tm+b.sm+b.bm;
    t.females += b.tf+b.sf+b.bf;
  });
  t.total = t.tarbiya+t.tasmeen+t.births;
  return t;
}

function topCard(label,num,color,ico,sub){
  return '<div class="col4"><div class="card">'+
    '<div class="ico" style="color:'+color+'">'+ico+'</div>'+
    '<div class="num" style="color:'+color+'">'+ar(num)+'</div>'+
    '<div class="lbl">'+label+'</div>'+
    (sub?'<div class="sub">'+sub+'</div>':'')+
    '</div></div>';
}

function summaryRow(t,color){
  return '<div class="row">'+
    '<div class="col4"><div class="card"><div class="num green">'+ar(t.tarbiya)+'</div><div class="lbl">تربية</div></div></div>'+
    '<div class="col4"><div class="card"><div class="num orange">'+ar(t.tasmeen)+'</div><div class="lbl">تجديد قطيع</div></div></div>'+
    '<div class="col4"><div class="card"><div class="num yellow">'+ar(t.births)+'</div><div class="lbl">مواليد</div></div></div>'+
    '<div class="col4"><div class="card"><div class="num" style="color:'+color+'">'+ar(t.males)+' ♂ / '+ar(t.females)+' ♀</div><div class="lbl">ذكور / إناث</div></div></div>'+
    '</div>';
}

function breedCard(emoji,b){
  var tarbiya=b.tm+b.tf, tasmeen=b.sm+b.sf, birth=b.bm+b.bf;
  var total=tarbiya+tasmeen+birth;
  if(total===0)return '';
  var h='<div class="col3"><div class="breed">';
  h+='<div class="breed-hd"><div class="emoji">'+emoji+'</div>'+
     '<div><div class="name">'+b.name+'</div><div class="cnt">'+ar(total)+' حيوان</div></div></div>';
  h+='<div class="row" style="gap:8px">';
  h+='<div class="col6"><div class="gbox"><span class="gnum green">'+ar(b.tm)+'</span><span class="glbl">ذكور تربية</span></div></div>';
  h+='<div class="col6"><div class="gbox"><span class="gnum green">'+ar(b.tf)+'</span><span class="glbl">إناث تربية</span></div></div>';
  h+='<div class="col6"><div class="gbox"><span class="gnum orange">'+ar(b.sm)+'</span><span class="glbl">ذكور تجديد</span></div></div>';
  h+='<div class="col6"><div class="gbox"><span class="gnum orange">'+ar(b.sf)+'</span><span class="glbl">إناث تجديد</span></div></div>';
  if(birth>0){
    h+='<div class="col6"><div class="gbox"><span class="gnum yellow">'+ar(b.bm)+'</span><span class="glbl">ذكور مواليد</span></div></div>';
    h+='<div class="col6"><div class="gbox"><span class="gnum yellow">'+ar(b.bf)+'</span><span class="glbl">إناث مواليد</span></div></div>';
  }
  h+='</div>';
  h+='<div class="badges">';
  if(tarbiya>0)h+='<span class="tag tarbiya">تربية '+ar(tarbiya)+'</span>';
  if(tasmeen>0)h+='<span class="tag tasmeen">تجديد '+ar(tasmeen)+'</span>';
  if(birth>0)h+='<span class="tag birth">مواليد '+ar(birth)+'</span>';
  h+='</div>';
  h+='</div></div>';
  return h;
}

function species(sp,t){
  var d=BAYAN_DATA[sp];
  var h='<div class="divider"><h2 style="color:'+d.color+'">'+d.emoji+' '+d.label+'</h2>'+
    '<div class="line"></div><span class="pill">'+ar(t.total)+' رأس</span></div>';
  h+=summaryRow(t,d.color);
  h+='<div class="row">';
  d.breeds.forEach(function(b){ h+=breedCard(d.emoji,b); });
  h+='</div>';
  return h;
}

(function render(){
  var g=totals('goat'), sh=totals('sheep'), grand=g.total+sh.total;
  var html='';
  html+='<div class="row">';
  html+=topCard('إجمالي القطيع', grand, 'var(--orange)', '📦', ar(g.total)+' ماعز + '+ar(sh.total)+' أغنام');
  html+=topCard('الماعز', g.total, 'var(--green)', '🐐', ar(g.births)+' مواليد');
  html+=topCard('الأغنام', sh.total, 'var(--blue)', '🐑', ar(sh.births)+' مواليد');
  html+=topCard('إجمالي المواليد', g.births+sh.births, 'var(--yellow)', '✨', ar(g.males+sh.males)+' ♂ / '+ar(g.females+sh.females)+' ♀');
  html+='</div>';
  html+=species('goat',g);
  html+=species('sheep',sh);
  document.getElementById('content').innerHTML=html;
})();
</script>
</body>
</html>
