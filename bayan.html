<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>بيان قطيع المزرعة — ٢٠٢٦/٠٦/٠١</title>
<script>(function(){try{var t=localStorage.getItem('bayan_theme');if(t==='light')document.documentElement.classList.add('light');}catch(e){}})();</script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0a; --bg2:#0f0f10; --card:#161618; --card2:#1d1d20; --line:#2a2a2e;
    --text:#f3f4f6; --muted:#9a9aa2; --dim:#6a6a72;
    --green:#22c55e; --blue:#3b82f6; --orange:#f97316; --yellow:#eab308;
    --r:16px;
  }
  html.light{
    --bg:#f4f5f7; --bg2:#eceef1; --card:#ffffff; --card2:#f7f8fa; --line:#e2e5ea;
    --text:#16181d; --muted:#5b6573; --dim:#8a93a3;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{font-family:'Cairo','Segoe UI',Tahoma,sans-serif;background:
    radial-gradient(1200px 600px at 80% -10%, rgba(34,197,94,.06), transparent 60%),
    radial-gradient(900px 500px at 10% 0%, rgba(59,130,246,.05), transparent 55%),
    var(--bg);
    color:var(--text);line-height:1.7;min-height:100vh;transition:background .3s,color .3s}
  .wrap{max-width:1100px;margin:0 auto;padding:0 16px 60px}

  .topbar{display:flex;justify-content:flex-end;padding:14px 0 0}
  .theme-btn{display:inline-flex;align-items:center;gap:8px;background:var(--card2);border:1px solid var(--line);
    color:var(--text);border-radius:30px;padding:8px 16px;font-family:inherit;font-size:.85rem;font-weight:600;cursor:pointer;transition:.2s}
  .theme-btn:hover{border-color:var(--green)}

  .hero{text-align:center;padding:20px 0 8px}
  .hero .crest{font-size:2.4rem}
  .hero h1{font-size:1.9rem;font-weight:800;margin-top:6px;color:var(--green)}
  .hero .desc{color:var(--muted);font-size:.98rem;margin-top:8px;max-width:560px;margin-inline:auto}
  .datebar{text-align:center;margin:18px 0 26px}
  .datebar span{display:inline-block;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);
    border-radius:12px;padding:9px 22px;font-weight:700;color:var(--green)}

  .shortcuts{position:sticky;top:0;z-index:50;display:flex;flex-wrap:wrap;gap:8px;justify-content:center;
    padding:12px 0;margin-bottom:8px;background:color-mix(in srgb,var(--bg) 80%,transparent);backdrop-filter:blur(12px);
    border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
  .sc{display:inline-flex;align-items:center;gap:7px;background:var(--card2);border:1px solid var(--line);
    color:var(--text);border-radius:30px;padding:7px 14px;font-family:inherit;font-size:.83rem;font-weight:600;
    cursor:pointer;text-decoration:none;transition:.22s}
  .sc:hover{border-color:var(--green);background:rgba(34,197,94,.12);transform:translateY(-2px)}
  .sc .dot{width:9px;height:9px;border-radius:50%}

  .row{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:14px}
  .col4{flex:1 1 calc(25% - 14px);min-width:150px}
  .col6{flex:1 1 calc(50% - 7px)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:20px 16px;text-align:center;
    opacity:0;transform:translateY(14px);animation:rise .5s ease forwards}
  .card .ico{font-size:1.4rem;margin-bottom:4px}
  .card .num{font-size:1.7rem;font-weight:800;line-height:1.2}
  .card .lbl{color:var(--muted);font-size:.85rem;margin-top:2px}
  .card .sub{font-size:.72rem;color:var(--dim);margin-top:3px}

  .divider{display:flex;align-items:center;gap:12px;margin:34px 0 18px;flex-wrap:wrap}
  .divider .line{flex:1;min-width:30px;height:1px;background:var(--line)}
  .divider h2{margin:0;font-weight:800;font-size:1.3rem}
  .pill{display:inline-flex;align-items:center;gap:6px;font-size:.8rem;padding:4px 14px;border-radius:20px;
    background:rgba(154,154,162,.15);color:var(--muted);border:1px solid rgba(154,154,162,.3)}

  .tbl{width:100%;border-collapse:collapse;font-size:.92rem;background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;margin-bottom:8px}
  .tbl th,.tbl td{padding:13px 10px;text-align:center}
  .tbl thead th{color:var(--dim);font-weight:700;font-size:.82rem;border-bottom:1px solid var(--line)}
  .tbl tbody tr{border-bottom:1px solid var(--line)}
  .tbl tbody tr:last-child{border-bottom:none}
  .tbl td.cat{text-align:right;font-weight:700;padding-inline-start:18px}
  .tbl .big{font-weight:900;font-size:1.05rem}
  .tbl tr.totalrow{background:rgba(249,115,22,.07)}
  .tbl tr.totalrow td{color:var(--orange);font-weight:900}

  .breed{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px}
  .breed-hd{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .breed-hd .emoji{font-size:1.8rem}
  .breed-hd .name{font-weight:800;font-size:1.05rem}
  .breed-hd .cnt{color:var(--muted);font-size:.8rem}
  .gbox{background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:10px;text-align:center}
  .gbox .gn{font-size:1.2rem;font-weight:800;display:block}
  .gbox .gl{color:var(--dim);font-size:.7rem}
  .tags{margin-top:12px;display:flex;flex-wrap:wrap;gap:6px}
  .tg{font-size:.74rem;padding:3px 10px;border-radius:8px;font-weight:700}
  .tg.t{background:rgba(34,197,94,.15);color:#16a34a}
  .tg.s{background:rgba(249,115,22,.15);color:#ea580c}
  .tg.b{background:rgba(234,179,8,.18);color:#a16207}

  .green{color:var(--green)} .blue{color:var(--blue)} .orange{color:var(--orange)} .yellow{color:var(--yellow)}

  .glossary{background:var(--card);border:1px dashed var(--line);border-radius:var(--r);padding:20px 22px;margin-top:20px}
  .glossary h3{font-size:1.05rem;font-weight:800;margin-bottom:12px}
  .gl-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px}
  .gl-item{display:flex;gap:10px;align-items:flex-start;font-size:.88rem}
  .gl-item .ic{font-size:1.1rem;flex:none;margin-top:2px}
  .gl-item b{color:var(--text)}
  .gl-item span{color:var(--muted)}

  footer{text-align:center;color:var(--muted);font-size:.8rem;margin-top:40px;padding-top:20px;border-top:1px solid var(--line)}
  footer small{font-size:.7rem;color:var(--dim)}
  .printbtn{display:block;margin:24px auto 0;background:var(--card2);border:1px solid var(--line);color:var(--text);
    font-family:inherit;font-size:.9rem;padding:10px 24px;border-radius:10px;cursor:pointer}
  .printbtn:hover{border-color:var(--green)}

  @keyframes rise{to{opacity:1;transform:translateY(0)}}
  @media(prefers-reduced-motion:reduce){*{animation:none!important}}

  @media print{
    body{background:#fff;color:#000}
    .topbar,.shortcuts,.printbtn{display:none}
    .card,.breed,.gbox,.tbl,.glossary{border:1px solid #ccc;background:#fff;break-inside:avoid}
    .hero h1{color:#000}
  }
  @media(max-width:600px){.col4{flex:1 1 calc(50% - 7px)}.hero h1{font-size:1.6rem}}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <button class="theme-btn" onclick="toggleTheme()"><span id="themeIcon">🌙</span> <span id="themeLbl">الوضع الفاتح</span></button>
  </div>

  <div class="hero">
    <div class="crest">🐐🐑</div>
    <h1>بيان قطيع المزرعة</h1>
    <p class="desc">عرض شامل لعدد الماعز والأغنام في المزرعة، موزّعين حسب السلالة والغرض والجنس.</p>
  </div>
  <div class="datebar"><span>📅 بيان عن يوم: ٢٠٢٦/٠٦/٠١</span></div>

  <nav class="shortcuts">
    <a class="sc" href="#summary"><span class="dot" style="background:var(--orange)"></span> الملخص العام</a>
    <a class="sc" href="#table"><span class="dot" style="background:var(--blue)"></span> الجدول</a>
    <a class="sc" href="#goats"><span class="dot" style="background:var(--green)"></span> الماعز</a>
    <a class="sc" href="#sheep"><span class="dot" style="background:var(--blue)"></span> الأغنام</a>
    <a class="sc" href="#glossary"><span class="dot" style="background:var(--yellow)"></span> دليل المصطلحات</a>
  </nav>

  <div id="content"></div>

  <button class="printbtn" onclick="window.print()">🖨️ طباعة البيان</button>
  <footer>
    ٢٠٢٦ &copy; بيان المزرعة — جميع الحقوق محفوظة<br>
    <small>إشراف: لواء أحمد رجب نوح | تطوير: جندي مصطفى محمد إبراهيم</small>
  </footer>
</div>

<script>
// ============================================================
//  بيان ثابت — عرض فقط، بدون رسوم بيانية وبدون تسجيل.
//  أرقام جدول الإكسيل ٢٠٢٦/٠٦/٠١. لتغيير الأرقام عدّل DATA.
//  الغرض: t=تربية | s=تجديد قطيع | b=مواليد ، الجنس: m=ذكور f=إناث
// ============================================================
var DATA = {
  goat: {
    label:'الماعز', emoji:'🐐', color:'var(--green)',
    breeds:[
      {name:'بور',  tm:11, tf:15,  sm:4, sf:0},
      {name:'شامي', tm:1,  tf:141, sm:1, sf:0},
      {name:'بلدي', tm:1,  tf:26,  sm:0, sf:0}
    ],
    births:{m:50, f:51}
  },
  sheep: {
    label:'الأغنام', emoji:'🐑', color:'var(--blue)',
    breeds:[
      {name:'برقي',      tm:2, tf:68, sm:0, sf:0},
      {name:'دودبر',     tm:1, tf:1,  sm:0, sf:0},
      {name:'ميت ماستر',tm:1, tf:0,  sm:0, sf:0}
    ],
    births:{m:19, f:17, tasmeenF:12}
  }
};

function ar(n){var d='٠١٢٣٤٥٦٧٨٩';return String(n).replace(/[0-9]/g,function(x){return d[+x];});}

function breedStats(sp){
  var t={tarbiya:0,tasmeen:0,males:0,females:0,total:0};
  DATA[sp].breeds.forEach(function(b){
    t.tarbiya+=b.tm+b.tf; t.tasmeen+=b.sm+b.sf;
    t.males+=b.tm+b.sm; t.females+=b.tf+b.sf;
  });
  t.total=t.tarbiya+t.tasmeen; return t;
}
function birthStats(sp){
  var b=DATA[sp].births, tf=b.tasmeenF||0;
  return {m:b.m, f:b.f+tf, tasmeenF:tf, total:b.m+b.f+tf, births_only:b.m+b.f};
}
var GB=breedStats('goat'), SB=breedStats('sheep');
var GBR=birthStats('goat'), SBR=birthStats('sheep');
var G_TOTAL=GB.total+GBR.total, S_TOTAL=SB.total+SBR.total, GRAND=G_TOTAL+S_TOTAL;

function topCard(label,num,color,ico,sub,delay){
  return '<div class="col4"><div class="card" style="animation-delay:'+delay+'s">'+
    '<div class="ico" style="color:'+color+'">'+ico+'</div>'+
    '<div class="num" style="color:'+color+'">'+ar(num)+'</div>'+
    '<div class="lbl">'+label+'</div>'+
    (sub?'<div class="sub">'+sub+'</div>':'')+'</div></div>';
}
function summaryRow(t,color){
  return '<div class="row">'+
    '<div class="col4"><div class="card"><div class="num green">'+ar(t.tarbiya)+'</div><div class="lbl">تربية</div></div></div>'+
    '<div class="col4"><div class="card"><div class="num orange">'+ar(t.tasmeen)+'</div><div class="lbl">تجديد قطيع</div></div></div>'+
    '<div class="col4"><div class="card"><div class="num yellow">'+ar(t.births)+'</div><div class="lbl">مواليد</div></div></div>'+
    '<div class="col4"><div class="card"><div class="num" style="color:'+color+'">'+ar(t.males)+' ♂ / '+ar(t.females)+' ♀</div><div class="lbl">ذكور / إناث</div></div></div>'+
    '</div>';
}
function breedCard(emoji,b){
  var tarbiya=b.tm+b.tf, tasmeen=b.sm+b.sf, total=tarbiya+tasmeen;
  var h='<div class="col6"><div class="breed">';
  h+='<div class="breed-hd"><div class="emoji">'+emoji+'</div><div><div class="name">'+b.name+'</div><div class="cnt">'+ar(total)+' رأس</div></div></div>';
  h+='<div class="row" style="gap:8px">';
  h+='<div class="col6"><div class="gbox"><span class="gn green">'+ar(b.tm)+'</span><span class="gl">ذكور تربية</span></div></div>';
  h+='<div class="col6"><div class="gbox"><span class="gn green">'+ar(b.tf)+'</span><span class="gl">إناث تربية</span></div></div>';
  h+='<div class="col6"><div class="gbox"><span class="gn orange">'+ar(b.sm)+'</span><span class="gl">ذكور تجديد</span></div></div>';
  h+='<div class="col6"><div class="gbox"><span class="gn orange">'+ar(b.sf)+'</span><span class="gl">إناث تجديد</span></div></div>';
  h+='</div><div class="tags">';
  if(tarbiya>0)h+='<span class="tg t">تربية '+ar(tarbiya)+' رأس</span>';
  if(tasmeen>0)h+='<span class="tg s">تجديد '+ar(tasmeen)+' رأس</span>';
  h+='</div></div></div>';
  return h;
}
function birthCard(sp){
  var br=birthStats(sp);
  if(br.total===0)return '';
  var name=(sp==='goat'?'مواليد الماعز':'مواليد الأغنام');
  var h='<div class="col6"><div class="breed" style="border-color:rgba(234,179,8,.4)">';
  h+='<div class="breed-hd"><div class="emoji">✨</div><div><div class="name yellow">'+name+'</div><div class="cnt">'+ar(br.total)+' رأس</div></div></div>';
  h+='<div class="row" style="gap:8px">';
  h+='<div class="col6"><div class="gbox"><span class="gn yellow">'+ar(br.m)+'</span><span class="gl">ذكور مواليد</span></div></div>';
  h+='<div class="col6"><div class="gbox"><span class="gn yellow">'+ar(br.f)+'</span><span class="gl">إناث مواليد</span></div></div>';
  h+='</div><div class="tags">';
  h+='<span class="tg b">مواليد '+ar(br.births_only)+' رأس</span>';
  if(br.tasmeenF>0)h+='<span class="tg s">تجديد قطيع '+ar(br.tasmeenF)+' رأس إناث</span>';
  h+='</div></div></div>';
  return h;
}
function summaryTable(){
  var rows=[
    ['ماعز (تربية وتجديد)', GB.total, GB.males, GB.females],
    ['أغنام (تربية وتجديد)', SB.total, SB.males, SB.females],
    ['مواليد الماعز', GBR.total, GBR.m, GBR.f],
    ['مواليد الأغنام', SBR.total, SBR.m, SBR.f]
  ];
  var h='<table class="tbl"><thead><tr><th style="text-align:right;padding-inline-start:18px">الفئة</th><th>الإجمالي</th><th>ذكور</th><th>إناث</th></tr></thead><tbody>';
  rows.forEach(function(r){ h+='<tr><td class="cat">'+r[0]+'</td><td class="big">'+ar(r[1])+'</td><td>'+ar(r[2])+'</td><td>'+ar(r[3])+'</td></tr>'; });
  var tm=GB.males+SB.males+GBR.m+SBR.m, tf=GB.females+SB.females+GBR.f+SBR.f;
  h+='<tr class="totalrow"><td class="cat">الإجمالي الكلي</td><td class="big">'+ar(GRAND)+'</td><td>'+ar(tm)+'</td><td>'+ar(tf)+'</td></tr></tbody></table>';
  return h;
}
function species(sp){
  var d=DATA[sp], bs=breedStats(sp), br=birthStats(sp), total=bs.total+br.total;
  var anchor=(sp==='goat'?'goats':'sheep');
  var h='<div class="divider" id="'+anchor+'"><h2 style="color:'+d.color+'">'+d.emoji+' '+d.label+'</h2>'+
    '<div class="line"></div><span class="pill">'+ar(total)+' رأس</span></div>';
  h+=summaryRow({tarbiya:bs.tarbiya,tasmeen:bs.tasmeen+br.tasmeenF,births:br.births_only,males:bs.males+br.m,females:bs.females+br.f},d.color);
  h+='<div class="row">';
  d.breeds.forEach(function(b){ h+=breedCard(d.emoji,b); });
  h+=birthCard(sp);
  h+='</div>';
  return h;
}

(function render(){
  var html='';
  html+='<div id="summary"></div>';
  html+='<div class="row">';
  html+=topCard('إجمالي القطيع', GRAND, 'var(--orange)', '📦', ar(G_TOTAL)+' ماعز + '+ar(S_TOTAL)+' أغنام',0);
  html+=topCard('الماعز', G_TOTAL, 'var(--green)', '🐐', ar(GBR.total)+' مواليد',0.05);
  html+=topCard('الأغنام', S_TOTAL, 'var(--blue)', '🐑', ar(SBR.total)+' مواليد',0.1);
  html+=topCard('إجمالي المواليد', GBR.total+SBR.total, 'var(--yellow)', '✨', ar(GBR.total)+' ماعز + '+ar(SBR.total)+' أغنام',0.15);
  html+='</div>';

  html+='<div class="divider" id="table"><h2 style="color:var(--blue)">📋 ملخص القطيع بالأرقام</h2><div class="line"></div></div>';
  html+=summaryTable();

  html+=species('goat');
  html+=species('sheep');

  html+='<div class="glossary" id="glossary"><h3>📖 دليل المصطلحات — ماذا تعني الكلمات؟</h3><div class="gl-grid">'+
    '<div class="gl-item"><span class="ic">🌱</span><div><b>تربية</b><br><span>رؤوس يتم تربيتها للحفاظ على القطيع وزيادته (إناث للولادة وذكور للتلقيح).</span></div></div>'+
    '<div class="gl-item"><span class="ic">🔄</span><div><b>تجديد قطيع</b><br><span>رؤوس يتم إعدادها لتحل محل القديمة في القطيع — أي تجديد الأعداد.</span></div></div>'+
    '<div class="gl-item"><span class="ic">✨</span><div><b>مواليد</b><br><span>الرؤوس الصغيرة التي وُلدت حديثاً في المزرعة.</span></div></div>'+
    '<div class="gl-item"><span class="ic">🐐</span><div><b>الماعز</b><br><span>السلالات: شامي، بور، بلدي.</span></div></div>'+
    '<div class="gl-item"><span class="ic">🐑</span><div><b>الأغنام</b><br><span>السلالات: برقي، دودبر، ميت ماستر.</span></div></div>'+
    '<div class="gl-item"><span class="ic">♂️♀️</span><div><b>ذكور / إناث</b><br><span>جنس الرأس — الإناث أساس تكاثر القطيع.</span></div></div>'+
  '</div></div>';

  document.getElementById('content').innerHTML=html;
})();

// سويتش لايت/دارك
window.toggleTheme=function(){
  var isLight=document.documentElement.classList.toggle('light');
  try{localStorage.setItem('bayan_theme',isLight?'light':'dark');}catch(e){}
  updateThemeBtn(isLight);
};
function updateThemeBtn(isLight){
  var ic=document.getElementById('themeIcon'), lb=document.getElementById('themeLbl');
  if(ic)ic.textContent=isLight?'☀️':'🌙';
  if(lb)lb.textContent=isLight?'الوضع الداكن':'الوضع الفاتح';
}
updateThemeBtn(document.documentElement.classList.contains('light'));
</script>
</body>
</html>
