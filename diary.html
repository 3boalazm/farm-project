<style>
/* This page only: the app-wide .page-wrap caps at 1200px, which cramped
   the previous wide grid. Overriding just here — not touching styles.css —
   keeps every other page's layout untouched. Source order (this tag loads
   after styles.css) plus equal specificity means this wins without !important. */
.page-wrap{max-width:1900px}

/* ══════════════════════════════════════════════════════
   Card-based redesign (replaces the previous grid table),
   adapted from an uploaded reference mockup. Palette/shadow/
   radius reuse the app's OWN existing tokens (--blue, --green,
   --orange, --purple, --yellow, --red, --card-bg, --card-shadow,
   --radius-*) rather than the mockup's own separate OKLCH
   variables, so this page stays visually consistent with the
   rest of the app and both light/dark modes keep working via
   the SAME html.light-mode switch every other page already uses.
   ══════════════════════════════════════════════════════ */

/* KPI row */
.dd-kpis{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:28px}
.dd-kpi{flex:1 1 160px;min-width:150px;background:var(--card-bg);border:1.5px solid var(--border);border-radius:var(--radius-xl);padding:18px 20px;box-shadow:var(--card-shadow)}
.dd-kpi--hero{background:linear-gradient(135deg,color-mix(in srgb,var(--green) 18%,var(--card-bg)),var(--card-bg) 65%);border-color:color-mix(in srgb,var(--green) 35%,var(--border))}
.dd-kpi__label{font-size:.78rem;color:var(--text-muted);font-weight:600;margin-bottom:4px;white-space:nowrap}
.dd-kpi__value{font-family:'Lexend',sans-serif;font-weight:700;line-height:1.1;font-variant-numeric:tabular-nums;color:var(--text)}
.dd-kpi--hero .dd-kpi__value{font-size:2.1rem}
.dd-kpi:not(.dd-kpi--hero) .dd-kpi__value{font-size:1.65rem}
.dd-kpi__note{font-size:.72rem;color:var(--text-muted);margin-top:8px}
.dd-kpi__delta{color:var(--green);font-weight:700}

/* Section heading */
.dd-section-title{font-size:1.15rem;font-weight:700;color:var(--text);margin-bottom:2px}
.dd-section-sub{font-size:.8rem;color:var(--text-muted);margin-bottom:18px}

/* Species divider */
.dd-species-divider{display:flex;align-items:center;gap:10px;margin:18px 0 14px}
.dd-species-divider__name{font-size:.88rem;font-weight:700;color:var(--text);white-space:nowrap}
.dd-species-divider__total{font-size:.78rem;color:var(--text-muted);white-space:nowrap}
.dd-species-divider__line{flex:1;height:1px;background:var(--border)}

/* Breed cards row */
.dd-breed-row{display:flex;flex-wrap:wrap;gap:16px;margin-bottom:8px}
.dd-card{width:270px;flex-shrink:0;padding:18px;border-radius:var(--radius-xl);background:var(--card-bg);border:1.5px solid var(--border);box-shadow:var(--card-shadow);transition:box-shadow .18s,border-color .18s,transform .18s}
.dd-card:hover{transform:translateY(-3px);border-color:var(--dd-accent,var(--green))}
.dd-card__head{display:flex;align-items:flex-start;gap:10px;margin-bottom:14px}
.dd-card__avatar{width:34px;height:34px;border-radius:50%;background:color-mix(in srgb,var(--dd-accent,var(--green)) 18%,var(--card-bg));color:var(--dd-accent,var(--green));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
.dd-card__name{font-size:.95rem;font-weight:700;color:var(--text);line-height:1.3}
.dd-card__pill{display:inline-block;font-size:.68rem;font-weight:600;color:var(--text-muted);background:var(--bg-3);padding:2px 8px;border-radius:999px;margin-top:3px}
.dd-card__expand-btn{width:26px;height:26px;border-radius:8px;border:none;background:transparent;color:var(--text-muted);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.dd-card__expand-btn:hover{background:var(--bg-hover)}
.dd-card__expand-btn i{transition:transform .2s}
.dd-card__total-label{font-size:.7rem;font-weight:600;color:var(--text-muted);letter-spacing:.02em;margin-bottom:2px}
.dd-card__total-value{font-family:'Lexend',sans-serif;font-size:1.7rem;font-weight:800;color:var(--text);font-variant-numeric:tabular-nums;line-height:1.1;margin-bottom:14px}
.dd-card__divider{height:1px;background:var(--border);margin-bottom:12px}
.dd-card__group-label{display:flex;align-items:center;gap:6px;margin-bottom:7px;color:var(--text-muted);font-size:.76rem;font-weight:600}
.dd-card__gender-row{display:flex;gap:8px;margin-bottom:12px}
.dd-card__gender-cell{flex:1;padding:8px 9px;border-radius:var(--radius-md);display:flex;align-items:center;gap:6px;min-width:0}
.dd-card__gender-cell .g-m{color:var(--blue);font-weight:700;font-size:.9rem;flex-shrink:0}
.dd-card__gender-cell .g-f{color:var(--orange);font-weight:700;font-size:.9rem;flex-shrink:0}
.dd-card__gender-cell .g-val{font-size:.92rem;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums}
.dd-card__births-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:999px;background:color-mix(in srgb,var(--green) 14%,var(--card-bg))}
.dd-card__births-pill span:first-child{font-size:.68rem;font-weight:600;color:var(--green)}
.dd-card__births-pill span:last-child{font-size:.78rem;font-weight:800;color:var(--green);font-variant-numeric:tabular-nums}

/* Expand-reveal: purpose split (تربية vs تسمين) */
.dd-card__purpose{margin-top:12px;padding-top:12px;border-top:1px dashed var(--border)}
.dd-card__purpose-label{font-size:.68rem;font-weight:600;color:var(--text-muted);margin-bottom:7px}
.dd-card__purpose-bar{display:flex;height:7px;border-radius:999px;overflow:hidden;background:var(--bg-3);margin-bottom:7px}
.dd-card__purpose-bar>span{background:var(--green)}
.dd-card__purpose-bar>span+span{background:var(--orange)}
.dd-card__purpose-legend{display:flex;justify-content:space-between;font-size:.74rem;color:var(--text-muted)}
.dd-card__purpose-edit{display:flex;gap:8px;margin-top:8px}

/* Edit-mode inputs (replace the plain number spans) */
.dd-inp{direction:ltr;width:100%;min-width:0;padding:5px 4px;border-radius:8px;border:1.5px solid var(--border);background:transparent;color:var(--text);font-family:'Lexend',sans-serif;font-weight:700;font-size:.88rem;text-align:center;outline:none}
.dd-inp:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(59,130,246,.15)}
.dd-inp.changed{background:color-mix(in srgb,var(--yellow) 14%,var(--card-bg));border-color:var(--yellow)}
.dd-purpose-inp{direction:ltr;width:56px;padding:4px;border-radius:7px;border:1.5px solid var(--border);background:transparent;color:var(--text);font-family:'Lexend',sans-serif;font-weight:700;font-size:.8rem;text-align:center;outline:none}
.dd-purpose-inp.changed{background:color-mix(in srgb,var(--yellow) 14%,var(--card-bg));border-color:var(--yellow)}

@media print{.no-print{display:none!important}.page-wrap{padding:0;max-width:none}.dd-card{break-inside:avoid}}
@media(max-width:640px){.dd-card{width:100%}}
</style>

<div class="page-wrap rail-v2-content">

  <div id="diary-main"><div class="text-center py-5"><div class="spinner"></div></div></div>

    <small style="font-size:.72rem;color:var(--text-muted)">إشراف: لواء أحمد رجب نوح | تطوير: جندي مصطفى محمد إبراهيم</small>
  </footer>
</div>

<script>
'use strict';
// ── State ────────────────────────────────────────────
var _allAnimals=[], _mode='view', _edits={};

// ── Column schema ────────────────────────────────────
// Breeds come from Settings (s.sheepBreeds / s.goatBreeds) rather than being
// hardcoded here. The previous hardcoded list had 'دودبر' while Settings has
// 'دوربر' — a two-letter transposition that silently sent every animal of
// that breed into no column at all, which is why the grid total (٤٣٨) did
// not match the real herd total (٤٤١).
//
// No 'أخرى' catch-all column anymore (removed per request — it was showing
// real counts, not noise: resolveBreedAlias() above is the actual fix for
// why they were there). Species-level totals in the footer are computed
// directly from alive() by species+gender, independent of which breed
// columns exist, so an animal that still doesn't resolve to a known breed
// is never silently dropped from the totals -- it just won't get its own
// visible column, which is exactly what was asked for.
var SHEEP_COLS=[], GOAT_COLS=[], ALL_COLS=[];
function buildCols(s){
  function pairs(sp, breeds){
    var cols=[];
    (breeds||[]).forEach(function(b,i){
      cols.push({sp:sp, breed:b, births:false, tint:i%3});
      cols.push({sp:sp, breed:b, births:true,  tint:i%3});
    });
    return cols;
  }
  SHEEP_COLS=pairs('sheep', s.sheepBreeds);
  GOAT_COLS =pairs('goat',  s.goatBreeds);
  ALL_COLS=SHEEP_COLS.concat(GOAT_COLS);
}
function knownBreeds(sp){
  var s=getSettings();
  return (sp==='sheep'? (s.sheepBreeds||[]) : (s.goatBreeds||[])).slice();
}

// A newborn is identified the SAME way the footer/dashboard already do it:
// breed==='مواليد' OR purpose==='birth'. Most newborns in this database were
// stored with the placeholder breed 'مواليد' and purpose 'tarbiya', so keying
// only on purpose==='birth' finds almost none of them.
function isBirthAnimal(a){ return a.breed==='مواليد' || a.purpose==='birth'; }

// A newborn saved with the placeholder breed still carries its mother's breed
// (createOffspringAnimal stores mother_breed), so the real breed is
// recoverable instead of being lost. Returns null only when genuinely unknown.
// Both the animal's own breed and its mother_breed are resolved through
// resolveBreedAlias() first, so historical 'دودبر' records fold into 'دوربر'
// instead of falling through to null.
function effBreed(a){
  var known=knownBreeds(a.species);
  var b=window.resolveBreedAlias(a.breed);
  if(known.indexOf(b)>=0) return b;
  var mb=window.resolveBreedAlias(a.mother_breed);
  if(a.mother_breed && known.indexOf(mb)>=0) return mb;
  return null;
}

// Rows are purpose-based, matching the Excel: تربية and تسمين only. Newborns
// are NOT a row -- they are a paired column beside each breed, and are still
// classified into تربية/تسمين like any other animal. تربية is the fallback
// bucket so every live animal lands in exactly one row.
var ROWS=[
  {id:'tarbiya', label:'تربية', cls:'row-tarbiya', writePurpose:'tarbiya',
   match:function(a){ return a.purpose!=='tasmeen'; }},
  {id:'tasmeen', label:'تسمين', cls:'row-tasmeen', writePurpose:'tasmeen',
   match:function(a){ return a.purpose==='tasmeen'; }},
];
function rowById(id){ for(var i=0;i<ROWS.length;i++){ if(ROWS[i].id===id) return ROWS[i]; } return null; }

// ── Helpers ──────────────────────────────────────────
function alive(){return _allAnimals.filter(function(a){return a.status==='alive';});}

// Single predicate used by BOTH the display and the edit/save path, so the
// two can never disagree about which animals a cell represents.
function matchAnimals(sp, breed, isBirths, row, gender){
  return alive().filter(function(a){
    if(a.species!==sp || a.gender!==gender) return false;
    if(isBirthAnimal(a)!==isBirths) return false;
    if(row && !row.match(a)) return false;
    return effBreed(a)===breed;
  });
}
function count(sp, breed, isBirths, row, gender){
  return matchAnimals(sp,breed,isBirths,row,gender).length;
}

// For footer/cards: count ALL مواليد animals
function countBirths(sp, gender){
  return alive().filter(function(a){
    return a.species===sp && isBirthAnimal(a) && a.gender===gender;
  }).length;
}

// Get value from _edits or live count
function val(sp, breed, isBirths, row, gender){
  var k=sp+'|'+breed+'|'+(isBirths?'b':'n')+'|'+row.id+'|'+gender;
  return _edits[k]!==undefined ? _edits[k] : count(sp,breed,isBirths,row,gender);
}

function disp(v, cls, extraCls){
  extraCls = extraCls ? ' '+extraCls : '';
  if(v===0||v==='-'||v===null||v===undefined)return '<td class="v-zero'+extraCls+'">—</td>';
  return '<td class="'+cls+extraCls+'">'+ar(v)+'</td>';
}

// ── Init ─────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async function(){
  if(!requireAuth())return;
  // SECURITY FIX (Phase 6 hardening): nav.js grants perm:'dash', unenforced until now.
  if (!can('dash')) {
    document.body.innerHTML='<div class="page-wrap"><div class="empty-state" style="padding-top:100px"><i class="bi bi-shield-x" style="font-size:3rem;display:block;margin-bottom:10px;opacity:.4"></i><p>غير مصرح بالوصول</p><a href="dashboard.html" class="action-btn">الرئيسية</a></div></div>';
    return;
  }
  initFirebase();
  var s=getSettings();
  document.getElementById('footer-year').textContent=ar(new Date().getFullYear());
  document.getElementById('footer-farm').textContent=s.farmName;
  renderNavbarV2('diary.html');
  renderPageHeader(
    '<i class="bi bi-journal-text accent-text"></i> يومية المزرعة',
    s.farmName+' — '+todayAr(),
    '<button class="action-btn no-print" onclick="window.print()"><i class="bi bi-printer"></i> طباعة</button>'+
    (can('admin')?'<button class="action-btn no-print" id="mode-btn" onclick="toggleMode()" style="background:rgba(33,150,243,.1);border-color:rgba(33,150,243,.35);color:var(--blue)"><i class="bi bi-pencil-square"></i> تعديل</button>':'')
  );
  try{
    _allAnimals=await fbGet('animals');
  }catch(e){
    document.getElementById('diary-main').innerHTML='<div class="empty-state"><i class="bi bi-wifi-off"></i><p>خطأ: '+e.message+'</p></div>';
    return;
  }
  render();
});

// ── Toggle mode ──────────────────────────────────────
window.toggleMode=function(){
  _mode=_mode==='view'?'edit':'view';
  _edits={};
  var btn=document.getElementById('mode-btn');
  if(btn){
    if(_mode==='edit'){
      btn.innerHTML='<i class="bi bi-x-circle"></i> إلغاء';
      btn.style.cssText='background:rgba(244,67,54,.1);border-color:rgba(244,67,54,.35);color:var(--red)';
    } else {
      btn.innerHTML='<i class="bi bi-pencil-square"></i> تعديل';
      btn.style.cssText='background:rgba(33,150,243,.1);border-color:rgba(33,150,243,.35);color:var(--blue)';
    }
  }
  render();
};

// Cycles through the app's OWN existing semantic colors for card accents —
// not new hues, just applied to a new place.
var ACCENT_CYCLE=['var(--blue)','var(--green)','var(--orange)','var(--purple)','var(--yellow)','var(--red)'];

function kpiCard(label,value,note,isHero){
  return '<div class="dd-kpi'+(isHero?' dd-kpi--hero':'')+'">'+
    '<div class="dd-kpi__label">'+label+'</div>'+
    '<div class="dd-kpi__value">'+ar(value)+'</div>'+
    (note?'<div class="dd-kpi__note">'+note+'</div>':'')+
  '</div>';
}

// One card per real breed (from Settings, via SHEEP_COLS/GOAT_COLS which are
// already deduplicated adult/newborn pairs) -- combines what used to be two
// adjacent table columns into one card with an "بالغة" and "مواليد" section.
function breedCard(sp,breed,accent,isEdit,tarbiyaRow,tasmeenRow,idx){
  var amT=val(sp,breed,false,tarbiyaRow,'male'),   amS=val(sp,breed,false,tasmeenRow,'male');
  var afT=val(sp,breed,false,tarbiyaRow,'female'), afS=val(sp,breed,false,tasmeenRow,'female');
  var bmT=val(sp,breed,true,tarbiyaRow,'male'),    bmS=val(sp,breed,true,tasmeenRow,'male');
  var bfT=val(sp,breed,true,tarbiyaRow,'female'),  bfS=val(sp,breed,true,tasmeenRow,'female');
  var am=amT+amS, af=afT+afS, bm=bmT+bmS, bf=bfT+bfS;
  var total=am+af+bm+bf, birthsTotal=bm+bf;
  var adultsTotal=am+af;
  var fatteningPct=adultsTotal>0?Math.round((amS+afS)/adultsTotal*100):0;
  var cardId='dd-'+sp+'-'+idx;
  var expanded=!!_expanded[cardId];

  function combinedField(bBool,gender,valCombined,changedKeyPrefix){
    var key=changedKeyPrefix+(bBool?'b':'n')+'|'+gender;
    var changed=_edits[key]!==undefined;
    if(isEdit){
      return '<input type="number" class="dd-inp'+(changed?' changed':'')+'" min="0" value="'+valCombined+'" data-key="'+key+'" onchange="onEdit(this)" oninput="onEdit(this)">';
    }
    return '<span class="g-val">'+(valCombined===0?'—':ar(valCombined))+'</span>';
  }
  var cKeyPrefix='c:'+sp+'|'+breed+'|';

  var html='<div class="dd-card" style="--dd-accent:'+accent+'" data-card-id="'+cardId+'">';
  html+='<div class="dd-card__head">';
  html+='<div class="dd-card__avatar">'+breed.slice(0,1)+'</div>';
  html+='<div style="flex:1;min-width:0">';
  html+='<div class="dd-card__name">'+breed+'</div>';
  html+='<div class="dd-card__pill">'+(sp==='sheep'?'أغنام':'ماعز')+'</div>';
  html+='</div>';
  html+='<button type="button" class="dd-card__expand-btn no-print" title="تفاصيل الغرض" onclick="toggleCardExpand(\''+cardId+'\')">'+
    '<i class="bi bi-chevron-down" style="transform:rotate('+(expanded?180:0)+'deg)"></i></button>';
  html+='</div>';

  html+='<div class="dd-card__total-label">الإجمالي</div>';
  html+='<div class="dd-card__total-value">'+ar(total)+'</div>';
  html+='<div class="dd-card__divider"></div>';

  html+='<div class="dd-card__group-label"><i class="bi bi-circle"></i> بالغة</div>';
  html+='<div class="dd-card__gender-row">';
  html+='<div class="dd-card__gender-cell"><span class="g-m">♂</span>'+combinedField(false,'male',am,cKeyPrefix)+'</div>';
  html+='<div class="dd-card__gender-cell"><span class="g-f">♀</span>'+combinedField(false,'female',af,cKeyPrefix)+'</div>';
  html+='</div>';

  html+='<div class="dd-card__group-label"><i class="bi bi-circle-fill" style="font-size:.5rem"></i> مواليد</div>';
  html+='<div class="dd-card__gender-row">';
  html+='<div class="dd-card__gender-cell"><span class="g-m">♂</span>'+combinedField(true,'male',bm,cKeyPrefix)+'</div>';
  html+='<div class="dd-card__gender-cell"><span class="g-f">♀</span>'+combinedField(true,'female',bf,cKeyPrefix)+'</div>';
  html+='</div>';

  html+='<div class="dd-card__births-pill"><span>إجمالي المواليد</span><span>'+ar(birthsTotal)+'</span></div>';

  if(expanded){
    html+='<div class="dd-card__purpose">';
    html+='<div class="dd-card__purpose-label">حسب الغرض (بالغة)</div>';
    html+='<div class="dd-card__purpose-bar"><span style="width:'+(100-fatteningPct)+'%"></span><span style="width:'+fatteningPct+'%"></span></div>';
    html+='<div class="dd-card__purpose-legend"><span>تربية '+ar(amT+afT)+'</span><span>تسمين '+ar(amS+afS)+'</span></div>';
    if(isEdit){
      // Direct تسمين editing lives here -- the top-level fields above always
      // target تربية, matching this design's simple default; expanding a
      // card is how تسمين's own count stays directly editable, not lost.
      var tsK='tasmeen';
      html+='<div class="dd-card__purpose-edit">';
      ['male','female'].forEach(function(g){
        var k=sp+'|'+breed+'|n|'+tsK+'|'+g;
        var v=val(sp,breed,false,tasmeenRow,g);
        var ch=_edits[k]!==undefined;
        html+='<div style="flex:1;text-align:center"><div style="font-size:.65rem;color:var(--text-muted);margin-bottom:3px">تسمين '+(g==='male'?'♂':'♀')+'</div><input type="number" class="dd-purpose-inp'+(ch?' changed':'')+'" min="0" value="'+v+'" data-key="'+k+'" onchange="onEdit(this)" oninput="onEdit(this)"></div>';
      });
      html+='</div>';
    }
    html+='</div>';
  }
  html+='</div>';
  return html;
}

function speciesBlock(sp,label,total,cols,isEdit,tarbiyaRow,tasmeenRow){
  var breeds=cols.filter(function(c){return !c.births;}); // adult half of each pair = one real breed
  if(!breeds.length)return'';
  var html='<div class="dd-species-divider"><span class="dd-species-divider__name">'+label+'</span>'+
    '<span class="dd-species-divider__total">إجمالي '+ar(total)+' رأس</span>'+
    '<span class="dd-species-divider__line"></span></div>';
  html+='<div class="dd-breed-row">';
  breeds.forEach(function(col,i){
    html+=breedCard(sp,col.breed,ACCENT_CYCLE[i%ACCENT_CYCLE.length],isEdit,tarbiyaRow,tasmeenRow,i);
  });
  html+='</div>';
  return html;
}

// ── Card expand/collapse state (per breed card, survives re-render) ──
var _expanded={};
window.toggleCardExpand=function(cardId){
  _expanded[cardId]=!_expanded[cardId];
  render();
};

// ── Main render ──────────────────────────────────────
function render(){
  var el=document.getElementById('diary-main');
  if(!el)return;
  var isEdit=_mode==='edit';
  buildCols(getSettings());
  var tarbiyaRow=rowById('tarbiya'), tasmeenRow=rowById('tasmeen');

  var sheepTotal=alive().filter(function(a){return a.species==='sheep';}).length;
  var goatTotal=alive().filter(function(a){return a.species==='goat';}).length;
  var sheepBirthsM=countBirths('sheep','male'), sheepBirthsF=countBirths('sheep','female');
  var goatBirthsM=countBirths('goat','male'), goatBirthsF=countBirths('goat','female');
  var sheepBirthsTotal=sheepBirthsM+sheepBirthsF, goatBirthsTotal=goatBirthsM+goatBirthsF;
  var farmTotal=sheepTotal+goatTotal;
  var birthsTotalAll=sheepBirthsTotal+goatBirthsTotal;
  var adultsTotalAll=farmTotal-birthsTotalAll;

  // Real computation, not in the previous table: born specifically today.
  var todayS=todayStr();
  var todayBirths=alive().filter(function(a){return isBirthAnimal(a)&&a.birth_date===todayS;}).length;

  // Real computation: mortality this month, using isRealDeath() so diary/
  // births/breed-page count-corrections are excluded exactly like every
  // other mortality statistic in the app now excludes them.
  var thisMonth=todayS.slice(0,7);
  var mortalityThisMonth=_allAnimals.filter(function(a){
    return window.isRealDeath(a) && a.died_at && a.died_at.slice(0,7)===thisMonth;
  }).length;
  // NOTE: a "transfers this month" KPI was in the reference design, but this
  // app has no dedicated transfer log -- barns.html records a transfer as a
  // free-text activity_log description, not a queryable event type. Rather
  // than invent a number, that KPI is intentionally omitted.

  var html='<div class="wonder-card">';
  html+='<div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2 no-print">';
  html+='<div class="fw-bold" style="font-size:.95rem"><i class="bi bi-grid-3x3-gap-fill accent-text me-2"></i>بيان الماعز والأغنام — '+todayAr()+'</div>';
  html+='<div class="d-flex gap-2">';
  if(isEdit){
    html+='<button class="action-btn primary" onclick="saveEdits()"><i class="bi bi-floppy-fill"></i> حفظ التعديلات</button>';
    html+='<button class="action-btn" onclick="_edits={};render()"><i class="bi bi-arrow-counterclockwise"></i> إعادة تعيين</button>';
  }
  html+='<button class="action-btn sm" onclick="window.print()"><i class="bi bi-printer"></i> طباعة</button>';
  html+='</div></div>';

  if(isEdit){
    html+='<div class="mb-3 p-3" style="background:rgba(33,150,243,.06);border:1px solid rgba(33,150,243,.25);border-radius:10px;font-size:.82rem">';
    html+='<i class="bi bi-info-circle-fill me-1" style="color:var(--blue)"></i> ';
    html+='<strong style="color:var(--blue)">وضع التعديل:</strong> عدّل الأرقام مباشرة — تستهدف تربية افتراضيًا. لتعديل تسمين افتح تفاصيل السلالة (السهم). الحقول <span style="color:var(--yellow);font-weight:700">الصفراء</span> تعني تغيير غير محفوظ.';
    html+='</div>';
  }

  html+='<div class="dd-kpis no-print">';
  html+=kpiCard('إجمالي المزرعة',farmTotal,null,true);
  html+=kpiCard('إجمالي الأغنام',sheepTotal);
  html+=kpiCard('إجمالي الماعز',goatTotal);
  html+=kpiCard('مواليد اليوم',todayBirths,'إضافات اليوم');
  html+=kpiCard('القطيع البالغ',adultsTotalAll,ar(birthsTotalAll)+' مولوداً قيد النمو');
  html+=kpiCard('الوفيات',mortalityThisMonth,'هذا الشهر');
  html+='</div>';

  html+='<div class="dd-section-title">مصفوفة السلالات</div>';
  html+='<div class="dd-section-sub">توزيع القطيع حسب السلالة — بالغ ومواليد</div>';

  html+=speciesBlock('sheep','أغنام',sheepTotal,SHEEP_COLS,isEdit,tarbiyaRow,tasmeenRow);
  html+=speciesBlock('goat','ماعز',goatTotal,GOAT_COLS,isEdit,tarbiyaRow,tasmeenRow);

  // Big-animals vs newborns split, per species -- kept exactly per last
  // session's request to match the reference Excel, restyled as cards
  // instead of table rows.
  html+='<div class="row g-3 mt-3">';
  [['أغنام',sheepTotal,sheepBirthsTotal,sheepBirthsM,sheepBirthsF,'var(--blue)'],
   ['ماعز',goatTotal,goatBirthsTotal,goatBirthsM,goatBirthsF,'var(--green)']
  ].forEach(function(s){
    var label=s[0],tot=s[1],bTot=s[2],bm=s[3],bf=s[4],color=s[5];
    html+='<div class="col-md-6"><div class="diary-card" style="border-color:'+color+'44;text-align:right">';
    html+='<div class="d-flex justify-content-between flex-wrap gap-2">';
    html+='<div><div class="text-gray" style="font-size:.72rem">إجمالي '+label+' الكبيرة</div>';
    html+='<div style="font-family:Lexend;font-size:1.4rem;font-weight:700;color:'+color+'">'+ar(tot-bTot)+'</div></div>';
    html+='<div><div class="text-gray" style="font-size:.72rem">إجمالي المواليد</div>';
    html+='<div style="font-family:Lexend;font-size:1.4rem;font-weight:700;color:var(--yellow)">'+ar(bTot)+'<small class="text-gray" style="font-size:.68rem;font-weight:400"> (ذ:'+ar(bm)+' إ:'+ar(bf)+')</small></div></div>';
    html+='<div><div class="text-gray" style="font-size:.72rem">إجمالي عدد '+label+'</div>';
    html+='<div style="font-family:Lexend;font-size:1.4rem;font-weight:800;color:var(--orange)">'+ar(tot)+'</div></div>';
    html+='</div></div></div>';
  });
  html+='</div>';

  html+='</div>'; // wonder-card
  el.innerHTML=html;
}

// ── Edit helpers ─────────────────────────────────────
// 'c:sp|breed|b/n|gender' = a top-level card field editing the COMBINED
// (تربية+تسمين) count; the diff is applied against تربية specifically
// (تسمين stays directly editable via the card's expanded "حسب الغرض"
// section, using the ordinary per-row key format below).
function parseKey(k){
  if(k.indexOf('c:')===0){
    var p=k.slice(2).split('|'); // sp|breed|b/n|gender
    return {sp:p[0], breed:p[1], births:p[2]==='b', row:rowById('tarbiya'), gender:p[3], combined:true};
  }
  var p=k.split('|'); // sp|breed|b/n|rowId|gender
  return {sp:p[0], breed:p[1], births:p[2]==='b', row:rowById(p[3]), gender:p[4], combined:false};
}
function currentForKey(q){
  if(!q.combined) return count(q.sp,q.breed,q.births,q.row,q.gender);
  return count(q.sp,q.breed,q.births,rowById('tarbiya'),q.gender)
       + count(q.sp,q.breed,q.births,rowById('tasmeen'),q.gender);
}
window.onEdit=function(inp){
  var k=inp.dataset.key, q=parseKey(k);
  if(!q.row) return;
  var newVal=parseInt(inp.value)||0;
  var current=currentForKey(q);
  if(newVal!==current){_edits[k]=newVal;inp.classList.add('changed');}
  else{delete _edits[k];inp.classList.remove('changed');}
};

window.saveEdits=async function(){
  var keys=Object.keys(_edits);
  if(!keys.length){toast('لا توجد تغييرات','info');return;}

  var adds=0,removes=0;
  keys.forEach(function(k){
    var q=parseKey(k); if(!q.row) return;
    var diff=_edits[k]-currentForKey(q);
    if(diff>0)adds+=diff; else removes+=Math.abs(diff);
  });

  if(!confirm('سيتم:\n'+(adds>0?'• إضافة '+adds+' حيوان\n':'')+(removes>0?'• تعطيل '+removes+' حيوان\n':'')+'\nتأكيد؟'))return;

  toast('جاري التطبيق...','info');
  var totalAdded=0, totalRemoved=0;

  for(var k in _edits){
    var q=parseKey(k); if(!q.row) continue;
    var desired=_edits[k];
    var diff=desired-currentForKey(q);

    if(diff>0){
      for(var i=0;i<diff;i++){
        try{
          // A newborn must stay identifiable as a newborn AND keep both its
          // breed and its تربية/تسمين purpose. Writing purpose:'birth' would
          // destroy the purpose; using breed:'مواليد' + mother_breed is the
          // shape the existing records already use, so effBreed() resolves it.
          var rec=q.births
            ? {species:q.sp, breed:'مواليد', mother_breed:q.breed, gender:q.gender, purpose:q.row.writePurpose}
            : {species:q.sp, breed:q.breed, gender:q.gender, purpose:q.row.writePurpose};
          rec.status='alive'; rec.tag=null; rec.barn=null; rec.birth_date=todayStr();
          rec.added_by=getUser()?.name; rec.notes='تمت الإضافة من يومية المزرعة';
          await fbPost('animals',rec);
          totalAdded++;
        }catch(e){console.error(e);}
      }
    } else if(diff<0){
      // Same predicate as the cell's own display -- an edit can only ever
      // affect the exact animals that cell is counting.
      var toRemove=matchAnimals(q.sp,q.breed,q.births,q.row,q.gender).slice(0,Math.abs(diff));
      for(var j=0;j<toRemove.length;j++){
        try{
          await fbPatch('animals',toRemove[j]._id,{status:'dead',died_at:todayStr(),death_reason:'تعديل من يومية المزرعة',is_correction:true});
          totalRemoved++;
        }catch(e){console.error(e);}
      }
    }
  }

  await logActivity('edit','animals','تعديل يدوي من اليومية: +'+ar(totalAdded)+' ،—'+ar(totalRemoved));
  
  // Save snapshot for Dashboard Sync
  try {
    const aliveAnimals = _allAnimals.filter(a => a.status === 'alive');
    const isB = a => a.purpose === 'birth' || a.breed === 'مواليد';
    await fbPut('diary_snapshot', {
      total: aliveAnimals.length,
      goats: aliveAnimals.filter(a => a.species === 'goat').length,
      sheep: aliveAnimals.filter(a => a.species === 'sheep').length,
      goatBirths: aliveAnimals.filter(a => a.species === 'goat' && isB(a)).length,
      sheepBirths: aliveAnimals.filter(a => a.species === 'sheep' && isB(a)).length,
      updated_at: new Date().toISOString()
    });
  } catch(e) { console.error('Failed to save sync snapshot', e); }

  toast('✅ +'+ar(totalAdded)+' إضافة، —'+ar(totalRemoved)+' إزالة');
  _allAnimals=await fbGet('animals');
  _edits={}; _mode='view';
  var btn=document.getElementById('mode-btn');
  if(btn){btn.innerHTML='<i class="bi bi-pencil-square"></i> تعديل';btn.style.cssText='background:rgba(33,150,243,.1);border-color:rgba(33,150,243,.35);color:var(--blue)';}
  render();
};
</script>
