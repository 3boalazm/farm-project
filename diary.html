<script>
'use strict';
// ── State ────────────────────────────────────────────
var _allAnimals=[], _mode='view', _edits={};

// ── Column schema ────────────────────────────────────
// Breeds come from Settings (s.sheepBreeds / s.goatBreeds) rather than being
// hardcoded here. The previous hardcoded list had 'دودبر' while Settings has
// 'دوربر' — a two-letter transposition that silently sent every animal of
// that breed into no column at all, which is why the grid total (٤٣٨) did
// not match the real herd total (٤٤١).
//
// 'أخرى' is a read-only catch-all for any live animal whose breed is not in
// Settings (renamed breeds, typos, legacy breed='مواليد' records). It exists
// so the grid can never again silently hide animals. It is NOT editable,
// because writing to it would create animals with a literal breed of 'أخرى'.
// 'أخرى' is a catch-all for live animals whose breed cannot be resolved to
// any breed in Settings (not even via mother_breed). It is rendered ONLY when
// something actually falls into it, so on clean data it disappears entirely
// — but it can never silently hide animals from the totals again.
var SHEEP_COLS=[], GOAT_COLS=[], ALL_COLS=[];
function buildCols(s){
  SHEEP_COLS=(s.sheepBreeds||[]).map(function(b){return {sp:'sheep',breed:b,other:false};});
  GOAT_COLS=(s.goatBreeds||[]).map(function(b){return {sp:'goat',breed:b,other:false};});
  ALL_COLS=SHEEP_COLS.concat(GOAT_COLS);
  // knownBreeds() reads from these arrays, so they must be populated before
  // effBreed() is called to decide whether an 'أخرى' column is needed.
  ['sheep','goat'].forEach(function(sp){
    var orphan=alive().some(function(a){ return a.species===sp && effBreed(a)===null; });
    if(!orphan) return;
    var col={sp:sp,breed:'أخرى',other:true};
    if(sp==='sheep') SHEEP_COLS.push(col); else GOAT_COLS.push(col);
  });
  ALL_COLS=SHEEP_COLS.concat(GOAT_COLS);
}
function knownBreeds(sp){
  var cols=(sp==='sheep'?SHEEP_COLS:GOAT_COLS);
  return cols.filter(function(c){return !c.other;}).map(function(c){return c.breed;});
}

// A newborn is identified the SAME way the footer/dashboard already do it:
// breed==='مواليد' OR purpose==='birth'. Most newborns in this database were
// stored with the placeholder breed 'مواليد' and purpose 'tarbiya', so keying
// only on purpose==='birth' finds almost none of them.
function isBirthAnimal(a){ return a.breed==='مواليد' || a.purpose==='birth'; }

// A newborn saved with the placeholder breed still carries its mother's breed
// (createOffspringAnimal stores mother_breed), so the real breed is
// recoverable instead of being lost. Returns null only when genuinely unknown.
function effBreed(a){
  var known=knownBreeds(a.species);
  if(known.indexOf(a.breed)>=0) return a.breed;
  if(a.mother_breed && known.indexOf(a.mother_breed)>=0) return a.mother_breed;
  return null;
}

// Rows partition EVERY live animal exactly once, so the grid total can never
// drift from the real herd total again. تربية is the fallback bucket.
var ROWS=[
  {id:'tarbiya', label:'تربية',  cls:'row-tarbiya', writePurpose:'tarbiya',
   match:function(a){ return !isBirthAnimal(a) && a.purpose!=='tasmeen'; }},
  {id:'tasmeen', label:'تسمين',  cls:'row-tasmeen', writePurpose:'tasmeen',
   match:function(a){ return !isBirthAnimal(a) && a.purpose==='tasmeen'; }},
  {id:'birth',   label:'مواليد', cls:'row-births',  writePurpose:'birth',
   match:isBirthAnimal},
];
function rowById(id){ for(var i=0;i<ROWS.length;i++){ if(ROWS[i].id===id) return ROWS[i]; } return null; }

// ── Helpers ──────────────────────────────────────────
function alive(){return _allAnimals.filter(function(a){return a.status==='alive';});}

// Single predicate used by BOTH the display and the edit/save path, so the
// two can never disagree about which animals a cell represents.
function matchAnimals(sp, breed, row, gender){
  return alive().filter(function(a){
    if(a.species!==sp || a.gender!==gender) return false;
    if(!row.match(a)) return false;
    var eb=effBreed(a);
    return breed==='أخرى' ? eb===null : eb===breed;
  });
}
function count(sp, breed, row, gender){ return matchAnimals(sp,breed,row,gender).length; }

// For footer/cards: count ALL مواليد animals
function countBirths(sp, gender){
  return alive().filter(function(a){
    return a.species===sp && isBirthAnimal(a) && a.gender===gender;
  }).length;
}

// Get value from _edits or live count
function val(sp, breed, row, gender){
  var k=sp+'|'+breed+'|'+row.id+'|'+gender;
  return _edits[k]!==undefined ? _edits[k] : count(sp,breed,row,gender);
}

function disp(v, cls){
  if(v===0||v==='-'||v===null||v===undefined)return '<td class="v-zero">—</td>';
  return '<td class="'+cls+'">'+ar(v)+'</td>';
}

// ── Init ─────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async function(){
  if(!requireAuth())return;
  // SECURITY FIX (Phase 6 hardening): nav.js grants perm:'dash', unenforced until now.
  if (!can('dash')) {
    document.body.innerHTML='<div class="page-wrap"><div class="empty-state" style="padding-top:100px"><i class="bi bi-shield-x" style="font-size:3rem;display:block;margin-bottom:10px;opacity:.4"></i><p>غير مصرح بالوصول</p><a href="dashboard.html" class="action-btn">الرئيسية</a></div></div>';
    return;
  }
  initFirebase();
  var s=getSettings();
  document.getElementById('footer-year').textContent=ar(new Date().getFullYear());
  document.getElementById('footer-farm').textContent=s.farmName;
  renderNavbarV2('diary.html');
  renderPageHeader(
    '<i class="bi bi-journal-text accent-text"></i> يومية المزرعة',
    s.farmName+' — '+todayAr(),
    '<button class="action-btn no-print" onclick="window.print()"><i class="bi bi-printer"></i> طباعة</button>'+
    (can('admin')?'<button class="action-btn no-print" id="mode-btn" onclick="toggleMode()" style="background:rgba(33,150,243,.1);border-color:rgba(33,150,243,.35);color:var(--blue)"><i class="bi bi-pencil-square"></i> تعديل</button>':'')
  );
  try{
    _allAnimals=await fbGet('animals');
  }catch(e){
    document.getElementById('diary-main').innerHTML='<div class="empty-state"><i class="bi bi-wifi-off"></i><p>خطأ: '+e.message+'</p></div>';
    return;
  }
  render();
});

// ── Toggle mode ──────────────────────────────────────
window.toggleMode=function(){
  _mode=_mode==='view'?'edit':'view';
  _edits={};
  var btn=document.getElementById('mode-btn');
  if(btn){
    if(_mode==='edit'){
      btn.innerHTML='<i class="bi bi-x-circle"></i> إلغاء';
      btn.style.cssText='background:rgba(244,67,54,.1);border-color:rgba(244,67,54,.35);color:var(--red)';
    } else {
      btn.innerHTML='<i class="bi bi-pencil-square"></i> تعديل';
      btn.style.cssText='background:rgba(33,150,243,.1);border-color:rgba(33,150,243,.35);color:var(--blue)';
    }
  }
  render();
};

// ── Main render ──────────────────────────────────────
function render(){
  var el=document.getElementById('diary-main');
  if(!el)return;
  var isEdit=_mode==='edit';
  buildCols(getSettings());

  // ── Build the <table> ────────────────────────────
  var html='<div class="wonder-card">';
  html+='<div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2 no-print">';
  html+='<div class="fw-bold" style="font-size:.95rem"><i class="bi bi-table accent-text me-2"></i>بيان الماعز والأغنام — '+todayAr()+'</div>';
  html+='<div class="d-flex gap-2">';
  if(isEdit){
    html+='<button class="action-btn primary" onclick="saveEdits()"><i class="bi bi-floppy-fill"></i> حفظ التعديلات</button>';
    html+='<button class="action-btn" onclick="_edits={};render()"><i class="bi bi-arrow-counterclockwise"></i> إعادة تعيين</button>';
  }
  html+='<button class="action-btn sm" onclick="window.print()"><i class="bi bi-printer"></i> طباعة</button>';
  html+='</div></div>';

  if(isEdit){
    html+='<div class="mb-3 p-3" style="background:rgba(33,150,243,.06);border:1px solid rgba(33,150,243,.25);border-radius:10px;font-size:.82rem">';
    html+='<i class="bi bi-info-circle-fill me-1" style="color:var(--blue)"></i> ';
    html+='<strong style="color:var(--blue)">وضع التعديل:</strong> عدّل الأرقام مباشرة. الخلايا <span style="color:var(--yellow);font-weight:700">الصفراء</span> تعني تغيير غير محفوظ.';
    html+='</div>';
  }

  html+='<div class="diary-wrap"><table class="diary-tbl">';

  // ── Header rows ──────────────────────────────────
  // Row 1: spans
  html+='<thead><tr>';
  html+='<th rowspan="3" class="v-label" style="min-width:65px">النوع</th>';
  html+='<th colspan="'+( SHEEP_COLS.length*2)+'" class="hd-sheep">أغنام</th>';
  html+='<th colspan="'+( GOAT_COLS.length*2)+'" class="hd-goat">ماعز</th>';
  html+='<th rowspan="3" class="hd-total">الإجمالي</th>';
  html+='</tr>';
  // Row 2: breed names
  html+='<tr>';
  ALL_COLS.forEach(function(col){
    var cls=col.other?'hd-births':(col.sp==='sheep'?'hd-sheep':'hd-goat');
    html+='<th colspan="2" class="'+cls+'"'+(col.other?' title="سلالات غير مسجّلة في الإعدادات — للعرض فقط"':'')+'>'+col.breed+'</th>';
  });
  html+='</tr>';
  // Row 3: ذكور / إناث
  html+='<tr>';
  ALL_COLS.forEach(function(){
    html+='<th class="sub-m">ذكور</th><th class="sub-f">إناث</th>';
  });
  html+='</tr></thead><tbody>';

  // ── Data rows: تربية / تسمين / مواليد ───────────
  ROWS.forEach(function(row){
    var rowTotalM=0, rowTotalF=0;
    html+='<tr class="'+row.cls+'"><td class="v-label">'+row.label+'</td>';
    ALL_COLS.forEach(function(col){
      var vm=val(col.sp,col.breed,row,'male');
      var vf=val(col.sp,col.breed,row,'female');
      rowTotalM+=vm; rowTotalF+=vf;
      var km=col.sp+'|'+col.breed+'|'+row.id+'|male';
      var kf=col.sp+'|'+col.breed+'|'+row.id+'|female';
      // 'أخرى' stays read-only even in edit mode: an edit there would post a
      // new animal with breed literally set to 'أخرى'.
      if(isEdit && !col.other){
        html+='<td><input type="number" class="dc-inp'+(  _edits[km]!==undefined?' changed':'')+'" min="0" value="'+vm+'" data-key="'+km+'" onchange="onEdit(this)" oninput="onEdit(this)"></td>';
        html+='<td><input type="number" class="dc-inp'+(  _edits[kf]!==undefined?' changed':'')+'" min="0" value="'+vf+'" data-key="'+kf+'" onchange="onEdit(this)" oninput="onEdit(this)"></td>';
      } else {
        html+=disp(vm,'v-m')+disp(vf,'v-f');
      }
    });
    var rowTotal=rowTotalM+rowTotalF;
    html+='<td class="v-total">'+(rowTotal>0?ar(rowTotal):'—')+'</td></tr>';
  });

  // ── إجمالي row = SUM(تربية+تسمين+مواليد) per column ───
  html+='<tr class="row-total"><td class="v-label">الإجمالي</td>';
  var grandTotal=0;
  ALL_COLS.forEach(function(col){
    var totalM=0, totalF=0;
    ROWS.forEach(function(row){
      totalM+=val(col.sp,col.breed,row,'male');
      totalF+=val(col.sp,col.breed,row,'female');
    });
    grandTotal+=totalM+totalF;
    html+='<td class="'+(totalM>0?'v-m':'v-zero')+'">'+(totalM>0?ar(totalM):'—')+'</td>';
    html+='<td class="'+(totalF>0?'v-f':'v-zero')+'">'+(totalF>0?ar(totalF):'—')+'</td>';
  });
  html+='<td class="v-total" style="font-size:1rem">'+ar(grandTotal)+'</td></tr>';

  // ── إجمالي الأغنام / الماعز footer row ──────────
  // Mirrors Excel: D9=SUM(B8:I8), M9=SUM(J8:Q8)
  var sheepTotal=0, goatTotal=0;
  var sheepBirthsM=0, sheepBirthsF=0, goatBirthsM=0, goatBirthsF=0;
  // Use actual alive count per species (matches dashboard - includes ALL breeds)
  sheepTotal=alive().filter(function(a){return a.species==='sheep';}).length;
  goatTotal=alive().filter(function(a){return a.species==='goat';}).length;
  sheepBirthsM=countBirths('sheep','male');
  sheepBirthsF=countBirths('sheep','female');
  goatBirthsM=countBirths('goat','male');
  goatBirthsF=countBirths('goat','female');
  // (SHEEP_COLS/GOAT_COLS column sums may miss animals with breeds not in settings)

  var sheepCols=SHEEP_COLS.length*2;
  var goatCols=GOAT_COLS.length*2;
  html+='<tr style="background:rgba(0,230,118,.07);font-weight:700">';
  html+='<td></td>';
  html+='<td colspan="'+sheepCols+'" style="text-align:center;padding:9px;color:var(--blue)">';
  html+='إجمالي الأغنام: <strong style="font-size:1rem">'+ar(sheepTotal)+'</strong>';
  html+='&nbsp;|&nbsp; المواليد: <strong style="color:var(--yellow)">'+ar(sheepBirthsM+sheepBirthsF)+'</strong>';
  html+='<span style="font-size:.72rem;color:var(--text-muted);margin-right:4px">(ذ: '+ar(sheepBirthsM)+' | إ: '+ar(sheepBirthsF)+')</span>';
  html+='</td>';
  html+='<td colspan="'+goatCols+'" style="text-align:center;padding:9px;color:var(--green)">';
  html+='إجمالي الماعز: <strong style="font-size:1rem">'+ar(goatTotal)+'</strong>';
  html+='&nbsp;|&nbsp; المواليد: <strong style="color:var(--yellow)">'+ar(goatBirthsM+goatBirthsF)+'</strong>';
  html+='<span style="font-size:.72rem;color:var(--text-muted);margin-right:4px">(ذ: '+ar(goatBirthsM)+' | إ: '+ar(goatBirthsF)+')</span>';
  html+='</td>';
  html+='<td style="text-align:center;color:var(--orange);font-weight:800">'+ar(sheepTotal+goatTotal)+'</td>';
  html+='</tr>';

  html+='</tbody></table></div>';

  // ── Summary cards (responsive) ───────────────────
  html+='<div class="diary-cards">';
  html+='<div class="diary-card" style="border-color:rgba(33,150,243,.3)">';
  html+='<div class="text-gray" style="font-size:.72rem">إجمالي الأغنام</div>';
  html+='<div style="font-family:Lexend;font-size:1.6rem;font-weight:700;color:var(--blue)">'+ar(sheepTotal)+'</div>';
  html+='<div style="font-size:.73rem;margin-top:2px"><span class="text-gray">المواليد: </span><span style="color:var(--yellow);font-weight:700">'+ar(sheepBirthsM+sheepBirthsF)+'</span><span class="text-gray"> (ذ:'+ar(sheepBirthsM)+' إ:'+ar(sheepBirthsF)+')</span></div>';
  html+='</div>';
  html+='<div class="diary-card" style="border-color:rgba(0,230,118,.3)">';
  html+='<div class="text-gray" style="font-size:.72rem">إجمالي الماعز</div>';
  html+='<div style="font-family:Lexend;font-size:1.6rem;font-weight:700;color:var(--green)">'+ar(goatTotal)+'</div>';
  html+='<div style="font-size:.73rem;margin-top:2px"><span class="text-gray">المواليد: </span><span style="color:var(--yellow);font-weight:700">'+ar(goatBirthsM+goatBirthsF)+'</span><span class="text-gray"> (ذ:'+ar(goatBirthsM)+' إ:'+ar(goatBirthsF)+')</span></div>';
  html+='</div>';
  html+='<div class="diary-card" style="border-color:rgba(255,107,53,.3)">';
  html+='<div class="text-gray" style="font-size:.72rem">إجمالي المزرعة</div>';
  html+='<div style="font-family:Lexend;font-size:1.8rem;font-weight:700;color:var(--orange)">'+ar(sheepTotal+goatTotal)+'</div>';
  var totalBirths=countBirths('sheep','male')+countBirths('sheep','female')+countBirths('goat','male')+countBirths('goat','female');
  html+='<div style="font-size:.73rem;margin-top:2px"><span class="text-gray">المواليد الكلي: </span><span style="color:var(--yellow);font-weight:700">'+ar(totalBirths)+'</span></div>';
  html+='</div></div>';

  html+='</div>'; // wonder-card
  el.innerHTML=html;
}

// ── Edit helpers ─────────────────────────────────────
window.onEdit=function(inp){
  var k=inp.dataset.key;
  var parts=k.split('|'); // sp|breed|rowId|gender
  var row=rowById(parts[2]); if(!row) return;
  var newVal=parseInt(inp.value)||0;
  var current=count(parts[0],parts[1],row,parts[3]);
  if(newVal!==current){_edits[k]=newVal;inp.classList.add('changed');}
  else{delete _edits[k];inp.classList.remove('changed');}
};

window.saveEdits=async function(){
  var keys=Object.keys(_edits);
  if(!keys.length){toast('لا توجد تغييرات','info');return;}

  var adds=0,removes=0;
  keys.forEach(function(k){
    var parts=k.split('|');
    var row=rowById(parts[2]); if(!row) return;
    var diff=_edits[k]-count(parts[0],parts[1],row,parts[3]);
    if(diff>0)adds+=diff; else removes+=Math.abs(diff);
  });

  if(!confirm('سيتم:\n'+(adds>0?'• إضافة '+adds+' حيوان\n':'')+(removes>0?'• تعطيل '+removes+' حيوان\n':'')+'\nتأكيد؟'))return;

  toast('جاري التطبيق...','info');
  var totalAdded=0, totalRemoved=0;

  for(var k in _edits){
    var parts=k.split('|');
    var sp=parts[0], breed=parts[1], gender=parts[3];
    var row=rowById(parts[2]); if(!row) continue;
    var desired=_edits[k];
    var current=count(sp,breed,row,gender);
    var diff=desired-current;

    if(diff>0){
      for(var i=0;i<diff;i++){
        try{
          await fbPost('animals',{species:sp,breed:breed,gender:gender,purpose:row.writePurpose,
            status:'alive',tag:null,barn:null,birth_date:todayStr(),
            added_by:getUser()?.name,notes:'تمت الإضافة من يومية المزرعة'});
          totalAdded++;
        }catch(e){console.error(e);}
      }
    } else if(diff<0){
      // Same predicate as the cell's own display -- an edit can only ever
      // affect the exact animals that cell is counting.
      var toRemove=matchAnimals(sp,breed,row,gender).slice(0,Math.abs(diff));
      for(var j=0;j<toRemove.length;j++){
        try{
          await fbPatch('animals',toRemove[j]._id,{status:'dead',died_at:todayStr(),death_reason:'تعديل من يومية المزرعة'});
          totalRemoved++;
        }catch(e){console.error(e);}
      }
    }
  }

  await logActivity('edit','animals','تعديل يدوي من اليومية: +'+ar(totalAdded)+' ،—'+ar(totalRemoved));
  
  // Save snapshot for Dashboard Sync
  try {
    const aliveAnimals = _allAnimals.filter(a => a.status === 'alive');
    const isB = a => a.purpose === 'birth' || a.breed === 'مواليد';
    await fbPut('diary_snapshot', {
      total: aliveAnimals.length,
      goats: aliveAnimals.filter(a => a.species === 'goat').length,
      sheep: aliveAnimals.filter(a => a.species === 'sheep').length,
      goatBirths: aliveAnimals.filter(a => a.species === 'goat' && isB(a)).length,
      sheepBirths: aliveAnimals.filter(a => a.species === 'sheep' && isB(a)).length,
      updated_at: new Date().toISOString()
    });
  } catch(e) { console.error('Failed to save sync snapshot', e); }

  toast('✅ +'+ar(totalAdded)+' إضافة، —'+ar(totalRemoved)+' إزالة');
  _allAnimals=await fbGet('animals');
  _edits={}; _mode='view';
  var btn=document.getElementById('mode-btn');
  if(btn){btn.innerHTML='<i class="bi bi-pencil-square"></i> تعديل';btn.style.cssText='background:rgba(33,150,243,.1);border-color:rgba(33,150,243,.35);color:var(--blue)';}
  render();
};
</script>
</body>
</html>
