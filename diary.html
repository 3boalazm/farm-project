<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<script>(function(){var t=localStorage.getItem('farm_theme');if(t==='light')document.documentElement.classList.add('light-mode');}());</script>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>يومية المزرعة — بيان المزرعة</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Lexend:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
/* ── Diary Table ── */
.diary-tbl{width:100%;border-collapse:separate;border-spacing:0;font-size:.78rem;text-align:center;direction:rtl}
.diary-tbl th,.diary-tbl td{border:1px solid var(--border);padding:7px 6px;white-space:nowrap}
.diary-tbl thead th{background:var(--bg-3);font-weight:700}
.diary-tbl .row-tarbiya td{background:rgba(0,230,118,.03)}
.diary-tbl .row-tasmeen td{background:rgba(255,107,53,.03)}
.diary-tbl .row-births td{background:rgba(255,193,7,.04)}
.diary-tbl .row-total td{background:rgba(255,107,53,.08);font-weight:800}
.diary-tbl td.m-col{color:var(--blue);font-weight:600}
.diary-tbl td.f-col{color:var(--orange);font-weight:600}
.diary-tbl td.zero{color:var(--border-2)}
.diary-tbl td.total-col{color:var(--orange);font-weight:800}
.diary-tbl th.sheep-hd{background:rgba(33,150,243,.08);color:var(--blue)}
.diary-tbl th.goat-hd{background:rgba(0,230,118,.08);color:var(--green)}
.diary-tbl th.births-hd{background:rgba(255,193,7,.08);color:var(--yellow)}
/* Edit inputs */
.diary-cell-input{width:48px;background:rgba(33,150,243,.08);border:1px solid rgba(33,150,243,.4);border-radius:6px;padding:3px 4px;color:var(--text);font-family:'Lexend',sans-serif;font-size:.82rem;text-align:center;outline:none}
.diary-cell-input:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(33,150,243,.15)}
.diary-cell-input.changed{background:rgba(255,193,7,.12);border-color:var(--yellow)}
/* Summary footer */
.diary-summary-row td{background:rgba(0,230,118,.07);font-weight:700}
/* Print */
@media print{
  .no-print{display:none!important}
  .diary-tbl{font-size:.7rem}
  .page-wrap{padding:0;margin:0}
}
</style>
</head>
<body>
<div class="page-wrap">
  <div id="page-header"></div>
  <div id="diary-main"><div class="text-center py-5"><div class="spinner"></div></div></div>
  <footer class="text-center text-gray mt-5 pt-4 pb-3" style="border-top:1px solid var(--border)">
    <span id="footer-year"></span> &copy; <span id="footer-farm"></span><br>
    <small style="font-size:.72rem;color:var(--text-muted)">إشراف: لواء أحمد رجب نوح | تطوير: جندي مصطفى محمد إبراهيم</small>
  </footer>
</div>
<script src="config.js"></script>
<script src="firebase.js"></script>
<script src="shared.js"></script>
<script>
'use strict';
var _diaryMode='view'; // 'view' or 'edit'
var _diaryAnimals=[];
var _pendingChanges={}; // key: sp-breed-purpose-gender => desired count

// ── SCHEMA ───────────────────────────────────────────
var SHEEP_BREEDS=['برقي','دودبر','ميت ماستر'];
var GOAT_BREEDS=['بور','شامي','بلدي'];
var PURPOSES=['tarbiya','tasmeen','birth'];
var PURPOSE_LABELS={tarbiya:'تربية',tasmeen:'تسمين',birth:'مواليد'};
var PURPOSE_ROW_STYLES={tarbiya:'row-tarbiya',tasmeen:'row-tasmeen',birth:'row-births'};

// ── INIT ─────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async function(){
  if(!requireAuth())return;
  initFirebase();
  var s=getSettings();
  document.getElementById('footer-year').textContent=ar(new Date().getFullYear());
  document.getElementById('footer-farm').textContent=s.farmName;
  renderNavbar('diary.html');
  renderPageHeader(
    '<i class="bi bi-journal-text accent-text"></i> يومية المزرعة',
    s.farmName+' — '+todayAr(),
    '<button class="action-btn no-print" onclick="window.print()"><i class="bi bi-printer"></i> طباعة</button>'+
    (can('admin')?
      '<button class="action-btn no-print" id="mode-btn" onclick="toggleDiaryMode()" style="background:rgba(33,150,243,.1);border-color:rgba(33,150,243,.35);color:var(--blue)">'+
        '<i class="bi bi-pencil-square"></i> تعديل يدوي</button>':'')
  );

  try{
    _diaryAnimals=await fbGet('animals');
  }catch(e){
    document.getElementById('diary-main').innerHTML='<div class="empty-state"><i class="bi bi-wifi-off"></i><p>خطأ في الاتصال: '+e.message+'</p></div>';
    return;
  }
  renderDiary();
});

// ── TOGGLE MODE ──────────────────────────────────────
window.toggleDiaryMode=function(){
  if(_diaryMode==='view'){
    _diaryMode='edit';
    _pendingChanges={};
    var btn=document.getElementById('mode-btn');
    if(btn){btn.innerHTML='<i class="bi bi-x-circle"></i> إلغاء التعديل';btn.style.background='rgba(244,67,54,.1)';btn.style.borderColor='rgba(244,67,54,.35)';btn.style.color='var(--red)';}
  } else {
    _diaryMode='view';
    _pendingChanges={};
    var btn=document.getElementById('mode-btn');
    if(btn){btn.innerHTML='<i class="bi bi-pencil-square"></i> تعديل يدوي';btn.style.background='rgba(33,150,243,.1)';btn.style.borderColor='rgba(33,150,243,.35)';btn.style.color='var(--blue)';}
  }
  renderDiary();
};

// ── GET COUNT ────────────────────────────────────────
function getCount(sp,breed,purpose,gender){
  return _diaryAnimals.filter(function(a){
    return a.status==='alive'&&a.species===sp&&a.breed===breed&&a.purpose===purpose&&a.gender===gender;
  }).length;
}

// ── RENDER DIARY ─────────────────────────────────────
function renderDiary(){
  var el=document.getElementById('diary-main');
  if(!el)return;

  var isEdit=(_diaryMode==='edit');
  var alive=_diaryAnimals.filter(function(a){return a.status==='alive';});

  // Build table
  // Columns: برقي(ذ,إ) | دودبر(ذ,إ) | ميت ماستر(ذ,إ) | ولدات أغنام(ذ,إ) | بور(ذ,إ) | شامي(ذ,إ) | بلدي(ذ,إ) | ولدات ماعز(ذ,إ) | الإجمالي
  
  function cell(sp, breed, purpose, gender){
    var current=getCount(sp,breed,purpose,gender);
    var key=sp+'-'+breed+'-'+purpose+'-'+gender;
    var val=(_pendingChanges[key]!==undefined)?_pendingChanges[key]:current;
    if(isEdit){
      return '<td><input type="number" class="diary-cell-input'+(val!==current?' changed':'')+'" data-key="'+key+'" data-sp="'+sp+'" data-breed="'+breed+'" data-purpose="'+purpose+'" data-gender="'+gender+'" value="'+val+'" min="0" onchange="onCellChange(this)" oninput="onCellChange(this)"></td>';
    }
    var display=val>0?ar(val):'—';
    var cls=gender==='male'?'m-col':'f-col';
    if(val===0)cls='zero';
    return '<td class="'+cls+'">'+display+'</td>';
  }

  function rowTotal(purpose){
    var t=0;
    SHEEP_BREEDS.forEach(function(b){t+=getCount('sheep',b,purpose,'male')+getCount('sheep',b,purpose,'female');});
    t+=getCount('sheep','مواليد',purpose,'male')+getCount('sheep','مواليد',purpose,'female');
    GOAT_BREEDS.forEach(function(b){t+=getCount('goat',b,purpose,'male')+getCount('goat',b,purpose,'female');});
    t+=getCount('goat','مواليد',purpose,'male')+getCount('goat','مواليد',purpose,'female');
    return t;
  }

  function colTotal(sp, breed, gender){
    var t=0;
    PURPOSES.forEach(function(p){t+=getCount(sp,breed,p,gender);});
    return t;
  }

  function totalAll(){
    return alive.length;
  }

  // Build table HTML
  var tbl='<div class="wonder-card" style="overflow-x:auto">'+
    '<div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">'+
      '<div class="fw-bold" style="font-size:.95rem"><i class="bi bi-table accent-text me-2"></i>بيان الماعز والأغنام — '+todayAr()+'</div>'+
      '<div class="d-flex gap-2 no-print">'+
        (isEdit?'<button class="action-btn primary" onclick="saveAllChanges()"><i class="bi bi-floppy-fill"></i> حفظ التعديلات</button>'+
                '<button class="action-btn" onclick="resetPending()"><i class="bi bi-arrow-counterclockwise"></i> إعادة تعيين</button>':'')+
        '<button class="action-btn sm" onclick="window.print()"><i class="bi bi-printer"></i> طباعة</button>'+
      '</div>'+
    '</div>'+
    (isEdit?'<div class="mb-3 p-3" style="background:rgba(33,150,243,.06);border:1px solid rgba(33,150,243,.25);border-radius:10px;font-size:.82rem">'+
      '<i class="bi bi-info-circle-fill me-2" style="color:var(--blue)"></i>'+
      '<strong style="color:var(--blue)">وضع التعديل:</strong> عدّل الأرقام مباشرة في الجدول. '+
      'الخلايا الصفراء تعني وجود تغيير غير محفوظ. '+
      'عند الحفظ سيتم <strong>إضافة</strong> حيوانات جديدة أو <strong>تعطيل</strong> الزيادة المطلوبة.'+
    '</div>':'');

  tbl+='<table class="diary-tbl"><thead>';
  
  // Header row 1: species sections
  tbl+='<tr>'+
    '<th rowspan="3" style="min-width:65px">النوع</th>'+
    '<th colspan="'+( SHEEP_BREEDS.length*2+2)+'" class="sheep-hd">أغنام</th>'+
    '<th colspan="'+(GOAT_BREEDS.length*2+2)+'" class="goat-hd">ماعز</th>'+
    '<th rowspan="3" style="background:rgba(255,107,53,.1);color:var(--orange)">الإجمالي</th>'+
  '</tr>';

  // Header row 2: breed names
  tbl+='<tr>';
  SHEEP_BREEDS.forEach(function(b){tbl+='<th colspan="2" class="sheep-hd">'+b+'</th>';});
  tbl+='<th colspan="2" class="births-hd">ولدات</th>';
  GOAT_BREEDS.forEach(function(b){tbl+='<th colspan="2" class="goat-hd">'+b+'</th>';});
  tbl+='<th colspan="2" class="births-hd">ولدات</th>';
  tbl+='</tr>';

  // Header row 3: ذكور / إناث
  tbl+='<tr>';
  var allCols=(SHEEP_BREEDS.length+1+GOAT_BREEDS.length+1);
  for(var ci=0;ci<allCols;ci++){
    tbl+='<th style="font-size:.68rem;color:var(--blue)">ذكور</th>'+
         '<th style="font-size:.68rem;color:var(--orange)">إناث</th>';
  }
  tbl+='</tr></thead><tbody>';

  // Purpose rows
  PURPOSES.forEach(function(purpose){
    var cls=PURPOSE_ROW_STYLES[purpose];
    var label=PURPOSE_LABELS[purpose];
    var rowT=rowTotal(purpose);
    tbl+='<tr class="'+cls+'"><td class="fw-bold" style="text-align:right">'+label+'</td>';
    // Sheep breeds
    SHEEP_BREEDS.forEach(function(b){
      tbl+=cell('sheep',b,purpose,'male')+cell('sheep',b,purpose,'female');
    });
    // Sheep births
    tbl+=cell('sheep','مواليد',purpose,'male')+cell('sheep','مواليد',purpose,'female');
    // Goat breeds
    GOAT_BREEDS.forEach(function(b){
      tbl+=cell('goat',b,purpose,'male')+cell('goat',b,purpose,'female');
    });
    // Goat births
    tbl+=cell('goat','مواليد',purpose,'male')+cell('goat','مواليد',purpose,'female');
    // Row total
    tbl+='<td class="total-col">'+ar(rowT)+'</td></tr>';
  });

  // Total row
  tbl+='<tr class="row-total"><td style="text-align:right">الإجمالي</td>';
  // Sheep breeds totals
  SHEEP_BREEDS.forEach(function(b){
    var m=colTotal('sheep',b,'male'),f=colTotal('sheep',b,'female');
    tbl+='<td class="'+(m>0?'m-col':'zero')+'">'+( m>0?ar(m):'—')+'</td>';
    tbl+='<td class="'+(f>0?'f-col':'zero')+'">'+( f>0?ar(f):'—')+'</td>';
  });
  // Sheep births total
  var sbm=colTotal('sheep','مواليد','male'),sbf=colTotal('sheep','مواليد','female');
  tbl+='<td class="'+(sbm>0?'m-col':'zero')+'">'+(sbm>0?ar(sbm):'—')+'</td>';
  tbl+='<td class="'+(sbf>0?'f-col':'zero')+'">'+(sbf>0?ar(sbf):'—')+'</td>';
  // Goat breeds totals
  GOAT_BREEDS.forEach(function(b){
    var m=colTotal('goat',b,'male'),f=colTotal('goat',b,'female');
    tbl+='<td class="'+(m>0?'m-col':'zero')+'">'+( m>0?ar(m):'—')+'</td>';
    tbl+='<td class="'+(f>0?'f-col':'zero')+'">'+( f>0?ar(f):'—')+'</td>';
  });
  // Goat births total
  var gbm=colTotal('goat','مواليد','male'),gbf=colTotal('goat','مواليد','female');
  tbl+='<td class="'+(gbm>0?'m-col':'zero')+'">'+(gbm>0?ar(gbm):'—')+'</td>';
  tbl+='<td class="'+(gbf>0?'f-col':'zero')+'">'+(gbf>0?ar(gbf):'—')+'</td>';
  tbl+='<td class="total-col" style="font-size:1rem">'+ar(totalAll())+'</td></tr>';

  // Summary footer
  var sheepTotal=alive.filter(function(a){return a.species==='sheep'&&a.purpose!=='birth';}).length;
  var sheepBirths=alive.filter(function(a){return a.species==='sheep'&&a.purpose==='birth';}).length;
  var goatTotal=alive.filter(function(a){return a.species==='goat'&&a.purpose!=='birth';}).length;
  var goatBirths=alive.filter(function(a){return a.species==='goat'&&a.purpose==='birth';}).length;
  var sheepCols=SHEEP_BREEDS.length*2+2;
  var goatCols=GOAT_BREEDS.length*2+2;
  tbl+='<tr class="diary-summary-row">'+
    '<td></td>'+
    '<td colspan="'+sheepCols+'" style="text-align:center;padding:8px;color:var(--blue)">'+
      'إجمالي الأغنام: <strong>'+ar(sheepTotal)+'</strong> | الولدات: <strong style="color:var(--yellow)">'+ar(sheepBirths)+'</strong>'+
    '</td>'+
    '<td colspan="'+goatCols+'" style="text-align:center;padding:8px;color:var(--green)">'+
      'إجمالي الماعز: <strong>'+ar(goatTotal)+'</strong> | الولدات: <strong style="color:var(--yellow)">'+ar(goatBirths)+'</strong>'+
    '</td>'+
    '<td></td>'+
  '</tr>';

  tbl+='</tbody></table></div>';
  el.innerHTML=tbl;
}

// ── CELL CHANGE ──────────────────────────────────────
window.onCellChange=function(input){
  var key=input.dataset.key;
  var sp=input.dataset.sp;
  var breed=input.dataset.breed;
  var purpose=input.dataset.purpose;
  var gender=input.dataset.gender;
  var newVal=parseInt(input.value)||0;
  var current=getCount(sp,breed,purpose,gender);
  if(newVal!==current){
    _pendingChanges[key]=newVal;
    input.classList.add('changed');
  } else {
    delete _pendingChanges[key];
    input.classList.remove('changed');
  }
  // Update row total in real-time
};

// ── SAVE ALL CHANGES ─────────────────────────────────
window.saveAllChanges=async function(){
  var keys=Object.keys(_pendingChanges);
  if(!keys.length){toast('لا توجد تغييرات','info');return;}

  // Show summary of what will change
  var adds=0,removes=0;
  keys.forEach(function(k){
    var inp=document.querySelector('input[data-key="'+k+'"]');
    if(!inp)return;
    var sp=inp.dataset.sp, breed=inp.dataset.breed, purpose=inp.dataset.purpose, gender=inp.dataset.gender;
    var current=getCount(sp,breed,purpose,gender);
    var desired=_pendingChanges[k];
    var diff=desired-current;
    if(diff>0)adds+=diff;
    else removes+=Math.abs(diff);
  });

  var msg='سيتم:\n'+(adds>0?'• إضافة '+adds+' حيوان\n':'')+(removes>0?'• إزالة (تعطيل) '+removes+' حيوان\n':'')+'\nتأكد من صحة الأرقام قبل المتابعة.';
  if(!confirm(msg))return;

  toast('جاري تطبيق التعديلات...','info');
  var totalAdded=0,totalRemoved=0;

  for(var k in _pendingChanges){
    var inp=document.querySelector('input[data-key="'+k+'"]');
    if(!inp)continue;
    var sp=inp.dataset.sp, breed=inp.dataset.breed, purpose=inp.dataset.purpose, gender=inp.dataset.gender;
    var current=getCount(sp,breed,purpose,gender);
    var desired=_pendingChanges[k];
    var diff=desired-current;

    if(diff>0){
      // Add animals
      for(var i=0;i<diff;i++){
        try{
          await fbPost('animals',{
            species:sp, breed:breed, gender:gender, purpose:purpose,
            status:'alive', tag:null, barn:null,
            birth_date:todayStr(),
            added_by:getUser()?.name,
            notes:'تمت الإضافة من يومية المزرعة — '+todayStr()
          });
          totalAdded++;
        }catch(e){console.error('add error',e);}
      }
    } else if(diff<0){
      // Remove (mark dead) from the specific category
      var toRemove=_diaryAnimals.filter(function(a){
        return a.status==='alive'&&a.species===sp&&a.breed===breed&&a.purpose===purpose&&a.gender===gender;
      }).slice(0,Math.abs(diff));
      for(var j=0;j<toRemove.length;j++){
        try{
          await fbPatch('animals',toRemove[j]._id,{status:'dead',died_at:todayStr(),death_reason:'تعديل من يومية المزرعة'});
          totalRemoved++;
        }catch(e){console.error('remove error',e);}
      }
    }
  }

  await logActivity('edit','animals','تعديل يدوي من يومية المزرعة: +'+ar(totalAdded)+' —'+ar(totalRemoved));
  toast('✅ تم حفظ التعديلات: +'+ar(totalAdded)+' إضافة، —'+ar(totalRemoved)+' إزالة');

  // Reload data
  _diaryAnimals=await fbGet('animals');
  _pendingChanges={};
  _diaryMode='view';
  var btn=document.getElementById('mode-btn');
  if(btn){btn.innerHTML='<i class="bi bi-pencil-square"></i> تعديل يدوي';btn.style.background='rgba(33,150,243,.1)';btn.style.borderColor='rgba(33,150,243,.35)';btn.style.color='var(--blue)';}
  renderDiary();
};

window.resetPending=function(){
  _pendingChanges={};
  renderDiary();
  toast('تم إعادة تعيين التعديلات','info');
};
</script>
</body>
</html>
