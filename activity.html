<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<script>(function(){var t=localStorage.getItem('farm_theme');if(t==='light')document.documentElement.classList.add('light-mode');}());</script>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>سجل الأنشطة — بيان المزرعة</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Lexend:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="page-wrap">
  <div id="page-header"></div>
  <!-- TABS -->
  <ul class="nav nav-pills mb-4 gap-2" id="activity-tabs">
    <li class="nav-item"><button class="nav-link active" onclick="switchTab('log')"><i class="bi bi-clock-history me-2"></i>سجل الأنشطة</button></li>
    <li class="nav-item"><button class="nav-link" onclick="switchTab('backups')"><i class="bi bi-archive-fill me-2"></i>النسخ الاحتياطية <span class="badge bg-secondary ms-1" id="backup-count">0</span></button></li>
  </ul>
  <div id="tab-log"><div id="content"><div class="text-center py-5"><div class="spinner"></div></div></div></div>
  <div id="tab-backups" style="display:none"><div id="backup-content"><div class="text-center py-5"><div class="spinner"></div></div></div></div>
  <footer class="text-center text-gray mt-5 pt-4 pb-3" style="border-top:1px solid var(--border)">
    © <span id="footer-year"></span> <span id="footer-farm"></span><br>
    <small style="font-size:.72rem;color:var(--text-muted)">إشراف: لواء أحمد رجب نوح &nbsp;|&nbsp; تطوير: جندي مصطفى محمد إبراهيم</small>
  </footer>
</div>
<script src="config.js"></script>
<script src="firebase.js"></script>
<script src="shared.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
'use strict';
// ── State ────────────────────────────────────────────
let allLogs=[], filterUser='all', filterAction='all', filterResource='all', filterDate='';
let _lastBackupTime=null; // time of last backup in this session
let currentTab='log';

const ACTION_CFG={
  add:   {icon:'bi-plus-circle-fill', cls:'act-add',    label:'إضافة'},
  edit:  {icon:'bi-pencil-fill',      cls:'act-edit',   label:'تعديل'},
  delete:{icon:'bi-trash-fill',       cls:'act-delete', label:'حذف'},
  login: {icon:'bi-box-arrow-in-right',cls:'act-login', label:'دخول'},
  logout:{icon:'bi-box-arrow-left',   cls:'act-login',  label:'خروج'},
  export:{icon:'bi-download',         cls:'act-edit',   label:'تصدير'},
};
const RESOURCE_LABELS={
  animals:'القطيع', health:'الصحة', vaccine:'التحصين', breeding:'التكاثر',
  finance:'المالية', inventory:'المخزن', settings:'الإعدادات',
  users:'المستخدمون', system:'النظام', reports:'التقارير', backup:'النسخ الاحتياطي',
};

// ── Init ─────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async ()=>{
  if(!requireAuth())return;
  if(!can('admin')&&!can('activity')){
    document.getElementById('content').innerHTML='<div class="empty-state"><i class="bi bi-shield-x"></i><p>هذه الصفحة للمديرين فقط</p><a href="dashboard.html" class="action-btn">الرئيسية</a></div>';
    renderNavbar('activity.html');return;
  }
  initFirebase();
  const s=getSettings();
  document.getElementById('footer-year').textContent=ar(new Date().getFullYear());
  document.getElementById('footer-farm').textContent=s.farmName;
  renderNavbar('activity.html');

  renderPageHeader('<i class="bi bi-clock-history accent-text"></i> سجل الأنشطة','كل ما يحدث في التطبيق موثّق هنا','');

  // Style tabs
  document.querySelectorAll('#activity-tabs .nav-link').forEach(btn=>{
    btn.style.cssText='background:var(--bg-3);border:1px solid var(--border);color:var(--text-sub);border-radius:10px;padding:8px 16px;cursor:pointer;font-family:Cairo,sans-serif;font-size:.85rem;transition:.2s';
    btn.classList.contains('active')&&(btn.style.background='rgba(0,230,118,.1)',btn.style.borderColor='rgba(0,230,118,.35)',btn.style.color='var(--green)');
  });

  await loadActivityData();
  await checkAndRunScheduledBackup();
});

async function loadActivityData(){
  try{
    allLogs=await fbGet('activity_log');
    allLogs.sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
  }catch(e){toast('خطأ: '+e.message,'error');}
  renderActivityPage();
}

// ── Tab Switching ────────────────────────────────────
window.switchTab=async function(tab){
  currentTab=tab;
  document.querySelectorAll('#activity-tabs .nav-link').forEach(btn=>{
    const isActive=btn.getAttribute('onclick').includes("'"+tab+"'");
    btn.classList.toggle('active',isActive);
    btn.style.background=isActive?'rgba(0,230,118,.1)':'var(--bg-3)';
    btn.style.borderColor=isActive?'rgba(0,230,118,.35)':'var(--border)';
    btn.style.color=isActive?'var(--green)':'var(--text-sub)';
  });
  document.getElementById('tab-log').style.display=tab==='log'?'block':'none';
  document.getElementById('tab-backups').style.display=tab==='backups'?'block':'none';
  if(tab==='backups') await renderBackupsTab();
};

// ── Activity Log Page ─────────────────────────────────
function renderActivityPage(){
  const el=document.getElementById('content');
  const today=new Date().toISOString().slice(0,10);
  const total=allLogs.length;
  const todayCount=allLogs.filter(l=>l.date===today).length;
  const users=[...new Set(allLogs.map(l=>l.userName))];
  const deleteCount=allLogs.filter(l=>l.action==='delete').length;

  // Apply filters
  let logs=allLogs;
  if(filterUser!=='all')logs=logs.filter(l=>l.userName===filterUser);
  if(filterAction!=='all')logs=logs.filter(l=>l.action===filterAction);
  if(filterResource!=='all')logs=logs.filter(l=>l.resource===filterResource);
  if(filterDate)logs=logs.filter(l=>l.date===filterDate);

  const allUsers=[...new Set(allLogs.map(l=>l.userName))].filter(Boolean);
  const allResources=[...new Set(allLogs.map(l=>l.resource))].filter(Boolean);

  // Admin header actions — always show, with clear status
  const backupStatus=_lastBackupTime
    ? '<span style="color:var(--green);font-size:.75rem"><i class="bi bi-check-circle-fill me-1"></i>آخر نسخة: '+_lastBackupTime+'</span>'
    : '<span style="color:var(--yellow);font-size:.75rem"><i class="bi bi-exclamation-triangle me-1"></i>لم تُؤخذ نسخة بعد</span>';

  renderPageHeader(
    '<i class="bi bi-clock-history accent-text"></i> سجل الأنشطة',
    'كل ما يحدث في التطبيق موثّق هنا',
    can('admin')?
      '<button class="action-btn primary" onclick="doBackupNow()" data-hint="تحميل النسخة الاحتياطية الآن وحفظها في Firebase"><i class="bi bi-cloud-arrow-up-fill"></i> نسخ احتياطية الآن</button>'+
      '<button class="action-btn" onclick="importBackup()" data-hint="استيراد نسخة احتياطية من ملف CSV"><i class="bi bi-upload"></i> استيراد</button>'+
      '<div class="dropdown d-inline-block">'+
        '<button class="action-btn danger" data-bs-toggle="dropdown" data-hint="مسح فترة زمنية — يتطلب نسخة احتياطية أولاً"><i class="bi bi-trash-fill"></i> مسح حسب الفترة <i class="bi bi-chevron-down" style="font-size:.65rem"></i></button>'+
        '<ul class="dropdown-menu">'+
          '<li><button class="dropdown-item" onclick="clearByPeriod(1)">آخر ساعة</button></li>'+
          '<li><button class="dropdown-item" onclick="clearByPeriod(24)">آخر يوم</button></li>'+
          '<li><button class="dropdown-item" onclick="clearByPeriod(168)">آخر أسبوع</button></li>'+
          '<li><button class="dropdown-item" onclick="clearByPeriod(720)">آخر شهر</button></li>'+
          '<li><button class="dropdown-item" onclick="clearByPeriod(1440)">آخر شهرين</button></li>'+
          '<li><hr class="dropdown-divider"></li>'+
          '<li><button class="dropdown-item" style="color:var(--red)" onclick="deleteAllActivity()">مسح الكل</button></li>'+
        '</ul>'+
      '</div>'+
      backupStatus
    :''
  );

  el.innerHTML=
  '<div class="row g-3 mb-4">'+
    [['إجمالي الأنشطة',ar(total),'var(--orange)','bi-collection-fill'],['أنشطة اليوم',ar(todayCount),'var(--green)','bi-calendar-check-fill'],['مستخدمون نشطون',ar(users.length),'var(--blue)','bi-people-fill'],['عمليات حذف',ar(deleteCount),'var(--red)','bi-trash-fill']]
    .map(s=>'<div class="col-6 col-md-3"><div class="stat-mini"><i class="bi '+s[3]+' d-block mb-1" style="color:'+s[2]+';font-size:1.2rem"></i><div class="num" style="color:'+s[2]+'">'+s[1]+'</div><div class="lbl">'+s[0]+'</div></div></div>').join('')+
  '</div>'+
  // User summary cards
  (allUsers.length>0?'<div class="wonder-card mb-4">'+
    '<div class="fw-bold mb-3" style="font-size:.88rem"><i class="bi bi-people-fill accent-text me-2"></i>ملخص حسب المستخدم</div>'+
    '<div class="row g-2">'+
      allUsers.slice(0,6).map(uName=>{
        const uLogs=allLogs.filter(l=>l.userName===uName);
        const uRole=uLogs[0]?.userRole||'worker';
        const adds=uLogs.filter(l=>l.action==='add').length;
        const edits=uLogs.filter(l=>l.action==='edit').length;
        const dels=uLogs.filter(l=>l.action==='delete').length;
        return'<div class="col-md-4"><div class="d-flex align-items-center gap-2 p-2" style="background:var(--bg-hover);border-radius:10px;cursor:pointer" onclick="filterUser=\''+uName+'\';renderActivityPage()">'+
          '<div class="user-avatar" style="width:32px;height:32px;font-size:.8rem">'+uName.slice(0,1)+'</div>'+
          '<div class="flex-grow-1"><div style="font-size:.82rem;font-weight:600">'+uName+'</div>'+
          '<div style="font-size:.72rem"><span class="green-text me-1">+'+ar(adds)+'</span><span class="blue-text me-1">✏'+ar(edits)+'</span><span class="red-text">🗑'+ar(dels)+'</span></div></div>'+
        '</div></div>';
      }).join('')+
    '</div></div>':'') +
  // Filters
  '<div class="wonder-card mb-3 p-3">'+
    '<div class="row g-2 align-items-end">'+
      '<div class="col-md-3"><label>المستخدم</label><select class="field" onchange="filterUser=this.value;renderActivityPage()">'+
        '<option value="all">الكل</option>'+allUsers.map(u=>'<option value="'+u+'" '+(filterUser===u?'selected':'')+'>'+u+'</option>').join('')+
      '</select></div>'+
      '<div class="col-md-2"><label>الإجراء</label><select class="field" onchange="filterAction=this.value;renderActivityPage()">'+
        '<option value="all">الكل</option>'+Object.entries(ACTION_CFG).map(([k,v])=>'<option value="'+k+'" '+(filterAction===k?'selected':'')+'>'+v.label+'</option>').join('')+
      '</select></div>'+
      '<div class="col-md-3"><label>القسم</label><select class="field" onchange="filterResource=this.value;renderActivityPage()">'+
        '<option value="all">الكل</option>'+allResources.map(r=>'<option value="'+r+'" '+(filterResource===r?'selected':'')+'>'+( RESOURCE_LABELS[r]||r)+'</option>').join('')+
      '</select></div>'+
      '<div class="col-md-2"><label>التاريخ</label><input type="date" class="field" value="'+filterDate+'" onchange="filterDate=this.value;renderActivityPage()"></div>'+
      '<div class="col-md-2"><button class="action-btn w-100" onclick="filterUser=\'all\';filterAction=\'all\';filterResource=\'all\';filterDate=\'\';renderActivityPage()">'+
        '<i class="bi bi-x-circle"></i> إعادة تعيين</button></div>'+
    '</div>'+
  '</div>'+
  '<div class="d-flex justify-content-between align-items-center mb-3">'+
    '<small class="text-gray">يُعرض '+ar(logs.length)+' نشاط'+( logs.length!==total?' من '+ar(total)+' إجمالي':'')+' </small>'+
    '<button class="action-btn sm" onclick="exportActivityCSV()"><i class="bi bi-filetype-csv"></i> تصدير CSV</button>'+
  '</div>'+
  (logs.length===0?'<div class="empty-state"><i class="bi bi-clock-history"></i><p>لا توجد أنشطة بهذه الفلاتر</p></div>':
  '<div class="wonder-card">'+
    logs.slice(0,200).map(log=>{
      const cfg=ACTION_CFG[log.action]||{icon:'bi-info-circle',cls:'act-login',label:log.action};
      const roleColor=ROLES[log.userRole]?.color||'var(--text-gray)';
      return'<div class="activity-row">'+
        '<div class="activity-icon '+cfg.cls+'"><i class="bi '+cfg.icon+'"></i></div>'+
        '<div class="flex-grow-1">'+
          '<div class="d-flex align-items-center gap-2 flex-wrap">'+
            '<span class="fw-bold" style="font-size:.85rem">'+(log.userName||'—')+'</span>'+
            '<span class="type-badge" style="background:'+roleColor+'22;color:'+roleColor+';border:1px solid '+roleColor+'44;font-size:.65rem">'+(ROLES[log.userRole]?.label||log.userRole||'—')+'</span>'+
            '<span class="type-badge badge-gray" style="font-size:.65rem">'+(RESOURCE_LABELS[log.resource]||log.resource||'—')+'</span>'+
          '</div>'+
          '<div style="font-size:.83rem;color:var(--text-sub);margin-top:2px">'+(log.description||'—')+'</div>'+
          '<div style="font-size:.7rem;color:var(--text-muted);margin-top:2px"><i class="bi bi-clock me-1"></i>'+(timeAr?timeAr(log.timestamp):log.timestamp||'—')+'</div>'+
        '</div>'+
        '<span class="type-badge '+cfg.cls+'" style="font-size:.68rem;flex-shrink:0">'+cfg.label+'</span>'+
      '</div>';
    }).join('')+
    (logs.length>200?'<div class="text-center py-3 text-gray" style="font-size:.8rem">يُعرض أول '+ar(200)+' نشاط فقط — استخدم الفلاتر</div>':'')+
  '</div>');
}

// ── Backup Functions ─────────────────────────────────

// Save backup to Firebase + download CSV
window.doBackupNow=async function(){
  if(!allLogs.length){toast('لا توجد أنشطة للنسخ','info');return;}
  toast('جاري حفظ النسخة الاحتياطية...','info');
  try{
    // Save to Firebase
    const backupData={
      created_at: new Date().toISOString(),
      date: todayStr(),
      count: allLogs.length,
      created_by: getUser()?.name||'—',
      type: 'manual',
      logs: allLogs.slice(0,2000) // Firebase limit safety
    };
    await fbPost('activity_backups', backupData);

    // Also download CSV
    const rows=[['التاريخ','الوقت','المستخدم','الدور','الإجراء','القسم','التفاصيل']];
    allLogs.forEach(l=>{rows.push([l.date||'',l.timestamp?.slice(11,19)||'',l.userName||'',ROLES[l.userRole]?.label||l.userRole||'',ACTION_CFG[l.action]?.label||l.action||'',RESOURCE_LABELS[l.resource]||l.resource||'',l.description||'']);});
    const csv=rows.map(r=>r.map(v=>'"'+v+'"').join(',')).join('\n');
    const a=document.createElement('a');
    a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
    a.download='activity-backup-'+todayStr()+'.csv';
    a.click();

    _lastBackupTime=todayStr();
    await logActivity('export','backup','نسخة احتياطية يدوية — '+ar(allLogs.length)+' سجل');
    toast('✅ تم حفظ النسخة في Firebase وتحميلها ('+ar(allLogs.length)+' سجل)');
    await renderBackupsTab();
  }catch(e){toast('خطأ: '+e.message,'error');}
};

// Import backup from CSV file
window.importBackup=function(){
  showModal('<div class="farm-modal" onclick="event.stopPropagation()" style="max-width:440px">'+
    '<h4><i class="bi bi-upload accent-text"></i> استيراد نسخة احتياطية</h4>'+
    '<p class="text-gray" style="font-size:.83rem">اختر ملف CSV لاستيراد سجل الأنشطة المحفوظ مسبقاً</p>'+
    '<input type="file" accept=".csv" class="field" id="import-file" style="cursor:pointer">'+
    '<div id="import-preview" class="mt-2 text-gray" style="font-size:.78rem"></div>'+
    '<div class="d-flex gap-2 justify-content-end mt-3">'+
      '<button class="action-btn" onclick="closeModal()">إلغاء</button>'+
      '<button class="action-btn primary" onclick="processImport()"><i class="bi bi-check-lg"></i> استيراد</button>'+
    '</div>'+
  '</div>');

  setTimeout(()=>{
    const inp=document.getElementById('import-file');
    if(inp)inp.addEventListener('change',function(){
      const f=this.files[0];
      if(f){const pv=document.getElementById('import-preview');if(pv)pv.textContent='الملف: '+f.name+' ('+(f.size/1024).toFixed(1)+' كيلوبايت)';}
    });
  },100);
};

window.processImport=function(){
  const inp=document.getElementById('import-file');
  if(!inp?.files[0]){toast('يرجى اختيار ملف','error');return;}
  const reader=new FileReader();
  reader.onload=function(e){
    const text=e.target.result;
    const lines=text.split('\n').filter(l=>l.trim()).slice(1); // skip header
    let imported=0;
    const parsed=lines.map(line=>{
      const cols=line.split(',').map(c=>c.replace(/^"|"$/g,'').trim());
      if(cols.length<7)return null;
      return{date:cols[0],timestamp:cols[0]+'T'+cols[1]+':00Z',userName:cols[2],userRole:Object.entries(ROLES).find(([k,v])=>v.label===cols[3])?.[0]||'worker',action:Object.entries(ACTION_CFG).find(([k,v])=>v.label===cols[4])?.[0]||'edit',resource:Object.entries(RESOURCE_LABELS).find(([k,v])=>v===cols[5])?.[0]||cols[5],description:cols[6]};
    }).filter(Boolean);
    closeModal();
    if(!parsed.length){toast('لا توجد بيانات صالحة في الملف','error');return;}
    if(!confirm('استيراد '+ar(parsed.length)+' سجل في قاعدة البيانات؟'))return;
    toast('جاري الاستيراد...','info');
    (async()=>{
      for(const rec of parsed){try{await fbPost('activity_log',rec);imported++;}catch(e){}}
      toast('تم استيراد '+ar(imported)+' سجل');
      await loadActivityData();
    })();
  };
  reader.readAsText(inp.files[0]);
};

// Render Backups Tab
async function renderBackupsTab(){
  const el=document.getElementById('backup-content');
  if(!el)return;
  el.innerHTML='<div class="text-center py-4"><div class="spinner"></div></div>';
  let backups=[];
  try{backups=await fbGet('activity_backups');backups.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));}
  catch(e){el.innerHTML='<div class="empty-state"><i class="bi bi-archive"></i><p>خطأ في تحميل النسخ: '+e.message+'</p></div>';return;}
  const bc=document.getElementById('backup-count');
  if(bc)bc.textContent=backups.length;
  if(!backups.length){el.innerHTML='<div class="empty-state"><i class="bi bi-archive"></i><p>لا توجد نسخ احتياطية بعد</p><button class="action-btn primary" onclick="doBackupNow()"><i class="bi bi-cloud-arrow-up-fill"></i> أنشئ أول نسخة احتياطية</button></div>';return;}
  el.innerHTML=
    '<div class="d-flex justify-content-between align-items-center mb-3">'+
      '<h6 class="fw-bold mb-0"><i class="bi bi-archive-fill accent-text me-2"></i>'+ar(backups.length)+' نسخة احتياطية محفوظة</h6>'+
      '<button class="action-btn primary" onclick="doBackupNow()"><i class="bi bi-cloud-arrow-up-fill"></i> نسخة جديدة الآن</button>'+
    '</div>'+
    backups.map(b=>'<div class="record-card">'+
      '<div class="d-flex justify-content-between align-items-start flex-wrap gap-2">'+
        '<div>'+
          '<div class="d-flex align-items-center gap-2 mb-1">'+
            '<span class="type-badge '+(b.type==='auto'?'badge-blue':'badge-tarbiya')+'"><i class="bi bi-'+(b.type==='auto'?'robot':'person-fill')+' me-1"></i>'+(b.type==='auto'?'تلقائية':'يدوية')+'</span>'+
            '<span class="fw-bold">'+(b.date||b.created_at?.slice(0,10)||'—')+'</span>'+
          '</div>'+
          '<small class="text-gray"><i class="bi bi-clock me-1"></i>'+(b.created_at?.replace('T',' ').slice(0,19)||'—')+
          ' &nbsp;•&nbsp; <i class="bi bi-collection me-1"></i>'+ar(b.count||0)+' سجل'+
          ' &nbsp;•&nbsp; <i class="bi bi-person me-1"></i>'+(b.created_by||'—')+'</small>'+
        '</div>'+
        '<div class="d-flex gap-2">'+
          '<button class="action-btn sm primary" onclick="downloadBackup(\''+b._id+'\')"><i class="bi bi-download"></i> تحميل</button>'+
          '<button class="action-btn sm danger" onclick="deleteBackup(\''+b._id+'\')"><i class="bi bi-trash"></i></button>'+
        '</div>'+
      '</div>'+
    '</div>').join('');
}

window.downloadBackup=async function(id){
  toast('جاري تحضير الملف...','info');
  try{
    const backup=await fbGetSingle('activity_backups/'+id);
    if(!backup?.logs?.length){toast('النسخة فارغة','info');return;}
    const rows=[['التاريخ','الوقت','المستخدم','الدور','الإجراء','القسم','التفاصيل']];
    backup.logs.forEach(l=>{rows.push([l.date||'',l.timestamp?.slice(11,19)||'',l.userName||'',ROLES[l.userRole]?.label||l.userRole||'',ACTION_CFG[l.action]?.label||l.action||'',RESOURCE_LABELS[l.resource]||l.resource||'',l.description||'']);});
    const csv=rows.map(r=>r.map(v=>'"'+v+'"').join(',')).join('\n');
    const a=document.createElement('a');
    a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
    a.download='backup-'+( backup.date||id)+'.csv';a.click();
    toast('تم التحميل');
  }catch(e){toast('خطأ: '+e.message,'error');}
};

window.deleteBackup=async function(id){
  if(!confirm('حذف هذه النسخة الاحتياطية؟\nلا يمكن التراجع.'))return;
  try{await fbDelete('activity_backups',id);toast('تم الحذف');await renderBackupsTab();}
  catch(e){toast('فشل: '+e.message,'error');}
};

// ── Delete Functions — require backup ────────────────
function requireBackup(){
  if(!_lastBackupTime){
    toast('⚠️ يجب أخذ نسخة احتياطية أولاً قبل أي عملية مسح','error');
    if(confirm('هل تريد أخذ نسخة احتياطية الآن؟'))doBackupNow();
    return false;
  }
  return true;
}

window.clearByPeriod=async function(hours){
  if(!requireBackup())return;
  const labels={1:'آخر ساعة',24:'آخر يوم',168:'آخر أسبوع',720:'آخر شهر',1440:'آخر شهرين'};
  if(!confirm('مسح أنشطة '+labels[hours]+'؟'))return;
  const cutoff=new Date();cutoff.setHours(cutoff.getHours()-hours);
  const toDelete=allLogs.filter(l=>new Date(l.timestamp)>=cutoff);
  if(!toDelete.length){toast('لا توجد أنشطة في هذه الفترة','info');return;}
  toast('جاري المسح...','info');
  let deleted=0;
  // DELETE using Firebase REST bulk-delete workaround: send null patches
  for(const log of toDelete){try{await fbDelete('activity_log',log._id);deleted++;}catch(e){}}
  toast('تم مسح '+ar(deleted)+' سجل');
  allLogs=allLogs.filter(l=>new Date(l.timestamp)<cutoff);
  renderActivityPage();
};

window.deleteAllActivity=async function(){
  if(!requireBackup())return;
  if(!confirm('مسح كل سجل الأنشطة نهائياً؟'))return;
  toast('جاري المسح...','info');
  try{
    // Fast: DELETE the whole node
    const url=FB_URL+'/activity_log.json'+(FB_SECRET?'?auth='+FB_SECRET:'');
    await fetch(url,{method:'DELETE'});
    await logActivity('delete','system','مسح كل سجل الأنشطة');
    toast('تم مسح كل السجلات');
    allLogs=[];_lastBackupTime=null;
    renderActivityPage();
  }catch(e){toast('فشل: '+e.message,'error');}
};

// ── Export CSV ────────────────────────────────────────
window.exportActivityCSV=function(){
  const logs=allLogs;
  const rows=[['التاريخ','الوقت','المستخدم','الدور','الإجراء','القسم','التفاصيل'],
    ...logs.map(l=>[l.date||'',l.timestamp?.slice(11,19)||'',l.userName||'',ROLES[l.userRole]?.label||l.userRole||'',ACTION_CFG[l.action]?.label||l.action||'',RESOURCE_LABELS[l.resource]||l.resource||'',l.description||''])
  ];
  const csv=rows.map(r=>r.map(v=>'"'+v+'"').join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download='activity-'+todayStr()+'.csv';a.click();
  toast('تم التصدير');
};

// ── Auto Quarterly Backup ────────────────────────────
async function checkAndRunScheduledBackup(){
  try{
    const lastKey='farm_last_auto_backup';
    const last=localStorage.getItem(lastKey);
    const now=new Date();
    const shouldBackup=!last||(now-new Date(last))>=90*24*60*60*1000; // 90 days
    if(!shouldBackup)return;
    if(!allLogs.length)return;
    // Auto backup
    console.log('Running quarterly auto-backup...');
    const backupData={
      created_at:now.toISOString(),
      date:todayStr(),
      count:allLogs.length,
      created_by:'النظام (تلقائي كل 3 أشهر)',
      type:'auto',
      logs:allLogs.slice(0,2000)
    };
    await fbPost('activity_backups',backupData);
    localStorage.setItem(lastKey,now.toISOString());
    await logActivity('export','backup','نسخة احتياطية تلقائية ربع سنوية — '+ar(allLogs.length)+' سجل');
    toast('✅ تم تنفيذ النسخة الاحتياطية التلقائية (ربع سنوية)','info');
    // Update backup count badge
    const bc=document.getElementById('backup-count');
    if(bc){const cnt=await fbGet('activity_backups');bc.textContent=cnt.length;}
  }catch(e){console.warn('Auto backup failed:',e);}
}
</script>
