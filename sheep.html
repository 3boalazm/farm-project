<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<script>
(function(){
  var t=localStorage.getItem('farm_theme');
  if(t==='light')document.documentElement.classList.add('light-mode');
})();
</script>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>قسم الأغنام — بيان المزرعة</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Lexend:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="page-wrap">
  <div id="page-header"></div>
  <div id="content"><div class="text-center py-5"><div class="spinner"></div></div></div>
  <footer class="text-center text-gray mt-5 pt-4 pb-3" style="border-top:1px solid var(--border)">
    © <span id="footer-year"></span> <span id="footer-farm"></span><br>
    <small style="font-size:.72rem;color:#555">إشراف: لواء أحمد رجب نوح &nbsp;|&nbsp; تطوير: جندي مصطفى محمد إبراهيم</small>
  </footer>
</div>
<script src="config.js"></script>
<script src="firebase.js"></script>
<script src="shared.js"></script>
<script src="notifications-service.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async ()=>{
  if(!requireAuth())return;
  initFirebase();
  const s=getSettings();
  document.getElementById('footer-year').textContent=ar(new Date().getFullYear());
  document.getElementById('footer-farm').textContent=s.farmName;
  renderNavbar('sheep.html');

  const el=document.getElementById('content');
  renderLoading(el);
  let animals=[];
  try{ animals=await fbGet('animals'); }catch(e){ toast('خطأ: '+e.message,'error'); }

  const alive=animals.filter(a=>a.status==='alive');
  const goats=alive.filter(a=>a.species==='sheep'&&a.purpose!=='birth');
  const births=alive.filter(a=>a.species==='sheep'&&a.purpose==='birth');
  const allSpeciesAnimals=alive.filter(a=>a.species==='sheep');
  const dead=animals.filter(a=>a.status==='dead'&&a.species==='sheep');
  const sorted=[...s.sheepBreeds].sort((a,b)=>breedStats(animals,b).total-breedStats(animals,a).total);

  renderPageHeader(
    '🐐 قسم الأغنام',
    `${ar(goats.length)} حيوان حي • ${ar(births.length)} مواليد`,
    can('animals')?`
      <button class="action-btn primary" onclick="openAddAnimal('sheep')"><i class="bi bi-plus-lg"></i> إضافة أغنام</button>
      <button class="action-btn" onclick="openAddBirth('sheep')"><i class="bi bi-stars"></i> إضافة مواليد</button>
      <button class="action-btn danger" onclick="openMarkDeath('sheep')"><i class="bi bi-x-octagon"></i> نفوق</button>`:''
  );

  // Breed cards
  const breedsHtml=s.sheepBreeds.map(breed=>{
    const bs=breedStats(animals,breed);
    const breedAnimals=alive.filter(a=>a.species==='sheep'&&a.breed===breed);
    return`<div class="col-lg-4 col-md-6">
      <div class="breed-card">
        <div class="breed-header">
          <div class="breed-icon">🐐</div>
          <div><div class="fw-bold">${breed}</div><small class="text-gray">${ar(bs.total)} حيوان</small></div>
        </div>
        <div class="row g-2 mb-3">
          <div class="col-6"><div class="gender-box"><span class="gender-count green-text">${ar(bs.tarbiyaMale)}</span><small class="text-gray">ذكور تربية</small></div></div>
          <div class="col-6"><div class="gender-box"><span class="gender-count green-text">${ar(bs.tarbiyaFemale)}</span><small class="text-gray">إناث تربية</small></div></div>
          <div class="col-6"><div class="gender-box"><span class="gender-count accent-text">${ar(bs.tasmeenMale)}</span><small class="text-gray">ذكور تسمين</small></div></div>
          <div class="col-6"><div class="gender-box"><span class="gender-count accent-text">${ar(bs.tasmeenFemale)}</span><small class="text-gray">إناث تسمين</small></div></div>
        </div>
        <div class="mb-2">
          ${bs.tarbiya>0?`<span class="type-badge badge-tarbiya">تربية ${ar(bs.tarbiya)}</span> `:''}
          ${bs.tasmeen>0?`<span class="type-badge badge-tasmeen">تسمين ${ar(bs.tasmeen)}</span>`:''}
        </div>
        <a href="animals.html?species=sheep&breed=${encodeURIComponent(breed)}" class="action-btn sm w-100 mt-2" style="justify-content:center">
          <i class="bi bi-list-ul"></i> عرض القائمة
        </a>
      </div>
    </div>`;
  }).join('');

  el.innerHTML=`
  <div class="row g-3 mb-4">
    <div class="col-6 col-md-3"><div class="stat-mini"><div class="num green-text">${ar(goats.length)}</div><div class="lbl">إجمالي الأغنام</div></div></div>
    <div class="col-6 col-md-3"><div class="stat-mini"><div class="num" style="color:var(--yellow)">${ar(births.length)}</div><div class="lbl">المواليد</div></div></div>
    <div class="col-6 col-md-3"><div class="stat-mini"><div class="num accent-text">${ar(goats.filter(a=>a.purpose==='tasmeen').length)}</div><div class="lbl">تسمين</div></div></div>
    <div class="col-6 col-md-3"><div class="stat-mini"><div class="num red-text">${ar(dead.length)}</div><div class="lbl">النافق</div></div></div>
  </div>

  <!-- Filtered Links -->
  <div class="d-flex gap-2 flex-wrap mb-3">
    <a href="animals.html?species=sheep&status=alive&purpose=tarbiya,tasmeen" class="action-btn primary sm"><i class="bi bi-list-ul"></i> كل الأغنام</a>
    <a href="animals.html?species=sheep&purpose=birth" class="action-btn sm" style="background:rgba(255,193,7,.1);border-color:rgba(255,193,7,.3);color:var(--yellow)"><i class="bi bi-stars"></i> المواليد</a>
    <a href="animals.html?species=sheep&purpose=tasmeen" class="action-btn sm" style="background:rgba(255,107,53,.1);border-color:rgba(255,107,53,.3);color:var(--orange)"><i class="bi bi-graph-up"></i> التسمين</a>
    <a href="animals.html?species=sheep&status=dead" class="action-btn danger sm"><i class="bi bi-x-octagon"></i> النافق</a>
    <a href="breeding.html" class="action-btn sm" style="background:rgba(156,39,176,.1);border-color:rgba(156,39,176,.3);color:var(--purple)"><i class="bi bi-diagram-2-fill"></i> التكاثر</a>
    <a href="health.html" class="action-btn sm" style="background:rgba(244,67,54,.1);border-color:rgba(244,67,54,.3);color:var(--red)"><i class="bi bi-heart-pulse-fill"></i> الصحة</a>
  </div>
  <div id="pie-container-sheep" class="wonder-card mb-4 text-center" style="max-width:350px"></div>

  <h6 class="fw-bold mb-3"><i class="bi bi-grid-3x3-gap-fill accent-text"></i> السلالات</h6>
  <div class="row g-3 mb-4">${breedsHtml}</div>

  <div class="births-section">
    <h6 class="fw-bold mb-3"><i class="bi bi-stars" style="color:var(--yellow)"></i> مواليد الأغنام — ${ar(births.length)}</h6>
    <div class="row g-3">
      <div class="col-6"><div class="summary-card"><div class="summary-number">${ar(births.filter(a=>a.gender==='male').length)}</div><small class="text-gray">ذكور</small></div></div>
      <div class="col-6"><div class="summary-card"><div class="summary-number accent-text">${ar(births.filter(a=>a.gender==='female').length)}</div><small class="text-gray">إناث</small></div></div>
    </div>
  </div>`;

  // Store animals for modals
  window._animals=animals;
  // Render pie chart
  const breedDatasheep=s.sheepBreeds.map(b=>({b,cnt:alive.filter(a=>a.breed===b).length})).filter(x=>x.cnt>0);
  const totalsheep=breedDatasheep.reduce((t,x)=>t+x.cnt,0)||1;
  const _savedColors=JSON.parse(localStorage.getItem('breed_colors')||'{}');
  const _defColors=['#00e676','#2196f3','#ff6b35','#9c27b0','#ffc107','#f44336','#00bcd4','#8bc34a'];
  const COLORS=breedDatasheep.map((x,i)=>_savedColors[x.b]||_defColors[i%_defColors.length]);
  if(breedDatasheep.length){
    const size=180,cx=90,cy=90,r=70,ir=30;let sa=0;let paths='',legend='';
    breedDatasheep.forEach(function(x,i){
      const angle=(x.cnt/totalsheep)*2*Math.PI;if(angle>=2*Math.PI-0.001)return;
      const ea=sa+angle,lg=angle>Math.PI?1:0;
      const x1=cx+r*Math.cos(sa-Math.PI/2),y1=cy+r*Math.sin(sa-Math.PI/2);
      const x2=cx+r*Math.cos(ea-Math.PI/2),y2=cy+r*Math.sin(ea-Math.PI/2);
      const xi=cx+ir*Math.cos(sa-Math.PI/2),yi=cy+ir*Math.sin(sa-Math.PI/2);
      const xi2=cx+ir*Math.cos(ea-Math.PI/2),yi2=cy+ir*Math.sin(ea-Math.PI/2);
      paths+='<path d="M '+xi+' '+yi+' A '+ir+' '+ir+' 0 '+lg+' 1 '+xi2+' '+yi2+' L '+x2+' '+y2+' A '+r+' '+r+' 0 '+lg+' 0 '+x1+' '+y1+' Z" fill="'+COLORS[i%COLORS.length]+'" opacity=".85" stroke="#141414" stroke-width="2"></path>';
      legend+='<span style="font-size:.7rem;display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:50%;background:'+COLORS[i%COLORS.length]+';display:inline-block"></span>'+x.b+' '+ar(x.cnt)+'</span>';
      sa=ea;
    });
    const pc=document.getElementById('pie-container-sheep');
    if(pc)pc.innerHTML='<h6 class="fw-bold mb-2">توزيع السلالات</h6><svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">'+paths+'<circle cx="'+cx+'" cy="'+cy+'" r="'+ir+'" fill="#141414"/><text x="'+cx+'" y="'+(cy-6)+'" text-anchor="middle" fill="#e8e8e8" font-size="18" font-weight="700" font-family="Lexend">'+ar(totalsheep)+
    '</text><text x="'+cx+'" y="'+(cy+12)+'" text-anchor="middle" fill="#888" font-size="10" font-family="Cairo">رأس</text></svg><div style="display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-top:8px">'+legend+'</div>';
  }
});

function openAddAnimal(species){
  const s=getSettings();
  showModal(`<div class="farm-modal" onclick="event.stopPropagation()">
    <h4><i class="bi bi-plus-circle accent-text"></i> إضافة أغنام</h4>
    <label>السلالة</label><select class="field" id="m-breed">${s.sheepBreeds.map(b=>`<option>${b}</option>`).join('')}</select>
    <label>الغرض</label><select class="field" id="m-purpose"><option value="tarbiya">تربية</option><option value="tasmeen">تسمين</option></select>
    <div class="row g-2">
      <div class="col-6"><label>الجنس</label><select class="field" id="m-gender"><option value="female">أنثى</option><option value="male">ذكر</option></select></div>
      <div class="col-6"><label>تاريخ الميلاد</label><input type="date" class="field" id="m-bdate"></div>
    </div>
    <div class="row g-2">
      <div class="col-6"><label>رقم الترقيم</label><input class="field" id="m-tag" placeholder="A-123"></div>
      <div class="col-6"><label>الكمية</label><input type="number" class="field" id="m-qty" value="1" min="1" max="500"></div>
    </div>
    <label>ملاحظات</label><textarea class="field" id="m-notes" rows="2"></textarea>
    <div class="d-flex gap-2 justify-content-end mt-3">
      <button class="action-btn" onclick="closeModal()">إلغاء</button>
      <button class="action-btn primary" onclick="submitAdd('sheep','tarbiya')">حفظ</button>
    </div>
  </div>`);
}

function openAddBirth(species){
  const s=getSettings();
  showModal(`<div class="farm-modal" onclick="event.stopPropagation()">
    <h4><i class="bi bi-stars" style="color:var(--yellow)"></i> إضافة مواليد أغنام</h4>
    <div class="row g-2">
      <div class="col-6"><label>الجنس</label><select class="field" id="m-gender"><option value="female">أنثى</option><option value="male">ذكر</option></select></div>
      <div class="col-6"><label>الكمية</label><input type="number" class="field" id="m-qty" value="1" min="1" max="100"></div>
    </div>
    <label>تاريخ الميلاد</label><input type="date" class="field" id="m-bdate" value="${todayStr()}">
    <label>ملاحظات</label><textarea class="field" id="m-notes" rows="2"></textarea>
    <div class="d-flex gap-2 justify-content-end mt-3">
      <button class="action-btn" onclick="closeModal()">إلغاء</button>
      <button class="action-btn primary" onclick="submitBirth('sheep')">حفظ</button>
    </div>
  </div>`);
}

window.submitAdd=async function(species,purpose){
  const s=getSettings();
  const breed=document.getElementById('m-breed').value;
  const gender=document.getElementById('m-gender').value;
  const tag=document.getElementById('m-tag')?.value.trim();
  const bdate=document.getElementById('m-bdate').value||null;
  const notes=document.getElementById('m-notes').value.trim();
  const qty=parseInt(document.getElementById('m-qty').value)||1;
  purpose=document.getElementById('m-purpose')?.value||purpose;
  closeModal();toast('جاري الحفظ...','info');
  let ok=0;
  for(let i=0;i<qty;i++){
    try{await fbPost('animals',{species,breed,gender,purpose,status:'alive',birth_date:bdate,tag:qty===1?(tag||null):(tag?`${tag}-${i+1}`:null),notes:notes||null});ok++;}catch(e){console.error(e);}
  }
  if(ok>0){await logActivity('add','animals',`أضاف ${ar(ok)} أغنام — ${breed}`);toast(`تمت إضافة ${ar(ok)} أغنام`);location.reload();}
  else toast('فشل الحفظ','error');
};

window.submitBirth=async function(species){
  const gender=document.getElementById('m-gender').value;
  const qty=parseInt(document.getElementById('m-qty').value)||1;
  const bdate=document.getElementById('m-bdate').value||null;
  const notes=document.getElementById('m-notes').value.trim();
  closeModal();toast('جاري الحفظ...','info');
  let ok=0;
  for(let i=0;i<qty;i++){
    try{await fbPost('animals',{species,breed:'مواليد',gender,purpose:'birth',status:'alive',birth_date:bdate,notes:notes||null});ok++;}catch(e){console.error(e);}
  }
  if(ok>0){await logActivity('add','animals',`أضاف ${ar(ok)} مواليد أغنام`);toast(`تمت إضافة ${ar(ok)} مواليد`);location.reload();}
  else toast('فشل الحفظ','error');
};

function openMarkDeath(species){
  const alive=(window._animals||[]).filter(a=>a.status==='alive'&&a.species===species);
  showModal(`<div class="farm-modal" onclick="event.stopPropagation()">
    <h4 style="color:#ff8a8a"><i class="bi bi-exclamation-triangle"></i> تسجيل نفوق</h4>
    <label>الحيوان (<span id="d-cnt">${ar(alive.length)}</span>)</label>
    <select class="field" id="d-animal">
      <option value="">— اختر —</option>
      ${alive.slice(0,200).map(a=>`<option value="${a._id}">${a.breed} • ${a.gender==='male'?'ذكر':'أنثى'}${a.tag?` • #${a.tag}`:''}</option>`).join('')}
    </select>
    <div class="d-flex gap-2 justify-content-end mt-3">
      <button class="action-btn" onclick="closeModal()">إلغاء</button>
      <button class="action-btn danger" onclick="submitDeath()">تأكيد</button>
    </div>
  </div>`);
}
window.submitDeath=async function(){
  const id=document.getElementById('d-animal').value;if(!id){toast('يرجى اختيار حيوان','error');return;}
  const a=(window._animals||[]).find(x=>x._id===id);
  closeModal();
  try{await fbPatch('animals',id,{status:'dead',died_at:new Date().toISOString()});await logActivity('edit','animals',`تسجيل نفوق — ${a?.breed||''} ${a?.tag?'#'+a.tag:''}`);toast('تم تسجيل النفوق');location.reload();}
  catch(e){toast('فشل: '+e.message,'error');}
};
</script>
</body>
</html>
