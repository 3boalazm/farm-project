# ══════════════════════════════════════════════════════════════
#  بيان المزرعة — GitHub Actions: Auto Build APK
#  يبني APK تلقائياً عند كل push على main
#  ويرفع الـ APK كـ Release artifact
# ══════════════════════════════════════════════════════════════

name: Build Android APK

on:
  push:
    branches: [ main, master ]
    tags:      [ 'v*.*.*' ]
  workflow_dispatch:    # يسمح بالتشغيل اليدوي من GitHub UI

jobs:
  build-apk:
    name: Build APK 🐐
    runs-on: ubuntu-latest

    steps:

      # ── 1. Checkout code ──────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Setup Java 17 ──────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 3. Setup Node.js ──────────────────────────────────
      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # ── 4. Install dependencies ───────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ── 5. Sync Capacitor ─────────────────────────────────
      - name: Sync Capacitor Android
        run: npx cap sync android

      # ── 6. Build Debug APK ────────────────────────────────
      - name: Build Debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 7. Rename APK with version/date ───────────────────
      - name: Rename APK
        run: |
          DATE=$(date +"%Y%m%d_%H%M")
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             bayan-farm-${DATE}.apk
          echo "APK_NAME=bayan-farm-${DATE}.apk" >> $GITHUB_ENV

      # ── 8. Upload APK as workflow artifact ────────────────
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bayan-farm-apk
          path: ${{ env.APK_NAME }}
          retention-days: 30

      # ── 9. Create GitHub Release (on tags only) ───────────
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.APK_NAME }}
          name: بيان المزرعة ${{ github.ref_name }}
          body: |
            ## 📱 بيان المزرعة — تطبيق Android

            ### التثبيت
            1. نزّل ملف `bayan-farm-*.apk`
            2. على جهازك: الإعدادات ← الأمان ← السماح بالمصادر غير المعروفة ✅
            3. افتح الملف وثبّته

            ### المميزات
            - 🐐 إدارة كاملة للقطيع (ماعز + أغنام)
            - 💊 السجل الصحي والتحصينات
            - 📊 تقارير وإحصائيات
            - 📱 يعمل Offline مع مزامنة تلقائية
          draft: false
          prerelease: false

  # ── Release APK signed (optional, for production) ─────────
  build-release-apk:
    name: Build Signed Release APK 🔑
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-apk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install & Sync
        run: |
          npm ci
          npx cap sync android

      # ── Decode keystore from GitHub Secret ────────────────
      - name: Decode Keystore
        if: secrets.KEYSTORE_BASE64 != ''
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/bayan-farm.keystore
        continue-on-error: true

      # ── Build Release APK ──────────────────────────────────
      - name: Build Release APK
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=app/bayan-farm.keystore \
            -Pandroid.injected.signing.store.password=${KEYSTORE_PASSWORD} \
            -Pandroid.injected.signing.key.alias=${KEY_ALIAS} \
            -Pandroid.injected.signing.key.password=${KEY_PASSWORD} \
            || ./gradlew assembleRelease --no-daemon
        continue-on-error: true

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: bayan-farm-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
        continue-on-error: true
