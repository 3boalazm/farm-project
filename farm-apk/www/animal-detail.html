<!-- weight helpers -->
<script>
function renderWeightTable(wts){
  if(!wts||!wts.length)return'<div class="text-gray text-center py-3" style="font-size:.85rem">لا توجد أوزان مسجّلة</div>';
  var sorted=[...wts].sort(function(a,b){return(a.date||"").localeCompare(b.date||"");});
  var maxW=Math.max.apply(null,sorted.map(function(w){return+w.weight||0;}));
  var show=sorted.slice(-8);
  var chartHtml='<div style="display:flex;align-items:flex-end;gap:5px;height:65px;margin:10px 0 6px;padding:0 2px">';
  show.forEach(function(w){
    var pct=maxW>0?Math.round(((+w.weight||0)/maxW)*100):0;
    chartHtml+='<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px">'+
      '<div style="font-size:.58rem;color:var(--text-gray)">'+ar(+(w.weight||0).toFixed?+w.weight:0)+'</div>'+
      '<div style="width:100%;height:'+Math.max(4,Math.round(pct*0.5))+'px;background:linear-gradient(180deg,var(--orange),#ff8a65);border-radius:4px 4px 0 0"></div>'+
      '<div style="font-size:.55rem;color:var(--text-muted);white-space:nowrap">'+((w.date||"").slice(5)||"")+'</div>'+
    '</div>';
  });
  chartHtml+='</div>';
  var last=+wts[0].weight||0,first=+wts[wts.length-1].weight||0,gain=Math.max(0,last-first);
  var statsHtml='<div class="row g-2 mb-3">'+
    [["آخر وزن",ar(last)+" كجم","var(--green)"],["أول وزن",ar(first)+" كجم","var(--blue)"],
     ["الزيادة",ar(+gain.toFixed(1))+" كجم","var(--orange)"],["قياسات",ar(wts.length),"var(--gray)"]]
    .map(function(x){return'<div class="col-6 col-md-3"><div class="stat-mini"><div class="num" style="color:'+x[2]+'">'+x[1]+'</div><div class="lbl">'+x[0]+'</div></div></div>';}).join("")+"</div>";
  var rows=wts.map(function(w,i){
    var prev=wts[i+1];var diff=prev?parseFloat(((+w.weight||0)-(+prev.weight||0)).toFixed(1)):0;
    return'<tr><td class="text-gray">'+( w.date||"—")+'</td>'+
      '<td class="fw-bold green-text">'+ar(+w.weight||0)+' كجم</td>'+
      '<td class="'+( diff>0?"green-text":diff<0?"red-text":"text-gray")+'">'+( diff!==0?(diff>0?"+":"")+ar(Math.abs(diff)):"-")+'</td>'+
      '<td class="text-gray" style="font-size:.78rem">'+( w.notes||"—")+'</td>'+
      '<td>'+( can("animals")? '<button class="icon-btn del" onclick="delWeight(\''+ w._id+'\')" title="حذف"><i class="bi bi-trash"></i></button>'  :"")+'</td></tr>';
  }).join("");
  return statsHtml+chartHtml+
    '<div class="table-responsive"><table class="data-table"><thead><tr>'+
      '<th>التاريخ</th><th>الوزن</th><th>الفارق</th><th>ملاحظات</th><th></th>'+
    '</tr></thead><tbody>'+rows+'</tbody></table></div>';
}
</script>
<script src="config.js"></script>
<script src="firebase.js"></script>

<script>
'use strict';
let animal={}, offspring=[], vaccinations=[], medications=[], weights=[], healthRecs=[], breedingRecs=[];
const params=new URLSearchParams(location.search);
const animalId=params.get('id');

document.addEventListener('DOMContentLoaded',async()=>{
  if(!requireAuth())return;
  initFirebase();
  const s=getSettings();
  document.getElementById('footer-year').textContent=ar(new Date().getFullYear());
  document.getElementById('footer-farm').textContent=s.farmName;
  renderNavbarV2('animals.html');

  if(!animalId){
    document.getElementById('content').innerHTML=`<div class="empty-state"><i class="bi bi-exclamation-triangle"></i><p>لم يتم تحديد الحيوان</p><a href="animals.html" class="action-btn">رجوع</a></div>`;
    return;
  }

  renderLoading(document.getElementById('content'));
  try{
    // Use fbGetSingle for direct object fetch (not array)
    animal=await fbGetSingle(`animals/${animalId}`)||{};
    if(!animal.species){
      // Try from list as fallback
      const allAnimals=await fbGet('animals');
      const found=allAnimals.find(a=>a._id===animalId);
      if(found){animal=found;}
    }
    const [off,vacc,meds,wts,healthAll,breedingAll]=await Promise.all([
      fbGet(`animals/${animalId}/offspring`),
      fbGet(`animals/${animalId}/vaccinations`),
      fbGet(`animals/${animalId}/medications`),
      fbGet(`animals/${animalId}/weights`),
      fbGet('health'),
      fbGet('breeding')
    ]);
    offspring=off||[];vaccinations=vacc||[];medications=meds||[];
    weights=(wts||[]).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    var atag=animal.tag||'';
    healthRecs=(healthAll||[]).filter(function(r){return r.animal_tag===atag||r.animal_id===animalId;}).sort(function(a,b){return(b.date||'').localeCompare(a.date||'');});
    breedingRecs=(breedingAll||[]).filter(function(r){return r.female_tag===atag||r.male_tag===atag||r.mother_tag===atag;}).sort(function(a,b){return(b.mating_date||'').localeCompare(a.mating_date||'');});
    renderDetail(s);
  }catch(e){
    renderEmpty(document.getElementById('content'),'bi-exclamation-triangle','خطأ في تحميل البيانات: '+e.message,`<a href="animals.html" class="action-btn primary">العودة للقائمة</a>`);
    toast('خطأ: '+e.message,'error');
  }
});

function renderDetail(s){
  const age=calcAge(animal.birth_date);
  const isFemale=animal.gender==='female';
  const pregnancyStatus=animal.pregnancy_status||'empty';
  const el=document.getElementById('content');

  // Breadcrumb back link (used both by the new page header below and, for
  // colour-per-species, kept as data here rather than duplicated)
  const backSectionLabel=animal.species==='goat'?'الماعز':'الأغنام';
  const backSectionHref=animal.species==='goat'?'goats.html':'sheep.html';

  // ── Migrated to renderPageHeaderV2 (Dashboard v2 architecture) ──
  // Replaces the hand-rolled breadcrumb <div> this page used to render
  // directly into #content — same component, same breadcrumb pattern
  // already used by animals.html and dashboard.html, just with this
  // page's own species-specific middle crumb.
  renderPageHeaderV2({
    title: `${animal.breed||'—'} ${animal.tag?'<span class="type-badge badge-gray" style="font-size:.8rem">#'+animal.tag+'</span>':''}`,
    breadcrumb: [
      {label:'القطيع', href:'animals.html'},
      {label:backSectionLabel, href:backSectionHref},
      {label:(animal.breed||'—')+(animal.tag?' #'+animal.tag:'')}
    ]
  });

  el.innerHTML=`
  <!-- Profile Header -->
  <div class="section-card mb-4" style="background:linear-gradient(135deg,rgba(255,107,53,.08),rgba(0,0,0,0));border-color:rgba(255,107,53,.2)">
    <div class="d-flex justify-content-between align-items-start flex-wrap gap-3">
      <div class="d-flex align-items-center gap-3">
        <div style="font-size:4rem;line-height:1">${animal.species==='goat'?'🐐':'🐑'}</div>
        <div>
          <h3 class="fw-bold mb-1">${animal.breed||'غير معروف'} ${animal.tag?`<span class="type-badge badge-gray" style="font-size:.8rem">#${animal.tag}</span>`:''}</h3>
          <div class="d-flex gap-2 flex-wrap">
            <span class="type-badge ${animal.purpose==='tasmeen'?'badge-tasmeen':animal.purpose==='birth'?'badge-blue':'badge-tarbiya'}">${{tarbiya:'تربية',tasmeen:'تسمين',birth:'مواليد'}[animal.purpose]||animal.purpose||'—'}</span>
            <span class="type-badge ${animal.status==='alive'?'badge-tarbiya':'badge-danger'}">${animal.status==='alive'?'حي':'نافق'}</span>
            ${isFemale?`<span class="type-badge ${pregnancyStatus==='pregnant'?'badge-blue':pregnancyStatus==='inseminated'?'badge-yellow':pregnancyStatus==='with_kid'?'badge-tarbiya':'badge-gray'}">${getPregnancyLabel(pregnancyStatus)}</span>`:''}
            ${animal.barn?`<span class="type-badge badge-gray"><i class="bi bi-building me-1" style="font-size:.65rem"></i>${animal.barn}</span>`:''}
          </div>
        </div>
      </div>
      ${can('animals')&&animal.status==='alive'?`
      <div class="dropdown">
        <button class="action-btn" data-bs-toggle="dropdown"><i class="bi bi-three-dots-vertical"></i> إجراءات</button>
        <ul class="dropdown-menu dropdown-menu-start" style="background:#1e1e1e;border:1px solid #333;border-radius:14px;padding:8px">
          <li><button class="dropdown-item" style="color:var(--light);border-radius:8px;padding:8px 14px" onclick="openEditAnimal()"><i class="bi bi-pencil me-2" style="color:var(--blue)"></i>تعديل البيانات</button></li>
          <li><button class="dropdown-item" style="color:var(--light);border-radius:8px;padding:8px 14px" onclick="openAddVaccination()"><i class="bi bi-shield-check me-2" style="color:var(--green)"></i>إضافة تطعيم</button></li>
          <li><button class="dropdown-item" style="color:var(--light);border-radius:8px;padding:8px 14px" onclick="openAddMedication()"><i class="bi bi-capsule me-2" style="color:var(--yellow)"></i>إضافة دواء</button></li>
          ${isFemale?`
          <li><button class="dropdown-item" style="color:var(--light);border-radius:8px;padding:8px 14px" onclick="openUpdatePregnancy()"><i class="bi bi-heart-pulse me-2" style="color:var(--purple)"></i>تحديث الحالة التناسلية</button></li>
          <li><button class="dropdown-item" style="color:var(--light);border-radius:8px;padding:8px 14px" onclick="openAddOffspring()"><i class="bi bi-stars me-2" style="color:var(--yellow)"></i>تسجيل مولود</button></li>`:''}
          <li><hr style="border-color:#333;margin:6px 10px"></li>
          <li><button class="dropdown-item" style="color:var(--red);border-radius:8px;padding:8px 14px" onclick="openRemoveAnimal()"><i class="bi bi-trash me-2"></i>إخراج من القطيع</button></li>
        </ul>
      </div>`:can('animals')?`<a href="animals.html" class="action-btn"><i class="bi bi-arrow-right"></i> رجوع</a>`:''}
    </div>
  </div>

  <!-- Stats Row — migrated to renderKPICard (Dashboard v2 architecture),
       same component already used on dashboard.html and animals.html -->
  <div class="row g-3 mb-4">
    <div class="col-6 col-md-3">${renderKPICard({ label:'مواليد مسجّلة', value: ar(offspring.length), status:'normal' })}</div>
    <div class="col-6 col-md-3">${renderKPICard({ label:'تطعيمات', value: ar(vaccinations.length), status:'normal' })}</div>
    <div class="col-6 col-md-3">${renderKPICard({ label:'أدوية', value: ar(medications.length), status: medications.length>0?'watch':'normal' })}</div>
    <div class="col-6 col-md-3">${renderKPICard({ label:'العمر', value: age.years>0?ar(age.years)+' سنة':ar(age.months)+' شهر', status:'normal' })}</div>
  </div>

  <!-- Info Grid -->
  <div class="row g-3 mb-4">
    ${[['النوع',animal.species==='goat'?'🐐 ماعز':'🐑 أغنام'],['السلالة',animal.breed||'—'],['الجنس',animal.gender==='male'?'♂ ذكر':'♀ أنثى'],['الغرض',{tarbiya:'تربية',tasmeen:'تسمين',birth:'مواليد'}[animal.purpose]||'—'],['العمر',age.years>0?ar(age.years)+' سنة و '+ar(age.months)+' شهر':ar(age.months)+' شهر'],['تاريخ الميلاد',animal.birth_date||'غير محدد'],['رقم الترقيم',animal.tag||'—'],['الجمالون/العنبر',animal.barn||'غير محدد'],['الأم',animal.mother_tag?`#${animal.mother_tag} ${animal.mother_breed?'('+animal.mother_breed+')':''}` :'—'],['الأب',animal.father_tag?`#${animal.father_tag}` :'—']].map(([k,v])=>`<div class="col-md-3 col-6"><div class="info-card"><div class="info-label">${k}</div><div class="info-value">${v}</div></div></div>`).join('')}
  </div>

  ${animal.notes?`<div class="section-card mb-4"><div class="info-label mb-2"><i class="bi bi-chat-left-text accent-text me-2"></i>ملاحظات</div><div>${animal.notes}</div></div>`:''}

  <!-- Quick Links -->
  <div class="d-flex gap-2 flex-wrap mb-4">
    <a href="health.html" class="tag-link" style="color:var(--red);border-color:rgba(244,67,54,.3)"><i class="bi bi-heart-pulse-fill"></i> السجل الصحي</a>
    <a href="breeding.html" class="tag-link" style="color:var(--purple);border-color:rgba(156,39,176,.3)"><i class="bi bi-diagram-2-fill"></i> التكاثر</a>
    <a href="vaccine.html" class="tag-link" style="color:var(--green);border-color:rgba(0,230,118,.3)"><i class="bi bi-bandaid-fill"></i> التحصين</a>
    ${animal.barn?`<a href="barns.html" class="tag-link" style="color:var(--blue);border-color:rgba(33,150,243,.3)"><i class="bi bi-building"></i> ${animal.barn}</a>`:''}
  </div>

  <!-- Activity Timeline — NEW section, migrated architecture. Unifies
       health/vaccination/medication/breeding/offspring events into one
       chronological view, reusing the exact same renderTimeline/
       renderTimelineItem components dashboard.html already established.
       The detailed per-category sections below (Health, Breeding,
       Offspring, Vaccinations, Medications, Weights) are kept exactly as
       they are — this Timeline is an additional at-a-glance summary,
       not a replacement, matching how dashboard.html keeps its own
       "Recent Records" table and "Recent Activity" timeline side by side. -->
  <div class="section-card mb-4">
    <h5 class="fw-bold mb-3"><i class="bi bi-clock-history accent-text me-2"></i>الخط الزمني للأحداث</h5>
    ${(function(){
      var events=[];
      healthRecs.forEach(function(r){ if(r.date) events.push({date:r.date, eventType:'سجل صحي', entity:(r.diagnosis||r.medication||'—')}); });
      vaccinations.forEach(function(v){ if(v.date) events.push({date:v.date, eventType:'تطعيم', entity:(v.name||'—')}); });
      medications.forEach(function(m){ if(m.start_date) events.push({date:m.start_date, eventType:'دواء', entity:(m.name||'—')}); });
      breedingRecs.forEach(function(r){ if(r.mating_date) events.push({date:r.mating_date, eventType:'تكاثر', entity:(r.status==='born'?'ولادة':r.status==='pregnant'?'حمل':r.status||'—')}); });
      offspring.forEach(function(o){ if(o.birth_date) events.push({date:o.birth_date, eventType:'مولود', entity:(o.tag?'#'+o.tag:'')+(o.gender==='male'?' ذكر':' أنثى')}); });
      events.sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
      var recentEvents=events.slice(0,8);
      return recentEvents.length ? renderTimeline(recentEvents.map(function(e){
        return renderTimelineItem({ time:e.date, eventType:e.eventType, entity:e.entity });
      })) : '<div class="empty-state py-3"><i class="bi bi-clock-history"></i><p>لا يوجد نشاط مسجّل بعد لهذا الحيوان</p></div>';
    })()}
  </div>

  <!-- Health Records from global collection -->
  <div class="section-card mb-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="fw-bold mb-0"><i class="bi bi-heart-pulse-fill me-2" style="color:var(--red)"></i>السجل الصحي (${ar(healthRecs.length)})</h5>
      <div class="d-flex gap-2">
        ${can('health')&&animal.status!=='dead'?'<button class="action-btn primary sm" onclick="openAddHealthFromDetail()"><i class="bi bi-plus-lg"></i> سجل</button>':''} 
        <a href="health.html" class="action-btn sm"><i class="bi bi-arrow-left"></i> الكل</a>
      </div>
    </div>
    ${healthRecs.length===0?'<div class="text-gray text-center py-3" style="font-size:.85rem">لا توجد سجلات صحية مرتبطة بهذا الحيوان</div>':
      healthRecs.slice(0,4).map(function(r){
        var today=new Date().toISOString().slice(0,10);
        var inW=r.withdrawal_end&&r.withdrawal_end>=today;
        var dLeft=inW?Math.max(0,Math.ceil((new Date(r.withdrawal_end)-new Date())/86400000)):0;
        return'<div class="record-card" style="margin-bottom:8px">'+
          '<div class="d-flex justify-content-between align-items-start flex-wrap gap-2">'+
          '<div class="flex-grow-1">'+
            '<div class="d-flex gap-2 flex-wrap mb-1">'+
              '<span class="type-badge '+(r.status==='active'?'badge-tasmeen':'badge-tarbiya')+'">'+(r.status==='active'?'قيد العلاج':'مكتمل')+'</span>'+
              (inW?'<span class="type-badge badge-danger">سحب '+ar(dLeft)+' يوم</span>':'')+
            '</div>'+
            '<div style="font-size:.85rem"><span class="text-gray">التشخيص: </span><strong>'+(r.diagnosis||'—')+'</strong> <span class="text-gray mx-1">|</span> <span class="text-gray">الدواء: </span><strong>'+(r.medication||'—')+'</strong></div>'+
            '<small class="text-gray">'+(r.date||'—')+(r.vet_name?' | د. '+r.vet_name:'')+(r.barn?' | '+r.barn:'')+'</small>'+
          '</div></div></div>';
      }).join('')+
      (healthRecs.length>4?'<div class="text-center mt-2"><small class="text-gray">و '+ar(healthRecs.length-4)+' سجل أقدم — <a href="health.html" style="color:var(--orange)">عرض الكل</a></small></div>':'')}
  </div>

  <!-- Breeding Records -->
  ${(isFemale||breedingRecs.length>0)?'<div class="section-card mb-4">'+
    '<div class="d-flex justify-content-between align-items-center mb-3">'+
      '<h5 class="fw-bold mb-0"><i class="bi bi-diagram-2-fill me-2" style="color:var(--purple)"></i>سجلات التكاثر ('+ar(breedingRecs.length)+')</h5>'+
      '<a href="breeding.html" class="action-btn sm"><i class="bi bi-arrow-left"></i> التكاثر</a>'+
    '</div>'+
    (breedingRecs.length===0?'<div class="text-gray text-center py-3" style="font-size:.85rem">لا توجد سجلات تكاثر</div>':
      breedingRecs.slice(0,4).map(function(r){

    if(window.renderAnimalFinancialHistory) window.renderAnimalFinancialHistory(animal);

// Sprint 5, Epic 5: ONE consolidated operational summary at the top of
// the intelligence sections -- composes evaluateOperationalPriority()
// (itself pure composition over Sprint 1-4) plus one read-only fetch of
// this animal's weight_alerts (to show "Weight status" as its own
// explicit line, per this sprint's own Phase 5 requirement) -- never
// calls evaluateWeightAlert() itself, since that WRITES, and a passive
// detail-page render must never trigger a write as a side effect.
// Sprint 9: recent notifications for this specific animal. Only
// notification types that carry structured animal_id/animal_tag fields
// can be filtered this way -- honestly, that's currently just the
// Operational Priority trigger (notifications-service.js). Older
// trigger types (vaccination, breeding, inventory) embed the animal
// reference in free text, not a structured field, and correctly won't
// appear here -- not a bug, a real, named scope boundary.
// v1.2: forecast section for this animal -- Weight, Health Risk, and
// Production (where applicable) forecasts, each showing trend,
// confidence, and the exact evidence the forecast functions themselves
// return. No explanation is added here beyond what those functions
// already provide -- no fabricated narrative.
// Sprint 13 (v1.6): Financial History for this animal, admin-only
// (mirrors can('finance') everywhere else in the app). Honest about a
// real limitation confirmed in docs/features/FINANCE-DISCOVERY.md:
// finance expense records carry no animal-level link, only barn --
// so per-animal feed/medical cost is shown as a clearly-labeled
// barn-level ESTIMATE, never presented as a precise per-animal figure.
// Revenue (sold_price) is real and direct, not estimated.
// Sprint 14 (v1.7): Feed & Treatment Consumption for this animal.
// Treatments are real, per-animal (health.animal_tag is a real field).
// Feed is honestly shown at the barn level -- feed_consumption carries
// no animal-level link (docs/features/INVENTORY-DISCOVERY.md), so this
// section says "for this barn," never implying per-animal precision
// the data cannot support.
window.renderAnimalConsumption=async function(animal){
  var container=document.getElementById('animal-consumption-section');
  if(!container) return;
  try{
    var results = await Promise.all([fbGet('health'), fbGet('feed_consumption')]);
    var health=results[0]||[], consumption=results[1]||[];
    var myTreatments = health.filter(function(h){return h.animal_tag===animal.tag;})
      .sort(function(a,b){return (b.date||'').localeCompare(a.date||'');}).slice(0,5);
    var barnConsumption = animal.barn ? consumption.filter(function(c){return c.barn===animal.barn;}) : [];
    var thisMonth = new Date().toISOString().slice(0,7);
    var barnMonthKg = barnConsumption.filter(function(c){return (c.date||'').startsWith(thisMonth);}).reduce(function(s,c){return s+(+c.quantity_kg||0);},0);
    if(!myTreatments.length && !barnMonthKg) { container.innerHTML=''; return; }
    var html='<div class="wonder-card p-3 mb-3"><h6 class="fw-bold mb-2"><i class="bi bi-clipboard2-pulse me-2" style="color:var(--orange)"></i>استهلاك العلف والعلاج</h6>';
    if(myTreatments.length){
      html+='<div class="mb-2"><small class="text-gray d-block mb-1">آخر العلاجات المُسجَّلة لهذا الحيوان</small>'+
        myTreatments.map(function(h){return '<div style="font-size:.78rem">'+h.date+' — '+(h.medication||'—')+'</div>';}).join('')+'</div>';
    }
    if(animal.barn){
      html+='<div class="text-gray" style="font-size:.78rem">استهلاك علف جمالون '+animal.barn+' هذا الشهر: '+ar(Math.round(barnMonthKg))+' كجم (على مستوى الجمالون بأكمله، لا يوجد تتبّع مباشر لكل حيوان)</div>';
    }
    html+='</div>';
    container.innerHTML=html;
  }catch(e){ container.innerHTML=''; }
};

window.renderAnimalFinancialHistory=async function(animal){
  var container=document.getElementById('animal-financial-section');
  if(!container||!can('finance')) return;
  try{
    var results = await Promise.all([fbGet('finance'), fbGet('animals')]);
    var finance=results[0]||[], allAnimals=results[1]||[];
    var revenue = animal.status==='sold' && animal.sold_price ? (+animal.sold_price) : null;

    var barnAnimalCount = animal.barn ? allAnimals.filter(function(a){return a.barn===animal.barn && a.status==='alive';}).length : 0;
    var barnExpenses = animal.barn ? finance.filter(function(f){return f.type==='expense' && f.barn===animal.barn;}) : [];
    var barnFeedTotal = barnExpenses.filter(function(f){return f.category==='أعلاف ومواد تغذية';}).reduce(function(s,f){return s+(+f.amount||0);},0);
    var barnMedTotal = barnExpenses.filter(function(f){return f.category==='أدوية وتحصينات';}).reduce(function(s,f){return s+(+f.amount||0);},0);
    var estFeedPerAnimal = barnAnimalCount>0 ? barnFeedTotal/barnAnimalCount : null;
    var estMedPerAnimal = barnAnimalCount>0 ? barnMedTotal/barnAnimalCount : null;
    var estTotalCost = (estFeedPerAnimal||0)+(estMedPerAnimal||0);
    var profitEstimate = revenue!==null ? revenue-estTotalCost : null;
    var curr = (getSettings&&getSettings().currency)||'ج.م';

    var fmt=function(v){return v===null?'—':ar(Math.round(v*100)/100).toLocaleString('ar-EG')+' '+curr;};
    container.innerHTML='<div class="wonder-card p-3 mb-3"><h6 class="fw-bold mb-2"><i class="bi bi-cash-stack me-2" style="color:var(--green)"></i>التاريخ المالي</h6>'+
      '<div class="row g-2 text-center mb-2">'+
        '<div class="col-6 col-md-3"><small class="text-gray d-block">إيراد مُسجَّل</small><span class="fw-bold" style="color:var(--green)">'+fmt(revenue)+'</span></div>'+
        '<div class="col-6 col-md-3"><small class="text-gray d-block">تقدير تكلفة علف (للجمالون)</small><span class="fw-bold">'+fmt(estFeedPerAnimal)+'</span></div>'+
        '<div class="col-6 col-md-3"><small class="text-gray d-block">تقدير تكلفة دواء (للجمالون)</small><span class="fw-bold">'+fmt(estMedPerAnimal)+'</span></div>'+
        '<div class="col-6 col-md-3"><small class="text-gray d-block">تقدير الربح</small><span class="fw-bold" style="color:'+(profitEstimate!==null&&profitEstimate<0?'var(--red)':'var(--green)')+'">'+fmt(profitEstimate)+'</span></div>'+
      '</div>'+
      '<div class="text-gray" style="font-size:.72rem">الإيراد رقم حقيقي (سعر البيع المُسجَّل). تكاليف العلف/الدواء تقديرية بمتوسط مصروفات الجمالون على عدد حيواناته -- لا يوجد تتبّع تكلفة مباشر لكل حيوان في السجلات المالية الحالية.</div>'+
    '</div>';
  }catch(e){ container.innerHTML=''; }
};

window.renderAnimalForecast=async function(animalId, animalTag, barn){
  var container=document.getElementById('animal-forecast-section');
  if(!container) return;
  try{
    var TREND_LABEL={rising:'تصاعدي',declining:'تنازلي',stable:'مستقر',improving:'تحسّن'};
    var TREND_COLOR={rising:'var(--green)',declining:'var(--red)',stable:'var(--gray)',improving:'var(--green)'};
    var CONF_LABEL={high:'عالية',medium:'متوسطة',low:'منخفضة'};
    var sections=[];

    if(window.forecastWeight){
      var wf=await window.forecastWeight(animalId, animalTag);
      if(wf&&wf.trend){
        var wc=TREND_COLOR[wf.trend]||'var(--gray)';
        sections.push('<div class="wonder-card p-3 mb-2" style="border-inline-start:3px solid '+wc+'">'+
          '<div class="d-flex justify-content-between align-items-center"><strong style="font-size:.88rem">توقع الوزن</strong>'+
          '<span class="type-badge" style="background:'+wc+'22;color:'+wc+';font-size:.68rem">'+(TREND_LABEL[wf.trend]||wf.trend)+' — ثقة '+(CONF_LABEL[wf.confidence]||wf.confidence)+'</span></div>'+
          '<div class="text-gray mt-1" style="font-size:.78rem">بعد ٧ أيام: '+ar(wf.projected7)+' كجم | ١٤ يوم: '+ar(wf.projected14)+' كجم | ٣٠ يوم: '+ar(wf.projected30)+' كجم</div>'+
          '<div class="text-gray mt-1" style="font-size:.72rem">'+wf.evidence.join(' — ')+'</div></div>');
      }
    }
    if(window.forecastHealthRisk){
      var hf=await window.forecastHealthRisk(animalId, animalTag, barn, 30);
      if(hf&&hf.projectedScore>hf.currentScore){
        sections.push('<div class="wonder-card p-3 mb-2" style="border-inline-start:3px solid var(--yellow)">'+
          '<div class="d-flex justify-content-between align-items-center"><strong style="font-size:.88rem">توقع المخاطر الصحية (٣٠ يوم)</strong>'+
          '<span class="type-badge" style="background:var(--yellow)22;color:var(--yellow);font-size:.68rem">ثقة '+(CONF_LABEL[hf.confidence]||hf.confidence)+'</span></div>'+
          '<div class="text-gray mt-1" style="font-size:.78rem">الدرجة الحالية '+ar(hf.currentScore)+' ← المتوقعة '+ar(hf.projectedScore)+'/100</div>'+
          '<div class="text-gray mt-1" style="font-size:.72rem">'+hf.evidence.join(' — ')+'</div></div>');
      }
    }
    // Sprint 12 (v1.5): breeding-window prediction, reuses
    // predictBreedingWindow() verbatim -- filters its herd-wide output
    // for this specific animal, no new calculation.
    if(window.predictBreedingWindow){
      var allPreds = await window.predictBreedingWindow(null, null);
      var mine = (allPreds||[]).find(function(p){return p.animalTag===animalTag;});
      if(mine && mine.daysUntil>=0 && mine.daysUntil<=30){
        sections.push('<div class="wonder-card p-3 mb-2" style="border-inline-start:3px solid var(--purple)">'+
          '<div class="d-flex justify-content-between align-items-center"><strong style="font-size:.88rem">نافذة تكاثر متوقعة</strong>'+
          '<span class="type-badge" style="background:var(--purple)22;color:var(--purple);font-size:.68rem">ثقة '+(CONF_LABEL[mine.confidence]||mine.confidence)+'</span></div>'+
          '<div class="text-gray mt-1" style="font-size:.78rem">متوقع خلال '+ar(mine.daysUntil)+' يوم ('+mine.predictedDate+')، بناءً على متوسط دورة '+ar(mine.avgIntervalDays)+' يوم عبر '+ar(mine.birthCount)+' ولادات سابقة</div></div>');
      }
    }
    container.innerHTML = sections.length ? '<div class="mb-3"><h6 class="fw-bold mb-2"><i class="bi bi-graph-up-arrow me-2" style="color:var(--blue)"></i>التوقعات</h6>'+sections.join('')+'</div>' : '';
  }catch(e){ container.innerHTML=''; }
};

window.renderAnimalNotifications=async function(animalId, animalTag){

window.renderUnifiedPriorityDetail=async function(animalId, animalTag, barn){
  var container=document.getElementById('unified-priority-detail-section');
  if(!container||!window.evaluateOperationalPriority) return;
  try{
    var priority=await window.evaluateOperationalPriority(animalId, animalTag, barn);
    var allWeightAlerts=await fbGet('weight_alerts');
    var myActiveWeightAlerts=(allWeightAlerts||[]).filter(function(a){return a.animal_id===animalId&&a.status==='active';});
    var allTasks=await fbGet('daily_tasks');
    var myPendingTasks=(allTasks||[]).filter(function(t){return t.status!=='done'&&t.related_tag===animalTag;});

    if(!priority&&!myActiveWeightAlerts.length&&!myPendingTasks.length){ container.innerHTML=''; return; }

    var LEVEL_LABEL={critical:'حرج',high:'مرتفع',medium:'متوسط',low:'منخفض'};
    var LEVEL_COLOR={critical:'var(--red)',high:'var(--orange)',medium:'var(--yellow)',low:'var(--green)'};
    var color=priority?(LEVEL_COLOR[priority.level]||'var(--gray)'):'var(--gray)';

    var html='<div class="wonder-card p-3 mb-3" style="border:2px solid '+color+'">';
    html+='<div class="d-flex justify-content-between align-items-center mb-2">'+
      '<h6 class="fw-bold mb-0"><i class="bi bi-stars me-2" style="color:'+color+'"></i>الأولوية التشغيلية الإجمالية</h6>'+
      (priority?'<span class="type-badge" style="background:'+color+'22;color:'+color+';font-size:.78rem">'+(LEVEL_LABEL[priority.level]||priority.level)+' — '+ar(priority.score)+'/100</span>':'<span class="type-badge" style="font-size:.78rem">لا توجد إشارات</span>');
    html+='</div>';
    if(priority){
      var ENGINE_LABEL={health:'الصحة',production:'الإنتاج',tasks:'المهام'};
      var engineNames=priority.contributingEngines.map(function(e){return ENGINE_LABEL[e]||e;}).join('، ');
      html+='<div class="text-gray mb-2" style="font-size:.76rem">ثقة التوصية: '+(priority.confidence==='high'?'عالية':'متوسطة')+' — المحركات المساهمة: '+engineNames+'</div>';
    }
    // Four explicit status lines, each from an already-existing engine output.
    html+='<div class="row g-2 text-center mb-2">'+
      '<div class="col-3"><small class="text-gray d-block">الوزن</small><span style="font-weight:700;color:'+(myActiveWeightAlerts.length?'var(--red)':'var(--green)')+'">'+(myActiveWeightAlerts.length?ar(myActiveWeightAlerts.length)+' تنبيه':'سليم')+'</span></div>'+
      '<div class="col-3"><small class="text-gray d-block">الصحة</small><span style="font-weight:700;color:'+(priority&&priority.healthScore>0?'var(--red)':'var(--green)')+'">'+(priority?ar(priority.healthScore)+'/100':'سليم')+'</span></div>'+
      '<div class="col-3"><small class="text-gray d-block">الإنتاج</small><span style="font-weight:700;color:'+(priority&&priority.productionSeverity>0?'var(--red)':'var(--green)')+'">'+(priority&&priority.productionSeverity>0?'منخفض':'مستقر')+'</span></div>'+

// Sprint 4, Epic 4: full production intelligence view for this animal.
// Shows production history, trend, KPI summary, and active
// recommendations for whichever type(s) -- milk and/or wool -- this
// animal has real records for. Fetches independently -- never blocks
// renderDetail()'s own synchronous rendering.
window.renderProductionDetailSection=async function(animalId, animalTag, barn){
  var container=document.getElementById('production-intelligence-detail-section');
  if(!container||!window.evaluateProductionKPIs) return;
  try{
    var TREND_LABEL={rising:'تصاعدي',stable:'مستقر',declining:'تنازلي'};
    var TREND_COLOR={rising:'var(--green)',stable:'var(--gray)',declining:'var(--red)'};
    var sections=[];
    var types=['milk','wool'];
    for(var i=0;i<types.length;i++){
      var type=types[i];
      var kpi=await window.evaluateProductionKPIs(animalId, animalTag, type);
      if(!kpi) continue;
      var unit=type==='milk'?'لتر':'كجم';
      var typeLabel=type==='milk'?'الحليب':'الصوف';
      var trendColor=TREND_COLOR[kpi.trend]||'var(--gray)';
      var html='<div class="wonder-card p-3 mb-2" style="border-inline-start:3px solid '+(kpi.dropDetected?'var(--red)':trendColor)+'">'+
        '<div class="d-flex justify-content-between align-items-center mb-1">'+
          '<strong style="font-size:.88rem">إنتاج '+typeLabel+'</strong>'+
          '<span class="type-badge" style="background:'+trendColor+'22;color:'+trendColor+';font-size:.68rem">'+(TREND_LABEL[kpi.trend]||kpi.trend)+'</span>'+
        '</div>'+
        '<div class="text-gray" style="font-size:.78rem">المعدل الأخير (7 أيام): '+ar(Math.round(kpi.recentAverage*10)/10)+' '+unit+'/يوم'+
          (kpi.consistencyLabel?' — '+kpi.consistencyLabel:'')+
        '</div>';
      if(kpi.dropDetected){
        html+='<div class="mt-1" style="font-size:.78rem;color:var(--red)"><i class="bi bi-exclamation-triangle me-1"></i>انخفاض '+ar(Math.round(kpi.dropPct*100))+'٪ عن المعدل الأساسي ('+ar(Math.round(kpi.baselineAverage*10)/10)+' '+unit+') — يُنصح بمتابعة العامل';
        html+='</div>';

        risk.contributors.map(function(c){return '<div class="text-gray">+'+c.points+' — '+c.evidence+'</div>';}).join('')+

function calcAge(birth_date){
  if(!birth_date)return{years:0,months:0};
  const b=new Date(birth_date),n=new Date();
  let y=n.getFullYear()-b.getFullYear(),m=n.getMonth()-b.getMonth();
  if(m<0){y--;m+=12;}return{years:y,months:m};
}

window.updateEBreeds=function(){const s=getSettings();const sp=document.getElementById('e-sp').value;document.getElementById('e-breed').innerHTML=(sp==='goat'?s.goatBreeds:s.sheepBreeds).map(b=>`<option>${b}</option>`).join('');};
window.submitEditAnimal=async function(){
  const data={species:document.getElementById('e-sp').value,breed:document.getElementById('e-breed').value,gender:document.getElementById('e-gender').value,birth_date:document.getElementById('e-bdate').value||null,barn:document.getElementById('e-barn').value||null,notes:document.getElementById('e-notes').value.trim()};
  const newPurpose=document.getElementById('e-purpose').value;
  const newTag=document.getElementById('e-tag').value.trim();
  const newMotherTag=document.getElementById('e-mother-tag').value.trim();
  const newFatherTag=document.getElementById('e-father-tag').value.trim();
  closeModal();toast('جاري الحفظ...','info');
  try{
    // purpose is routed through the canonical setAnimalPurpose() service,
    // separately from this general patch, and only when it actually
    // changed -- every other field here (species, breed, gender, dates,
    // barn, notes) is unaffected by the Animal Lifecycle Service's scope
    // and stays as a normal, direct edit.
    if(newPurpose!==animal.purpose){
      var pr=await window.setAnimalPurpose({animalId:animalId, purpose:newPurpose, allowBirthTarget:newPurpose==='birth'});
      if(!pr.ok) throw new Error(pr.error);
    }
    // Tag changes route through renameTag() -- reuses the canonical
    // uniqueness check and preserves old-tag history, rather than the
    // ad-hoc check that used to sit directly in this function.
    if(newTag && newTag!==(animal.tag||'')){
      var rt=await window.renameTag({animalId:animalId, newTag:newTag});
      if(!rt.ok) throw new Error(rt.error);
    }
    // Mother/father: resolve the entered tag to a real animal and store
    // the ID-based link via linkParents(), rather than free, unvalidated
    // text. Best-effort, matching breeding.js's same pattern: an
    // unresolved tag warns, it does not block, since the parent may
    // genuinely not be registered in this system.
    if(newMotherTag!==(animal.mother_tag||'') || newFatherTag!==(animal.father_tag||'')){
      var linkOpts={animalId:animalId};
      if(newMotherTag!==(animal.mother_tag||'')){
        var mAnimal=newMotherTag?await window.findByTag(newMotherTag):null;
        if(newMotherTag && !mAnimal) toast('تنبيه: لم يتم العثور على الأم بهذا الرقم','warning');
        linkOpts.motherId=mAnimal?mAnimal._id:null;
      }
      if(newFatherTag!==(animal.father_tag||'')){
        var fAnimal=newFatherTag?await window.findByTag(newFatherTag):null;
        if(newFatherTag && !fAnimal) toast('تنبيه: لم يتم العثور على الأب بهذا الرقم','warning');
        linkOpts.fatherId=fAnimal?fAnimal._id:null;
      }
      var lr=await window.linkParents(linkOpts);
      if(!lr.ok) throw new Error(lr.error);
    }
    await fbPatch('animals',animalId,data);await logActivity('edit','animals',`تعديل #${animal.tag||animalId}`);toast('تم التعديل');animal=await fbGetSingle(`animals/${animalId}`)||animal;renderDetail(getSettings());
  }
  catch(e){toast('فشل: '+e.message,'error');}
};

// Sprint 13 (v1.6): dynamic show/hide, matching pages/finance.js's own
// updateFinCats() pattern -- price is only meaningful for a real sale.
window._toggleRemovePriceField=function(){
  var wrap=document.getElementById('r-price-wrap');
  if(wrap) wrap.style.display = document.getElementById('r-reason').value==='sale' ? '' : 'none';
};
window.submitRemoveAnimal=async function(){
  const reason=document.getElementById('r-reason').value;const date=document.getElementById('r-date').value;const notes=document.getElementById('r-notes').value.trim();
  const priceInput = document.getElementById('r-price');
  const price = (reason==='sale' && priceInput) ? (parseFloat(priceInput.value)||0) : 0;
  closeModal();toast('جاري الحفظ...','info');
  try{
    // Sale Source-of-Truth fix (Repository 5, Priority 1 follow-up): the
    // 'sale' reason previously fell into the same status:'dead' write as
    // genuine death/slaughter, matching the same broken convention already
    // repaired in performBulkSell(). Only this one branch changes — death
    // and slaughter keep their exact original update shape, untouched.
    var r;
    if(reason==='sale'){
      r=await window.sellAnimal({animalId:animalId, date:date, price:price, notes:notes||null, skipFinance:true});
    }else{
      // 'slaughter' and 'death' are both real, legitimate death-equivalent
      // outcomes (unlike an inventory correction) -- both correctly go
      // through markAnimalDead(), with the Arabic reason label preserved
      // as death_reason exactly as this page's own UI already presents it.
      r=await window.markAnimalDead({animalId:animalId, date:date, reason:reason==='slaughter'?'ذبح':'نفوق', notes:notes||null});
    }
    if(!r.ok) throw new Error(r.error);
    // Sprint 13 (v1.6): confirmed real gap (docs/features/FINANCE-DISCOVERY.md)
    // -- this exact write path created no finance record at all, unlike
    // animals.html's own sale flows. Same collection, same shape, same
    // category constant those flows already use -- no new structure.
    if(reason==='sale' && price>0){
      await window.recordIncome({date:date,category:'بيع حيوانات',amount:price,description:'بيع '+(animal.tag||animalId)+(notes?' | '+notes:''),relatedAnimal:animalId,relatedModule:'animals'});
    }
    await logActivity('remove','animals',`إخراج #${animal.tag||animalId} — ${reason==='sale'?'بيع':reason==='slaughter'?'ذبح':'نفوق'}`);
    // Sprint 11 (v1.4): closes EVERY open reminder task tied to this
    // animal (vaccination/medication/birth follow-ups it may still have
    // pending) -- confirmed as a genuine, complete automation gap
    // (docs/features/WORKFLOW-DISCOVERY.md: sale/death had zero hooks
    // before this sprint). Awaited directly (not fire-and-forget) since
    // this page navigates away shortly after.
    if(window.completeWorkflow){
      try{ await window.completeWorkflow(reason==='sale'?'sale':'death', { sourceId:animalId, animalTag:animal.tag, salePrice:price>0?price:null }); }catch(e){}
    }
    toast('تم إخراج الحيوان');
    setTimeout(()=>location.href='animals.html',1500);
  }catch(e){toast('فشل: '+e.message,'error');}
};

window.adhCalc=function(){
  var tend=document.getElementById('adh-tend').value;
  var wdays=+document.getElementById('adh-wdays').value||0;
  if(tend&&wdays>0){var dt=new Date(tend);dt.setDate(dt.getDate()+wdays);document.getElementById('adh-wdate').textContent=dt.toISOString().slice(0,10);document.getElementById('adh-wshow').style.display='block';}
  else document.getElementById('adh-wshow').style.display='none';
};

window.submitHealthFromDetail=async function(){
  var diag=document.getElementById('adh-diag').value.trim();

  if(!diag||!med){toast('يرجى إدخال التشخيص والدواء','error');return;}
  var tend=document.getElementById('adh-tend').value;
  var wdays=+document.getElementById('adh-wdays').value||0;

  var data={
    animal_id:animalId,animal_tag:animal.tag||'',animal_breed:animal.breed||'',animal_species:animal.species||'goat',
    barn:document.getElementById('adh-barn').value,date:document.getElementById('adh-date').value,

  };

    await fbPost('health',data);

};
