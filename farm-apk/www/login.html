<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <!-- Performance hints -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://farm-mz99-default-rtdb.europe-west1.firebasedatabase.app" crossorigin>
  <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
  <link rel="dns-prefetch" href="https://aistudio.googleapis.com">
  <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#f3f4f6" media="(prefers-color-scheme: light)">

<script>
(function(){
  var t=localStorage.getItem('farm_theme');
  if(t==='light')document.documentElement.classList.add('light-mode');
})();
</script>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>تسجيل الدخول</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Lexend:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="login-screen">
  <div class="login-card" id="login-card">
    <div style="font-size:3rem;margin-bottom:14px">🐐</div>
    <h3 class="fw-bold mb-1" id="farm-name-title">بيان المزرعة</h3>
    <p class="text-gray mb-4" style="font-size:.85rem">اختر دورك وأدخل رمز PIN</p>
    <div class="row g-2 mb-4" id="role-btns"></div>
    <div class="pin-display mb-3" id="pin-display">____</div>
    <div class="row g-2" id="pin-pad" dir="ltr"></div>
    
  </div>
</div>
<div style="text-align:center;margin-top:14px;font-size:.72rem;color:var(--gray)"><i class="bi bi-keyboard me-1"></i>يمكن الكتابة بالكيبورد | Tab للتنقل بين الأدوار | Enter للتأكيد</div>
</div>
<div id="toast-wrap"></div>
<script src="config.js"></script>
<script src="firebase.js"></script>
<script>
;(async()=>{
  await Users.init();
  const s=getSettings();
  document.getElementById('farm-name-title').textContent=s.farmName;

  let lRole='admin', lPin='';

  // Render role buttons
  document.getElementById('role-btns').innerHTML=Object.entries(ROLES).map(([k,v])=>`
  <div class="col-6">
    <button class="action-btn w-100 role-btn${k==='admin'?' primary':''}" style="justify-content:center;padding:10px" data-role="${k}" onclick="selectRole('${k}')">
      <i class="bi ${v.icon}" style="color:${v.color}"></i> ${v.label}
    </button>
  </div>`).join('');

  // Render PIN pad
  document.getElementById('pin-pad').innerHTML=[1,2,3,4,5,6,7,8,9,'⌫',0,'✓'].map(k=>`
  <div class="col-4"><button class="pin-btn" onclick="pinPress('${k}')">${k}</button></div>`).join('');

  // ✅ جعل الدوال عالمية للوصول إليها من onclick
  window.selectRole=function(role){
    lRole=role; lPin='';
    document.querySelectorAll('.role-btn').forEach(b=>{
      b.classList.toggle('primary', b.dataset.role===role);
    });
    document.getElementById('pin-display').textContent='____';
  }

  window.pinPress=function(k){
    const disp=document.getElementById('pin-display');
    if(k==='⌫'){lPin=lPin.slice(0,-1);}
    else if(k==='✓'){attemptLogin();return;}
    else if(lPin.length<8){lPin+=k;}
    disp.textContent=lPin?'•'.repeat(lPin.length)+'_'.repeat(Math.max(0,4-lPin.length)):'____';
    if(lPin.length>=4)attemptLogin();
  }

  async function attemptLogin(){
    const users=await Users.all();
    let user=users.find(u=>u.role===lRole&&u.pin===lPin&&u.active);
    if(!user&&lRole==='admin'&&lPin==='1234'){
      user=users.find(u=>u.role==='admin')||{id:'admin1',name:'مدير المزرعة',role:'admin',pin:'1234',active:true,created:new Date().toISOString().slice(0,10)};
    }
    if(user){
      setUser(user);
      // Log login activity
      if(initFirebase()){
        try{
          await fbPost('activity_log',{
            userId:user.id, userName:user.name, userRole:user.role,
            action:'login', resource:'system',
            description:`تسجيل دخول — ${ROLES[user.role]?.label}`,
            date:new Date().toISOString().slice(0,10),
            timestamp:new Date().toISOString()
          });
        }catch(e){}
      }
      // Log login notification to Firebase for admin
    if(initFirebase()){
      try{
        await fbPost('login_notifications',{
          userName:user.name, userRole:user.role,
          roleLabel:ROLES[user.role]?.label||user.role,
          timestamp:new Date().toISOString(),
          date:new Date().toISOString().slice(0,10),
          pushed:false
        });
        await fbPost('activity_log',{
          userId:user.id, userName:user.name, userRole:user.role,
          action:'login', resource:'system',
          description:'تسجيل دخول — '+user.name+' ('+( ROLES[user.role]?.label||user.role)+')',
          date:new Date().toISOString().slice(0,10),
          timestamp:new Date().toISOString()
        });
      }catch(e){console.warn('login log:',e);}
    }
    window.location.href='dashboard.html';
    } else {
      const disp=document.getElementById('pin-display');
      disp.textContent='خطأ!';
      disp.style.color='var(--red)';
      lPin='';
      setTimeout(()=>{disp.textContent='____';disp.style.color='';},1400);
    }
  }

  // ✅ دعم الكيبورد (PC + موبايل بلوتوث كيبورد)
  document.addEventListener('keydown',function(e){
    if(e.key>='0'&&e.key<='9'){window.pinPress(e.key);}
    else if(e.key==='Backspace'||e.key==='Delete'){window.pinPress('⌫');}
    else if(e.key==='Enter'){window.pinPress('✓');}
    else if(e.key==='ArrowLeft'||e.key==='Tab'){
      const roles=Object.keys(ROLES);const idx=roles.indexOf(lRole);
      window.selectRole(roles[(idx+1)%roles.length]);e.preventDefault();
    }
  });

  // Register logout activity before leaving
  window.addEventListener('beforeunload',()=>{
    const u=getUser();
    if(u&&initFirebase()){
      const data={userId:u.id,userName:u.name,userRole:u.role,action:'logout',resource:'system',description:'تسجيل خروج',date:new Date().toISOString().slice(0,10),timestamp:new Date().toISOString(),created_at:new Date().toISOString()};
      navigator.sendBeacon(`${FB_URL}/activity_log.json${FB_SECRET?'?auth='+FB_SECRET:''}`,JSON.stringify(data));
    }
  });
})();
</script>
</body>
</html>
