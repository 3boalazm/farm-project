<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <!-- Performance hints -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://farm-mz99-default-rtdb.europe-west1.firebasedatabase.app" crossorigin>
  <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
  <link rel="dns-prefetch" href="https://aistudio.googleapis.com">

  <meta name="theme-color" content="#f3f4f6" media="(prefers-color-scheme: light)">

<script>(function(){var t=localStorage.getItem('farm_theme');if(t==='light')document.documentElement.classList.add('light-mode');}());</script>

<title>محرك البيانات — بيان المزرعة</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
.drop-zone{border:2px dashed var(--border-2);border-radius:16px;padding:40px 20px;text-align:center;transition:.3s;cursor:pointer;background:var(--bg-2)}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--orange);background:rgba(255,107,53,.05)}
.drop-zone i{font-size:2.5rem;color:var(--text-muted);display:block;margin-bottom:12px}
.val-ok{color:var(--green)}.val-err{color:var(--red)}.val-warn{color:var(--orange)}
.map-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border-3)}
.map-row:last-child{border-bottom:none}
.map-label{min-width:130px;font-size:.8rem;font-weight:600;color:var(--text-gray)}
.map-sample{min-width:90px;font-size:.75rem;color:var(--text-muted);font-family:monospace}
.progress-step{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--border-3)}
.step-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;flex-shrink:0}
.tpl-card{background:var(--bg-3);border:1px solid var(--border);border-radius:14px;padding:16px;transition:.2s;cursor:pointer}
.tpl-card:hover{border-color:var(--border-2);transform:translateY(-2px)}
</style>
</head>
<body>
<div class="page-wrap">
  <div id="page-header"></div>
  <div id="content"><div class="text-center py-5"><div class="spinner"></div></div></div>
  <footer class="text-center text-gray mt-5 pt-4 pb-3" style="border-top:1px solid var(--border)">
    <span id="footer-year"></span> &copy; <span id="footer-farm"></span><br>
    <small style="font-size:.72rem;color:var(--text-muted)">إشراف: لواء أحمد رجب نوح | تطوير: جندي مصطفى محمد إبراهيم</small>
  </footer>
</div>
<script src="config.js"></script>
<script src="firebase.js"></script>
<script src="nav.js"></script>
<script src="shared.js"></script>
<script src="sw-register.js"></script>
<script src="offline-sync.js" defer></script>
<script src="pages/datepicker.js" defer></script>
<script src="pages/tour.js" defer></script>
<script src="import-data.js"></script>
<script>
'use strict';

var _tab      = 'import';
var _parsed   = [];   // rows from uploaded Excel
var _mapped   = {};   // colIndex → fieldName
var _validated = [];  // parsed + validation result
var _headers  = [];   // Excel column headers

document.addEventListener('DOMContentLoaded', function() {
  if (!requireAuth()) return;
  initFirebase();
  var s = getSettings();
  document.getElementById('footer-year').textContent = ar(new Date().getFullYear());
  document.getElementById('footer-farm').textContent  = s.farmName;
  renderNavbar('');
  renderPageHeader(
    '<i class="bi bi-database-fill-gear accent-text"></i> محرك الاستيراد والتصدير الذكي',
    'Smart Bulk-Data Engine', ''
  );
  renderMain();
});

// ── Main layout ───────────────────────────────────────────
function renderMain() {
  var el = document.getElementById('content');
  el.innerHTML =
    '<div class="d-flex gap-2 flex-wrap mb-4">' +
      '<button class="filter-btn' + (_tab==='import'?' active':'') + '" onclick="switchTab(\'import\')"><i class="bi bi-cloud-arrow-up-fill me-1"></i>استيراد Excel</button>' +
      '<button class="filter-btn' + (_tab==='export'?' active':'') + '" onclick="switchTab(\'export\')"><i class="bi bi-file-earmark-excel-fill me-1"></i>تصدير قوالب</button>' +
      '<button class="filter-btn' + (_tab==='initial'?' active':'') + '" onclick="switchTab(\'initial\')"><i class="bi bi-database-fill-add me-1"></i>الاستيراد الأولي</button>' +
    '</div>' +
    '<div id="tab-body"></div>';
  renderTab();
}

window.switchTab = function(t) {
  _tab = t;
  document.querySelectorAll('.filter-btn').forEach(function(b) {
    b.classList.toggle('active',
      (t==='import'  && b.textContent.includes('استيراد Excel')) ||
      (t==='export'  && b.textContent.includes('تصدير قوالب'))  ||
      (t==='initial' && b.textContent.includes('الأولي'))
    );
  });
  renderTab();
};

function renderTab() {
  var el = document.getElementById('tab-body');
  if (!el) return;
  if (_tab === 'import')  renderImportTab(el);
  if (_tab === 'export')  renderExportTab(el);
  if (_tab === 'initial') renderInitialTab(el);
}

// ══════════════════════════════════════════
//  TAB 1: EXCEL IMPORT
// ══════════════════════════════════════════
function renderImportTab(el) {
  el.innerHTML =
    '<div class="wonder-card mb-4">' +
      '<h6 class="fw-bold mb-3"><i class="bi bi-info-circle-fill accent-text me-2"></i>كيفية الاستخدام</h6>' +
      '<div class="row g-3">' +
        ['<i class="bi bi-download me-1" style="color:var(--blue)"></i>حمّل القالب من تبويب "تصدير قوالب"',
         '<i class="bi bi-pencil-fill me-1" style="color:var(--orange)"></i>عدّل البيانات في Excel (بدون إنترنت)',
         '<i class="bi bi-cloud-arrow-up-fill me-1" style="color:var(--green)"></i>ارفع الملف هنا للمراجعة والتحقق',
         '<i class="bi bi-check-circle-fill me-1" style="color:var(--green)"></i>راجع النتائج واضغط "رفع للنظام"',
        ].map(function(s,i){return '<div class="col-6 col-md-3"><div class="d-flex align-items-start gap-2"><span style="background:var(--orange);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;flex-shrink:0">'+ar(i+1)+'</span><small style="color:var(--text-sub)">'+s+'</small></div></div>';}).join('') +
      '</div>' +
    '</div>' +
    // Drop zone
    '<div class="wonder-card mb-4">' +
      '<h6 class="fw-bold mb-3"><i class="bi bi-cloud-arrow-up-fill accent-text me-2"></i>رفع ملف Excel</h6>' +
      '<div class="drop-zone" id="drop-zone" onclick="document.getElementById(\'file-input\').click()" ondragover="dzOver(event)" ondragleave="dzLeave()" ondrop="dzDrop(event)">' +
        '<i class="bi bi-file-earmark-excel-fill" style="color:#4caf50"></i>' +
        '<div class="fw-bold mb-1">اسحب ملف Excel هنا أو اضغط للاختيار</div>' +
        '<small class="text-gray">.xlsx / .xls فقط — حد أقصى 5MB</small>' +
      '</div>' +
      '<input type="file" id="file-input" accept=".xlsx,.xls" style="display:none" onchange="fileSelected(this)">' +
    '</div>' +
    // Results area
    '<div id="import-results"></div>';
}

// ── Drop zone ─────────────────────────────────────────────
window.dzOver  = function(e){e.preventDefault();document.getElementById('drop-zone').classList.add('drag-over');};
window.dzLeave = function(){document.getElementById('drop-zone').classList.remove('drag-over');};
window.dzDrop  = function(e){e.preventDefault();dzLeave();var f=e.dataTransfer.files[0];if(f)parseExcel(f);};
window.fileSelected = function(inp){if(inp.files[0])parseExcel(inp.files[0]);};

// ── Parse Excel ───────────────────────────────────────────
window.parseExcel = function(file) {
  if (!file.name.match(/\.(xlsx|xls)$/i)) { toast('يرجى رفع ملف Excel (.xlsx أو .xls)', 'error'); return; }
  if (file.size > 5 * 1024 * 1024) { toast('حجم الملف تجاوز 5MB', 'error'); return; }

  var res = document.getElementById('import-results');
  res.innerHTML = '<div class="wonder-card"><div class="text-center py-3"><div class="spinner"></div><p class="text-gray mt-2">جاري قراءة الملف...</p></div></div>';

  var reader = new FileReader();
  reader.onload = function(ev) {
    try {
      var wb = XLSX.read(ev.target.result, { type: 'binary', cellDates: true });
      var ws = wb.Sheets[wb.SheetNames[0]];
      var rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
      if (!rows || rows.length < 2) { toast('الملف فارغ أو لا يحتوي على بيانات', 'error'); return; }

      _headers = rows[0].map(function(h){ return String(h||'').trim(); });
      _parsed  = rows.slice(1).filter(function(r){ return r.some(function(c){return c!=='';});});
      _mapped  = autoMap(_headers);
      _validated = [];

      renderMappingUI(res, file.name);
    } catch(e) {
      res.innerHTML = '<div class="wonder-card"><div class="red-text"><i class="bi bi-exclamation-triangle-fill me-2"></i>خطأ في قراءة الملف: ' + e.message + '</div></div>';
    }
  };
  reader.readAsBinaryString(file);
};

// ── Auto column mapping ───────────────────────────────────
var FIELD_ALIASES = {
  species:      ['النوع','species','type','kind'],
  breed:        ['السلالة','breed','الصنف','نوع السلالة'],
  gender:       ['الجنس','gender','sex'],
  purpose:      ['الغرض','purpose','غرض','هدف'],
  status:       ['الحالة','status','state'],
  tag:          ['الترقيم','tag','رقم','id','ear_tag','رقم الترقيم','الترقيم/الرقم'],
  barn:         ['الجمالون','barn','العنبر','القسم','section'],
  birth_date:   ['تاريخ الميلاد','birth_date','birthdate','تاريخ_الميلاد','دوب','dob'],
  current_weight:['الوزن','weight','current_weight','وزن'],
  notes:        ['ملاحظات','notes','note'],
};

function autoMap(headers) {
  var map = {};
  headers.forEach(function(h, idx) {
    var hn = h.toLowerCase().trim();
    Object.keys(FIELD_ALIASES).forEach(function(field) {
      FIELD_ALIASES[field].forEach(function(alias) {
        if (hn === alias.toLowerCase() || hn.includes(alias.toLowerCase())) {
          if (!Object.values(map).includes(field)) map[idx] = field;
        }
      });
    });
  });
  return map;
}

// ── Mapping UI ────────────────────────────────────────────
function renderMappingUI(res, fileName) {
  var fieldLabels = {
    species:'النوع (goat/sheep)*', breed:'السلالة*', gender:'الجنس (male/female)*',
    purpose:'الغرض (tarbiya/tasmeen/birth)*', status:'الحالة (alive/dead)',
    tag:'رقم الترقيم', barn:'الجمالون/العنبر', birth_date:'تاريخ الميلاد',
    current_weight:'الوزن (كجم)', notes:'ملاحظات',
  };
  var sample = _parsed[0] || [];

  res.innerHTML =
    '<div class="wonder-card mb-4">' +
      '<div class="d-flex justify-content-between align-items-center mb-3">' +
        '<h6 class="fw-bold mb-0"><i class="bi bi-diagram-3-fill accent-text me-2"></i>ربط الأعمدة</h6>' +
        '<small class="text-gray">' + fileName + ' — ' + ar(_parsed.length) + ' صف</small>' +
      '</div>' +
      '<p class="text-gray" style="font-size:.82rem;margin-bottom:12px">تأكد من صحة الربط بين أعمدة الملف وحقول النظام:</p>' +
      Object.keys(fieldLabels).map(function(field) {
        var currentCol = Object.keys(_mapped).find(function(k){ return _mapped[k] === field; });
        var sampleVal  = currentCol !== undefined ? (sample[+currentCol] || '') : '';
        return '<div class="map-row">' +
          '<div class="map-label">' + fieldLabels[field] + '</div>' +
          '<select class="field mb-0" style="flex:1;height:32px;padding:0 8px;font-size:.8rem" onchange="updateMap(' + Object.keys(fieldLabels).indexOf(field) + ',this.value,\'' + field + '\')">' +
            '<option value="">— تجاهل —</option>' +
            _headers.map(function(h, i) {
              return '<option value="' + i + '"' + (i === +currentCol ? ' selected' : '') + '>' + h + '</option>';
            }).join('') +
          '</select>' +
          '<div class="map-sample">' + (sampleVal ? '<span class="text-gray" style="font-size:.72rem">مثال: ' + String(sampleVal).slice(0,14) + '</span>' : '') + '</div>' +
        '</div>';
      }).join('') +
      '<div class="d-flex gap-2 justify-content-end mt-3">' +
        '<button class="action-btn" onclick="renderImportTab(document.getElementById(\'import-results\'))">إلغاء</button>' +
        '<button class="action-btn primary" onclick="runValidation()"><i class="bi bi-shield-check me-1"></i>تحقق من البيانات</button>' +
      '</div>' +
    '</div>';
}

window.updateMap = function(idx, colVal, field) {
  // Remove old mapping for this field
  Object.keys(_mapped).forEach(function(k){ if(_mapped[k]===field) delete _mapped[k]; });
  if (colVal !== '') _mapped[+colVal] = field;
};

// ── Validation ────────────────────────────────────────────
var ENUMS = {
  species:  ['goat','sheep','ماعز','أغنام'],
  gender:   ['male','female','ذكر','أنثى'],
  purpose:  ['tarbiya','tasmeen','birth','تربية','تسمين','مواليد'],
  status:   ['alive','dead','حي','نافق',''],
};
var NORM = {
  species:  {goat:'goat',sheep:'sheep','ماعز':'goat','أغنام':'sheep'},
  gender:   {male:'male',female:'female','ذكر':'male','أنثى':'female'},
  purpose:  {tarbiya:'tarbiya',tasmeen:'tasmeen',birth:'birth','تربية':'tarbiya','تسمين':'tasmeen','مواليد':'birth'},
  status:   {alive:'alive',dead:'dead','حي':'alive','نافق':'dead','':'alive'},
};

window.runValidation = function() {
  var res = document.getElementById('import-results');
  // Check required fields mapped
  var required = ['species','breed','gender','purpose'];
  var missing  = required.filter(function(f){ return !Object.values(_mapped).includes(f); });
  if (missing.length) {
    toast('يرجى ربط الحقول الإلزامية: ' + missing.join(', '), 'error');
    return;
  }

  _validated = _parsed.map(function(row, ri) {
    var errors = [], warnings = [];
    var data = {};

    // Extract mapped fields
    Object.keys(_mapped).forEach(function(colIdx) {
      var field = _mapped[colIdx];
      var val   = String(row[+colIdx] || '').trim();

      // Normalize enums
      if (NORM[field]) {
        var norm = NORM[field][val] || NORM[field][val.toLowerCase()];
        if (norm !== undefined) val = norm;
        else if (ENUMS[field] && !ENUMS[field].includes(val) && val !== '') {
          errors.push(field + ': قيمة غير صالحة "' + val + '"');
        }
      }

      // Date format
      if (field === 'birth_date' && val) {
        if (val instanceof Date) { val = val.toISOString().slice(0,10); }
        else if (!/^\d{4}-\d{2}-\d{2}$/.test(val)) {
          // Try to parse
          var d = new Date(val);
          if (!isNaN(d)) val = d.toISOString().slice(0,10);
          else { warnings.push('تاريخ الميلاد بصيغة غير معروفة: ' + val); val = ''; }
        }
      }

      // Weight
      if (field === 'current_weight' && val) {
        var w = parseFloat(val);
        if (isNaN(w) || w <= 0 || w > 500) { warnings.push('وزن غير منطقي: ' + val); val = ''; }
        else val = w;
      }

      if (val !== '') data[field] = val;
    });

    // Required check
    if (!data.species) errors.push('النوع مطلوب');
    if (!data.breed)   errors.push('السلالة مطلوبة');
    if (!data.gender)  errors.push('الجنس مطلوب');
    if (!data.purpose) errors.push('الغرض مطلوب');

    // Defaults
    if (!data.status) data.status = 'alive';

    return { row: ri + 2, data: data, errors: errors, warnings: warnings, ok: errors.length === 0 };
  });

  renderValidationResults(res);
};

// ── Validation Results ────────────────────────────────────
function renderValidationResults(res) {
  var okRows  = _validated.filter(function(r){ return r.ok; });
  var errRows = _validated.filter(function(r){ return !r.ok; });
  var warnRows= _validated.filter(function(r){ return r.ok && r.warnings.length; });

  var summary =
    '<div class="wonder-card mb-4">' +
      '<h6 class="fw-bold mb-3"><i class="bi bi-shield-check accent-text me-2"></i>نتائج التحقق</h6>' +
      '<div class="row g-3 mb-3">' +
        [{l:'صالحة للرفع',v:okRows.length,c:'var(--green)',i:'bi-check-circle-fill'},
         {l:'بها أخطاء',v:errRows.length,c:'var(--red)',i:'bi-x-circle-fill'},
         {l:'تحذيرات',v:warnRows.length,c:'var(--orange)',i:'bi-exclamation-triangle-fill'},
         {l:'الإجمالي',v:_validated.length,c:'var(--gray)',i:'bi-table'},
        ].map(function(k){return '<div class="col-6 col-md-3"><div class="summary-card"><i class="bi '+k.i+' d-block mb-2" style="color:'+k.c+';font-size:1.2rem"></i><div class="summary-number" style="color:'+k.c+'">'+ar(k.v)+'</div><small class="text-gray">'+k.l+'</small></div></div>';}).join('') +
      '</div>' +

      // Progress bar
      '<div class="finance-bar mb-3" style="height:10px">' +
        '<div class="finance-bar-fill" style="width:' + Math.round(okRows.length/_validated.length*100) + '%;background:var(--green)"></div>' +
      '</div>' +

      (errRows.length ?
        '<div class="mb-3"><div class="fw-bold red-text mb-2"><i class="bi bi-x-circle-fill me-2"></i>صفوف بها أخطاء (يجب تصحيحها):</div>' +
        errRows.slice(0,5).map(function(r){return '<div style="background:rgba(244,67,54,.06);border:1px solid rgba(244,67,54,.2);border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:.8rem"><span class="fw-bold red-text">صف '+ar(r.row)+':</span> '+r.errors.join(' | ')+'</div>';}).join('') +
        (errRows.length>5?'<small class="text-gray">+ '+ar(errRows.length-5)+' صف بأخطاء أخرى</small>':'') +
        '</div>' : '') +

      (warnRows.length ?
        '<div class="mb-3"><div class="fw-bold" style="color:var(--orange)" ><i class="bi bi-exclamation-triangle-fill me-2"></i>تحذيرات (سيتم تجاهل الحقول المتأثرة):</div>' +
        warnRows.slice(0,3).map(function(r){return '<div class="text-gray" style="font-size:.8rem;padding:4px 0">صف '+ar(r.row)+': '+r.warnings.join(' | ')+'</div>';}).join('') +
        '</div>' : '') +

      '<div class="d-flex gap-2 flex-wrap">' +
        '<button class="action-btn" onclick="runValidation()"><i class="bi bi-arrow-repeat me-1"></i>إعادة التحقق</button>' +
        (okRows.length > 0 ?
          '<button class="action-btn primary" onclick="startExcelImport()"><i class="bi bi-cloud-arrow-up-fill me-1"></i>رفع ' + ar(okRows.length) + ' صف للنظام</button>' : '') +
        '<button class="action-btn danger" onclick="renderImportTab(document.getElementById(\'import-results\'))"><i class="bi bi-x-lg me-1"></i>إلغاء</button>' +
      '</div>' +
    '</div>';

  // Preview table
  var preview =
    '<div class="wonder-card mb-4">' +
      '<h6 class="fw-bold mb-3"><i class="bi bi-table accent-text me-2"></i>معاينة البيانات</h6>' +
      '<div class="table-responsive" style="max-height:320px;overflow-y:auto"><table class="tbl" style="font-size:.76rem">' +
        '<thead><tr>' +
          '<th>#</th><th>الحالة</th>' +
          Object.values(_mapped).map(function(f){return '<th>'+f+'</th>';}).join('') +
        '</tr></thead><tbody>' +
        _validated.slice(0,15).map(function(r){
          var ico = r.errors.length ? '❌' : r.warnings.length ? '⚠️' : '✅';
          return '<tr style="'+(r.errors.length?'background:rgba(244,67,54,.04)':r.warnings.length?'background:rgba(255,193,7,.04)':'')+'">'+
            '<td class="text-gray">' + ar(r.row) + '</td>' +
            '<td title="'+(r.errors.join(' | ')||r.warnings.join(' | '))+'">' + ico + '</td>' +
            Object.values(_mapped).map(function(f){return '<td>'+(r.data[f]!==undefined?r.data[f]:'<span class="text-muted">—</span>')+'</td>';}).join('') +
          '</tr>';
        }).join('') +
        (_validated.length > 15 ? '<tr><td colspan="20" class="text-center text-gray" style="padding:8px">+ ' + ar(_validated.length-15) + ' صف...</td></tr>' : '') +
      '</tbody></table></div>' +
    '</div>';

  res.innerHTML = summary + preview;
}

// ── Excel Import to Firebase ──────────────────────────────
window.startExcelImport = async function() {
  if (!confirm('رفع ' + ar(_validated.filter(function(r){return r.ok;}).length) + ' سجل لقاعدة البيانات؟')) return;

  var validRows = _validated.filter(function(r){ return r.ok; });
  var res       = document.getElementById('import-results');
  var total     = validRows.length;
  var ok = 0, failed = 0;

  res.innerHTML =
    '<div class="wonder-card">' +
      '<h6 class="fw-bold mb-3"><i class="bi bi-cloud-arrow-up-fill accent-text me-2"></i>جاري الرفع...</h6>' +
      '<div class="d-flex justify-content-between mb-1"><span class="text-gray" id="xl-status">بدء الرفع...</span><span id="xl-pct" class="fw-bold">0٪</span></div>' +
      '<div class="progress-wonder"><div class="progress-bar-wonder" id="xl-bar" style="width:0%;transition:width .2s"></div></div>' +
      '<div id="xl-result" class="mt-3"></div>' +
    '</div>';

  var status = document.getElementById('xl-status');
  var bar    = document.getElementById('xl-bar');
  var pct    = document.getElementById('xl-pct');

  for (var i = 0; i < total; i++) {
    var data = Object.assign({}, validRows[i].data, {
      created_at:  new Date().toISOString(),
      imported_at: new Date().toISOString(),
    });
    try {
      await fbPost('animals', data);
      ok++;
    } catch(e) {
      failed++;
      console.error('Import row failed:', e.message);
    }
    var p = Math.round((i+1)/total*100);
    bar.style.width  = p + '%';
    pct.textContent  = ar(p) + '٪';
    status.textContent = 'جاري الرفع... ' + ar(i+1) + ' / ' + ar(total);
  }

  await logActivity('add', 'animals', 'استيراد Excel: ' + ar(ok) + ' حيوان' + (failed?' — فشل: '+ar(failed):''));

  document.getElementById('xl-result').innerHTML =
    '<div style="background:' + (failed ? 'rgba(255,107,53,.1)' : 'rgba(0,230,118,.1)') + ';border:1px solid ' + (failed ? 'rgba(255,107,53,.3)' : 'rgba(0,230,118,.3)') + ';border-radius:12px;padding:14px 18px">' +
      '<div class="fw-bold ' + (failed ? 'accent-text' : 'green-text') + '">' +
        (failed ? '⚠️' : '✅') + ' تم رفع ' + ar(ok) + ' سجل' + (failed?' (فشل: '+ar(failed)+')':'') +
      '</div>' +
      '<div class="d-flex gap-2 mt-3">' +
        '<a href="animals.html" class="action-btn primary"><i class="bi bi-list-ul me-1"></i>عرض القطيع</a>' +
        '<a href="dashboard.html" class="action-btn"><i class="bi bi-house-fill me-1"></i>الرئيسية</a>' +
      '</div>' +
    '</div>';
};

// ── Download template ─────────────────────────────────────
window.downloadTemplate = function(id) {
  if (!window.XLSX) { toast('مكتبة Excel غير متاحة', 'error'); return; }
  var tpl = (window._tplDefs || []).find(function(t){ return t.id === id; });
  if (!tpl) return;
  var wb = XLSX.utils.book_new();
  var ws = XLSX.utils.aoa_to_sheet([tpl.cols, ...tpl.sample]);
  ws['!cols'] = tpl.cols.map(function(){ return { wch: 18 }; });
  XLSX.utils.book_append_sheet(wb, ws, 'البيانات');
  // Instructions sheet
  var instr = XLSX.utils.aoa_to_sheet([
    ['تعليمات استخدام القالب'],
    [''],
    ['١. لا تغيّر أسماء الأعمدة في الصف الأول'],
    ['٢. أضف بياناتك من الصف الثاني فصاعداً'],
    ['٣. احفظ الملف بصيغة .xlsx'],
    ['٤. ارفع الملف في صفحة "استيراد Excel"'],
    [''],
    ['الحقول الإلزامية: ' + tpl.cols.slice(0,3).join('، ')],
  ]);
  XLSX.utils.book_append_sheet(wb, instr, 'تعليمات');
  XLSX.writeFile(wb, 'template-' + id + '-' + todayStr() + '.xlsx');
  toast('تم تحميل قالب ' + tpl.title);
};

// ── Export current data ───────────────────────────────────
window.exportCurrentData = async function() {
  toast('جاري التصدير...', 'info');
  try {
    var [animals, health, breeding, finance, vaccines, meds, feeds] = await Promise.all([
      fbGet('animals'), fbGet('health'), fbGet('breeding'), fbGet('finance'),
      fbGet('vaccinations'), fbGet('inventory_meds'), fbGet('inventory_feeds'),
    ]);
    var s  = getSettings();
    var wb = XLSX.utils.book_new();
    var addSheet = function(name, header, rows) {
      var ws = XLSX.utils.aoa_to_sheet([header, ...rows]);
      ws['!cols'] = header.map(function(){ return { wch: 15 }; });
      XLSX.utils.book_append_sheet(wb, ws, name);
    };
    addSheet('القطيع',
      ['النوع','السلالة','الجنس','الغرض','الحالة','الترقيم','الجمالون','تاريخ الميلاد','الوزن','تاريخ الإضافة'],
      (animals||[]).map(function(a){return[a.species||'',a.breed||'',a.gender||'',a.purpose||'',a.status||'',a.tag||'',a.barn||'',a.birth_date||'',a.current_weight||'',(a.created_at||'').slice(0,10)];}));
    addSheet('السجل الصحي',
      ['الترقيم','السلالة','النوع','التاريخ','التشخيص','الدواء','الجرعة','أيام التأثير','انتهاء التأثير','الحالة','الطبيب'],
      (health||[]).map(function(r){return[r.animal_tag||'',r.animal_breed||'',r.animal_species||'',r.date||'',r.diagnosis||'',r.medication||'',r.dosage||'',r.withdrawal_days||0,r.withdrawal_end||'',r.status||'',r.vet_name||''];}));
    addSheet('التكاثر',
      ['ترقيم الأنثى','السلالة','ترقيم الذكر','سلالة الذكر','تاريخ التقريع','الولادة المتوقعة','الحالة','المواليد'],
      (breeding||[]).map(function(r){return[r.female_tag||r.mother_tag||'',r.female_breed||'',r.male_tag||'',r.male_breed||'',r.mating_date||'',r.expected_birth||'',r.status||'',r.offspring_count||0];}));
    if (can('finance')) addSheet('المالية',
      ['التاريخ','النوع','الفئة','الوصف','المبلغ'],
      (finance||[]).map(function(r){return[r.date||'',r.type||'',r.category||'',r.description||'',r.amount||0];}));
    addSheet('التحصين',
      ['التحصين','القسم','العدد','الحالة','الموعد','التنفيذ'],
      (vaccines||[]).map(function(v){return[v.name||'',v.target_section||'',v.count||0,v.status||'',v.scheduled_date||'',v.done_date||''];}));
    addSheet('المخزون - أدوية',
      ['الصنف','الكمية','الوحدة','الحد الأدنى','تاريخ الانتهاء'],
      (meds||[]).map(function(m){return[m.name||'',m.quantity||0,m.unit||'',m.min_quantity||0,m.expiry||''];}));
    addSheet('المخزون - أعلاف',
      ['الصنف','الكمية','الوحدة','الحد الأدنى'],
      (feeds||[]).map(function(f){return[f.name||'',f.quantity||0,f.unit||'',f.min_quantity||0];}));
    XLSX.writeFile(wb, 'farm-export-' + todayStr() + '.xlsx');
    await logActivity('export', 'data', 'تصدير شامل لكل بيانات المزرعة');
    toast('تم التصدير ✓');
  } catch(e) {
    toast('خطأ في التصدير: ' + e.message, 'error');
  }
};

window.startInitialImport = async function() {
  if (!confirm('هل أنت متأكد من استيراد ٤٤٠ حيوان؟\n\nتأكد أن قاعدة البيانات فارغة أو جديدة.')) return;
  var btn    = document.getElementById('init-btn');
  var prog   = document.getElementById('init-progress');
  var result = document.getElementById('init-result');
  var status = document.getElementById('init-status');
  var bar    = document.getElementById('init-bar');
  var pct    = document.getElementById('init-pct');

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="width:18px;height:18px;border-width:2px;display:inline-block;margin-left:8px"></div> جاري الاستيراد...';
  prog.style.display = 'block';

  var ok = 0, failed = 0, total = FARM_ANIMALS.length;
  for (var i = 0; i < total; i++) {
    var a = Object.assign({}, FARM_ANIMALS[i], { created_at: new Date().toISOString(), imported_at: new Date().toISOString() });
    try { await fbPost('animals', a); ok++; } catch(e) { failed++; }
    var p = Math.round((i+1)/total*100);
    bar.style.width = p + '%';
    pct.textContent = ar(p) + '٪';
    status.textContent = 'جاري الاستيراد... ' + ar(i+1) + ' / ' + ar(total);
  }
  await logActivity('add', 'animals', 'استيراد بيانات المزرعة: ' + ar(ok) + ' حيوان (' + ar(failed) + ' فشل)');
  result.style.display = 'block';
  result.innerHTML = '<div style="background:' + (ok===total?'rgba(0,230,118,.1)':'rgba(255,107,53,.1)') + ';border:1px solid ' + (ok===total?'rgba(0,230,118,.3)':'rgba(255,107,53,.3)') + ';border-radius:12px;padding:14px 18px;font-weight:700"><i class="bi bi-' + (ok===total?'check-circle-fill me-2" style="color:var(--green)'>✅':'exclamation-circle-fill me-2" style="color:var(--orange)">⚠️') + ' تم استيراد ' + ar(ok) + (failed?' من '+ar(total)+'<br><span class="text-gray fw-normal">فشل: '+ar(failed)+'</span>':'') + '</div>';
  btn.innerHTML = '<i class="bi bi-check-circle-fill me-2"></i>تم الاستيراد';
  setTimeout(function(){ location.href = 'animals.html'; }, 2000);
};
