<!-- weight helpers -->
<script>
function renderWeightTable(wts){
  if(!wts||!wts.length)return'<div class="text-gray text-center py-3" style="font-size:.85rem">لا توجد أوزان مسجّلة</div>';
  var sorted=[...wts].sort(function(a,b){return(a.date||"").localeCompare(b.date||"");});
  var maxW=Math.max.apply(null,sorted.map(function(w){return+w.weight||0;}));
  var show=sorted.slice(-8);
  var chartHtml='<div style="display:flex;align-items:flex-end;gap:5px;height:65px;margin:10px 0 6px;padding:0 2px">';
  show.forEach(function(w){
    var pct=maxW>0?Math.round(((+w.weight||0)/maxW)*100):0;
    chartHtml+='<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px">'+
      '<div style="font-size:.58rem;color:var(--text-gray)">'+ar(+(w.weight||0).toFixed?+w.weight:0)+'</div>'+
      '<div style="width:100%;height:'+Math.max(4,Math.round(pct*0.5))+'px;background:linear-gradient(180deg,var(--orange),#ff8a65);border-radius:4px 4px 0 0"></div>'+
      '<div style="font-size:.55rem;color:var(--text-muted);white-space:nowrap">'+((w.date||"").slice(5)||"")+'</div>'+
    '</div>';
  });
  chartHtml+='</div>';
  var last=+wts[0].weight||0,first=+wts[wts.length-1].weight||0,gain=Math.max(0,last-first);
  var statsHtml='<div class="row g-2 mb-3">'+
    [["آخر وزن",ar(last)+" كجم","var(--green)"],["أول وزن",ar(first)+" كجم","var(--blue)"],
     ["الزيادة",ar(+gain.toFixed(1))+" كجم","var(--orange)"],["قياسات",ar(wts.length),"var(--gray)"]]
    .map(function(x){return'<div class="col-6 col-md-3"><div class="stat-mini"><div class="num" style="color:'+x[2]+'">'+x[1]+'</div><div class="lbl">'+x[0]+'</div></div></div>';}).join("")+"</div>";
  var rows=wts.map(function(w,i){
    var prev=wts[i+1];var diff=prev?parseFloat(((+w.weight||0)-(+prev.weight||0)).toFixed(1)):0;
    return'<tr><td class="text-gray">'+( w.date||"—")+'</td>'+
      '<td class="fw-bold green-text">'+ar(+w.weight||0)+' كجم</td>'+
      '<td class="'+( diff>0?"green-text":diff<0?"red-text":"text-gray")+'">'+( diff!==0?(diff>0?"+":"")+ar(Math.abs(diff)):"-")+'</td>'+
      '<td class="text-gray" style="font-size:.78rem">'+( w.notes||"—")+'</td>'+
      '<td>'+( can("animals")? '<button class="icon-btn del" onclick="delWeight(\''+ w._id+'\')" title="حذف"><i class="bi bi-trash"></i></button>'  :"")+'</td></tr>';
  }).join("");
  return statsHtml+chartHtml+
    '<div class="table-responsive"><table class="data-table"><thead><tr>'+
      '<th>التاريخ</th><th>الوزن</th><th>الفارق</th><th>ملاحظات</th><th></th>'+
    '</tr></thead><tbody>'+rows+'</tbody></table></div>';
}
</script>
<script src="config.js"></script>
<script src="firebase.js"></script>

<script>
'use strict';
let animal={}, offspring=[], vaccinations=[], medications=[], weights=[], healthRecs=[], breedingRecs=[];
const params=new URLSearchParams(location.search);
const animalId=params.get('id');

document.addEventListener('DOMContentLoaded',async()=>{
  if(!requireAuth())return;
  initFirebase();
  const s=getSettings();
  document.getElementById('footer-year').textContent=ar(new Date().getFullYear());
  document.getElementById('footer-farm').textContent=s.farmName;
  renderNavbar('animals.html');

  if(!animalId){
    document.getElementById('content').innerHTML=`<div class="empty-state"><i class="bi bi-exclamation-triangle"></i><p>لم يتم تحديد الحيوان</p><a href="animals.html" class="action-btn">رجوع</a></div>`;
    return;
  }

  renderLoading(document.getElementById('content'));
  try{
    // Use fbGetSingle for direct object fetch (not array)
    animal=await fbGetSingle(`animals/${animalId}`)||{};
    if(!animal.species){
      // Try from list as fallback
      const allAnimals=await fbGet('animals');
      const found=allAnimals.find(a=>a._id===animalId);
      if(found){animal=found;}
    }
    const [off,vacc,meds,wts,healthAll,breedingAll]=await Promise.all([
      fbGet(`animals/${animalId}/offspring`),
      fbGet(`animals/${animalId}/vaccinations`),
      fbGet(`animals/${animalId}/medications`),
      fbGet(`animals/${animalId}/weights`),
      fbGet('health'),
      fbGet('breeding')
    ]);
    offspring=off||[];vaccinations=vacc||[];medications=meds||[];
    weights=(wts||[]).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    var atag=animal.tag||'';
    healthRecs=(healthAll||[]).filter(function(r){return r.animal_tag===atag||r.animal_id===animalId;}).sort(function(a,b){return(b.date||'').localeCompare(a.date||'');});
    breedingRecs=(breedingAll||[]).filter(function(r){return r.female_tag===atag||r.male_tag===atag||r.mother_tag===atag;}).sort(function(a,b){return(b.mating_date||'').localeCompare(a.mating_date||'');});
    renderDetail(s);
  }catch(e){
    renderEmpty(document.getElementById('content'),'bi-exclamation-triangle','خطأ في تحميل البيانات: '+e.message,`<a href="animals.html" class="action-btn primary">العودة للقائمة</a>`);
    toast('خطأ: '+e.message,'error');
  }
});

function renderDetail(s){
  const age=calcAge(animal.birth_date);
  const isFemale=animal.gender==='female';
  const pregnancyStatus=animal.pregnancy_status||'empty';
  const el=document.getElementById('content');

  // Breadcrumb back link (used both by the new page header below and, for
  // colour-per-species, kept as data here rather than duplicated)
  const backSectionLabel=animal.species==='goat'?'الماعز':'الأغنام';
  const backSectionHref=animal.species==='goat'?'goats.html':'sheep.html';

  // ── Migrated to renderPageHeaderV2 (Dashboard v2 architecture) ──
  // Replaces the hand-rolled breadcrumb <div> this page used to render
  // directly into #content — same component, same breadcrumb pattern
  // already used by animals.html and dashboard.html, just with this
  // page's own species-specific middle crumb.
  renderPageHeaderV2({
    title: `${animal.breed||'—'} ${animal.tag?'<span class="type-badge badge-gray" style="font-size:.8rem">#'+animal.tag+'</span>':''}`,
    breadcrumb: [
      {label:'القطيع', href:'animals.html'},
      {label:backSectionLabel, href:backSectionHref},
      {label:(animal.breed||'—')+(animal.tag?' #'+animal.tag:'')}
    ]
  });

  el.innerHTML=`
  <!-- Profile Header -->
  <div class="section-card mb-4" style="background:linear-gradient(135deg,rgba(255,107,53,.08),rgba(0,0,0,0));border-color:rgba(255,107,53,.2)">
    <div class="d-flex justify-content-between align-items-start flex-wrap gap-3">
      <div class="d-flex align-items-center gap-3">
        <div style="font-size:4rem;line-height:1">${animal.species==='goat'?'🐐':'🐑'}</div>
        <div>
          <h3 class="fw-bold mb-1">${animal.breed||'غير معروف'} ${animal.tag?`<span class="type-badge badge-gray" style="font-size:.8rem">#${animal.tag}</span>`:''}</h3>
          <div class="d-flex gap-2 flex-wrap">
            <span class="type-badge ${animal.purpose==='tasmeen'?'badge-tasmeen':animal.purpose==='birth'?'badge-blue':'badge-tarbiya'}">${{tarbiya:'تربية',tasmeen:'تسمين',birth:'مواليد'}[animal.purpose]||animal.purpose||'—'}</span>
            <span class="type-badge ${animal.status==='alive'?'badge-tarbiya':'badge-danger'}">${animal.status==='alive'?'حي':'نافق'}</span>
            ${isFemale?`<span class="type-badge ${pregnancyStatus==='pregnant'?'badge-blue':pregnancyStatus==='inseminated'?'badge-yellow':pregnancyStatus==='with_kid'?'badge-tarbiya':'badge-gray'}">${getPregnancyLabel(pregnancyStatus)}</span>`:''}
            ${animal.barn?`<span class="type-badge badge-gray"><i class="bi bi-building me-1" style="font-size:.65rem"></i>${animal.barn}</span>`:''}
          </div>
        </div>
      </div>
      ${can('animals')&&animal.status==='alive'?`
      <div class="dropdown">
        <button class="action-btn" data-bs-toggle="dropdown"><i class="bi bi-three-dots-vertical"></i> إجراءات</button>
        <ul class="dropdown-menu dropdown-menu-start" style="background:#1e1e1e;border:1px solid #333;border-radius:14px;padding:8px">
          <li><button class="dropdown-item" style="color:var(--light);border-radius:8px;padding:8px 14px" onclick="openEditAnimal()"><i class="bi bi-pencil me-2" style="color:var(--blue)"></i>تعديل البيانات</button></li>
          <li><button class="dropdown-item" style="color:var(--light);border-radius:8px;padding:8px 14px" onclick="openAddVaccination()"><i class="bi bi-shield-check me-2" style="color:var(--green)"></i>إضافة تطعيم</button></li>
          <li><button class="dropdown-item" style="color:var(--light);border-radius:8px;padding:8px 14px" onclick="openAddMedication()"><i class="bi bi-capsule me-2" style="color:var(--yellow)"></i>إضافة دواء</button></li>
          ${isFemale?`
          <li><button class="dropdown-item" style="color:var(--light);border-radius:8px;padding:8px 14px" onclick="openUpdatePregnancy()"><i class="bi bi-heart-pulse me-2" style="color:var(--purple)"></i>تحديث الحالة التناسلية</button></li>
          <li><button class="dropdown-item" style="color:var(--light);border-radius:8px;padding:8px 14px" onclick="openAddOffspring()"><i class="bi bi-stars me-2" style="color:var(--yellow)"></i>تسجيل مولود</button></li>`:''}
          <li><hr style="border-color:#333;margin:6px 10px"></li>
          <li><button class="dropdown-item" style="color:var(--red);border-radius:8px;padding:8px 14px" onclick="openRemoveAnimal()"><i class="bi bi-trash me-2"></i>إخراج من القطيع</button></li>
        </ul>
      </div>`:can('animals')?`<a href="animals.html" class="action-btn"><i class="bi bi-arrow-right"></i> رجوع</a>`:''}
    </div>
  </div>

  <!-- Stats Row — migrated to renderKPICard (Dashboard v2 architecture),
       same component already used on dashboard.html and animals.html -->
  <div class="row g-3 mb-4">
    <div class="col-6 col-md-3">${renderKPICard({ label:'مواليد مسجّلة', value: ar(offspring.length), status:'normal' })}</div>
    <div class="col-6 col-md-3">${renderKPICard({ label:'تطعيمات', value: ar(vaccinations.length), status:'normal' })}</div>
    <div class="col-6 col-md-3">${renderKPICard({ label:'أدوية', value: ar(medications.length), status: medications.length>0?'watch':'normal' })}</div>
    <div class="col-6 col-md-3">${renderKPICard({ label:'العمر', value: age.years>0?ar(age.years)+' سنة':ar(age.months)+' شهر', status:'normal' })}</div>
  </div>

  <!-- Info Grid -->
  <div class="row g-3 mb-4">
    ${[['النوع',animal.species==='goat'?'🐐 ماعز':'🐑 أغنام'],['السلالة',animal.breed||'—'],['الجنس',animal.gender==='male'?'♂ ذكر':'♀ أنثى'],['الغرض',{tarbiya:'تربية',tasmeen:'تسمين',birth:'مواليد'}[animal.purpose]||'—'],['العمر',age.years>0?ar(age.years)+' سنة و '+ar(age.months)+' شهر':ar(age.months)+' شهر'],['تاريخ الميلاد',animal.birth_date||'غير محدد'],['رقم الترقيم',animal.tag||'—'],['الجمالون/العنبر',animal.barn||'غير محدد'],['الأم',animal.mother_tag?`#${animal.mother_tag} ${animal.mother_breed?'('+animal.mother_breed+')':''}` :'—'],['الأب',animal.father_tag?`#${animal.father_tag}` :'—']].map(([k,v])=>`<div class="col-md-3 col-6"><div class="info-card"><div class="info-label">${k}</div><div class="info-value">${v}</div></div></div>`).join('')}
  </div>

  ${animal.notes?`<div class="section-card mb-4"><div class="info-label mb-2"><i class="bi bi-chat-left-text accent-text me-2"></i>ملاحظات</div><div>${animal.notes}</div></div>`:''}

  <!-- Quick Links -->
  <div class="d-flex gap-2 flex-wrap mb-4">
    <a href="health.html" class="tag-link" style="color:var(--red);border-color:rgba(244,67,54,.3)"><i class="bi bi-heart-pulse-fill"></i> السجل الصحي</a>
    <a href="breeding.html" class="tag-link" style="color:var(--purple);border-color:rgba(156,39,176,.3)"><i class="bi bi-diagram-2-fill"></i> التكاثر</a>
    <a href="vaccine.html" class="tag-link" style="color:var(--green);border-color:rgba(0,230,118,.3)"><i class="bi bi-bandaid-fill"></i> التحصين</a>
    ${animal.barn?`<a href="barns.html" class="tag-link" style="color:var(--blue);border-color:rgba(33,150,243,.3)"><i class="bi bi-building"></i> ${animal.barn}</a>`:''}
  </div>

  <!-- Activity Timeline — NEW section, migrated architecture. Unifies
       health/vaccination/medication/breeding/offspring events into one
       chronological view, reusing the exact same renderTimeline/
       renderTimelineItem components dashboard.html already established.
       The detailed per-category sections below (Health, Breeding,
       Offspring, Vaccinations, Medications, Weights) are kept exactly as
       they are — this Timeline is an additional at-a-glance summary,
       not a replacement, matching how dashboard.html keeps its own
       "Recent Records" table and "Recent Activity" timeline side by side. -->
  <div class="section-card mb-4">
    <h5 class="fw-bold mb-3"><i class="bi bi-clock-history accent-text me-2"></i>الخط الزمني للأحداث</h5>
    ${(function(){
      var events=[];
      healthRecs.forEach(function(r){ if(r.date) events.push({date:r.date, eventType:'سجل صحي', entity:(r.diagnosis||r.medication||'—')}); });
      vaccinations.forEach(function(v){ if(v.date) events.push({date:v.date, eventType:'تطعيم', entity:(v.name||'—')}); });
      medications.forEach(function(m){ if(m.start_date) events.push({date:m.start_date, eventType:'دواء', entity:(m.name||'—')}); });
      breedingRecs.forEach(function(r){ if(r.mating_date) events.push({date:r.mating_date, eventType:'تكاثر', entity:(r.status==='born'?'ولادة':r.status==='pregnant'?'حمل':r.status||'—')}); });
      offspring.forEach(function(o){ if(o.birth_date) events.push({date:o.birth_date, eventType:'مولود', entity:(o.tag?'#'+o.tag:'')+(o.gender==='male'?' ذكر':' أنثى')}); });
      events.sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
      var recentEvents=events.slice(0,8);
      return recentEvents.length ? renderTimeline(recentEvents.map(function(e){
        return renderTimelineItem({ time:e.date, eventType:e.eventType, entity:e.entity });
      })) : '<div class="empty-state py-3"><i class="bi bi-clock-history"></i><p>لا يوجد نشاط مسجّل بعد لهذا الحيوان</p></div>';
    })()}
  </div>

  <!-- Health Records from global collection -->
  <div class="section-card mb-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="fw-bold mb-0"><i class="bi bi-heart-pulse-fill me-2" style="color:var(--red)"></i>السجل الصحي (${ar(healthRecs.length)})</h5>
      <div class="d-flex gap-2">
        ${can('health')&&animal.status!=='dead'?'<button class="action-btn primary sm" onclick="openAddHealthFromDetail()"><i class="bi bi-plus-lg"></i> سجل</button>':''} 
        <a href="health.html" class="action-btn sm"><i class="bi bi-arrow-left"></i> الكل</a>
      </div>
    </div>
    ${healthRecs.length===0?'<div class="text-gray text-center py-3" style="font-size:.85rem">لا توجد سجلات صحية مرتبطة بهذا الحيوان</div>':
      healthRecs.slice(0,4).map(function(r){
        var today=new Date().toISOString().slice(0,10);
        var inW=r.withdrawal_end&&r.withdrawal_end>=today;
        var dLeft=inW?Math.max(0,Math.ceil((new Date(r.withdrawal_end)-new Date())/86400000)):0;
        return'<div class="record-card" style="margin-bottom:8px">'+
          '<div class="d-flex justify-content-between align-items-start flex-wrap gap-2">'+
          '<div class="flex-grow-1">'+
            '<div class="d-flex gap-2 flex-wrap mb-1">'+
              '<span class="type-badge '+(r.status==='active'?'badge-tasmeen':'badge-tarbiya')+'">'+(r.status==='active'?'قيد العلاج':'مكتمل')+'</span>'+
              (inW?'<span class="type-badge badge-danger">سحب '+ar(dLeft)+' يوم</span>':'')+
            '</div>'+
            '<div style="font-size:.85rem"><span class="text-gray">التشخيص: </span><strong>'+(r.diagnosis||'—')+'</strong> <span class="text-gray mx-1">|</span> <span class="text-gray">الدواء: </span><strong>'+(r.medication||'—')+'</strong></div>'+
            '<small class="text-gray">'+(r.date||'—')+(r.vet_name?' | د. '+r.vet_name:'')+(r.barn?' | '+r.barn:'')+'</small>'+
          '</div></div></div>';
      }).join('')+
      (healthRecs.length>4?'<div class="text-center mt-2"><small class="text-gray">و '+ar(healthRecs.length-4)+' سجل أقدم — <a href="health.html" style="color:var(--orange)">عرض الكل</a></small></div>':'')}
  </div>

  <!-- Breeding Records -->
  ${(isFemale||breedingRecs.length>0)?'<div class="section-card mb-4">'+
    '<div class="d-flex justify-content-between align-items-center mb-3">'+
      '<h5 class="fw-bold mb-0"><i class="bi bi-diagram-2-fill me-2" style="color:var(--purple)"></i>سجلات التكاثر ('+ar(breedingRecs.length)+')</h5>'+
      '<a href="breeding.html" class="action-btn sm"><i class="bi bi-arrow-left"></i> التكاثر</a>'+
    '</div>'+
    (breedingRecs.length===0?'<div class="text-gray text-center py-3" style="font-size:.85rem">لا توجد سجلات تكاثر</div>':
      breedingRecs.slice(0,4).map(function(r){

function calcAge(birth_date){
  if(!birth_date)return{years:0,months:0};
  const b=new Date(birth_date),n=new Date();
  let y=n.getFullYear()-b.getFullYear(),m=n.getMonth()-b.getMonth();
  if(m<0){y--;m+=12;}return{years:y,months:m};
}

window.submitRemoveAnimal=async function(){
  const reason=document.getElementById('r-reason').value;const date=document.getElementById('r-date').value;const notes=document.getElementById('r-notes').value.trim();
  closeModal();toast('جاري الحفظ...','info');
  try{
    // Sale Source-of-Truth fix (Repository 5, Priority 1 follow-up): the
    // 'sale' reason previously fell into the same status:'dead' write as
    // genuine death/slaughter, matching the same broken convention already
    // repaired in performBulkSell(). Only this one branch changes — death
    // and slaughter keep their exact original update shape, untouched.
    var updates;
    if(reason==='sale'){
      updates={status:'sold',sold_date:date,sold_price:null,sold_to:null,sold_notes:notes||null};
    }else{
      updates={status:'dead',removed_at:date,removal_reason:reason,removal_notes:notes};
      if(reason==='death')updates.died_at=date;
    }
    await fbPatch('animals',animalId,updates);
    await logActivity('remove','animals',`إخراج #${animal.tag||animalId} — ${reason==='sale'?'بيع':reason==='slaughter'?'ذبح':'نفوق'}`);
    toast('تم إخراج الحيوان');
    setTimeout(()=>location.href='animals.html',1500);
  }catch(e){toast('فشل: '+e.message,'error');}
};

window.adhCalc=function(){
  var tend=document.getElementById('adh-tend').value;
  var wdays=+document.getElementById('adh-wdays').value||0;
  if(tend&&wdays>0){var dt=new Date(tend);dt.setDate(dt.getDate()+wdays);document.getElementById('adh-wdate').textContent=dt.toISOString().slice(0,10);document.getElementById('adh-wshow').style.display='block';}
  else document.getElementById('adh-wshow').style.display='none';
};

window.submitHealthFromDetail=async function(){
  var diag=document.getElementById('adh-diag').value.trim();
  var med=document.getElementById('adh-med').value.trim();
  if(!diag||!med){toast('يرجى إدخال التشخيص والدواء','error');return;}
  var tend=document.getElementById('adh-tend').value;
  var wdays=+document.getElementById('adh-wdays').value||0;
  var withdrawal_end='';
  if(tend&&wdays>0){var dt=new Date(tend);dt.setDate(dt.getDate()+wdays);withdrawal_end=dt.toISOString().slice(0,10);}
  var data={
    animal_id:animalId,animal_tag:animal.tag||'',animal_breed:animal.breed||'',animal_species:animal.species||'goat',
    barn:document.getElementById('adh-barn').value,date:document.getElementById('adh-date').value,
    vet_name:document.getElementById('adh-vet').value.trim()||null,diagnosis:diag,medication:med,
    dosage:document.getElementById('adh-dose').value.trim(),withdrawal_days:wdays,treatment_end:tend||null,
    withdrawal_end:withdrawal_end||null,status:'active',notes:document.getElementById('adh-notes').value.trim()||null
  };
  closeModal();toast('جاري الحفظ...','info');
  try{
    await fbPost('health',data);
    await logActivity('add','health','سجل صحي: '+diag+' | '+med+' للحيوان '+(animal.tag||animal.breed));
    toast('تم الحفظ');
    fbCacheInvalidate('health');
    var healthAll=await fbGet('health',true);
    var atag=animal.tag||'';
    healthRecs=(healthAll||[]).filter(function(r){return r.animal_tag===atag||r.animal_id===animalId;}).sort(function(a,b){return(b.date||'').localeCompare(a.date||'');});
    renderDetail(getSettings());
  }catch(e){toast('خطأ: '+e.message,'error');}
};
