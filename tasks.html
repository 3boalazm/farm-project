<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <!-- Performance hints -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://farm-mz99-default-rtdb.europe-west1.firebasedatabase.app" crossorigin>
  <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
  <link rel="dns-prefetch" href="https://aistudio.googleapis.com">
  <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#f3f4f6" media="(prefers-color-scheme: light)">

<script>(function(){var t=localStorage.getItem('farm_theme');if(t==='light')document.documentElement.classList.add('light-mode');}());</script>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>المهام اليومية — بيان المزرعة</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Lexend:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
.task-card{background:var(--bg-2);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:10px;transition:.2s}
.task-card:hover{border-color:var(--border-2);transform:translateY(-1px)}
.task-card.done{opacity:.65;background:rgba(0,230,118,.03);border-color:rgba(0,230,118,.15)}
.task-card.overdue{border-color:rgba(244,67,54,.35);background:rgba(244,67,54,.04)}
.task-card.in-progress{border-color:rgba(255,193,7,.35);background:rgba(255,193,7,.04)}
.task-checkbox{width:22px;height:22px;border-radius:6px;border:2px solid var(--border-2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.2s;background:transparent}
.task-checkbox.checked{background:var(--green);border-color:var(--green);color:#fff}
.task-checkbox:hover{border-color:var(--orange)}
.task-cat{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:8px;font-size:.7rem;font-weight:600}
.priority-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.fab-btn-tasks{position:fixed;bottom:80px;left:20px;width:60px;height:60px;border-radius:50%;background:var(--orange);color:#fff;border:none;box-shadow:0 8px 24px rgba(255,107,53,.5);font-size:1.5rem;cursor:pointer;z-index:1000;display:none;align-items:center;justify-content:center;transition:.2s}
.fab-btn-tasks:hover{transform:scale(1.08)}
@media (max-width:768px){.fab-btn-tasks{display:flex!important}}
</style>
</head>
<body>
<div class="page-wrap">
  <div id="page-header"></div>
  <div id="content"><div class="text-center py-5"><div class="spinner"></div></div></div>
  <footer class="text-center text-gray mt-5 pt-4 pb-3" style="border-top:1px solid var(--border)">
    &copy; <span id="footer-year"></span> <span id="footer-farm"></span><br>
    <small style="font-size:.72rem;color:var(--text-muted)">إشراف: لواء أحمد رجب نوح | تطوير: جندي مصطفى محمد إبراهيم</small>
  </footer>
</div>
<button class="fab-btn-tasks" onclick="openTaskModal()" aria-label="مهمة جديدة" title="إضافة مهمة سريعـة">
  <i class="bi bi-plus-lg"></i>
</button>
<script src="config.js"></script>
<script src="firebase.js"></script>
<script src="nav.js"></script>
<script src="shared.js"></script>
<script src="pages/datepicker.js" defer></script>
<script src="pages/tour.js" defer></script>
<script src="pages/tasks.js"></script>
</body>
</html>
