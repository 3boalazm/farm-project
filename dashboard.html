<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>الرئيسية — بيان المزرعة</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Lexend:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="page-wrap">
  <div id="page-header"></div>
  <div id="content"><div class="text-center py-5"><div class="spinner"></div></div></div>
  <footer class="text-center text-gray mt-5 pt-4 pb-3" style="border-top:1px solid var(--border)">
    © <span id="footer-year"></span> <span id="footer-farm"></span><br>
    <small style="font-size:.72rem;color:#555">إشراف: لواء أحمد رجب نوح &nbsp;|&nbsp; تطوير: جندي مصطفى محمد إبراهيم</small>
  </footer>
</div>
<script src="config.js"></script>
<script src="firebase.js"></script>
<script src="shared.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async ()=>{
  if(!requireAuth())return;
  initFirebase();
  const s=getSettings();
  document.getElementById('footer-year').textContent=ar(new Date().getFullYear());
  document.getElementById('footer-farm').textContent=s.farmName;
  renderNavbar('dashboard.html');

  const el=document.getElementById('content');
  renderLoading(el);

  let animals=[], vaccinations=[], breeding=[], health=[], finance=[];
  try{
    [animals,vaccinations,breeding,health,finance]=await Promise.all([
      fbGet('animals'),fbGet('vaccinations'),fbGet('breeding'),fbGet('health'),fbGet('finance')
    ]);
  }catch(e){toast('خطأ في التحميل: '+e.message,'error');}

  const alive=animals.filter(a=>a.status==='alive');
  const tG=alive.filter(a=>a.species==='goat'&&a.purpose!=='birth').length;
  const tS=alive.filter(a=>a.species==='sheep'&&a.purpose!=='birth').length;
  const births=alive.filter(a=>a.purpose==='birth').length;
  const goatBirths=alive.filter(a=>a.species==='goat'&&a.purpose==='birth').length;
  const sheepBirths=alive.filter(a=>a.species==='sheep'&&a.purpose==='birth').length;
  const pregnant=breeding.filter(r=>r.status==='pregnant').length;
  const inc=finance.filter(r=>r.type==='income').reduce((t,r)=>t+(+r.amount||0),0);
  const exp=finance.filter(r=>r.type==='expense').reduce((t,r)=>t+(+r.amount||0),0);
  const curr=s.currency;

  renderPageHeader(
    'مرحباً '+getUser().name+' 👋',
    s.farmName+' — '+todayAr(),
    '<a href="diary.html" class="action-btn" style="background:rgba(255,107,53,.1);border-color:rgba(255,107,53,.3);color:var(--orange)"><i class="bi bi-journal-text"></i> يومية المزرعة</a>'+
    (can('animals')?'<button class="action-btn primary" onclick="openAddAnimalDash()"><i class="bi bi-plus-lg"></i> إضافة حيوان</button><button class="action-btn" onclick="openAddBirthsDash()" style="background:rgba(255,193,7,.1);border-color:rgba(255,193,7,.35);color:var(--yellow)"><i class="bi bi-stars"></i> مواليد</button><button class="action-btn danger" onclick="openMarkDeathDash()"><i class="bi bi-x-octagon"></i> نفوق</button>':'')
  );

  // Build breed stats for pie chart
  const allBreeds=[...s.goatBreeds.map(k=>({k,sp:'goat'})),...s.sheepBreeds.map(k=>({k,sp:'sheep'}))];
  const breedData=allBreeds.map(function(b){
    const a=alive.filter(x=>x.breed===b.k);
    return{breed:b.k,species:b.sp,total:a.length,tarbiya:a.filter(x=>x.purpose==='tarbiya').length,tasmeen:a.filter(x=>x.purpose==='tasmeen').length,births:a.filter(x=>x.purpose==='birth').length};
  }).filter(b=>b.total>0).sort((a,b)=>b.total-a.total);
  const totalAlive=alive.length||1;
  const PIE_COLORS=['#00e676','#2196f3','#ff6b35','#9c27b0','#ffc107','#f44336','#00bcd4','#8bc34a','#ff9800','#e91e63'];

  // Quick stats cards
  const treating=health.filter(r=>r.status==='active').length;
  const quickStats=[
    {l:'إجمالي القطيع',v:tG+tS+births,c:'var(--orange)',i:'bi-bar-chart-fill',href:'animals.html?status=alive'},
    {l:'الماعز',v:tG,c:'var(--green)',i:'bi-tropical-storm',href:'animals.html?species=goat&purpose=tarbiya,tasmeen'},
    {l:'الأغنام',v:tS,c:'var(--blue)',i:'bi-cloud-fill',href:'animals.html?species=sheep&purpose=tarbiya,tasmeen'},
    {l:'حوامل',v:pregnant,c:'var(--purple)',i:'bi-diagram-2',href:'breeding.html'},
    {l:'ولدات الماعز',v:goatBirths,c:'var(--green)',i:'bi-stars',href:'animals.html?species=goat&purpose=birth'},
    {l:'ولدات الأغنام',v:sheepBirths,c:'var(--blue)',i:'bi-stars',href:'animals.html?species=sheep&purpose=birth'},
  ];

  // Build HTML
  var statsHtml=quickStats.map(function(st){
    return '<div class="col-6 col-md-4 col-lg-2"><a href="'+st.href+'" style="text-decoration:none"><div class="summary-card"><i class="bi '+st.i+' d-block mb-2" style="font-size:1.3rem;color:'+st.c+'"></i><div class="summary-number" style="color:'+st.c+'">'+ar(st.v)+'</div><small class="text-gray">'+st.l+'</small></div></a></div>';
  }).join('');

  var finHtml='';
  if(can('finance')){
    finHtml='<div class="row g-3 mb-4">'+
      '<div class="col-md-4"><div class="wonder-card text-center"><div style="font-size:1.1rem;font-weight:700;color:var(--green)">'+inc.toLocaleString('ar-EG')+' '+curr+'</div><small class="text-gray">الإيرادات</small></div></div>'+
      '<div class="col-md-4"><div class="wonder-card text-center"><div style="font-size:1.1rem;font-weight:700;color:var(--orange)">'+exp.toLocaleString('ar-EG')+' '+curr+'</div><small class="text-gray">المصروفات</small></div></div>'+
      '<div class="col-md-4"><div class="wonder-card text-center"><div style="font-size:1.1rem;font-weight:700;color:'+(inc-exp>=0?'var(--green)':'var(--red)')+'">'+((inc-exp>=0?'+':'')+(inc-exp).toLocaleString('ar-EG'))+' '+curr+'</div><small class="text-gray">'+(inc-exp>=0?'صافي الربح':'صافي الخسارة')+'</small></div></div>'+
    '</div>';
  }

  // Summary table HTML
  var tableRows=breedData.map(function(b){
    return '<tr style="border-bottom:1px solid #1e1e1e"><td style="padding:8px;color:var(--gray)">'+(b.species==='goat'?'ماعز':'أغنام')+'</td><td style="padding:8px;font-weight:700">'+b.breed+'</td><td style="padding:8px">'+ar(b.tarbiya)+'</td><td style="padding:8px">'+ar(b.tasmeen)+'</td><td style="padding:8px;color:var(--yellow)">'+ar(b.births)+'</td><td style="padding:8px;font-weight:700;color:var(--green)">'+ar(b.total)+'</td></tr>';
  }).join('');

  el.innerHTML=
    '<div id="weather-widget" class="wonder-card mb-4 p-3"><div class="text-gray" style="font-size:.82rem"><i class="bi bi-cloud-sun me-2"></i>جاري تحميل حالة الطقس...</div></div>'+
    '<div class="row g-3 mb-4">'+statsHtml+'</div>'+
    finHtml+
    '<div class="row g-3 mb-4">'+
      '<div class="col-md-5"><div class="wonder-card"><h6 class="fw-bold mb-3"><i class="bi bi-pie-chart-fill accent-text"></i> توزيع القطيع</h6><div id="pie-container" class="text-center"></div></div></div>'+
      '<div class="col-md-7"><div class="wonder-card p-0"><div class="p-3 pb-2 fw-bold" style="font-size:.9rem"><i class="bi bi-table accent-text me-2"></i>ملخص المزرعة</div><div class="table-responsive"><table style="width:100%;border-collapse:separate;border-spacing:0;font-size:.8rem"><thead><tr style="background:rgba(255,255,255,.03)"><th style="padding:8px;color:var(--gray);font-weight:700;border-bottom:1px solid var(--border)">القسم</th><th style="padding:8px;color:var(--gray);font-weight:700;border-bottom:1px solid var(--border)">السلالة</th><th style="padding:8px;color:var(--gray);font-weight:700;border-bottom:1px solid var(--border)">تربية</th><th style="padding:8px;color:var(--gray);font-weight:700;border-bottom:1px solid var(--border)">تسمين</th><th style="padding:8px;color:var(--gray);font-weight:700;border-bottom:1px solid var(--border)">ولدات</th><th style="padding:8px;color:var(--gray);font-weight:700;border-bottom:1px solid var(--border)">الإجمالي</th></tr></thead><tbody>'+tableRows+'</tbody></table></div></div></div>'+
    '</div>'+
    '<div class="births-section">'+
      '<h6 class="fw-bold mb-3"><i class="bi bi-stars" style="color:var(--yellow)"></i> الولدات — '+ar(births)+'</h6>'+
      '<div class="row g-3">'+
        '<div class="col-md-6"><div class="d-flex justify-content-between align-items-center p-3" style="background:rgba(255,255,255,.03);border-radius:12px"><div><div class="fw-bold">ولدات الماعز</div><small class="text-gray">'+ar(goatBirths)+'</small></div><div class="d-flex gap-3"><div class="text-center"><div class="fw-bold green-text">'+ar(alive.filter(a=>a.species==='goat'&&a.purpose==='birth'&&a.gender==='male').length)+'</div><small class="text-gray">ذكور</small></div><div class="text-center"><div class="fw-bold accent-text">'+ar(alive.filter(a=>a.species==='goat'&&a.purpose==='birth'&&a.gender==='female').length)+'</div><small class="text-gray">إناث</small></div></div></div></div>'+
        '<div class="col-md-6"><div class="d-flex justify-content-between align-items-center p-3" style="background:rgba(255,255,255,.03);border-radius:12px"><div><div class="fw-bold">ولدات الأغنام</div><small class="text-gray">'+ar(sheepBirths)+'</small></div><div class="d-flex gap-3"><div class="text-center"><div class="fw-bold green-text">'+ar(alive.filter(a=>a.species==='sheep'&&a.purpose==='birth'&&a.gender==='male').length)+'</div><small class="text-gray">ذكور</small></div><div class="text-center"><div class="fw-bold accent-text">'+ar(alive.filter(a=>a.species==='sheep'&&a.purpose==='birth'&&a.gender==='female').length)+'</div><small class="text-gray">إناث</small></div></div></div></div>'+
      '</div>'+
    '</div>';

  // Render Pie Chart
  if(breedData.length>0){
    var size=220,cx=size/2,cy=size/2,r=85,ir=45;
    var startAngle=0;
    var svgPaths='';var legendItems='';
    breedData.forEach(function(b,i){
      var angle=(b.total/totalAlive)*2*Math.PI;
      if(angle>=2*Math.PI)angle=2*Math.PI-0.001;
      var endAngle=startAngle+angle;
      var x1=cx+r*Math.cos(startAngle-Math.PI/2),y1=cy+r*Math.sin(startAngle-Math.PI/2);
      var x2=cx+r*Math.cos(endAngle-Math.PI/2),y2=cy+r*Math.sin(endAngle-Math.PI/2);
      var xi=cx+ir*Math.cos(startAngle-Math.PI/2),yi=cy+ir*Math.sin(startAngle-Math.PI/2);
      var xi2=cx+ir*Math.cos(endAngle-Math.PI/2),yi2=cy+ir*Math.sin(endAngle-Math.PI/2);
      var large=angle>Math.PI?1:0;
      var path='M '+xi+' '+yi+' A '+ir+' '+ir+' 0 '+large+' 1 '+xi2+' '+yi2+' L '+x2+' '+y2+' A '+r+' '+r+' 0 '+large+' 0 '+x1+' '+y1+' Z';
      var color=PIE_COLORS[i%PIE_COLORS.length];
      var pct=Math.round(b.total/totalAlive*100);
      svgPaths+='<path d="'+path+'" fill="'+color+'" opacity=".85" stroke="#141414" stroke-width="2"><title>'+b.breed+': '+ar(b.total)+'</title></path>';
      legendItems+='<span style="font-size:.72rem;display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:50%;background:'+color+';display:inline-block"></span>'+b.breed+' '+ar(pct)+'٪</span>';
      startAngle=endAngle;
    });
    var pieHtml='<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'" style="overflow:visible;max-width:100%">'+svgPaths+'<circle cx="'+cx+'" cy="'+cy+'" r="'+ir+'" fill="#141414"/><text x="'+cx+'" y="'+(cy-8)+'" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700" font-family="Lexend">'+ar(totalAlive)+'</text><text x="'+cx+'" y="'+(cy+12)+'" text-anchor="middle" fill="#888" font-size="11" font-family="Cairo">رأس حي</text></svg><div style="display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-top:8px">'+legendItems+'</div>';
    var pc=document.getElementById('pie-container');
    if(pc)pc.innerHTML=pieHtml;
  }

  // Weather Widget
  getWeather().then(function(w){
    if(!w||!w.main)return;
    var temp=Math.round(w.main.temp);
    var feels=Math.round(w.main.feels_like);
    var desc=w.weather&&w.weather[0]?w.weather[0].description:'';
    var humidity=w.main.humidity;
    var isHot=temp>=35,isCold=temp<=10;
    var emoji=isHot?'🌡️':isCold?'🥶':temp>=25?'☀️':'🌤️';
    var alertHtml='';
    if(isHot)alertHtml='<div class="type-badge badge-danger" style="font-size:.7rem"><i class="bi bi-exclamation-triangle-fill me-1"></i>إجهاد حراري — زِد المياه وأخِّر الرعي</div>';
    if(isCold)alertHtml='<div class="type-badge badge-blue" style="font-size:.7rem"><i class="bi bi-snow me-1"></i>برد شديد — تحقق من التدفئة</div>';
    var wEl=document.getElementById('weather-widget');
    if(wEl)wEl.innerHTML='<div class="d-flex align-items-center gap-3 flex-wrap"><div style="font-size:2rem">'+emoji+'</div><div><div style="font-size:1.4rem;font-weight:700;color:'+(isHot?'var(--red)':isCold?'var(--blue)':'var(--green)')+'">'+ar(temp)+'°م</div><div style="font-size:.78rem;color:var(--gray)">'+desc+' • رطوبة '+ar(humidity)+'٪ • يبدو كأنه '+ar(feels)+'°م</div></div>'+alertHtml+'</div>';
  }).catch(function(){});
});

// ── Dashboard Quick Actions ──────────────────────────────
window.openAddAnimalDash=function(){
  const s=getSettings();
  showModal('<div class="farm-modal" onclick="event.stopPropagation()">'+
    '<h4><i class="bi bi-plus-circle accent-text"></i> إضافة حيوان سريع</h4>'+
    '<div class="row g-2">'+
      '<div class="col-6"><label>النوع</label><select class="field" id="da-sp"><option value="goat">ماعز</option><option value="sheep">أغنام</option></select></div>'+
      '<div class="col-6"><label>الغرض</label><select class="field" id="da-pur"><option value="tarbiya">تربية</option><option value="tasmeen">تسمين</option></select></div>'+
    '</div>'+
    '<label>السلالة</label><select class="field" id="da-breed">'+s.goatBreeds.map(b=>'<option>'+b+'</option>').join('')+'</select>'+
    '<div class="row g-2">'+
      '<div class="col-6"><label>الجنس</label><select class="field" id="da-gender"><option value="female">أنثى</option><option value="male">ذكر</option></select></div>'+
      '<div class="col-6"><label>رقم الترقيم</label><input class="field" id="da-tag" placeholder="A-001"></div>'+
    '</div>'+
    '<label>الجمالون</label><select class="field" id="da-barn"><option value="">— غير محدد —</option><option>ج١ع١</option><option>ج١ع٢</option><option>ج٢ع١</option><option>ج٢ع٢</option><option>ج٣ع١</option><option>ج٣ع٢</option><option>ج٤ع١</option><option>ج٤ع٢</option><option>ج٥ع١</option><option>ج٥ع٢</option></select>'+
    '<div class="d-flex gap-2 justify-content-end mt-3">'+
      '<button class="action-btn" onclick="closeModal()">إلغاء</button>'+
      '<button class="action-btn primary" onclick="submitAddAnimalDash()">حفظ</button>'+
    '</div>'+
  '</div>');
};

window.submitAddAnimalDash=async function(){
  const sp=document.getElementById('da-sp').value;
  const breed=document.getElementById('da-breed').value;
  const gender=document.getElementById('da-gender').value;
  const purpose=document.getElementById('da-pur').value;
  const tag=document.getElementById('da-tag').value.trim();
  const barn=document.getElementById('da-barn').value;
  closeModal();toast('جاري الحفظ...','info');
  try{
    await fbPost('animals',{species:sp,breed,gender,purpose,status:'alive',tag:tag||null,barn:barn||null,birth_date:todayStr()});
    await logActivity('add','animals','إضافة سريعة من الداشبورد: '+breed+' '+gender);
    toast('تمت الإضافة');
    setTimeout(()=>location.reload(),1000);
  }catch(e){toast('فشل: '+e.message,'error');}
};

window.openAddBirthsDash=function(){
  showModal('<div class="farm-modal narrow" onclick="event.stopPropagation()">'+
    '<h4><i class="bi bi-stars" style="color:var(--yellow)"></i> إضافة مواليد</h4>'+
    '<div class="row g-2">'+
      '<div class="col-6"><label>النوع</label><select class="field" id="db-sp"><option value="goat">ماعز</option><option value="sheep">أغنام</option></select></div>'+
      '<div class="col-6"><label>الجنس</label><select class="field" id="db-g"><option value="female">أنثى</option><option value="male">ذكر</option></select></div>'+
    '</div>'+
    '<div class="row g-2">'+
      '<div class="col-6"><label>الكمية</label><input type="number" class="field" id="db-qty" value="1" min="1"></div>'+
      '<div class="col-6"><label>تاريخ الميلاد</label><input type="date" class="field" id="db-d" value="'+todayStr()+'"></div>'+
    '</div>'+
    '<div class="d-flex gap-2 justify-content-end mt-3">'+
      '<button class="action-btn" onclick="closeModal()">إلغاء</button>'+
      '<button class="action-btn primary" onclick="submitBirthsDash()">حفظ</button>'+
    '</div>'+
  '</div>');
};
window.submitBirthsDash=async function(){
  const sp=document.getElementById('db-sp').value;
  const g=document.getElementById('db-g').value;
  const qty=+document.getElementById('db-qty').value||1;
  const d=document.getElementById('db-d').value;
  closeModal();toast('جاري الحفظ...','info');
  let ok=0;
  for(let i=0;i<qty;i++){try{await fbPost('animals',{species:sp,breed:'مواليد',gender:g,purpose:'birth',status:'alive',birth_date:d});ok++;}catch(e){}}
  if(ok){await logActivity('add','animals','إضافة '+ar(ok)+' مواليد من الداشبورد');toast('تمت إضافة '+ar(ok)+' مواليد');setTimeout(()=>location.reload(),1000);}
};
window.openMarkDeathDash=async function(){
  const animals2=await fbGet('animals');
  const alive=animals2.filter(a=>a.status==='alive');
  showModal('<div class="farm-modal narrow" onclick="event.stopPropagation()">'+
    '<h4 style="color:var(--red)"><i class="bi bi-x-octagon"></i> تسجيل نفوق</h4>'+
    '<label>الحيوان</label><select class="field" id="dd-a"><option value="">— اختر —</option>'+
    alive.slice(0,200).map(a=>'<option value="'+a._id+'">'+a.breed+(a.tag?' #'+a.tag:'')+(a.gender==='male'?' ذكر':' أنثى')+'</option>').join('')+
    '</select>'+
    '<label>التاريخ</label><input type="date" class="field" id="dd-d" value="'+todayStr()+'">'+
    '<div class="d-flex gap-2 justify-content-end mt-3">'+
      '<button class="action-btn" onclick="closeModal()">إلغاء</button>'+
      '<button class="action-btn danger" onclick="submitDeathDash()">تسجيل</button>'+
    '</div>'+
  '</div>');
};
window.submitDeathDash=async function(){
  const id=document.getElementById('dd-a').value;if(!id){toast('يرجى اختيار حيوان','error');return;}
  closeModal();
  try{await fbPatch('animals',id,{status:'dead',died_at:document.getElementById('dd-d').value});await logActivity('edit','animals','تسجيل نفوق من الداشبورد');toast('تم تسجيل النفوق');}
  catch(e){toast('فشل: '+e.message,'error');}
};
</script>
</body>
</html>
