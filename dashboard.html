<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<script>(function(){var t=localStorage.getItem('farm_theme');if(t==='light')document.documentElement.classList.add('light-mode');}());</script>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>الرئيسية — بيان المزرعة</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Lexend:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  .sync-status { font-size: 0.7rem; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border-3); }
  .sync-ok { color: var(--green); }
  .sync-conflict { color: var(--red); font-weight: 700; }
  .sync-btn { padding: 2px 8px; font-size: 0.65rem; border-radius: 4px; border: 1px solid; background: transparent; cursor: pointer; margin-top: 4px; transition: all 0.2s; }
  .sync-btn-apply { color: var(--green); border-color: var(--green); }
  .sync-btn-apply:hover { background: var(--green); color: #fff; }
  .summary-card { position: relative; overflow: hidden; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }
</style>
</head>
<body>
<div class="page-wrap">
  <div id="page-header"></div>
  <div id="content"><div class="text-center py-5"><div class="spinner"></div></div></div>
  <footer class="text-center text-gray mt-5 pt-4 pb-3" style="border-top:1px solid var(--border)">
    <span id="footer-year"></span> &copy; <span id="footer-farm"></span><br>
    <small style="font-size:.72rem;color:var(--text-muted)">إشراف: لواء أحمد رجب نوح | تطوير: جندي مصطفى محمد إبراهيم</small>
  </footer>
</div>
<script src="config.js"></script>
<script src="firebase.js"></script>
<script src="nav.js"></script>
<script src="shared.js"></script>
<script>
/**
 * Dashboard Logic with Sync Conflict Resolution
 */
document.addEventListener('DOMContentLoaded', async function(){
  if(!requireAuth())return;
  initFirebase();
  var s=getSettings();
  document.getElementById('footer-year').textContent=ar(new Date().getFullYear());
  document.getElementById('footer-farm').textContent=s.farmName;
  renderNavbar('dashboard.html');

  var el=document.getElementById('content');
  renderLoading(el);

  try {
    const [animals, breeding, health, finance] = await Promise.all([
      fbGet('animals'), fbGet('breeding'), fbGet('health'), fbGet('finance')
    ]);
    renderDashboard(animals, breeding, health, finance);
  } catch(e) {
    toast('خطأ في التحميل: '+e.message,'error');
  }
});

function renderDashboard(animals, breeding, health, finance) {
  var s=getSettings();
  var el=document.getElementById('content');
  var alive = animals.filter(a => a.status === 'alive');
  
  // Helpers
  const isBirth = a => a.purpose === 'birth' || a.breed === 'مواليد';
  const arNum = n => ar(n);

  // Stats calculation (The "Actual" data from database)
  const stats = {
    total: alive.length,
    goats: alive.filter(a => a.species === 'goat').length,
    sheep: alive.filter(a => a.species === 'sheep').length,
    pregnant: breeding.filter(r => r.status === 'pregnant').length,
    goatBirths: alive.filter(a => a.species === 'goat' && isBirth(a)).length,
    sheepBirths: alive.filter(a => a.species === 'sheep' && isBirth(a)).length,
    dead: animals.filter(a => a.status === 'dead').length
  };

  // Finance
  var inc=finance.filter(r=>r.type==='income').reduce((t,r)=>t+(+r.amount||0),0);
  var exp=finance.filter(r=>r.type==='expense').reduce((t,r)=>t+(+r.amount||0),0);

  renderPageHeader(
    'مرحباً ' + getUser().name + ' 👋',
    s.farmName + ' — ' + todayAr(),
    `<a href="diary.html" class="action-btn" style="background:rgba(255,107,53,.1);border-color:rgba(255,107,53,.3);color:var(--orange)"><i class="bi bi-journal-text"></i> يومية المزرعة</a>
     <a href="assistant.html" class="action-btn" style="background:rgba(0,230,118,.1);border-color:rgba(0,230,118,.3);color:var(--green)"><i class="bi bi-robot"></i> المساعد الذكي</a>
     ${can('animals') ? `
       <button class="action-btn primary" onclick="openAddAnimalDash()"><i class="bi bi-plus-lg"></i> إضافة حيوان</button>
       <button class="action-btn" onclick="openUnifiedBirthModal('goat')" style="background:rgba(255,193,7,.1);border-color:rgba(255,193,7,.35);color:var(--yellow)"><i class="bi bi-stars"></i> مواليد</button>
       <button class="action-btn danger" onclick="openMarkDeathDash()"><i class="bi bi-x-octagon"></i> نفوق</button>
     ` : ''}`
  );

  // Build Breed Data for table/chart
  var allBreeds = s.goatBreeds.map(k => ({k, sp:'goat'})).concat(s.sheepBreeds.map(k => ({k, sp:'sheep'})));
  var breedData = allBreeds.map(b => {
    var a = alive.filter(x => x.breed === b.k && x.species === b.sp);
    return {
      breed: b.k, species: b.sp, total: a.length,
      tarbiya: a.filter(x => x.purpose === 'tarbiya').length,
      tasmeen: a.filter(x => x.purpose === 'tasmeen').length,
      births: a.filter(x => x.purpose === 'birth').length
    };
  }).filter(b => b.total > 0).sort((a,b) => {
    // Group goats together first, then sheep — each group sorted by total (desc)
    if (a.species !== b.species) return a.species === 'goat' ? -1 : 1;
    return b.total - a.total;
  });

  // NOTE: the separate aggregate "مواليد" rows were removed on request.
  // Births are already detailed per-breed in the "مواليد" column of each row,
  // so the bottom aggregate rows duplicated that data.

  // UI Components — مرتبة: إجمالي | حوامل | [ماعز + مواليده] | [أغنام + مواليدها]
  const quickStatGroups = [
    // Row 1: إجمالي + حوامل (كاردات واسعة)
    { id:'total',      l:'إجمالي القطيع', v:arNum(stats.total),      c:'var(--orange)', i:'bi-bar-chart-fill', href:'animals.html',        wide:true },
    { id:'pregnant',   l:'حوامل',          v:arNum(stats.pregnant),   c:'var(--purple)', i:'bi-diagram-2',     href:'breeding.html',         wide:true },
    // Row 2: ماعز → مواليد الماعز → أغنام → مواليد الأغنام
    { id:'goats',      l:'الماعز',         v:arNum(stats.goats),      c:'var(--green)',  i:'bi-tropical-storm',href:'goats.html',             wide:false },
    { id:'goatBirths', l:'مواليد الماعز',  v:arNum(stats.goatBirths), c:'var(--green)',  i:'bi-stars',         href:'births.html?sp=goat',   wide:false },
    { id:'sheep',      l:'الأغنام',        v:arNum(stats.sheep),      c:'var(--blue)',   i:'bi-cloud-fill',    href:'sheep.html',            wide:false },
    { id:'sheepBirths',l:'مواليد الأغنام', v:arNum(stats.sheepBirths),c:'var(--blue)',   i:'bi-stars',         href:'births.html?sp=sheep',  wide:false },
  ];

  const tableRows = breedData.map(b => `
    <tr style="border-bottom:1px solid var(--border-3)">
      <td style="padding:8px;color:var(--text-gray)">${b.species==='goat'?'ماعز':'أغنام'}</td>
      <td style="padding:8px;font-weight:700">${b.breed}</td>
      <td style="padding:8px">${arNum(b.tarbiya)}</td>
      <td style="padding:8px">${arNum(b.tasmeen)}</td>
      <td style="padding:8px;color:var(--yellow)">${arNum(b.births)}</td>
      <td style="padding:8px;font-weight:700;color:var(--green)">${arNum(b.total)}</td>
    </tr>
  `).join('');

  el.innerHTML = `
    <div id="weather-widget" class="wonder-card mb-4 p-3"><div class="text-gray" style="font-size:.82rem"><i class="bi bi-cloud-sun me-2"></i>جاري تحميل حالة الطقس...</div></div>
    <!-- Row 1: إجمالي القطيع + حوامل -->
    <div class="row g-3 mb-3">
      ${quickStatGroups.filter(st => st.wide).map(st => `
        <div class="col-6">
          <div class="summary-card">
            <a href="${st.href}" style="text-decoration:none">
              <i class="bi ${st.i} d-block mb-2" style="font-size:1.3rem;color:${st.c}"></i>
              <div class="summary-number" style="color:${st.c}">${st.v}</div>
              <small class="text-gray">${st.l}</small>
            </a>
            <div class="sync-status" id="sync-${st.id}">
              <i class="bi bi-check-circle-fill sync-ok"></i> متزامن مع اليومية
            </div>
          </div>
        </div>
      `).join('')}
    </div>
    <!-- Row 2: ماعز | مواليد الماعز | أغنام | مواليد الأغنام — مرتبة بحيث كل نوع يسبق مواليده -->
    <div class="row g-3 mb-4">
      ${quickStatGroups.filter(st => !st.wide).map((st, i) => `
        <div class="col-6">
          <div class="summary-card" style="${i % 2 === 1 ? 'border-right: 3px solid ' + st.c + '33; margin-right: 2px;' : ''}">
            <a href="${st.href}" style="text-decoration:none">
              <i class="bi ${st.i} d-block mb-2" style="font-size:1.3rem;color:${st.c}"></i>
              <div class="summary-number" style="color:${st.c}">${st.v}</div>
              <small class="text-gray">${st.l}</small>
            </a>
            <div class="sync-status" id="sync-${st.id}">
              <i class="bi bi-check-circle-fill sync-ok"></i> متزامن مع اليومية
            </div>
          </div>
        </div>
      `).join('')}
    </div>
    ${can('finance') ? `
      <div class="row g-3 mb-4">
        <div class="col-md-4"><a href="finance.html" style="text-decoration:none"><div class="wonder-card text-center"><div style="font-size:1.1rem;font-weight:700;color:var(--green)">${inc.toLocaleString('ar-EG')} ${s.currency}</div><small class="text-gray">الإيرادات</small></div></a></div>
        <div class="col-md-4"><a href="finance.html" style="text-decoration:none"><div class="wonder-card text-center"><div style="font-size:1.1rem;font-weight:700;color:var(--orange)">${exp.toLocaleString('ar-EG')} ${s.currency}</div><small class="text-gray">المصروفات</small></div></a></div>
        <div class="col-md-4"><a href="cost.html" style="text-decoration:none"><div class="wonder-card text-center"><div style="font-size:1.1rem;font-weight:700;color:${(inc-exp>=0?'var(--green)':'var(--red)')}">${((inc-exp>=0?'+':'')+(inc-exp).toLocaleString('ar-EG'))} ${s.currency}</div><small class="text-gray">صافي الربح/الخسارة</small></div></a></div>
      </div>
    ` : ''}
    <div class="row g-3 mb-4">
      <div class="col-md-5"><div class="wonder-card"><h6 class="fw-bold mb-3"><i class="bi bi-pie-chart-fill accent-text"></i> توزيع القطيع</h6><div id="pie-container" class="text-center"></div></div></div>
      <div class="col-md-7">
        <div class="wonder-card p-0">
          <div class="p-3 pb-2 fw-bold" style="font-size:.9rem"><a href="diary.html" style="text-decoration:none;color:var(--text)"><i class="bi bi-table accent-text me-2"></i>ملخص المزرعة</a></div>
          <div class="table-responsive">
            <table style="width:100%;border-collapse:separate;border-spacing:0;font-size:.8rem">
              <thead>
                <tr style="background:rgba(255,255,255,.03)">
                  <th style="padding:8px;color:var(--text-gray);font-weight:700;border-bottom:1px solid var(--border)">القسم</th>
                  <th style="padding:8px;color:var(--text-gray);font-weight:700;border-bottom:1px solid var(--border)">السلالة</th>
                  <th style="padding:8px;color:var(--text-gray);font-weight:700;border-bottom:1px solid var(--border)">تربية</th>
                  <th style="padding:8px;color:var(--text-gray);font-weight:700;border-bottom:1px solid var(--border)">تسمين</th>
                  <th style="padding:8px;color:var(--text-gray);font-weight:700;border-bottom:1px solid var(--border)">مواليد</th>
                  <th style="padding:8px;color:var(--text-gray);font-weight:700;border-bottom:1px solid var(--border)">الإجمالي</th>
                </tr>
              </thead>
              <tbody>${tableRows}</tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  `;

  renderPieChart(breedData, stats.total);
  getWeather().then(w => renderWeather(w));

  // Simulated Sync Check (based on user's manual observation)
  // In a real scenario, we'd compare against a 'diary_snapshot' in Firebase
  checkSync(stats);
}

async function checkSync(actual, animals) {
  // Get diary snapshot if exists, or calculate it
  // Since diary.html calculates from the same animals list, they are technically always synced
  // UNLESS we define "Diary" as a manual target.
  // Based on user request, let's look for a 'diary_snapshot' in Firebase which might store the "Correct" numbers
  try {
    const diarySnap = await fbGet('diary_snapshot');
    if (!diarySnap) {
      // If no snapshot, we assume sync is OK or we create one from current logic
      return;
    }

    const mapping = {
      'total': diarySnap.total,
      'goats': diarySnap.goats,
      'sheep': diarySnap.sheep,
      'goatBirths': diarySnap.goatBirths,
      'sheepBirths': diarySnap.sheepBirths
    };

    Object.keys(mapping).forEach(id => {
      if (mapping[id] !== undefined && actual[id] !== mapping[id]) {
        showConflict(id, actual[id], mapping[id]);
      }
    });
  } catch(e) { console.error('Sync check failed', e); }
}

function showConflict(id, actualVal, diaryVal) {
  const el = document.getElementById('sync-' + id);
  if (!el) return;
  el.innerHTML = `
    <div class="sync-conflict"><i class="bi bi-exclamation-triangle-fill"></i> تعارض مع اليومية</div>
    <div style="font-size:0.6rem; color:var(--text-muted)">اليومية: ${ar(diaryVal)} | الحالي: ${ar(actualVal)}</div>
    <div class="d-flex gap-1">
      <button class="sync-btn sync-btn-apply" onclick="resolveSync('${id}', ${diaryVal}, 'diary')">تطبيق اليومية</button>
      <button class="sync-btn" style="border-color:var(--gray); color:var(--gray)" onclick="resolveSync('${id}', ${actualVal}, 'actual')">اعتماد الحالي</button>
    </div>
  `;
}

window.resolveSync = async function(id, targetVal, source) {
  if (source === 'actual') {
    // If user chooses "Dashboard", update the snapshot to match current DB
    try {
      const animals = await fbGet('animals');
      const alive = animals.filter(a => a.status === 'alive');
      const isB = a => a.purpose === 'birth' || a.breed === 'مواليد';
      await fbPut('diary_snapshot', {
        total: alive.length,
        goats: alive.filter(a => a.species === 'goat').length,
        sheep: alive.filter(a => a.species === 'sheep').length,
        goatBirths: alive.filter(a => a.species === 'goat' && isB(a)).length,
        sheepBirths: alive.filter(a => a.species === 'sheep' && isB(a)).length,
        updated_at: new Date().toISOString()
      });
      toast('✅ تم اعتماد بيانات الداشبورد وتحديث اليومية', 'success');
    } catch(e) { toast('فشل التحديث: ' + e.message, 'error'); }
  } else {
    // If user chooses "Diary", they should go to diary.html to fix it properly
    // or we could automate adding/removing "Generic" animals.
    // Given the complexity, directing to Diary is safer, but let's add a quick fix.
    toast('⚠️ يرجى التوجه لصفحة اليومية لإجراء التعديلات اللازمة لضمان دقة البيانات', 'warning');
    setTimeout(() => { window.location.href = 'diary.html?mode=edit'; }, 1500);
    return;
  }
  setTimeout(() => { location.reload(); }, 1200);
};

function renderPieChart(data, total) {
  if(!data.length) return;
  var size=200,cx=100,cy=100,r=80,ir=35;var sa=0;var paths='',legend='';
  var dc=['#00e676','#2196f3','#ff6b35','#9c27b0','#ffc107','#f44336','#00bcd4','#8bc34a','#ff9800','#e91e63'];
  var sc=JSON.parse(localStorage.getItem('breed_colors')||'{}');

  data.forEach((b,i) => {
    var angle=(b.total/total)*2*Math.PI; if(angle>=2*Math.PI-0.001) angle=2*Math.PI-0.001;
    var ea=sa+angle,lg=angle>Math.PI?1:0;
    var x1=cx+r*Math.cos(sa-Math.PI/2), y1=cy+r*Math.sin(sa-Math.PI/2);
    var x2=cx+r*Math.cos(ea-Math.PI/2), y2=cy+r*Math.sin(ea-Math.PI/2);
    var xi=cx+ir*Math.cos(sa-Math.PI/2), yi=cy+ir*Math.sin(sa-Math.PI/2);
    var xi2=cx+ir*Math.cos(ea-Math.PI/2), yi2=cy+ir*Math.sin(ea-Math.PI/2);
    var color = b.breed==='مواليد' ? (b.species==='goat'?'#ffc107':'#ff9800') : (sc[b.breed]||dc[i%dc.length]);
    var pct=Math.round(b.total/total*100);
    paths+=`<path d="M ${xi} ${yi} A ${ir} ${ir} 0 ${lg} 1 ${xi2} ${yi2} L ${x2} ${y2} A ${r} ${r} 0 ${lg} 0 ${x1} ${y1} Z" fill="${color}" opacity=".85" stroke="var(--bg)" stroke-width="2"><title>${b.breed}: ${ar(b.total)}</title></path>`;
    legend+=`<span style="font-size:.7rem;display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:50%;background:${color};display:inline-block"></span>${b.breed} ${ar(pct)}٪</span>`;
    sa=ea;
  });
  var pc=document.getElementById('pie-container');
  if(pc) pc.innerHTML=`<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="overflow:visible;max-width:100%">${paths}<circle cx="${cx}" cy="${cy}" r="${ir}" fill="var(--bg-2)"/><text x="${cx}" y="${cy-6}" text-anchor="middle" fill="var(--text)" font-size="20" font-weight="700" font-family="Lexend">${ar(total)}</text><text x="${cx}" y="${cy+12}" text-anchor="middle" fill="var(--text-gray)" font-size="10" font-family="Cairo">رأس</text></svg><div style="display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-top:8px">${legend}</div>`;
}

function renderWeather(w) {
  var wEl=document.getElementById('weather-widget');
  if(!w||!w.main){if(wEl)wEl.innerHTML='<div class="text-gray" style="font-size:.82rem"><i class="bi bi-cloud-slash me-2"></i>حالة الطقس غير متاحة</div>';return;}
  var temp=Math.round(w.main.temp);
  var isHot=temp>=35,isCold=temp<=10;
  var emoji=isHot?'🌡️':isCold?'🥶':temp>=25?'☀️':'⛅';
  var animalTip='';
  if(isHot) animalTip='تأثير على القطيع: زيادة المياه، تهوية الحظائر، خفض الكثافة. المواليد والحوامل في خطر.';
  else if(isCold) animalTip='تأثير على القطيع: أضف قش للمواليد والحوامل، أغلق فتحات التهوية ليلاً.';
  else animalTip='الطقس مناسب للقطيع — ظروف مثالية للرعاية والإنتاج.';
  
  if(wEl) wEl.innerHTML=`<div class="d-flex align-items-center gap-3 flex-wrap">
    <div style="font-size:1.8rem">${emoji}</div>
    <div><div class="fw-bold">${ar(temp)}° م</div><small class="text-gray">${w.weather[0].description}</small></div>
    <div class="ms-md-auto" style="font-size:.75rem;max-width:400px;color:var(--text-muted)">${animalTip}</div>
  </div>`;
}

// Modal Handlers
window.openAddAnimalDash=function(){
  var s=getSettings();
  showModal('<div class="farm-modal" onclick="event.stopPropagation()">'+
    '<h4><i class="bi bi-plus-circle accent-text"></i> إضافة حيوان سريع</h4>'+
    '<div class="row g-2">'+
      '<div class="col-6"><label>النوع</label><select class="field" id="da-sp" onchange="window._daBreeds()"><option value="goat">ماعز</option><option value="sheep">أغنام</option></select></div>'+
      '<div class="col-6"><label>الغرض</label><select class="field" id="da-pur"><option value="tarbiya">تربية</option><option value="tasmeen">تسمين</option></select></div>'+
    '</div>'+
    '<label>السلالة</label><select class="field" id="da-breed">'+s.goatBreeds.map(function(b){return'<option>'+b+'</option>';}).join('')+'</select>'+
    '<div class="row g-2">'+
      '<div class="col-6"><label>الجنس</label><select class="field" id="da-g"><option value="female">أنثى</option><option value="male">ذكر</option></select></div>'+
      '<div class="col-6"><label>رقم الترقيم</label><input class="field" id="da-tag" placeholder="A-001"></div>'+
    '</div>'+
    '<div class="d-flex gap-2 justify-content-end mt-3">'+
      '<button class="action-btn" onclick="closeModal()">إلغاء</button>'+
      '<button class="action-btn primary" onclick="_daSubmit()">حفظ</button>'+
    '</div>'+
  '</div>');
};
window._daBreeds=function(){var s=getSettings();var sp=document.getElementById('da-sp')?.value;var b=document.getElementById('da-breed');if(b)b.innerHTML=(sp==='goat'?s.goatBreeds:s.sheepBreeds).map(function(x){return'<option>'+x+'</option>';}).join('');};
window._daSubmit=async function(){
  var sp=document.getElementById('da-sp').value;
  var breed=document.getElementById('da-breed').value;
  var gender=document.getElementById('da-g').value;
  var purpose=document.getElementById('da-pur').value;
  var tag=document.getElementById('da-tag').value.trim();
  closeModal();toast('جاري الحفظ...','info');
  try{
    await fbPost('animals',{species:sp,breed,gender,purpose,status:'alive',tag:tag||null,birth_date:todayStr()});
    await logActivity('add','animals','إضافة سريعة: '+breed+' '+gender);
    toast('تمت الإضافة');
    setTimeout(function(){location.reload();},1200);
  }catch(e){toast('فشل: '+e.message,'error');}
};

window.openMarkDeathDash=async function(){
  var animals2=await fbGet('animals');
  var alive2=animals2.filter(function(a){return a.status==='alive';}).slice(0,200);
  showModal('<div class="farm-modal narrow" onclick="event.stopPropagation()">'+
    '<h4 style="color:var(--red)"><i class="bi bi-x-octagon"></i> تسجيل نفوق</h4>'+
    '<label>الحيوان</label><select class="field" id="dd-a"><option value="">— اختر —</option>'+
      alive2.map(function(a){return'<option value="'+a._id+'">'+a.breed+(a.tag?' #'+a.tag:'')+(a.gender==='male'?' ذكر':' أنثى')+'</option>';}).join('')+
    '</select>'+
    '<label>التاريخ</label><input type="date" class="field" id="dd-d" value="'+todayStr()+'">'+
    '<div class="d-flex gap-2 justify-content-end mt-3">'+
      '<button class="action-btn" onclick="closeModal()">إلغاء</button>'+
      '<button class="action-btn danger" onclick="_ddSubmit()">تسجيل</button>'+
    '</div>'+
  '</div>');
};
window._ddSubmit=async function(){
  var id=document.getElementById('dd-a').value;if(!id){toast('يرجى اختيار حيوان','error');return;}
  closeModal();
  try{
    await fbPatch('animals',id,{status:'dead',died_at:document.getElementById('dd-d').value});
    await logActivity('edit','animals','تسجيل نفوق');
    toast('تم تسجيل النفوق');
    setTimeout(() => { location.reload(); }, 1000);
  }catch(e){toast('فشل: '+e.message,'error');}
};
</script>
</body>
