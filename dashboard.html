<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<script>(function(){var t=localStorage.getItem('farm_theme');if(t==='light')document.documentElement.classList.add('light-mode');}());</script>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>الرئيسية — بيان المزرعة</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Lexend:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="media/logo-icon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="media/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="media/favicon-16.png">
<link rel="apple-touch-icon" href="media/apple-touch-icon.png">
<link rel="stylesheet" href="styles.css">
<style>
  .sync-status { font-size: 0.7rem; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border-3); }
  .sync-ok { color: var(--green); }
  .sync-conflict { color: var(--red); font-weight: 700; }
  .sync-btn { padding: 2px 8px; font-size: 0.65rem; border-radius: 4px; border: 1px solid; background: transparent; cursor: pointer; margin-top: 4px; transition: all 0.2s; }
  .sync-btn-apply { color: var(--green); border-color: var(--green); }
  .sync-btn-apply:hover { background: var(--green); color: #fff; }
  .summary-card { position: relative; overflow: hidden; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }
</style>
</head>
<body>
<div class="page-wrap rail-v2-content">
  <div id="page-header"></div>
  <div id="content"><div class="text-center py-5"><div class="spinner"></div></div></div>
  <footer class="text-center text-gray mt-5 pt-4 pb-3" style="border-top:1px solid var(--border)">
    <span id="footer-year"></span> &copy; <span id="footer-farm"></span><br>
    <small style="font-size:.72rem;color:var(--text-muted)">إشراف: لواء أحمد رجب نوح | تطوير: جندي مصطفى محمد إبراهيم</small>
  </footer>
</div>
<script src="config.js"></script>
<script src="firebase.js"></script>
<script src="nav.js"></script>
<script src="shared.js"></script>
<script>
/**
 * Dashboard Logic with Sync Conflict Resolution
 */
document.addEventListener('DOMContentLoaded', async function(){
  if(!requireAuth())return;
  // SECURITY FIX (Phase 6 hardening): nav.js grants this page perm:'dash',
  // but no can('dash') check enforced it -- same bug class already fixed
  // in cost.html/breeding.js/inventory.js/reports.js/finance.js/users.html.
  // In practice 'dash' is granted to every current role, so this guard is
  // defense-in-depth rather than a currently-exploitable gap -- added for
  // consistency and to protect against a future, more restrictive role.
  if (!can('dash')) {
    document.body.innerHTML='<div class="page-wrap"><div class="empty-state" style="padding-top:100px"><i class="bi bi-shield-x" style="font-size:3rem;display:block;margin-bottom:10px;opacity:.4"></i><p>غير مصرح بالوصول</p><a href="login.html" class="action-btn">تسجيل الدخول</a></div></div>';
    return;
  }
  initFirebase();
  var s=getSettings();
  document.getElementById('footer-year').textContent=ar(new Date().getFullYear());
  document.getElementById('footer-farm').textContent=s.farmName;
  renderNavbarV2('dashboard.html');

  var el=document.getElementById('content');
  renderLoading(el);

  try {
    const [animals, breeding, health, finance, meds, feeds, equipment, production, activity, weightAlerts, vaccinations, productionAlerts, dailyTasks, workflowHistory] = await Promise.all([
      fbGet('animals'), fbGet('breeding'), fbGet('health'), fbGet('finance'),
      fbGet('inventory_meds'), fbGet('inventory_feeds'), fbGet('inventory_equipment'),
      fbGet('production_log').catch(()=>[]), fbGet('activity_log').catch(()=>[]),
      fbGet('weight_alerts').catch(()=>[]), // Sprint 2, Epic 2
      fbGet('vaccinations').catch(()=>[]),  // Sprint 3, Epic 3
      fbGet('production_alerts').catch(()=>[]), // Sprint 4, Epic 4
      fbGet('daily_tasks').catch(()=>[]), // Sprint 6, Epic 6
      fbGet('workflow_history').catch(()=>[]) // Sprint 11 (v1.4) -- new, additive read
    ]);
    // Sprint 2, Epic 2: read-time staleness check for animals with no
    // recent weight -- fire-and-forget, never blocks dashboard rendering.
    if (window.evaluateMissingWeightAlerts) { window.evaluateMissingWeightAlerts(animals, 30).catch(function(){}); }
    renderDashboard(animals, breeding, health, finance, meds, feeds, equipment, production, activity, weightAlerts, vaccinations, productionAlerts, dailyTasks, workflowHistory);
    // Sprint 3, Epic 3: rank animals by health risk -- independent,
    // async, fire-and-forget. Never blocks the synchronous render above.
    // Sprint 5, Epic 5: ONE unified operational-priorities ranking,
    // replacing the separate Sprint 3 (health-risk) and Sprint 4
    // (production) rankings -- composes their existing outputs, never
    // recomputes them. Independent, async, fire-and-forget.
    if (window.renderUnifiedPriorities) { window.renderUnifiedPriorities(animals, health, weightAlerts, production).catch(function(){}); }
    // Sprint 9: unread notification summary link, independent async render.
    if (window.renderNotifSummaryLink) { window.renderNotifSummaryLink().catch(function(){}); }
    // v1.2: Farm Forecast Summary, independent async render.
    if (window.renderFarmForecastSummary) { window.renderFarmForecastSummary(animals, health, weightAlerts, production).catch(function(){}); }
    if (window.renderInventoryExecCard) { window.renderInventoryExecCard().catch(function(){}); }
  } catch(e) {
    toast('خطأ في التحميل: '+e.message,'error');
  }
});

function daysLeftDash(d){ return Math.ceil((new Date(d)-new Date())/86400000); }

function renderDashboard(animals, breeding, health, finance, meds, feeds, equipment, production, activity, weightAlerts, vaccinations, productionAlerts, dailyTasks, workflowHistory) {
  var s=getSettings();
  var el=document.getElementById('content');
  var alive = animals.filter(a => a.status === 'alive');

  // Helpers
  const isBirth = a => a.purpose === 'birth' || a.breed === 'مواليد';
  const arNum = n => ar(n);
  const today = todayStr();

  // Stats calculation (The "Actual" data from database)
  const stats = {
    total: alive.length,
    goats: alive.filter(a => a.species === 'goat').length,
    sheep: alive.filter(a => a.species === 'sheep').length,
    pregnant: breeding.filter(r => r.status === 'pregnant').length,
    goatBirths: alive.filter(a => a.species === 'goat' && isBirth(a)).length,
    sheepBirths: alive.filter(a => a.species === 'sheep' && isBirth(a)).length,
    dead: animals.filter(a => a.status === 'dead').length
  };

  // Finance
  var inc=finance.filter(r=>r.type==='income').reduce((t,r)=>t+(+r.amount||0),0);
  var exp=finance.filter(r=>r.type==='expense').reduce((t,r)=>t+(+r.amount||0),0);

  // ── Phase 1: Today Summary (real, date-filtered) ─────────────
  const todaySummary = {
    births: animals.filter(a => isBirth(a) && a.birth_date === today).length,
    deaths: animals.filter(a => a.status === 'dead' && a.died_at === today).length,
    income: finance.filter(r => r.type === 'income' && r.date === today).reduce((t,r)=>t+(+r.amount||0),0),
    expense: finance.filter(r => r.type === 'expense' && r.date === today).reduce((t,r)=>t+(+r.amount||0),0),
  };

  // ── Phase 1: Health snapshot (health collection was fetched but unused before) ──
  const activeHealth = health.filter(r => r.status === 'active');

  // ── Phase 1: Real inventory alerts (same thresholds inventory.html already uses) ──
  const lowMeds = meds.filter(m => +m.quantity <= +m.min_quantity && +m.min_quantity > 0);
  const lowFeeds = feeds.filter(f => +f.quantity <= +f.min_quantity && +f.min_quantity > 0);
  const expiringMeds = meds.filter(m => m.expiry && daysLeftDash(m.expiry) <= 7 && daysLeftDash(m.expiry) >= 0);
  const overdueMaint = equipment.filter(e => e.next_maintenance && daysLeftDash(e.next_maintenance) < 0);

  const priorityAlerts = [];
  if (todaySummary.deaths > 0) priorityAlerts.push({ severity:'critical', icon:'bi-heartbreak', title:`${ar(todaySummary.deaths)} حالة نفوق اليوم`, source:'القطيع', deadline:'اليوم', actionLabel:'عرض', actionHref:'animals.html' });
  if (lowMeds.length) priorityAlerts.push({ severity:'critical', icon:'bi-capsule', title:`${ar(lowMeds.length)} دواء وصل للحد الأدنى`, message: lowMeds.slice(0,3).map(m=>m.name).join('، '), source:'المخزون', actionLabel:'عرض', actionHref:'inventory.html' });
  // Sprint 6, Epic 6: the weight-alert entry that used to live here was
  // removed -- confirmed duplicated with Sprint 5's Unified Priorities
  // panel (docs/features/DASHBOARD-INVENTORY.md). activeWeightAlerts/
  // weekTrendDelta are still computed (used by the Unified Priorities
  // panel's own stats below), just no longer pushed into priorityAlerts
  // a second time.
  const activeWeightAlerts = (weightAlerts||[]).filter(a => a.status === 'active');
  const highRiskWeightAlerts = activeWeightAlerts.filter(a => a.severity === 'high');
  // Trend: alerts detected in the last 7 days vs the 7 days before that -- a real
  // week-over-week comparison, not just a cumulative total.
  const _now = new Date();
  const _7d = new Date(_now); _7d.setDate(_7d.getDate()-7);
  const _14d = new Date(_now); _14d.setDate(_14d.getDate()-14);
  const thisWeekAlerts = (weightAlerts||[]).filter(a => a.detected_at && new Date(a.detected_at) >= _7d).length;
  const lastWeekAlerts = (weightAlerts||[]).filter(a => a.detected_at && new Date(a.detected_at) >= _14d && new Date(a.detected_at) < _7d).length;
  const weekTrendDelta = thisWeekAlerts - lastWeekAlerts;
  if (overdueMaint.length) priorityAlerts.push({ severity:'watch', icon:'bi-tools', title:`${ar(overdueMaint.length)} معدّة متأخرة عن الصيانة`, source:'المخزون', actionLabel:'عرض', actionHref:'inventory.html' });
  if (expiringMeds.length) priorityAlerts.push({ severity:'watch', icon:'bi-hourglass-split', title:`${ar(expiringMeds.length)} دواء قريب من انتهاء الصلاحية`, message:'خلال أسبوع', source:'المخزون', actionLabel:'عرض', actionHref:'inventory.html' });
  if (lowFeeds.length) priorityAlerts.push({ severity:'watch', icon:'bi-basket', title:`${ar(lowFeeds.length)} علف وصل للحد الأدنى`, message: lowFeeds.slice(0,3).map(f=>f.name).join('، '), source:'المخزون', actionLabel:'عرض', actionHref:'inventory.html' });

  // ── Phase 1: Farm Health Score — composite, weighted, capped 0-100 ──
  // Starting from 100, deducting for real negative signals found above.
  // Weights are a reasonable starting point, not a certified formula — tune as needed.
  let healthScore = 100;
  healthScore -= Math.min(todaySummary.deaths * 15, 30);
  healthScore -= Math.min(lowMeds.length * 4, 12);
  healthScore -= Math.min(lowFeeds.length * 3, 9);
  healthScore -= Math.min(overdueMaint.length * 5, 15);
  healthScore -= Math.min(expiringMeds.length * 2, 8);
  const activeTreatRatio = stats.total > 0 ? activeHealth.length / stats.total : 0;
  if (activeTreatRatio > 0.15) healthScore -= 10; else if (activeTreatRatio > 0.05) healthScore -= 5;
  healthScore = Math.max(0, Math.min(100, Math.round(healthScore)));
  const healthLabel = healthScore >= 90 ? 'ممتاز' : healthScore >= 75 ? 'جيد' : healthScore >= 60 ? 'يحتاج انتباه' : 'حرج';
  const healthColor = healthScore >= 90 ? 'var(--green)' : healthScore >= 75 ? 'var(--blue)' : healthScore >= 60 ? 'var(--yellow)' : 'var(--red)';

  // ── Phase 3: Analytics Grid (real data, reconstructed where no history collection exists) ──
  const arMonths = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  const now3 = new Date();

  // 1. Herd Population Trend — reconstructed from birth_date/died_at (no snapshot history collection exists)
  const herdTrend = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now3.getFullYear(), now3.getMonth()-i, 1);
    const monthEnd = new Date(d.getFullYear(), d.getMonth()+1, 0).toISOString().slice(0,10);
    const count = animals.filter(a => {
      if (!a.birth_date || a.birth_date > monthEnd) return false;
      if (a.status === 'dead' && a.died_at && a.died_at <= monthEnd) return false;
      return true;
    }).length;
    herdTrend.push({ label: arMonths[d.getMonth()].slice(0,3), value: count });
  }

  // 2. Health Status Distribution — real categories only (this app tracks alive/dead + active-treatment,
  //    it does NOT track quarantine/sold as animal statuses, so those aren't invented here)
  const underTreatmentCount = Math.min(activeHealth.length, stats.total);
  const healthyCount = Math.max(0, stats.total - underTreatmentCount);
  const healthDistribution = [
    { label:'سليم', value: healthyCount, color:'#10b981' },
    { label:'تحت العلاج', value: underTreatmentCount, color:'#f59e0b' },
    { label:'نافق', value: stats.dead, color:'#ef4444' },
  ];

  // 3. Production Trend — real milk quantities, last 14 days (production_log, same field names production.html already uses)
  const milkLog = (production||[]).filter(p => p.type === 'milk');
  const prodTrend = [];
  for (let i = 13; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate()-i);
    const dStr = d.toISOString().slice(0,10);
    const dayTotal = milkLog.filter(p => p.date === dStr).reduce((t,p)=>t+(+p.quantity||0),0);
    prodTrend.push({ label: String(d.getDate()), value: dayTotal });
  }

  // 4. Revenue vs Expense — real finance records, grouped by month, last 6 months
  const revExpTrend = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now3.getFullYear(), now3.getMonth()-i, 1);
    const mStr = d.toISOString().slice(0,7);
    const monthInc = finance.filter(r => r.type==='income' && (r.date||'').startsWith(mStr)).reduce((t,r)=>t+(+r.amount||0),0);
    const monthExp = finance.filter(r => r.type==='expense' && (r.date||'').startsWith(mStr)).reduce((t,r)=>t+(+r.amount||0),0);
    revExpTrend.push({ label: arMonths[d.getMonth()].slice(0,3), values: [monthInc, monthExp] });
  }

  // ── Phase 3: Recent Records (unified across animals/health/finance, real dates) ──
  // Sprint 6, Epic 6: extended into the "Operational Timeline" -- same
  // merge/sort/render mechanism, four more event TYPES feeding it
  // (production, weight-alert detection, birth, task automation).
  // Each source collection is read exactly once here; no record is
  // pushed under two different types, so nothing appears twice.
  const recentRecords = [];
  animals.forEach(a => {
    const d = a.created_at || a.imported_at || a.birth_date;
    if (d) recentRecords.push({ date: d.slice(0,10), type:'حيوان', module:`${a.breed||''} ${a.gender==='male'?'ذكر':'أنثى'}`, status:a.status==='alive'?'حي':'نافق', statusCls:a.status==='alive'?'badge-tarbiya':'badge-danger' });
  });
  health.forEach(h => {
    if (h.date) recentRecords.push({ date:h.date, type:'صحة', module:h.diagnosis||h.medication||'—', status:h.status==='active'?'قيد العلاج':'مكتمل', statusCls:h.status==='active'?'badge-tasmeen':'badge-tarbiya' });
  });
  finance.forEach(f => {
    if (f.date) recentRecords.push({ date:f.date, type:'مالية', module:f.type==='income'?'إيراد':'مصروف', status:(+f.amount||0).toLocaleString('ar-EG')+' '+s.currency, statusCls: f.type==='income'?'badge-tarbiya':'badge-yellow' });
  });
  (production||[]).forEach(p => {
    if (p.date && (p.type==='milk'||p.type==='wool')) recentRecords.push({ date:p.date, type:'إنتاج', module:(p.animal_tag||'—')+' — '+(p.type==='milk'?'حليب':'صوف'), status:ar(p.quantity)+' '+(p.unit==='liter'?'لتر':'كجم'), statusCls:'badge-tarbiya' });
  });
  (weightAlerts||[]).forEach(w => {
    if (w.detected_at) recentRecords.push({ date:w.detected_at.slice(0,10), type:'وزن', module:(w.animal_tag||'—')+' — '+(w.action||'تنبيه'), status:w.status==='active'?'نشط':'مُغلق', statusCls:w.status==='active'?'badge-danger':'badge-tarbiya' });
  });
  (breeding||[]).forEach(b => {
    if (b.status==='born' && b.actual_birth) recentRecords.push({ date:b.actual_birth, type:'ولادة', module:(b.female_tag||'—')+' — '+ar(b.offspring_count||0)+' مولود', status:'مكتملة', statusCls:'badge-tarbiya' });
  });
  (dailyTasks||[]).forEach(t => {
    if (t.auto_generated && t.created_at) recentRecords.push({ date:t.created_at.slice(0,10), type:'أتمتة', module:t.title||'—', status:t.status==='done'?'مُنجزة':'معلّقة', statusCls:t.status==='done'?'badge-tarbiya':'badge-yellow' });
  });
  // Sprint 11 (v1.4): workflow completions join the SAME merge/sort/
  // render mechanism -- no new timeline component, reusing exactly
  // what Sprint 6 already established.
  const WORKFLOW_TYPE_LABEL = {birth:'ولادة',vaccination:'تحصين',medication:'علاج',weight:'وزن',production:'إنتاج',health:'صحة',sale:'بيع',death:'نفوق'};
  (workflowHistory||[]).forEach(w => {
    if (w.completed_at) recentRecords.push({ date:w.completed_at.slice(0,10), type:'مسار عمل', module:(WORKFLOW_TYPE_LABEL[w.workflow_type]||w.workflow_type)+' — '+(w.animal_tag||w.source_id||'—'), status:w.outcome==='success'?'نجح':'خطأ', statusCls:w.outcome==='success'?'badge-tarbiya':'badge-danger' });
  });
  recentRecords.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const recentRecordsTop = recentRecords.slice(0,10);

  // ── Sprint 6, Epic 6: Upcoming Tasks -- reads daily_tasks directly
  // (a genuinely new dashboard read of already-existing Sprint 1 data),
  // sorted by due date, pending/in_progress only. ──
  const upcomingTasks = (dailyTasks||[]).filter(t=>t.status!=='done').sort((a,b)=>(a.date||'').localeCompare(b.date||'')).slice(0,6);
  const overdueTasks = (dailyTasks||[]).filter(t=>t.status!=='done' && t.date && t.date<today);

  // ── Phase 3: Recent Activity (real activity_log, already written by logActivity() across the app) ──
  const recentActivity = [...(activity||[])].sort((a,b)=>(b.timestamp||'').localeCompare(a.timestamp||'')).slice(0,6);

  renderPageHeaderV2({
    title: 'مرحباً ' + getUser().name + ' 👋',
    description: s.farmName + ' — ' + todayAr(),
    secondaryActions: `<a href="diary.html" class="action-btn" style="background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.3);color:var(--orange)"><i class="bi bi-journal-text"></i> يومية المزرعة</a>
     <a href="assistant.html" class="action-btn" style="background:rgba(52,211,153,.1);border-color:rgba(52,211,153,.3);color:var(--green)"><i class="bi bi-robot"></i> المساعد الذكي</a>
     ${can('animals') ? `<button class="action-btn" onclick="openUnifiedBirthModal('goat')" style="background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.35);color:var(--yellow)"><i class="bi bi-stars"></i> مواليد</button>
       <button class="action-btn danger" onclick="openMarkDeathDash()"><i class="bi bi-x-octagon"></i> نفوق</button>` : ''}`,
    primaryAction: can('animals') ? `<button class="action-btn primary" onclick="openAddAnimalDash()"><i class="bi bi-plus-lg"></i> إضافة حيوان</button>` : ''
  });

  // Build Breed Data for table/chart
  var allBreeds = s.goatBreeds.map(k => ({k, sp:'goat'})).concat(s.sheepBreeds.map(k => ({k, sp:'sheep'})));
  var breedData = allBreeds.map(b => {
    var a = alive.filter(x => x.breed === b.k && x.species === b.sp);
    return {
      breed: b.k, species: b.sp, total: a.length,
      tarbiya: a.filter(x => x.purpose === 'tarbiya').length,
      tasmeen: a.filter(x => x.purpose === 'tasmeen').length,
      births: a.filter(x => x.purpose === 'birth').length
    };
  }).filter(b => b.total > 0).sort((a,b) => {
    // Group goats together first, then sheep — each group sorted by total (desc)
    if (a.species !== b.species) return a.species === 'goat' ? -1 : 1;
    return b.total - a.total;
  });

  // NOTE: the separate aggregate "مواليد" rows were removed on request.
  // Births are already detailed per-breed in the "مواليد" column of each row,
  // so the bottom aggregate rows duplicated that data.

  // UI Components — مرتبة: إجمالي | حوامل | [ماعز + مواليده] | [أغنام + مواليدها]
  const quickStatGroups = [
    // Row 1: إجمالي + حوامل (كاردات واسعة)
    { id:'total',      l:'إجمالي القطيع', v:arNum(stats.total),      c:'var(--orange)', i:'bi-bar-chart-fill', href:'animals.html',        wide:true },
    { id:'pregnant',   l:'حوامل',          v:arNum(stats.pregnant),   c:'var(--purple)', i:'bi-diagram-2',     href:'breeding.html',         wide:true },
    // Row 2: ماعز → مواليد الماعز → أغنام → مواليد الأغنام
    { id:'goats',      l:'الماعز',         v:arNum(stats.goats),      c:'var(--green)',  i:'bi-tropical-storm',href:'goats.html',             wide:false },
    { id:'goatBirths', l:'مواليد الماعز',  v:arNum(stats.goatBirths), c:'var(--green)',  i:'bi-stars',         href:'births.html?sp=goat',   wide:false },
    { id:'sheep',      l:'الأغنام',        v:arNum(stats.sheep),      c:'var(--blue)',   i:'bi-cloud-fill',    href:'sheep.html',            wide:false },
    { id:'sheepBirths',l:'مواليد الأغنام', v:arNum(stats.sheepBirths),c:'var(--blue)',   i:'bi-stars',         href:'births.html?sp=sheep',  wide:false },
  ];

  const tableRows = breedData.map(b => `
    <tr style="border-bottom:1px solid var(--border-3)">
      <td style="padding:8px;color:var(--text-gray)">${b.species==='goat'?'ماعز':'أغنام'}</td>
      <td style="padding:8px;font-weight:700">${b.breed}</td>
      <td style="padding:8px">${arNum(b.tarbiya)}</td>
      <td style="padding:8px">${arNum(b.tasmeen)}</td>
      <td style="padding:8px;color:var(--yellow)">${arNum(b.births)}</td>
      <td style="padding:8px;font-weight:700;color:var(--green)">${arNum(b.total)}</td>
    </tr>
  `).join('');

  el.innerHTML = `
    ${(() => {
      // Sprint 6, Epic 6: Daily Briefing. Every sentence below is
      // conditional on a real, computed number -- nothing is a
      // template that always renders regardless of data. Self-contained
      // (own variable names) for the same scoping-safety reason as the
      // KPI Strip above.

window.renderInventoryExecCard = async function() {

    var results = await Promise.all([fbGet('inventory_meds'), fbGet('inventory_feeds'), fbGet('feed_consumption')]);

    var lowStock = meds.filter(function(m){return +m.quantity<=+m.min_quantity && +m.min_quantity>0;}).length
                 + feeds.filter(function(f){return +f.quantity<=+f.min_quantity && +f.min_quantity>0;}).length;
    var outOfStock = meds.filter(function(m){return +m.quantity<=0;}).length + feeds.filter(function(f){return +f.quantity<=0;}).length;
    var feedRemaining = feeds.reduce(function(s,f){return s+((+f.quantity||0)*(+f.unit_weight||50));},0);

window.renderUnifiedPriorities = async function(animals, health, weightAlerts, production) {
  var container = document.getElementById('unified-priority-section');
  if (!container || !window.evaluateOperationalPriority) return;
  try {
    var activeHealthTags = new Set((health||[]).filter(function(r){return r.status==='active';}).map(function(r){return r.animal_tag;}));
    var activeWeightAnimalIds = new Set((weightAlerts||[]).filter(function(a){return a.status==='active';}).map(function(a){return a.animal_id;}));
    var producingAnimalIds = new Set((production||[]).filter(function(p){return p.type==='milk'||p.type==='wool';}).map(function(p){return p.animal_id;}));
    var candidates = (animals||[]).filter(function(a){
      return a.status!=='dead' && (activeHealthTags.has(a.tag) || activeWeightAnimalIds.has(a._id) || producingAnimalIds.has(a._id));
    });
    if (!candidates.length) { container.innerHTML = ''; return; }

    var results = [];
    for (var i=0; i<candidates.length; i++) {
      var a = candidates[i];
      var p = await window.evaluateOperationalPriority(a._id, a.tag, a.barn);
      if (p) results.push(p);
    }
    if (!results.length) { container.innerHTML = ''; return; }
    var ranked = window.rankOperationalPriorities ? window.rankOperationalPriorities(results) : results;
    var top = ranked.slice(0,5);

    var LEVEL_COLOR={critical:'var(--red)',high:'var(--orange)',medium:'var(--yellow)',low:'var(--green)'};
    container.innerHTML = 'الأعلى أولوية: ' + top.map(function(r){
      return '<a href="animal-detail.html?id='+r.animalId+'" style="color:'+(LEVEL_COLOR[r.level]||'var(--text)')+';text-decoration:none;font-weight:700" title="ثقة: '+(r.confidence==='high'?'عالية':'متوسطة')+' — '+r.contributingEngines.join('، ')+'">'+(r.animalTag||r.animalId)+' ('+ar(r.score)+')</a>';
    }).join('، ');
  } catch(e) { container.innerHTML = ''; }
};

async function checkSync(actual, animals) {
  // Get diary snapshot if exists, or calculate it
  // Since diary.html calculates from the same animals list, they are technically always synced
  // UNLESS we define "Diary" as a manual target.
  // Based on user request, let's look for a 'diary_snapshot' in Firebase which might store the "Correct" numbers
  try {
    const diarySnap = await fbGet('diary_snapshot');
    if (!diarySnap) {
      // If no snapshot, we assume sync is OK or we create one from current logic
      return;
    }

    const mapping = {
      'total': diarySnap.total,
      'goats': diarySnap.goats,
      'sheep': diarySnap.sheep,
      'goatBirths': diarySnap.goatBirths,
      'sheepBirths': diarySnap.sheepBirths
    };

    Object.keys(mapping).forEach(id => {
      if (mapping[id] !== undefined && actual[id] !== mapping[id]) {
        showConflict(id, actual[id], mapping[id]);
      }
    });
  } catch(e) { console.error('Sync check failed', e); }
}

function showConflict(id, actualVal, diaryVal) {
  const el = document.getElementById('sync-' + id);
  if (!el) return;
  el.innerHTML = `
    <div class="sync-conflict"><i class="bi bi-exclamation-triangle-fill"></i> تعارض مع اليومية</div>
    <div style="font-size:0.6rem; color:var(--text-muted)">اليومية: ${ar(diaryVal)} | الحالي: ${ar(actualVal)}</div>
    <div class="d-flex gap-1">
      <button class="sync-btn sync-btn-apply" onclick="resolveSync('${id}', ${diaryVal}, 'diary')">تطبيق اليومية</button>
      <button class="sync-btn" style="border-color:var(--gray); color:var(--gray)" onclick="resolveSync('${id}', ${actualVal}, 'actual')">اعتماد الحالي</button>
    </div>
  `;
}

window.resolveSync = async function(id, targetVal, source) {
  if (source === 'actual') {
    // If user chooses "Dashboard", update the snapshot to match current DB
    try {
      const animals = await fbGet('animals');
      const alive = animals.filter(a => a.status === 'alive');
      const isB = a => a.purpose === 'birth' || a.breed === 'مواليد';
      await fbPut('diary_snapshot', {
        total: alive.length,
        goats: alive.filter(a => a.species === 'goat').length,
        sheep: alive.filter(a => a.species === 'sheep').length,
        goatBirths: alive.filter(a => a.species === 'goat' && isB(a)).length,
        sheepBirths: alive.filter(a => a.species === 'sheep' && isB(a)).length,
        updated_at: new Date().toISOString()
      });
      toast('✅ تم اعتماد بيانات الداشبورد وتحديث اليومية', 'success');
    } catch(e) { toast('فشل التحديث: ' + e.message, 'error'); }
  } else {
    // If user chooses "Diary", they should go to diary.html to fix it properly
    // or we could automate adding/removing "Generic" animals.
    // Given the complexity, directing to Diary is safer, but let's add a quick fix.
    toast('⚠️ يرجى التوجه لصفحة اليومية لإجراء التعديلات اللازمة لضمان دقة البيانات', 'warning');
    setTimeout(() => { window.location.href = 'diary.html?mode=edit'; }, 1500);
    return;
  }
  setTimeout(() => { location.reload(); }, 1200);
};

function renderPieChart(data, total) {
  if(!data.length) return;
  var size=200,cx=100,cy=100,r=80,ir=35;var sa=0;var paths='',legend='';
  var dc=['#00e676','#2196f3','#ff6b35','#9c27b0','#ffc107','#f44336','#00bcd4','#8bc34a','#ff9800','#e91e63'];
  var sc=JSON.parse(localStorage.getItem('breed_colors')||'{}');

  data.forEach((b,i) => {
    var angle=(b.total/total)*2*Math.PI; if(angle>=2*Math.PI-0.001) angle=2*Math.PI-0.001;
    var ea=sa+angle,lg=angle>Math.PI?1:0;
    var x1=cx+r*Math.cos(sa-Math.PI/2), y1=cy+r*Math.sin(sa-Math.PI/2);
    var x2=cx+r*Math.cos(ea-Math.PI/2), y2=cy+r*Math.sin(ea-Math.PI/2);
    var xi=cx+ir*Math.cos(sa-Math.PI/2), yi=cy+ir*Math.sin(sa-Math.PI/2);
    var xi2=cx+ir*Math.cos(ea-Math.PI/2), yi2=cy+ir*Math.sin(ea-Math.PI/2);
    var color = b.breed==='مواليد' ? (b.species==='goat'?'#ffc107':'#ff9800') : (sc[b.breed]||dc[i%dc.length]);
    var pct=Math.round(b.total/total*100);
    paths+=`<path d="M ${xi} ${yi} A ${ir} ${ir} 0 ${lg} 1 ${xi2} ${yi2} L ${x2} ${y2} A ${r} ${r} 0 ${lg} 0 ${x1} ${y1} Z" fill="${color}" opacity=".85" stroke="var(--bg)" stroke-width="2"><title>${b.breed}: ${ar(b.total)}</title></path>`;
    legend+=`<span style="font-size:.7rem;display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:50%;background:${color};display:inline-block"></span>${b.breed} ${ar(pct)}٪</span>`;
    sa=ea;
  });
  var pc=document.getElementById('pie-container');
  if(pc) pc.innerHTML=`<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="overflow:visible;max-width:100%">${paths}<circle cx="${cx}" cy="${cy}" r="${ir}" fill="var(--bg-2)"/><text x="${cx}" y="${cy-6}" text-anchor="middle" fill="var(--text)" font-size="20" font-weight="700" font-family="Lexend">${ar(total)}</text><text x="${cx}" y="${cy+12}" text-anchor="middle" fill="var(--text-gray)" font-size="10" font-family="Cairo">رأس</text></svg><div style="display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-top:8px">${legend}</div>`;
}

function renderWeather(w) {
  var wEl=document.getElementById('weather-widget');
  if(!w||!w.main){if(wEl)wEl.innerHTML='<div class="text-gray" style="font-size:.82rem"><i class="bi bi-cloud-slash me-2"></i>حالة الطقس غير متاحة</div>';return;}
  var temp=Math.round(w.main.temp);
  var isHot=temp>=35,isCold=temp<=10;
  var emoji=isHot?'🌡️':isCold?'🥶':temp>=25?'☀️':'⛅';
  var animalTip='';
  if(isHot) animalTip='تأثير على القطيع: زيادة المياه، تهوية الحظائر، خفض الكثافة. المواليد والحوامل في خطر.';
  else if(isCold) animalTip='تأثير على القطيع: أضف قش للمواليد والحوامل، أغلق فتحات التهوية ليلاً.';
  else animalTip='الطقس مناسب للقطيع — ظروف مثالية للرعاية والإنتاج.';
  
  if(wEl) wEl.innerHTML=`<div class="d-flex align-items-center gap-3 flex-wrap">
    <div style="font-size:1.8rem">${emoji}</div>
    <div><div class="fw-bold">${ar(temp)}° م</div><small class="text-gray">${w.weather[0].description}</small></div>
    <div class="ms-md-auto" style="font-size:.75rem;max-width:400px;color:var(--text-muted)">${animalTip}</div>
  </div>`;
}

        '<label>تم التشريح؟</label>'+
        '<select class="field" id="dd-autopsy">'+
          '<option value="no">لا</option>'+
          '<option value="yes">نعم</option>'+
        '</select>'+
      '</div>'+
      '<div class="col-6">'+
        '<label>قيمة الخسارة ('+getSettings().currency+')</label>'+
        '<input type="number" class="field" id="dd-loss" placeholder="0" min="0">'+
      '</div>'+
    '</div>'+
    '<label>معرف الوفاة</label>'+
    '<input class="field" id="dd-death-id" placeholder="DTH-YYYYMMDD-XXXX">'+
    '<label>ملاحظات <span class="text-gray" style="font-weight:400">(اختياري)</span></label>'+
    '<textarea class="field" id="dd-notes" rows="2"></textarea>'+
    '<div class="d-flex gap-2 justify-content-end mt-3">'+
      '<button class="action-btn" onclick="closeModal()">إلغاء</button>'+
      '<button class="action-btn danger" onclick="_ddSubmit()">تسجيل</button>'+
    '</div>'+
  '</div>');
};
window._ddSubmit=async function(){
  var id=document.getElementById('dd-a').value;if(!id){toast('يرجى اختيار حيوان','error');return;}
  var diedAt=document.getElementById('dd-d').value;
  var deathTime=document.getElementById('dd-time')?.value;
  var deathReason=document.getElementById('dd-reason')?.value;
  var deathAutopsy=document.getElementById('dd-autopsy')?.value==='yes';
  var deathLoss=parseFloat(document.getElementById('dd-loss')?.value)||null;
  var deathNotes=document.getElementById('dd-notes')?.value;
  var deathId=document.getElementById('dd-death-id')?.value;
  closeModal();
  try{
    await fbPatch('animals',id,{status:'dead',died_at:diedAt,death_time:deathTime,death_reason:deathReason,death_autopsy:deathAutopsy,death_loss:deathLoss,death_notes:deathNotes,death_id:deathId});
    if(deathLoss>0){
      await fbPost('finance',{
        date:diedAt,type:'loss',category:'نفوق حيوانات',
        amount:deathLoss,
        description:'نفوق — '+deathId+(deathReason?' | '+deathReason:''),
        added_by:getUser()?.name
      });
    }
    await logActivity('edit','animals','نفوق: '+deathId+' | '+deathReason+(deathAutopsy?' | تشريح':''));
    toast('تم تسجيل النفوق');
    setTimeout(() => { location.reload(); }, 1000);
  }catch(e){toast('فشل: '+e.message,'error');}
};
</script>
</body>
</html>
