<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>الرئيسية — بيان المزرعة</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Lexend:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="page-wrap">
  <div id="page-header"></div>
  <div id="content"><div class="text-center py-5"><div class="spinner"></div></div></div>
  <footer class="text-center text-gray mt-5 pt-4 pb-3" style="border-top:1px solid var(--border)">
    © <span id="footer-year"></span> <span id="footer-farm"></span>
  </footer>
</div>
<script src="config.js"></script>
<script src="firebase.js"></script>
<script src="shared.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async ()=>{
  if(!requireAuth())return;
  initFirebase();
  const s=getSettings();
  document.getElementById('footer-year').textContent=ar(new Date().getFullYear());
  document.getElementById('footer-farm').textContent=s.farmName;
  renderNavbar('dashboard.html');

  const el=document.getElementById('content');
  renderLoading(el);

  let animals=[], vaccinations=[], breeding=[], health=[], finance=[];
  try{
    [animals,vaccinations,breeding,health,finance]=await Promise.all([
      fbGet('animals'),fbGet('vaccinations'),fbGet('breeding'),fbGet('health'),fbGet('finance')
    ]);
  }catch(e){toast('خطأ في التحميل: '+e.message,'error');}

  const alive=animals.filter(a=>a.status==='alive');
  const tG=alive.filter(a=>a.species==='goat'&&a.purpose!=='birth').length;
  const tS=alive.filter(a=>a.species==='sheep'&&a.purpose!=='birth').length;
  const births=alive.filter(a=>a.purpose==='birth').length;
  const dead=animals.filter(a=>a.status==='dead').length;
  const pregnant=breeding.filter(r=>r.status==='pregnant').length;
  const treating=health.filter(r=>r.status==='active').length;
  const inc=finance.filter(r=>r.type==='income').reduce((s,r)=>s+(+r.amount||0),0);
  const exp=finance.filter(r=>r.type==='expense').reduce((s,r)=>s+(+r.amount||0),0);
  const curr=s.currency;

  renderPageHeader(
    `مرحباً ${getUser().name} 👋`,
    `${s.farmName} — ${todayAr()}`,
    can('animals')?`<a href="animals.html" class="action-btn primary"><i class="bi bi-plus-lg"></i> إضافة حيوان</a><a href="reports.html" class="action-btn"><i class="bi bi-graph-up"></i> التقارير</a>`:''
  );

  const quickStats=[
    {l:'إجمالي القطيع', v:tG+tS+births, c:'var(--orange)', i:'bi-bar-chart-fill', href:'animals.html'},
    {l:'الماعز',         v:tG,            c:'var(--green)',  i:'bi-tropical-storm', href:'animals.html?species=goat'},
    {l:'الأغنام',        v:tS,            c:'var(--blue)',   i:'bi-cloud-fill',     href:'animals.html?species=sheep'},
    {l:'المواليد',       v:births,        c:'var(--yellow)', i:'bi-stars',          href:'animals.html?purpose=birth'},
    {l:'حوامل',          v:pregnant,      c:'var(--purple)', i:'bi-diagram-2',      href:'breeding.html'},
    {l:'قيد العلاج',     v:treating,      c:'var(--red)',    i:'bi-heart-pulse',    href:'health.html'},
  ];

  const allBreeds=[...s.goatBreeds.map(k=>({k,e:'🐐'})),...s.sheepBreeds.map(k=>({k,e:'🐑'}))];

  el.innerHTML=`
  <div class="row g-3 mb-4">
    ${quickStats.map((st,i)=>`<div class="col-6 col-md-4 col-lg-2">
      <a href="${st.href}" style="text-decoration:none">
        <div class="summary-card"><i class="bi ${st.i} d-block mb-2" style="font-size:1.3rem;color:${st.c}"></i>
        <div class="summary-number" style="color:${st.c}">${ar(st.v)}</div>
        <small class="text-gray">${st.l}</small></div>
      </a></div>`).join('')}
  </div>

  ${can('finance')?`<div class="row g-3 mb-4">
    <div class="col-md-4"><div class="wonder-card text-center">
      <div style="font-size:1.1rem;font-weight:700;color:var(--green)">${inc.toLocaleString('ar-EG')} ${curr}</div>
      <small class="text-gray">الإيرادات</small></div></div>
    <div class="col-md-4"><div class="wonder-card text-center">
      <div style="font-size:1.1rem;font-weight:700;color:var(--orange)">${exp.toLocaleString('ar-EG')} ${curr}</div>
      <small class="text-gray">المصروفات</small></div></div>
    <div class="col-md-4"><div class="wonder-card text-center">
      <div style="font-size:1.1rem;font-weight:700;color:${inc-exp>=0?'var(--green)':'var(--red)'}">${(inc-exp>=0?'+':'')+(inc-exp).toLocaleString('ar-EG')} ${curr}</div>
      <small class="text-gray">صافي الربح</small></div></div>
  </div>`:''}

  <h6 class="fw-bold mb-3"><i class="bi bi-grid-3x3-gap-fill accent-text"></i> توزيع السلالات</h6>
  <div class="row g-3 mb-4">
    ${allBreeds.map(({k,e})=>{const bs=breedStats(animals,k);return`
    <div class="col-md-4 col-sm-6">
      <div class="breed-card">
        <div class="breed-header"><div class="breed-icon">${e}</div>
        <div><div class="fw-bold">${k}</div><small class="text-gray">${ar(bs.total)} حيوان</small></div></div>
        <div class="row g-2">
          <div class="col-6"><div class="gender-box"><span class="gender-count green-text">${ar(bs.tarbiyaMale)}</span><small class="text-gray">ذكور تربية</small></div></div>
          <div class="col-6"><div class="gender-box"><span class="gender-count green-text">${ar(bs.tarbiyaFemale)}</span><small class="text-gray">إناث تربية</small></div></div>
          <div class="col-6"><div class="gender-box"><span class="gender-count accent-text">${ar(bs.tasmeenMale)}</span><small class="text-gray">ذكور تسمين</small></div></div>
          <div class="col-6"><div class="gender-box"><span class="gender-count accent-text">${ar(bs.tasmeenFemale)}</span><small class="text-gray">إناث تسمين</small></div></div>
        </div>
        <div class="mt-2">${bs.tarbiya>0?`<span class="type-badge badge-tarbiya">تربية ${ar(bs.tarbiya)}</span> `:''} ${bs.tasmeen>0?`<span class="type-badge badge-tasmeen">تسمين ${ar(bs.tasmeen)}</span>`:''}</div>
      </div>
    </div>`;}).join('')}
  </div>

  <div class="births-section">
    <h6 class="fw-bold mb-3"><i class="bi bi-stars" style="color:var(--yellow)"></i> الولدات — ${ar(births)}</h6>
    <div class="row g-3">
      ${['goat','sheep'].map(sp=>{
        const b=alive.filter(a=>a.species===sp&&a.purpose==='birth');
        return`<div class="col-md-6">
          <div class="d-flex justify-content-between align-items-center p-3" style="background:rgba(255,255,255,.03);border-radius:12px">
            <div><div class="fw-bold">${sp==='goat'?'ولدات الماعز':'ولدات الأغنام'}</div><small class="text-gray">${ar(b.length)}</small></div>
            <div class="d-flex gap-3">
              <div class="text-center"><div class="fw-bold green-text">${ar(b.filter(a=>a.gender==='male').length)}</div><small class="text-gray">ذكور</small></div>
              <div class="text-center"><div class="fw-bold accent-text">${ar(b.filter(a=>a.gender==='female').length)}</div><small class="text-gray">إناث</small></div>
            </div>
          </div></div>`;
      }).join('')}
    </div>
  </div>`;
});
</script>
</body>
</html>
